body:
  text: 後樂集巻十一宋衛涇撰奏議繳劉伯震換武職劄臣聞武階以横行爲重非有功不遷遥領至戎團二級在右列爲寵平居無事猶當謹惜以重名器若建功立業之際正所恃爲犇走激勸之具尤不可授非其人也臣近者伏見劉伯震奉聖㫖換武除環衛官繼而授武大夫遥郡團練使臣初謂中興諸將之家例許換武巳嘗書行退而詢之公論稽之令甲則有甚不然者伯震爲劉光世親孫不可謂非名將之後但其人姿禀輕浮趣向凡下不紹前烈習成驕騃識與不識目爲劉僥此非美名也伯震偃然居之曽無愧悔嘗得湖州倅即爲臣僚繳駮自是由祠禄倅嚴陵夤縁再任前後别無履厯儻其有志事功與之換武使宣勞効亦何不可臣竊攷乾道重修中書門下省文臣換官格朝奉大夫遥郡刺史據伯震自稱見該磨勘亦不過得武大夫惟帶職朝請大夫以下三階方許換左右武大夫亦止遥郡刺史即無朝散大夫換右武大夫遥郡團練使條格兼武臣官至武功大夫自礙止法有終身不得轉行者伯震何人輒爾超躐意猶未滿乃援楊文昌爲比多見其不知量伯震視文昌階官雖不逺文昌三爲丞郎曽經朝廷擢用玉音嘉奬優示褒除正任刺史是爲特恩安得爲例至於韓杖亦有聖語褒揚猶止依格換授伯震固不應與二人比矧陛下規恢逺略旌㧞人才正功名之士踴躍思奮之秋方且以是官賞邊功勵將帥顧如伯震者得之非分恐聞之不以朝廷恩榮爲重而臨事或解體矣或言伯震近時稍加收斂然其市井儇薄之稱喧傳中外之久未聞有植立以自表見一旦加諸右班之上庸人孺子皆得意而侮之亦何以聳聽觀瞻重環尹之寄哉臣用是不避仇怨爲陛下别白言之欲望聖慈將劉伯震換官指揮止與依條格換授允叶公論増重横列戎團之選使違法徼求者有所不容庶幾朝廷益以尊嚴紀綱益以振肅誠非小補所以詞頭臣未敢撰述謹録聞伏候勅㫖十七日得㫖依繳兵部郎官劉炳除江西提舉劄臣竊惟常平使者之任分一道刺舉之權若昔先朝選掄特重在外必登最郡課綽有治聲在内必服勤郎省著聞朝績始與兹選是爲拔擢倘授非人則公論不置臣伏見新除江西提舉劉炳試州逺外資望甚淺夤縁收召遂厠朝列繼以宣司辟置諮議超列郎選以寵其行而炳天資闇愚材術踈短職在裨贊補報蔑如進退之間義當自審顧方入部就職偃然安居物議蜚騰乃謀去就復徼幸使節迄遂所欲丐外之章不知引咎猶謂非不欲趨事赴功敢爲大言欺罔衆聽學士大夫宜知禮義㢘恥行不顧言當如是乎縱朝廷寛大不欲加罪使之善去幸矣况炳爲丞未久爲郎又纔數日凡郎曹久次而去者亦不過得節是冝幽黜而反㧞擢人雖置而不問炳獨不知愧乎臣愚欲望聖慈特發睿斷將劉炳新除江西提舉指揮特賜寢罷且與待闕州軍差遣庶幾朝廷不至過予在炳受之亦安乃所以全其進退之節不勝幸甚所有録黄臣未敢書行謹録奏聞伏候勅旨初四日得旨依繳夀慈宫内侍王師珪等鐫降狀臣聞賞以勸有功罰以徵弗恪輕重貴乎適中不可有所偏也迺者癸丑之夕夀慈宫火陛下特降御筆以上驚慈闈徹樂避殿恐懼修省夫以一人之尊躬自貶損不遑寧處而本宫官吏儲備無素守䕶不䖍惡得不任其咎陛下欽崇孝養方務調娱未暇致詰提舉官吳囘三人者懐不自安騰章自列旋頒睿㫖各從鐫削可謂曲全之恩臣近縁忝冐承攝於詞頭中竊見指揮凡夀慈宫應奉官吏等到宫實及五年各轉一官資考其員數六百三十有四未及五年者又四百二十九人夫以平居無事安坐受賞若此猥衆而失職抵罰不過二三臣固疑之今臺臣有彈疏乞將應奉官等黜降謂當大明典憲以警弛慢而所降聖㫖王師珪王溶各降一官楊旦降一官罷幹辦事務人數多寡臣未敢問惟是吳囘等自劾尚奪二秩王師珪等皆有論奏楊旦者罪狀尤著止削一階輕重毋乃有所偏乎况前日救火官兵陛下以慈闈之重隨即第賞曽不淹時賞固所以爲勸而罰不足示懲顧何以詔四方而厲百辟乎借曰太皇太后聖意寛厚不欲重有誅責然賞罰之行紀綱所繫又安可以恩而廢法乎臣不敢以代庖之蹔有所隱黙欲望聖慈特發睿斷將王師珪王溶照吴囘等一體鐫降其楊旦再與鐫斥庶幾少慰輿議儆肅宫臣懲勸之方斯爲兩得繳榮傅辰改正狀臣聞朝廷行法非難守法爲難法之所在行之果而守之堅則人有所畏而不敢犯若能行於一時而不能守於異日則將啓人之玩心而不知懲創矣諸事已經斷而理訴者一年内聽乞别勘三年聽别定其經勅斷者詣闕進狀此法也今榮傅辰嘗任蕭山知縣在任以不法取勘曾經伏辨准勅比加役流賍罪追毁出身以來文字除名勒停則是法已行矣傅辰既而申訴亦嘗詣闕進狀臣取索到刑部文案法寺則以爲應得别定條法合具申朝廷行下無干礙監司照應别定條法施行刑部則以傅辰所訴未應條法乞朝廷批狀告示據此二說則傅辰所訴未可遽從甚明今置有司之言不問而直與改正則於守法之意毋乃或未安乎臣竊惟陛下比來與二三大臣修明紀綱嚴賍吏之禁恐爲民害犯者不貸若巳經勘結勅斷如傅辰輩容易與之改正則凡不曽勘結伏辨而以賍罪廢罷者豈得無辭以自解乎兼傅辰狀自稱元勘寃屈臣未暇詳究其事或萬一有如所訴何惜不與從條别定然後斟酌施行庶足以昭示至公在朝廷不失爲守法在傅辰容有可諉者臣職守所在既有愚見難以緘黙所有録黄臣未敢書行謹録奏聞伏候勅㫖繳徐柟祠禄狀臣竊惟御史耳目之司朝廷紀綱所係惟無私乃能體國正巳斯可律人必振揚風采砥礪㢘隅然後風憲尊嚴百辟整肅伏見朝奉郎徐柟素乏聲稱誤膺簡㧞自頃入臺凡所論奏多不厭塞物望其劾翁㸃也反爲㸃上章詆毁指其所言率挾私意柟雖苦詞辨數訖無以自解識者固已譏其辱臺所宜引避乃偃然自安巳而蘇師旦之敗交通之跡尤爲彰露物議甚喧亦可以言去就矣而柟包羞居職如罔聞知累月以來一無建明日惟覬望遷擢此其風采銷靡㢘恥道䘮尚足以稱陛下糾繩之任乎近因縱容親戚販鬻私酒暨場務捕獲動以千計付之有司公行可也乃力與庇䕶甚至縱令僕厮爭奪紛競都人聚觀請囑守臣必欲釋放遂至徹聞天聽陛下曲全事體猶攽南郡之命今因其引疾畀以祠禄陛下所以待柟可謂厚矣而柟不自愛重上負陛下久尸要任敗壊臺綱若不别白言之切慮中外莫知其故反疑陛下輕去臺臣有累聖德臣愚欲乞睿斷將徐柟祠禄指揮特賜寢罷俾之循省庶幾上以彰陛下黜陟之公下以釋搢紳疑似之論不勝幸甚臣雖時暫兼攝不敢隱嘿隳廢職守所有録黄臣未敢書讀謹録奏聞伏候勅㫖六月七日奉聖㫖依應詔論北伐劄子臣疎賤至愚暫爾兼官猥奉明詔使得吐露與聞邊議之重仰見陛下博盡下情憂深慮逺以圖帝王萬全之至計臣敢不罄竭愚忠臣竊惟國家再修盟好以來邊境晏清中外寧謐民不知兵以保和平之福蓋踰四十年于此比來敵運衰微内當多事自敝之餘頗爲恭順外知吾國飭備之謹寖生疑懼伏覩宣示類聚探報事宜其虚實的確雖不可盡知臣妄料敵情不過因並邊侵軼之擾多爲防備必未敢輕犯王畧自速殄亡近者賀正使副陳景俊等囘程竊知北廷嘗有文諭其詞委曲類若退懦然觀其指意只欲求邊臣無生事盜賊不作邊境安静而巳今探報所云修道路閱舟師㸃集兵夫添置寨栅等事徃徃其國眎吾増戍隨亦葺備施行未必周悉傳聞易至張皇譬之對奕彼此相應此示之急則彼亦急此示之緩則彼亦緩如邇日朝廷分制使命相繼宣諭諜間徃來彼寧不知恐其展轉生疑安知凡百繕守殆將不止如目前所傳此亦事勢之所必至毋足怪者臣反覆熟慮今日之計惟當審在我之虚實以爲備禦必勝之䇿無或隨在彼之動静以爲作輟無定之謀自古兩國相持未聞强弱持重者安輕動者危應兵常勝首事常沮秦漢之逺未暇悉論東晉事體大畧類今謝𤣥淝水之勝苻堅舉國之衆匹馬不能北返此應兵必勝之騐也禇裒殷浩投機太速勞師于外曽微寸功此首事多沮之鑒也本朝中興以後凡渝盟興師常先出于敵然敵首兵毎衂而我應兵常得利烏珠號善用兵獨潁昌大敗以十萬勁騎不能支劉錡背城之一戰金亮氣焰方張自謂可以叱咤渡江而海道采石所向輒挫卒授首于廣陵此二役者彼以首兵而皆敗今日侵犯之謀果先出於彼是以機授我堅師不動以待之正不足畏矧㓂之既衰萬萬不及烏珠金亮强盛臣知其必不能出此明矣易曰不利爲㓂利禦㓂今當令彼常居爲㓂之名而在我先定禦㓂之計是遺彼以不利而我擇其甚利圖全制勝莫切於此兵法曰善戰者致人不善戰者致于人臣所謂持重則安致人者也輕動則危致于人者也若北敵自貽伊戚警我邊陲是堕乎致于我之術矣以静制動以逸待勞豈不能收潁昌城下卻敵之效乎臣所慮者彼此疑障既開邊備未可輕撤要當力於自治堅忍持重勿爲無益之争以啓其侮勿爲易泄之機以激其變稍遲歲月使吾之戎政益修軍實愈覈儲蓄豐裕士馬騰奮則伸縮進退無不在我遲速操縱終可以得志矣中國舉措尤貴嚴宻若朝得一報而爲之營營不寧夕得一奏而遽謂晏然無事臣恐非所以示朝廷之整暇而敵人得以窺測淺深也昔魯有疆事疆吏以告魯威公曰疆場之事謹守而備其不虞姑盡所備事至而戰又何謁焉魯豈忘疆事哉蓋内爲之備而外不示弱此有所主而彼不能動耳豈以天下之大而可無自立之規模乎臣有惓惓之愚夫事有先後謀有緩急譬人之一身腹心無疾而後外邪可攻今備邊之計誠不可緩而荆襄兩淮所在饑民未甚帖息尤所當急若艱食者衆萬一盜賊有警則㓂得窺伺之便而始有重煩朝廷之憂者其可不亟圖之臣願陛下申敕諭使司且以撫安饑民爲先使腹心敉寧根本充實則内安外懼而禦備之䇿可以無闕臣識見短淺冒陳管臆不足以仰禆廟算席藁恐懼陛下赦之幸甚應詔舉人才舉游九言錢文子黄冝狀承尚書吏部牒凖今月十二日都省劄子節文七月十二日三省同奉聖㫖在内令侍從臺諫兩省卿監郎官不拘文武臣各舉人才三兩人某人有某才堪辦某事某人有某能可任某責並須明著實迹結罪保明仍限三日具奏者臣伏覩通直郎主管建昌軍仙都觀游九言資才剛實不専意於文藝淳熈間知静江府張栻嘗露薦章於孝廟稱其臨事有斷留意軍伍間事今已三十年更嘗既多其才益老近任江東撫幹贊畫帥閫區處事務軍民至今思之但其人過於自許幾有亢訐之累如朝廷棄瑕録用置之幕府或邊鎮任使必能盡瘁報國有所植立朝奉郎主管台州崇道觀錢文子器識𢎞毅不以科目自居頃繇幕僚改秩宰邑醴陵不卑其官刻意民事撫摩善良鋤治姦惡盜賊爲之屏息豪强望風斂戢縣計上供之外沛然有餘及試郡天台振厲風采治民馭軍寛猛得宜偶嘗處事少差未免矯枉之失如朝廷湔祓簡拔處以繁劇州郡或經理財賦必能彈壓斡旋不至乏事承議郎前通判慶元軍府黄宜世事精練吏道敏强嘗爲劇縣財計不擾而辦獄訟咸得其平吏畏民愛前後少見其比嘉泰二年有㫖令宰執論薦邊郡守臣謂宜才學優長邑政有聲足以充選縁其資格未及且俾實厯通判得倅四明郡政多所裨補海道利便講之尤熟兼曽在淮郡守官諳悉事體議論可聽倘䝉朝廷照已降指揮擢用或别有繁難職任其才蓋所優爲臣竊思朝廷興舉事功貪才使過之時此三人者皆有可用之實不宜寘之閑地今或嘗因廢黜見處祠禄或任滿替罷未有差遣是敢冒昧上塞明詔如將來不如所舉臣甘坐謬舉之罰除吏部侍郎舉樓昉自代狀準令節文侍從官受訖三日内舉官一員充自代者臣伏覩從事郎新差監行在㸃檢贍軍激賞酒庫所糴場門樓昉粹學瓌文通材奥識亶推逺器宜服顯塗使居銓綜之司必有平允之譽循名責實臣所不如願改恩章以光賢舉今舉充自代論聖學劄子臣聞學者爲王者事自昔帝王莫不以學爲本然學有小大分章析句牽制文義此書生之學也究聖賢之用心明古今之大致識安危治亂之體察善惡消長之機斯爲帝王之大學臣恭惟陛下聰明天縱不自矜伐即位之初首下明詔博延儒英増置講讀紬繹經史從容賜坐一日再御情亡厭倦可謂知所本矣邇者側聞玉音宣諭今後晚講各須講解義理引古證今庻不爲文具若只讀過恐無益於事大哉王言臣有以見陛下識度高逺精進不已知求多聞之有益於聖徳也臣誠不佞抑聞之先哲學則必問問然後爲學學者聖之先務問者學之大方也孔子稱舜大智必曰好問仲虺戒成湯必曰好問則裕易乾之六爻龍徳變化皆聖人也九二見龍在田孔子曰龍徳而正中也亦由學以聚之問以辨之逮至九五飛龍在天則與天地合徳日月並明學問之功其大矣哉儻若誦說雖勤而誠意之不充見聞雖廣而躬行之不力深恐猶爲觀美而於王功帝績未知所用力之地也董子曰尊其所聞則高明矣行其所知則光大矣高明光大不在乎他在乎加之意而已臣伏願陛下講學之際更留聖心咨詢考問以盡臣下之情反復研究以求理道之要磨礲漸漬日累月積䟽瀹其心源斟酌於義味自然德性成就知慮開明物來而能名事至而能應以之用人則邪佞者逺忠直者伸以之立政則蠧弊日銷績效日著何爲而不成何求而不獲哉昔唐太宗平定四方有志治道選文學之士日侍閒燕或論徃古成敗或問民間事情言及暗主亂朝則省懼自戒言及賢君理代則企竦思齊言及稼穡艱難則務遵勤儉言及閭閻疾苦則議息征徭惟其見善必從聞義必徙用成貞觀之治庻幾成康爲功徳兼隆之主此又尊所聞行所知之明驗也以陛下天資粹美進徳無疆上焉唐虞三代下焉亦不失爲唐太宗惟陛下留神幸甚取進止應詔舉彭法輔廣充奉使之選狀凖尚書吏部牒備準尚書省劄子三月二日奉聖㫖令兩省侍從臺諫各於文武臣内舉堪充奉使二人限三日聞奏臣伏覩儒林郎辟差充揚州江都縣丞彭法雖出特科尚負壯志長於言論深識事機忠訓郎監潭州南嶽廟輔廣生於將閥學有師承志切憂時言皆中理今保舉堪充奉使之選應詔舉耿羽王好生充通書金國元帥府人狀準吏部牒開禧三年九月十八日三省樞宻院劄子九月十八日三省樞宻院奉聖㫖令兩省侍從臺諫於在朝職事官院轄京局官内各選舉堪充三省樞宻院通書金國元帥府人一二人限一日聞奏知州縣官内有堪充者亦聽選舉臣伏覩承議郎提轄行在左藏東西庫耿羽性資慷慨志慮忠純曉暢事機尤長議論廸功郎新特差充淮西路轉運司幹辦公事王好生深達時務有志事功談辯詳明智畧可取今選舉堪充三省樞宻院通書官除御史中丞舉倪思充自代狀臣伏覩中大夫提舉江州太平興國宫倪思歴事三朝秉持一德親結知於聖主義不辱於權臣欲大正於紀綱冝首登於風憲願回恩渙允叶師虞今舉充自代論朝議大夫易祓朝請郎太常少卿兼權吏部侍郎兼侍講朱質朝奉大夫林行可乞賜鐫斥狀臣恭惟陛下奮發英斷雷厲風行元惡巨姦一朝屏殪兵民欣快中外聳聞宗社幸甚然以侂胄自强秉政日乆中外之士被其汲引安於平進無所阿附者豈無其人勢亦難以盡責之若夫朋姦罔上長惡怙終爲天下所指目者豈可置而不論乎臣謹按朝議大夫易祓器識卑凡貪躁嗜進學舍優選歆艷士林使之稍加涵養自可馴致通顯繇館學而攝詞垣蓋鄉用矣一旦侂冑畀蘇師旦以節鉞猶有憚於物議祓乃懐章詣師旦之門極其褒美有文事武備無智名勇功之語傳者唾罵形於譏誚既而懐不自安求居諫職以鉗衆口士行已掃地矣遂愈無顧藉凡可以投合者靡所不爲侂冑竊弄威福怨嫉既多宻圖兵柄以固其位鄧友龍倡用兵之議易祓和之更互表裏専務詭隨去年之春侂胄意雖已决然未卜人心之從違祓乃獻說張大賊中之事使廷臣條具易祓首言敵國有必敗之勢中國有必勝之理又白敵國如外强中乾之人僅延喘息易祓號爲儒生豈無見於利害之實徒以意在逢迎不復體國侂胄始欲加罪異議而廷臣言不可者什七八卒亦無如之何易祓果得爲諫大夫復力主兵說方其遣從臣宣諭荆襄也止以賑䘏流民爲詞人尚疑信及易以宣撫則中外始知其必妄動同列有力爭者易祓鄧友龍相繼論奏遂至貶斥而師已出境矣逮友龍以䘮師罷黜祓自知其敗露佯爲大言以宣威自任欲蓋前日之繆妄且師旦之麻祓寧不知其不當草侂冑亦不强其必從祓諂附師旦攫金而不見人慨然援筆師旦既敗侂冑毎對客鄙笑之主持用兵本欲附㑹侂胄以苟富貴至誕謾之不可揜則雖侂冑亦厭惡之矣未幾而果逐去易祓知其權要而不恤國計兵釁一動貽禍生靈祓偃然家居坐享祠廪其心亦自安乎朝請郎太常少卿兼權吏部侍郎兼侍講朱質趣操回邪心術傾險䇿名高第榮進素定初任回改秩即授學官具有舊比質既欲速乃於任未滿之前力求特薦有審察之命已不安分義矣入朝甫閱四載以著廷權郎朝廷待遇不薄不自愛重日事奔競至投拜李士謹以結蘇師旦或謁不得入則伺候終日趦趄受命閽人館閣之彦當如是乎師旦雖揄揚於侂胄而未有以中其意也去歲正旦北使來廷偶閤門詔相差誤致北使舉止周章未爲甚失禮也質知侂胄意在尋釁遽上章乞斬北使師旦言於侂胄謂質天下之竒材且訝廷臣不知出此質由是進見無阻竟得諫官遂與易祓更相附和形於章奏無非迎合如曰方今指義旗以行天討弔遺黎而復舊疆來蘇徯望之乆雲合響應之勢摧枯拉朽指日可竢不知質何所見而云爾耶丘崈之在督府斟酌事勢嘗遣小使徃通和議北使一再回答指言侂胄不及其他侂胄怒其不與回䕶直以上聞諷質使言質即上疏醜詆務快其意雖不厭公論不恤也質既盤據要地自謂莫敢孰何每肆刼持之言謂可以聾瞽上下而不知人之視已如見其肺肝侂冑亦始覺其非矣乃移之奉常質盍自圖去就乃復乞憐於侂胄自述其宿昔奉承之謹求兼吏侍仍厠經帷前此卿監郎曹之兼講讀或出於一時擢用者有之其罷臺諫而仍兼講讀者惟陳讜嘗冒處旋即論去質居之安焉且以張栻自况多見其不知量又其大可罪者近日陛下竄斥侂胄質自以失所依賴纍若䘮家之狗荒廢職事奔趨他門止復爲庇身之所至有拒而不納者夫子曰苟患失之無所不至矣有臣如此尚可使居獻納之任侍清閒之燕乎至若朝奉大夫林行可者狀類鬼蜮心同蛇虺褊狹多忌深嶮莫測兩宰劇邑觕有能稱而大體不正貪榮嗜利背君忘親其人之賢否可見矣陳自强冒居政地即引爲六察以爲己助二年之間躐處臺端凡所論奏無非奉行權臣風指暨以憂去書問交通殆無虚月每遇侂胄生日餽獻之禮不違時刻侂冑亦拳拳於行可率朝至暮報常許還以舊物夫居䘮而通問於人在禮必有甚不得已者而行可念弗及此一意趨媚事親不孝其能移忠於君乎去夏六月蘇師旦敗行可未及知致書師旦囑浦城宰陳至和轉達書題稱爲恩府節使相公至和急封還之巳爲一士夫所見相與傳笑行可身爲臺諫顧稱奴𨽻爲恩府其苟賤亡恥抑可知矣其居鄉也嘗以舊臺諫自處縱容親黨陵轢州縣福州因買銀事有親戚占恡富室無禮縣官邑宰林洽稍加懲治行可大怒師憲爲之斷遣數人猶未快意必欲作草大臣上疏論奏以欺脅愚民揺撼邑宰幾至不免夫臺諫朝廷紀綱之任豈可行恣睢鄉曲之間乎服闋被召處以奉常清選怏怏不樂諂佞百出一日見執政忽言平章可謂與天同心衆人以爲當用兵則從而用兵衆人以為當議和亦從而議和夫兵陛下之兵也豈衆人所得可否而侂冑所得專决與天同心之語豈所施於臣下乎侂胄之擅開兵端不特士大夫知之閭閻小民亦知之不特中國知之敵人亦莫不知之方丘崈之遣小使也書詞未嘗不爲之歸過於鄧友龍皇甫斌輩而北帥貽書直謂侂胄既爲太師平章軍國使無意於用兵則師旦輩豈敢專擅由是言之則首謀姦臣其爲侂胄明矣夫逺而敵國亦知兵端起於侂胄而行可獨不知之不過巧爲諂辭爲侂胄文過而已欺君負國孰甚於斯卒自奉常晉長諫省又見衆議籍籍國事至此咎將誰歸推所從來將不利於自强侂胄必去異議者然後可安遂有一網打盡之謀夫侂胄專擅日久自强依阿取容人畏凶焰莫敢指言蒙蔽之禍將不勝救而行可又欲盡逐異議是將使陛下左右皆侂胄自强之人而後已此其意欲何爲耶臣前所謂姦險之徒樂爲之鷹犬者易祓朱質行可其人是矣夫侂胄之姦惡易祓導之於前朱質助之於後行可成之於終今侂胄既已竄殛而三人者使得佚罰則何以快人心之憤鬱昭國憲於陛下更化厲精之始乎臣愚欲乞睿斷將易祓朱質林行可重賜鐫斥終身不齒以爲士而不顧行檢自棄名義朋姦罔上長惡怙終者之戒取進止十一月十五日三省同奉聖㫖並依論新除司農少卿張鎡乞賜竄責狀臣仰惟陛下奮發乾剛誅鋤元惡中外慶快萬口一詞惟是更化之初一黜一陟天下觀瞻所係不容少有差失儻使姦人投隙而進豈不致中外之疑謹按新除司農少卿張鎡很甚虎狼毒於蛇虺立朝則猥賤而無恥居家則凟亂而朋滛其回邪姦慝之迹雖盡南山之竹不足登載而前後亦畧見於臺臣之章疏矣若其凶殘著於心本奴婢厮役之徒少忤其意必潛置之死地當蘇師旦用事之時鎡傾其故弟家財强抑孤女與師旦子爲婚其女出嫁之夕號泣登車指鎡而慟曰叔要做好官却以我嫁書表司之子聞者爲之悲感有銜不愜卒殞非命自此益得罪於公議不復以人類待之廢放終身猶爲僥倖忽傳除目大駭聽聞轉相顧語莫測其端識者尤爲疑懼况張鎡既爲師旦姻家情好稠宻崇資顯秩皆自師旦得之師旦既斥每懐觖望近正典刑當益懐鞅鞅既爲刑人死黨豈宜寘之卿列而俾近君側乎臣職在彈劾若不於幾微之始亟鉏其姦設或鎡交結非類益肆梟張則爲國蟊賊將又有不可勝言者用敢冒昧以聞伏望聖斷將張鎡削奪官資重賜竄責以清朝列以杜姦萌中外幸甚取進止十一月十五日三省同奉聖㫖張鎡特降兩官送廣德軍居住論宫觀鄧友龍乞賜鐫黜狀臣聞國家之大柄賞罰而已昭勸示懲維昔盛時未嘗廢一是以公道興行人心悅服臣伏見與宫觀鄧友龍始焉立朝頗得士譽慷慨自許亦足稱尚朝廷以其勇赴功名之㑹未暇詳攷才諝之實畀以重權不從中御而友龍疎闊脫畧乏持重之操阻愎迷闇無臨敵之算所以許之便宜正應斟酌彼已審量進退設若未得機便不厭反覆論議以圖萬全而友龍不思委寄之重無虞心而務輕信上違指授督趣師行遂使績効未睹憂顧方深職任宣威咎將誰執所幸陛下明見萬里察其負乗改授宿望友龍自宜上章引過屏息俟命傳聞道路尚乃偃然自居猶覬入臺就職紀綱風憲之首當如是乎雖陛下曲示保全賦以祠禄然既辜任使遽得優閑懲勸不明公論未塞欲望聖斷將鄧友龍特賜鐫黜以彰國典天下幸甚取進止乞六曹尚書依舊獨員上殿劄子臣伏覩近降聖㫖六曹尚書獨員上殿及文臣帶一路兵鈐及監司職任者朝辭並須上殿指揮更不施行臣竊惟尚書之職其選甚高自行官制以來多自此官除執政朝廷所以待之可謂厚矣元豐之末始有不得獨員上殿之法紹聖之初尋即改正所以示優禮而去疑貳也今復罷此指揮其何故哉監司當一路之寄兵鈐受方面之託以人主之好惡達於逺方不使一對清光何由面稟聖訓况先朝之法行之巳久别無大害不必輕改臣今欲乞六曹尚書許獨員上殿及文臣帶一路兵鈐及監司職任者朝辭日並須上殿皆依舊施行取進止乞御史臺及兩省臺諫官挑班上殿劄子臣伏覩近降聖㫖御史臺所請挑班上殿指揮更不施行契勘臺諫官欲上殿奏事申牒閤門若遇班次併積不免累日伺候臣自供職以來凡欲上殿計㑹閤門多值未有班次毎作急速公事奏禀方得即對竊惟耳目之官以言爲職雖非急速公事亦當以時敷陳則御史臺挑班之請不爲過也况尚書六曹開封府大理寺遇有合奏公事並許挑班上殿何獨耳目官不得用此臣今欲乞今後御史臺及兩省臺諫官並依六曹等處許先次挑班上殿仍不隔班取進止再言王師約劄子臣近以除駙馬都尉王師約不當言之再矣未蒙施行用人聽言皆非細事一舉兩失實累初政伏望聖慈出自睿斷罷師約新除以合公議取進止
