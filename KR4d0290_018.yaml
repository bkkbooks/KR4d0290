body:
  text: 後樂集卷十八宋衛涇撰墓志先伯知縣先伯母孺人墓銘公諱時敏字子修衛氏之先出於齊唐末避亂南遷多居華亭至公父始著籍蘇之崑山曾祖淳故不仕祖孝先贈朝請郎考闐故任朝奉大夫通判紹興府以公仕贈朝請大夫妣沈氏封宜人公少有大志讀書著文紹興中以父遇郊恩補將仕郎初任泰州海陵縣主簿次監潭州南嶽廟次授兩浙轉運司催促起發物斛官有詔省併再監行在太平惠民和劑局淳熙三年秩滿改宣教郎知臨安府仁和縣磨勘轉通直郎七年十月十七日以疾卒于家享年四十有八公娶沈氏公母弟之子封孺人以公之喪憂戚感疾越明年三月十日卒年四十有六子四人沂渙餘幼未名女三人長許嫁進士陳仲速孫男一人符女一人擇吉卜枚終公喪之後五月乃兆於先君墓右實湖州歸安縣廣德鄉石佛塢之原以十年三月八日有事窀穸兩喪並舉行路之人亦為悲傷流涕嗚呼痛哉公之行事將有文志諸墓兹用紀世系嵗月置于隧以合葬故同其銘先考太師魯國公墓銘公諱某字子文姓衛氏嘉興府華亭縣人後徙家平江之崑山曾祖某妣袁氏張氏祖某贈右朝請郎妣安人陸氏杜氏考某左朝奉大夫纍贈正奉大夫妣碩人沈氏公生于紹興七年丁巳歲五月十四日戊寅時紹興甲戌以正奉遺澤補將仕郎初任迪功郎建康府江寧縣主簿秩滿丁碩人憂服除調紹興府司法參軍循從政郎監行在草料場門避親兩易監文思院上界門以製造玉牒儀物賞循文标郎淳熙辛丑用舉主改宣教郎知通州海門縣郡太守於常賦外誅求無藝公謝不能即移疾以歸踰年丐外祠主管台州崇道觀淳熙戊申明堂恩賜五品服簽書建康軍節度判官㕔公事通判鎮江軍兼管內勸農營田事淳煕己酉及紹興甲寅兩遇登極恩并磨勘階七轉至朝奉大夫慶元六年庚申十一月二十七日以疾卒于家年六十四公娶章氏級之女封安人先公七年卒贈宜人葬于湖州歸安縣廣德鄉上沃里澱子塢石佛山之原先塋之側嘉泰改元三月二十二日壬申奉公之柩合葬焉子男涇登淳熙甲辰進士第任朝請大夫濟洽皆將仕郎洽以涇為起居舍人遇上初郊恩廕補溉鄉貢進士湜兩浙轉運司進士女琰適承直郎新差充兩浙路轉運司催促糴買官曾耆年琮適從政郎前濠州州學教授周南瑧適修職郎揚州州學教授朱晞顔璣適進士顧復孫男六人樵朴樗孫女六人將葬涇等茹哀忍死姑叙鄉里世家官簿始終之大略屬耆年書而納諸壙若銓次行事求銘墓左蓋有待云先兄從事郎慶元府奉化縣主簿墓志吾兄姓衛氏諱沂字與叔齠齔知好學忘寒暑食飲為文雅馴場屋不耦年三十三始以余任館職中胄子舉又五年聨姻內宗授迪功郎主慶元府奉化縣簿余被命聘北以守宅賞循從事郎吾兄志則自奮益刻勵於學年四十三登慶元進士科試吏俸以郎攝邑事有能稱尤不苟于所職邑人蒙賴無追呼橫斂之擾帥黃公由趙公彥逾皆首薦之趙於當世士少許可特加器重秩滿部使者亦交章薦論而遽以疾諗矣嘉泰四年九月十七日丙子卒于家享年四十有八嗚呼吾兄早罹艱厄甫踰弱冠連失怙恃先君愛均子姪且教之日望其有成比吾兄鎖㕔再貢禮部先君尚亡恙時昆弟同試四人吾兄獨與選先君語諸弟曰若伯父有後吾喜甚於若輩為之也吾兄長余二歲幼同研席晨窗夜燈相處二十年怡怡如一日嗚呼已矣尚忍言之吾兄天性溫厚事尊撫幼孝友輯睦人無間言自鄉黨族姻凡所與遊者莫不得其歡心其不幸而死亦莫不悲傷歎惜蓋古所謂善人君子者耶吾兄積勤苦得一第謂必大其所就而訖若是嗚呼其命耶余之哀思其何窮也吾兄先取鄭氏前十八年卒今配趙氏故福建安撫司參議官不綿第三女子男三人曰橅曰楷曰槐女一人適鄉貢進士符衍橅等以明年開禧改元月正二日庚申葬吾兄於湖州武康縣大塢山之原以鄭氏袝伯父任通直郎知臨安府仁和縣諱時敏吾兄其長子也兆域相距十里許鄉里世繫伯父既有銘姑識名字行事始末及卒葬月日納諸壙云同堂弟朝請大夫新知贑州軍州兼管內勸農事提舉南安軍南雄州兵甲公事江西兵馬鈐轄借紫某述并書故中大夫提舉武夷山冲佑觀祥符縣開國男趙公墓志銘本朝公族之盛其在今日以儒自致者幾半進士蓋自高廟渡江舊京近屬紫蓋而南者上每引對必勉以學人知嚮方乾道初有以宗英冠多士孝廟寧親東朝喜見慈顔玉音交賀淳熙以來賢才彬彬由進士出矣於是上始有用才不問戚疏之意公卿庶士州牧侯伯既拔其尢者略用之又以遺後世子孫而使究其用故司農卿趙公其一也公諱善􅀢字作肅故名善儀字麟之宗正更今名曾祖慶逺軍節度使饒陽侯諱仲沄娶符氏封永嘉郡夫人祖武節郎添差南劔州兵馬鈐轄諱士崒娶安氏魏氏皆封安人父修武郎纍贈銀青光祿大夫諱不擇娶黃氏纍贈蘄春郡夫人初士崒居官昭武樂其風土因家焉是生不擇能植立無它嗜好惟篤於教子公居幼獨嶄然早成乾道二年取應中選兩調酒稅學益不廢銀青語蘄春曰興我家者是子也八年擢進士科授左承務郎吉之吉水丞丁銀青憂再丞筠之上髙任湖北常平幹屬丁蘄春憂免喪入湖南倉幕知撫之樂安縣守潯州今上御極知邵州除大理直遷丞為郎倉部為右司開禧初元直煥章閣帥靜江兼廣右經略改潭州尋以直龍圖閣鎮江陵除司農少卿總領湖廣軍餉攝荆湖宣撫湖北安撫兼鄂州嘉定更化上嘉其勞就晉為卿因任踰年提舉武夷山冲佑觀凡四奉祠十年五月十有一日以疾卒年七十積階至中大夫爵祥符開國男戶三百服三品嗟夫公獨非兩朝之所培育崇就兼賢與材者耶方其得百里始近民也樂安喜訟而尚鬭公曰以刑辟禁末乃繕學校先風教申訓戒而習以革歲旱祠于巔崖躬履猿棧不憚歸未山半雨隨之艮齊謝公諤位諫垣聞而薦賞俄守潯郡遐土瘠歲科民竹木名修城實它用吏並緣侵擾民不堪命公悉罷去又算賦繁重有班白不敢巾者公奏免之暨移治邵陽政如在潯時獄卑泄多疾死公因囹空徙置之無復前患溪峒種族逼處境外曩時幸郡亡備反側易亂公廣威信精簡閲軍實內强猺人相戒毋生事部使者上其狀遂繇簡擢尚登用矣開禧權姦啓邊隙公議不合即補八桂瓊管猺陳奴期久侵擾未入平僚佐有請兵深討者公曰是趣亂也止遣將佐盛屯兵聲言掩擊待其自潰瓊人父母之長沙文物日殷昔文定胡公父子遺規在焉嘗請于朝創南嶽書院其治先後類如此疆事未靖蘇政輩嘯聚茶陵人情搖搖公密遣吏入賊曉以逆順政感悟率其衆來假以官秩籍其尤剽悍者𨽻諸軍城邑晏然歲饑諸峒出冦掠公賙恤調娛而監司有異已者公去而李元礪之變起矣逆曦既授首宣撫吳公獵將入蜀撫諭奏乞公代荆上從之居無何移武昌總餉事仍兼吳公所領節初荆雖堅城而兵遣戍者什七八公登城慨想昔人地謂連吳控蜀奈何以單旅徒守指衝要莫如三海顧僚吏曰吾欲築寨瀦水以備緩急何如衆難之公力以自任不日寨成後屢廢輒復至今賴其利先是宣威治所環以兵衛外示威重內實怯懦公曰多兵自防非宣威意也命徹之土豪柴俊孟宗政備料義聽節制與金戰解襄陽安陵圍有功諸將蔽不言俊等怨望公聞之檄至慰藉賞賚有差俊等感悅餉臺儲六路賦入江漢之屯數十萬方益兵增戍費浩莫支前使者屢以為言公調度從容亦無乏興至於繕列壁歸流民拯薦饑蠲苛斂皆其績效彰彰者公風儀秀整器識夷逺好學博記不妄言笑以科第致身從碩儒望士遊逾不懈故能立朝不阿臨事有斷克著聲稱以毋負纍朝若此其事親孝奉已約處兄弟友睦居閒十年以琴書自娛育花疏沼婆娑其間遂老焉十月壬午葬于青雲聚水之丘公所自卜壽藏伍氏封令人前二年卒子汝例從政郎新建寧府觀察推官汝瀧迪功郎衡陽縣主簿蚤亡汝淏從事郎泉州司户汝渲迪功郎信州貴溪縣尉公之叔兄無嗣以汝渲繼女適進士謝寧孫承直郎宣州戶掾鄧友直孫男六人崇堅登仕郎崇珞崇璅崇健崇均崇逹孫女三人尚幼某與公先後守長沙見公長嗣蔚有家法畀以京削倦遊東歸書來請曰願志先人之墓既辭復請乃銘之曰昔在中興思皇我宗保合以文蟬聨登崇乾道淳煕兩科有公公不自伐序更民庸為郎開禧不阿故去秉旄宅南上無南顧三邊多壘假公盡護宿飽江漢長城荆楚惟學斯忠退不告勞位雖卿士聲烈孔昭姪孫朝散大夫前知武岡軍墓志銘德章與余同六世祖而屬曽孫行嘉定壬申余帥湖南德章時守武岡余諗于朝乞更以他郡德章慨然曰吾仕四十年官針惟謹未嘗苟進今老矣無能為也盍以祠去有㫖參西浙議幕瓜問至力申祠請德章平日清簡强健如壯年余覬其復用也既退處絶意榮利如是者六年俄末疾以卒實嘉定己卯二月某日也其孤將以是年某月某日葬湖州歸安縣廣德鄉雞鳴山前期以書來乞銘嗚呼德章而止于斯耶德章才氣剛直晚得一郡不究於用若尼於余乃遂其髙是可尚也已德章名藻世為嘉興華亭人曽大夫某朝散大夫大父某通直郎太僕寺丞考某承務郎致仕纍贈朝議大夫妣周氏繼丁氏贈恭人淳煕乙未德章擢進士第調臨安府冨陽縣簿以親老改授仁和便就養仁和今畿邑仕者趨競成風率簡忽吏事德章矯時弊足不迹公卿之門勾稽版籍井井有序京尹王公佐性嚴重獨敬畏之秩滿授常州無錫丞丁朝議憂再調饒之餘千丞常平倉歲久漁蠧特甚或勸發摘以求知上官德章曰暴人之惡揚已之能吾不為也卒為補償宰數侵之未嘗幾微見顔靣宰旋以事忤憲臺督責峻急德章從容為辨數訖免于戾丞相趙公汝愚聞之稱其偉器薦書及格改宣教郎知太平州繁昌縣甫四越月以恭人丁氏憂罷尋知處之麗水麗水嚴邑素號難治且寓公鼎貴縣有政輒掣其肘德章處以安靜邑人宜之參政何公淡同知葉公翥郡將胡公澄章交公車何公每曰事舉無擾政成不苛足見儒者緒餘之效黃公何相繼出守亦曰口不言而民自化庭不令而事自集真漢史所謂循良者開禧邊塵驟興淮民轉徙京口毋慮數十萬德章適倅是邦奉詔賑貸乃度地以居來者躬核户口多寡而頒之粟吏無容姦流人安集郡將沈公作賔參贊督府列其勞上之特進一秩敵逼儀真我師退焚瓜州老弱驚潰德章檢校所部戎器修壞完缺創蓋防江寨宇七百楹招刺效用千數為扞禦計民以案堵方權姦用事姻舊布滿中外長吏畏避莫敢舉職德章以武岡陛辭入對首乞養監司郡守風采仍請撥降糴本於所在積榖皆切時務上嘉納焉在郡平易便民不為赫赫名民至今懷之使得攄其抱負當以事業見于世嗚呼惜哉德章天禀純正不喜阿附方筮仕里人錢公良臣居政路蓋公經二版曹期相推挽德章力辭而去麗水寓公在周行者合辭薦之時宰復以不能媚事權門安於平進暨歸自武岡朝紳或移書勉以當路多已知且將用公德章曰非我志也蓋其靜退之操始終弗渝故老而益堅至蒞官以亷處鄉以和輕財重誼如恐不及平時退然有所不為及利物濟人勇往不憚蓋非特為吾家令子弟亦一時名勝所嘉與也積官朝散大夫春秋七十有八娶沈氏封宜人先二年卒子社迪功郎安豐軍六安縣尉好學守家法長女適宣教郎知寧國府太平縣李權次適迪功郎道州江華縣丞沈􅗄幼適進士劉應龍孫一人銘曰世之降兮亷耻道亡繄德章兮謹於自將位雖不究兮于宗有光尚爾嗣人兮庶方來之顯揚故朝散大夫主管華州雲臺觀曾公墓志銘昔余伯姊歸使君時余年未弱冠間接論議風裁即雅重君知為承家器也自有連五十年親交之義貫初終猶一日余與世疏亢晚乃叨預大政而君獨幠然平進于仕凡趨尚之詣理矩度之範俗蓋于是益知之嘉定壬午八月十有七日以祠官殁于蘇之常熟君寓里也訃報余為之慟將以是年仲冬庚申舉窆事于吳南宫鄉香山之原其大父考妣之隴前葬諸甥列泣請余銘君墓余其何辭君諱耆年字夀翁故朝散郎權知髙郵軍諱崇之子故朝請大夫知大宗正丞諱恬之孫故朝請大夫尚書虞部郎中諱誼之曾孫而侍中魯國宣靖公諱公亮之五世孫也曾姓出夏少康子分封于鄫周末國除去邑為氏孔門正傳曰㸃曰參皆其的系繇漢而降𣲖别四出始有居東南者施及本朝宣靖公起自世科相我仁宗英宗神宗侑清廟垂太史而溫陵之曾光大矣虞部以舊京盛時仕朝廷位省郎名稱于諸老間宗丞受學上蔡龜山二先生氣醇而脉正以故髙郵使君得以嗣子昌吏道而典刑貽君滋弗墜也紹興戊辰君妣令人陸氏感祥夢而君寤生離襁褓不好弄所親惟筆床書卷甫數嵗出就外傅儼如成人與其仲弟延年月相策勵期于克紹而髙郵復能力貧博延儒碩以訓啓之洎長果聯貢禮部而君為詞賦第一士類到今口之若膾炙髙郵卒有遺澤未任君雅志科級至是以門户寄而令人復勉之乃拜命筮仕令人家長興則調湖州户掾安逺次以求便親逮造官首務色養親歡矣退而畢力王事裁以亷直家法人莫知其為試吏也諸臺滯訟職此叢委君察斷無留難兩造靡靡悅服當路因交剡以聞端明戴尚書溪方主教湖學經生咸㑹君以餘閒往就劘切遂莫逆于道藝中秩滿授監左藏中門才及月令人大故居喪毁瘠服除為浙漕糴買官君吏考已及宜以薦脫選而泊如不為意其後紹不施而舉者交致之嘉泰中改宣教郎權姦擅國謂忠獻韓公實與宣靖並相先朝訪後人而得君將置諸在列君笑曰非我志也應令注嘉興縣以歸君三歷官僅皆掾局令宰為近民而嘉興號難治乃一以精識强濟洗宿蠧令盡去異時牒訴贏數百紙終君任减什七八㑹歲旱蝗憂不自寧履畝閲實以白之郡郡艱于蠲租則力爭得請乃已蠲數視他邑為倍民飢以紓更化初羽孽未殄上猶旰食有旨縣令得條利害君所言三事舉切時病而其卒篇謂朝廷和糴昨雖取辦嘉禾今蝗旱之餘歲且艱食加以官糴民將奔迸流徙害有不可言者疏奏朝廷韙之和糴議寢受代趨闕得倅三衢曩時髙郵使君嘗丞衢之西安惠利入人至之日士民知故丞子也歡迎恐後君佐郡有體郡所罷行平决不憚大吏衢人賴之薦于上者加多於前人謂君華近可立取君自諗不善于世願再領倅二得升建康北門體貌嚴重為二者類俯首不可否事君曰豫通守也斯民戚休均係焉胡寧旅進退乎遇事必極言便否餉臺審計以近制屬君有軍吏冒請算數抵牾一見知其姦亟鉏治之使者用是深器愛君前後登薦目不一二及是漕臣真公德秀以耿介端莊精明峻潔薦寵抑實録也循格當守郡得權發遣興化軍事陛辭奏曰國家贓吏之罰非不申飭而犯者益衆伏見州縣官吏月請俸廩州則守倅晷刻不移縣則令丞手自預兊若職幕簿尉而下長官多未之察其無故不支動纍月或朞年為祿而仕者何以養亷雖吏之亷貪本不由此要在我待之盡則犯者可以重置之憲夫氷蘖其操者世復幾人惟祿足以衣食之則苟有知者忍蹈不義乎是雖非驚時竦俗之論恐或可上禆戒敕下倡亷潔也在莆涉再歲扶善去惡行之愈不疑禁兵單弱給使官吏外凡寓公舉人舊乃悉許占借君曰邊師未班朝家縻粟以養兵而州郡之備乃爾其可乎即以漸抽還俾復行伍非大風雨按閲日不輟軍容為振而寓公交怨矣俄以言者去君喜于歸道逢佳山水必登眺把酒興盡乃行還家手葺三徑自號愛間老人朋親相樂應接忘疲客去則奩香束書燕坐無他營首秋偶嬰腹疾而醫療迄不效一日立妻孥曰我大期且至平生無不了事當行即行旋却藥而逝時奉華州雲臺祠自君寢疾若知舊若里巷故老日扣門問安否以疾狀增損為憂喜既沒悲愴聚泣有以見君感人之素也享年七十有五積階朝散大夫服五品娶某先公太師鄭國公之長息女封宜人二子邲邴各預漕薦二女適故職郎元圭繼適朝奉大夫大理少卿蓋鑄先八年卒孫男文子文孟孫女尚幼君內禀外蹈不淪其天繇閨門以逹官政故能明偹肅括識者指為家學中來顧亦略用所長而惜未大其施也其餘力文詞不為詭異而合雅正尤耽結字超悟二歐楷法至于篆籕幾若神畫散落逺邇在在寶之有愛間雜藁若干卷愛間隨筆若干卷切時之論若干卷藏于家君之不朽其亦在斯乎余既諾諸孤請哀而銘之曰祖有攸訓蔚粹傳兮君仕君處動弗愆兮行無巨細率其天兮未閎爾施而奄然兮慘余中腸歎逝川兮香山之藏隴因先兮余尚銘之以永爾千萬年兮故特進資政殿大學士程公墓志銘嘉定十六年四月同知樞密院程公卓以疾不能朝時國家值仇敵百年之運疆埸大計委成西府者視常為尤劇上聞公疾憂甚中使日問狀稍間入謝重慰藉自力就職而疾復作即拜疏言臣不幸疾進弗瘳將先犬馬填溝壑機務至重懼不能復勝陛下委寄願上印綬乞骸骨以六月五日薨上省奏嗟惻罷朝發賻加厚詔有司以特進資政殿大學士告其第舉朝皆哭弔某年某月某日葬歙縣長夀鄉龍山孫剛中以墓上之銘來請曰先大父奮迹孤士出藩入輔名績略信于中外矣蒙國厚恩襚往録存哀榮略備于始終矣惟遺耀未紀將審所託焉幸賜之言以夀逺也豫於公為同年進士且相繼司牧于閩蓋義知公者乃序而銘之不復辭公字從元徽休寧人望閥甚逺三世褒叙士彥太子少保畎太子少傅世昌太子少師公蚤有絶識世父文簡公以瓌文宿學被遇孝宗為時儒先公甫勝冠探微入窈盡得其傳入太學試積取高等衆莫敢齒列中淳熙十一年進士第揚州司戶郡議計民廥積而征之匿不自言籍畀告者公曰藏於民與儲之公等也且粟已當賦矣征之何名帥悟而止丞崇仁縣陂旁舊有公田所入褊甚而郡緣虛籍征于邑者歲纍萬償以别色邑遂窶困公嘆曰使為此邑永患而令不得盡其愛於民者此田也且吾誼不敢諉之令而弗顧疏其實走諸司許盡鬻之民乃已知處州龍泉縣少師喪不行知吉州龍泉令約而信賦緩而足㕓野舒暇門階間寂莫識其吏迹也有倳刃而匿其首主名不立掠治久無以具獄公屏坐深念如或助之詰其婦曰豈嘗産怨於族乎婦謝無有惟族父曩以地訟耳索其家衣故在泣曰妾手所完紉也遂直其寃執政以才薦入為諸軍糧料院以嫌改進奏院宗正寺簿奏言郡帑别儲以給公費有定制也今恣其侈用顯賕私餉崇侈無厭冝裁約以紓民力異駿名騅𨽻在親衛有常數也今齒色歲减新綱續撥才足相補宜課息以壯戎備遷司農丞知嘉興府近畿俗豪喜鬭稍失意則簪筆遍抵其上公以刑鉏姦以惠銷薄從容摩揉而政以和有僞鬻印紙為左劵者辭所連逮甚衆吏白公當窮治且藉是或紓郡計公曰為之詭遇豈不能政在安民爾罪止造者無它坐民至今德之為大理丞刑部郎奏言國家謹獄犴而緩死則宥之以逺今部以罷卒齎用窘絶不稍代更則往者未必生也州縣仗胥吏而給事要以少為貴今長及子孫聲焰薰熾不亟汰省則來者未易清也說皆施行遷軍器監兼右司郎官權太守少卿言者不樂罷主冲祐觀起知泉州文簡棠隂猶在邦人幸公來時楮劵墊陌僅及半價接不如令者急甚公以法便民而勢自通平糴舊為民擾攔米要市迂費歲月公饒所豫民而事自集郡舊以銀鐐驟溢而繅纊非工詔與台信邵武昌互貢所有烹採久涸而直售數倍文簡請更定獻程而未報去之有四十年矣公曰得地利以惠吾民可也忍默默乎力為奏具言弊極矣惟垂裁朝廷尚難之繼公者復助之請乃皆聽可於是纍年之弊革矣移提㸃福建刑獄民留像以祠攝帥事直祕閣為真郡負海暴桀椎埋公追迹名捕空其巢貸所騫汙者為之振業境內奠枕健吏武譎宿姦如山公戒僚列悉意首公事無落吏手遇期㑹迫猝才留一二旁立待命具筆牘行文書而已閩素多士公在泉新美學宫至閩更舊洗陋如泉時又崇峙儲廪增貟以養而呻誦滿廊户矣課縣籍計日勾稽而復賦謬輸皆釐整督曹牒應時剖奪而新爭故訟皆縮却又條便宜數事欲以治邑之殿最上之銓部為升黜覆獄之能否載之印歷為勸懲幽縶之無所廪食者取之常平以寬瘐死伉勇而熟於水鬪者傳以海道以戒不虞上供間出於僧坊則豪右勿困以貸息租銖盡歸於吏攬則官府勿重以漁奪蓋其勤苦在民亹亹一意審其痡毒時其安便苟有圭撮為利者無不為也寸尺可效者無不竭也召為祕書少監論諸將酣豢於富貴精鋭銷落褊禆後起奮逹無路不加搜採英豪坐老矣軍籍淄蠧於隱占十幾四三贏糧剩鏹脂腴一將不加檢質餉計坐失矣泉貨以權輕重通有無也今泄於外毁於器不急救之殆將日少願詔鍾官兼采鐡錫以資冶鑄上嘉納且曰何但於少遂將無矣遷起居郎工部吏部侍郎奏言擇守在牧養當後資格選將在備圉當先淮堧民餒而怨困於折納者當使絶息將愚而貪習于朘削者當示威懲財窮于兵當節浮冗法壞於例當抑僥幸進給事中言臺臣坐貪穢敗不可與貼職宗子以殺人抵罪不可貸同惡其隨時舒吐無所回隱而志以伸引議規切無所阿徇而論以盡皆類此自嘉定初忍垢講和我幣歲入未幾彼有外患因自絶甫定則復請賂公前在郎省以選往賀正旦還言彼寇深仇結燼餘幾何潰叛四起矣而猶暴骨以逞兵不足恃也禍稔彰聞歲不為稔粟直萬錢矣而猶讐斂以供民不足恃也願益講修攘之䇿以待天意之定上說始議與北絶矣在戎監言兵法先計後戰敵逋誅已久願咨逮戎略首末皆許圖上擇其可者而咨度焉若臨戰而計則無及也及是進李德裕籌邊事又言敵亡無日矣困獸猶鬪蓄力運智事宜在蚤前後極言邊事常欲以暇應猝以弱就强圖易于難而無粗武以冒進慮動于靜而無安恬以玩敵纍疏一意也上既默許任屬進二密院于是敵勢日蹙孤懸一隅爭倒戈奮擊舉地奉珍而歸我天下翕然望中興矣公憂邊思職純識獨到念蠆毒未易輕則勢之廣莫者尚費完守狙伺未易測則情之擕異者尚勞控馭宿將前望坐相視盡幹方禦侮誰與謀長所謂邊境安危之原慮方深也是以荷上簡擢凡所以審智計廣忠益練才實緝事幾者顯贊密扶愛日惜隂冀行其所知以圖永報惜其歲月之近而不究其材也公宿道以婉養德以冲自幼內行淳備少師持家嚴甚公以孝敬盡瘁無惰色共㸑緦者幾數百指公以愛友成熟無間言勇于矢義勢雖險不為懾費雖巨不為嗇故舊歿無以斂公為倒奩空楮以助且經理其家在太學同席者歿于疫相率委去公挾醫護視不輟晨暮卒賴以生與人謙以裕奉已約以清雖貴不改其度窶士寒品酬接盡禮所居增一樓儲書一堂燕坐而已嘗曰富貴非可力求寧遲其自至涖官則先以亷勤吾所以寡憂患者以此爾子孫守之謹勿渝也異時喜誘掖後進酬義侃侃屨滿户外因所霑溉率皆有立雅不喜言人之過才長獨藝曲借聲價因所鍳許率皆知名誦樂天詩慕其為人所居西有林壑之勝暇日從賔御短棹倐往命雲侶月觴詠悠然其淡于榮利不以軒冕之味而遂忘也奏議十卷文集二十卷年七十一夫人朱氏封齊安郡君有賢行先卒子以思監西京中嶽廟以過毁得疾後十有一日而卒江隂縣尉朱立已知丹徒縣姚元特其壻也孫剛中監西京中嶽廟孫壻旌德縣尉汪耒惟新安介在江左修岑絶巘透高入雲奔湍濯流倒注萬仭其靈邁肅潔之氣鍾美于人則言論風􅋵多以諫官御史有聞于時若夫砥節者傷于孤簡贍智者過于深刻非人美于地則未有能以義而勝俗者公雖以氷玉自潔而揮斥崖谷無岸異嶄絶之行人樂其平粹雖以頴鋭朗出而洗削纎巧無枝葉華蔓之迹人信其篤厚故立朝不過崇懇激而周盡雅俗如機凑的言皆可以長國居外不廣植聲威而坐燭幽隱如鏡見象事皆可以庇民庶幾獨鍾于賦豫之全者銘曰惟天降才稽德則均借美于地或庇其醇惟公懋德自為芳馨疏介以通藴高于平有球彼至薦以亷清如琴斯希寂涵至音有謨在國有澤在民以雅伸俗以實逺名三事晚矣噫難者兵謀胡忌蚤憂奚厭深徹土未隂效逺而近孰盡其能孰嗇其成蔚兮朝隮龍山之垠俾來者誰尚芘斯銘安娘壙銘安娘某之第二女也生於慶元丁巳甫十歲夏中忽得疾呼小方胍診視曰此伏暑中風吾業醫舊矣二十年間未嘗見童幼有此謂比歲乃有之且多作于立秋前後十日病者十不療一二其不死者亦不復全人豈亦關氣數耶吾女初苦壯熱幾旬不解屢投凉劑大腑通利熱既退而右手足緩弱纒綿二年餘嘉定初元吾罷政歸時適盛夏舟中再冒暑毒還舍旬浹疾作遂歿年止十二嗚呼是可哀也後十八年乳母楊氏卜葬兹地因祔于側且刻歲月納諸壙徑山䝉菴佛智禪師塔銘慶元丁巳夏徑山寺闕住持有㫖以命僧元聰後數年寺燼於火不二年元聰新之視舊觀有加焉寺既復元聰引去上復以住持命之且為御書寺額及蒙菴二字賜之仍賜號曰佛智禪師嘉定己巳十一月十一日元聰示若有疾以偈入奏其略曰漚滅本來同盡在吾皇大海中及有願延睿算等語越四日元聰逝去事聞上特降贈金遂以是年某月某日某辰入塔于䝉菴之原某時伏在林野耳剽是事竊深敬嘆主上待遇臣子恩全始終其施于元聰者猶若此元聰以寂滅為學至其垂歿必以祝聖人夀為言于以見君臣之典窮天地而不可泯者如此欲私記之未能也未幾其徒狀師之行求塔銘于某乃以所聞識其首而後次序之曰師姓朱名元聰字蒙叟福之長樂人母房氏以慶夀恩封孺人師少頴慧習儒年十九始去儒入釋初從龜峯僧璘游璘歿則從晦菴慧光學陳公康伯一日至龜峯見師于優婆塞中小異捐金俾之買僧牒師既落髮乃白晦菴曰元聰身了而心未了望和尚免以事役晦菴笑曰佛法在尋常行履處何懼事奪耶今限汝一月心如不了即有决罰師歸僧堂書晦菴語于窗紙脅不至席者半月幾至欲狂晦菴日使人視之忽聞其有啜泣聲亟呼之前曰啞壞了汝師對曰昨日聞父訃不克歸學佛無成恐兩下俱失故泣晦菴連摑師三掌師頓有所悟衝口呈頌了了了徹底了無端赤腳東西走踏破晴空月一輪八萬四千門洞曉晦菴曰且放汝三十棒師云元聰亦放和尚三十棒自此機鋒濬發境徹理融乃辭晦菴往諸方勘辨逮晦菴住法石師隨之為侍者晦菴臨終以行雪堂所付法衣付師書示衆曰再來毒種元聰叵耐吾宗滅汝邊也法衣一條聊分付聽子時撾塗毒鼓師拜而受之叢林遂有毒種之號晦菴既終泉守周公葵首請師住清化師以晦菴常戒其年未及四十不得出世辭之即日擕晦菴骨歸葬龜峯道過福之乾元時木菴道永方峭立崖岸師徑造其室木菴云莫即是聰侍者否師稱名木菴曰此事非聰明所能辦師云通身是口吐不出木菴云中毒了也師云莫掩彩木菴曰須知此事不在方策上不在口皮邊師云畢竟在什麼處木菴曰鐡蒺藜當靣擲師云大好不在口皮邊木菴肯之其深禪密句多此類有語録傳于世師既葬晦菴即往見密菴咸傑於焉巨見且菴守仁于長蘆又見瞎堂慧逺于靈隱見水菴宗一於净慈又見誰菴宗演于髙亭佛照德光於光孝復菴可宗于保安以證其所得逮密菴遷徑山師為第一座由是聲名益起四方衲子皆宗之錢公佃將漕江西首請師住隆興光孝師辭之張公子顔為江西帥又欲以光孝處師知其不可屈乃貽書密菴俾勉其行師遂自光孝開堂為晦菴嗣至是師年四十矣未幾饒之薦福撫之漕山洪之寶峯爭欲迎致師師皆不赴江東帥留公正轉運尤公袤丘公崈前後凡三請師住雲居師亦三辭之一日憲使趙公曄俾南康守錢公聞詩詭作民家請說法道過廬山遂遮留師于雲居一住九年百廢具舉鉗鎚益密爐鞴愈髙趙公汝愚始當塗以隱靜招師師欣然從之外戶為之屨滿未幾平江之承天常之華藏真之長蘆同日轉使至師曰吾緣法自長蘆往雪峯徑山遂往長蘆已而雪峯果虛席福建帥詹公體仁㑹諸禪探籌一探而得師名遂以聞于朝師欲因之省母亦不辭而承命遂住雪峯三年自雪峯過徑山凡坐十四夏因回祿之變築屋甚廣事見樓公鑰所為記又傾橐益田足以安衆師持身精勤接物𢎞大生機硬語直指人心禪徒之奔徑山遂不减大慧盛時至于五緣俱契諸福具全又若默有所助云臨終既奏遺偈又貽書别常所往來者其弟子環繞求語師皆隨根器授之最後辭大衆曰來未嘗來去未嘗去七十四年月印寒渚遂擲筆趺化人以為國一後身僧臘七十四度比丘二百餘人嗣法若行謙元詔可逹南悟端仁輩凡五十餘人它日必有聞于世者師滅之夕大風拔林瘞骨之日久雨頓霽是夜塔現祥光空中出金磬聲初范公成大與師厚至范公欲得師住承天則師曰願從公杖屨行不願承天也范公每謂師墨名而儒行故余因范公知師甚詳及觀師之終始一念於君師父母者則范公之言信矣然獨於聞父之喪當荒迷之中反有所悟入則佛者偉之而儒者疑之豈亦所謂生於憂患者歟銘曰人生而善有萬惟均能盡此性拔夷冠倫在吾為仁在佛為覺理本不殊殊以其學蒙菴之覺匪覺伊仁君師父母仁之本根末法波流紛拏口舌孰知此事初無異說龍門雪堂為法棟梁燈翳而吐由師乃光孰振徑山孰扶佛智我撮其實天子之賜
