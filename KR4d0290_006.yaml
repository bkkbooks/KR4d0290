body:
  text: 後樂集卷六宋衛涇撰表狀賜進士及第謝皇帝表臣某等言伏蒙聖恩賜臣等進士及第者參綱條而上對僅畢奏篇侈命服以中朌濫階士版名傳臚句聲籍士林雖為祖宗之成模乃有臣子之深懼中謝竊以科目取士雖勢使然言語求人其難久矣矧臨軒之舊典有操牘之常程泛獵陳言用塞明詔學固不躋於奧閫責豈専在於有司嘗繹幼聞粗知深旨惟賈誼之疏於漢雖曰通逹而未諳諸老持重之謀而劉蕡之策於唐雖號讜忠而尚貽史臣疏直之歎夫豈賢者之過抑知時論之難辱在選中施及臣等永懷先哲如景髙山雖釋褐命官曽不間於楚粵閩蜀之畯然探端知緒豈盡逹於虞夏商周之宜俯愧淺聞仰辜清問兹蓋恭遇皇帝陛下至誠贊化皇極敷言體柔克以居髙以剛中而行健扶攜直諒諏訪謀猷要使芻蕘之作興必先尺度之疏濶致兹孱陋有此遭逢鳬鶴短長盡出隂陽之開闔鯤鵬變化可占江海之閎深上以名求下以實稱臣等誓堅素節勉效前修拜敕在廷方被采葑之寵捐軀報國終存橫草之忠臣等無任賜進士及第謝太上皇帝表臣某等言云云總章晝訪俯逮芻蕘廣陛臚傳寵加韋布侈千載遭逢之幸拜兩宫涵養之恩進冒光榮退懷兢灼臣等中謝竊考人材之盛欽聞治古之隆清問博詢疇咨精選既自為股肱之用勵翼而致時雍復留如元愷之才封殖以待帝舉惟今日勳華之懿來衆言稷契之忠俾無諱於有司咸展盡於底蘊儻非崇論曷副詳延如臣等問學迂疏器資凡陋親逢盛旦徒有朴忠草芥荒蕪安識朝廷之典故簡編陳腐不知言語之精粗誤塵中御之觀敷錫太常之第載循其本必有可遵兹蓋恭遇尊號太上皇帝陛下與天為徒順帝之則崇詩書禮樂以造士設庠序學校以明倫陶教育於三紀之餘煥文章於百王之上聖作明述遹觀潤色之傳德進言揚罔俾忠嘉之伏特旌後學往繼前修臣等謹當尊其所聞期以不負敬修可願敢懷人爵之縻增益未能終冀天工之亮臣等無任謝賜聞喜宴表臣等言伏蒙聖恩賜臣等聞喜宴者據經上對甫趨廣殿之廬式宴示慈重拜大官之品仰霑膏飫俯極感藏臣等中謝伏念臣等猥以寒生適逢熙運業僅専於鉛槧樂不改於簞瓢黼座雍容特垂清問巵言猥并各罄丹衷懷野人願獻之芹遇治世求針之木匪獨就班於科級繼蒙均賜於賔筵簮會曲江不數唐人之故事樂諧韶簫獲聞虞氏之餘音肴核踐嘉豆觴交錯洽醴醪而自愧誇里巷之為榮兹蓋恭遇皇帝陛下廣運聖神旁招俊乂需雲渥采衣被草茅湛露靈光發輝葵藿俾知燕喜之盛獨在賢材之多臣等敢不祗佩殊恩答揚異數加籩有秩既歌飽德之詩覆餗是羞彌篤食功之訓臣等無任謝賜花表臣等言伏蒙聖恩賜臣等聞喜宴花者燕錫公堂甫拜需雲之澤花頒禁籞仍沾湑露之恩香風遍襲於衣冠淑景頓移於尊爼事維循舊寵實更新臣等中謝伏念臣等蕭艾凡姿草茅鄙習秀發尚慙於儒藻竒芳未吐於天葩追攀杏苑之英遊濫陪式衎緬想鶴林之佳致忽覩仙標叨被恩榮益增愧懼兹蓋伏遇皇帝陛下作人有績與物為春密移造化之功大肆乾坤之渥臣等敢不祗承帝賚榮戴龍光追琢其章謹拜生成之賜英華發外願宏充實之輝臣等無任謝頒氷表臣某等言伏蒙聖恩賜臣等聞喜宴頒氷者蓊若需雲方啓初筵之秩霈然湛露遽叨凌室之頒盡滌煩囂頓忘炎燠臣等中謝竊以夏頒秋刷雖常誦周官之文陽出隂藏亦竊窺魯史之旨顧方安藜藿之陋奚暇為饔飱之謀不圖寒士之幸逢亦預夏時之蕃錫惟其疵賤敢自意於屬饜故此戰兢凛莫勝其履薄兹蓋伏遇皇帝陛下功參化育義篤臣工大烹不吝於養賢菲飲惟専於挹已燭知悃愊懷憂時若渴之心澡雪肺腸過推食解衣之惠臣等敢不益思修潔仰對恩榮厚澤所加方詠春開之雅躁心一洗先逃夕飲之譏淮東提舉到任謝表班行寓趾積愧空餐淮壤觀風猥叨隆委方退嚴於親養俄趨奉於戌期入境載驅視章惟謹中謝臣起身寒逺逢世休明誤當慈極之詳延擢以太常之首選頃從幕府詔詣公車藏室蓬萊多愧並遊之俊縹囊緗素獲觀未見之書嗣際興王遊塵清貫約麟編而抱槧森皇屬以橫經承攝郎闈倏周嵗籥義當引去初自詭於偏城恩許便私遹榮分於一節惟時楚甸實屏吳都號稱財賦之淵允資鹺荈之利姦蠧殆成於積習源流盍審於隄防矧復偽錢之行重為艱食之害幸今略定善後伊何宜妙簡於髦英往具宣於德意如臣素乏可稱之望歡言所與之輕兹蓋伏遇皇帝陛下愛護羣生照臨百辟豈特適均中外示以微權抑將詳試才能儲之有用責任綦重戰兢靡寧臣敢不祗服訓詞益修職業裕民足國必明取豫之方攬轡登車尚厲澄清之志浙東提舉到任謝表祗奉恩言載馳軺傳顧罔堪於巳試曽敢冀於後圖中謝伏念臣頃以辭藝得官本無材術濟世遵故事而登册府纍數載而並英遊學力單微覺嵗年之尚早誠衷膚薄繇志氣之未充所願溫故習於私庭庶或展寸長於異日昨蒙誤寵遽俾觀風服勞敢憚於咨詢守拙每忘其寡陋考言弗績尸祿奚為豈期易地之除靡及循墻之避惟人情退怯於隱約之後而物論難容於瘝曠之餘顧是洪私凄其小巳矧內甸不輕置使蓋若時屢選得人殆覺庸虛愈難稱塞兹蓋伏遇皇帝陛下以積久而改察庶政以更試而審驗羣工賜以曲成責其求效臣惟當黽勉寧恤悔尤知王事之為難抑君門之甚邇簿書繁密雖非素習之長閭巷隱微終幸徹聞之速冀蘇民力少答主知謝授衣節物劄山川蒙露感嘉節以旋歸分野占星來湛恩於錫豫涵濡厚澤衣被榮光酌天序之推移慮使將之匽薄乃稽令典有赫賜儀消息與時尚識授衣之旨動容中禮敢窮吹帽之歡辭免正除中書舍人奏劄臣竊以中書與聞幾事內史職贊命書使之播告有孚之惠心杜防未形之闕政是為禁管之地必登洪碩之儒分押六曹號稱三字熙朝尤重作誥是官不輕畀人當時才豈為難猶或試而後授矧惟立事建功之意繫於發號施令之間欲效涓塵之愚豈特詞采之末伏念臣流落江湖之久更嘗憂患之餘乏文字之芳鮮視筆研為鹵莽不堪承攝敢冒躐除欲望皇帝陛下收還誤恩改畀廷彥庶全愚分免速人言謝正除中書舍人表議禮奉常攝官詞掖深慙假寵更忝真除中謝竊以西臺機務之原實陪國論內史贊書之職乃代王言若昔盛時有嚴此選歐陽修擢升於慶厯之始尚云發揮之難王安石拔用於嘉祐之間亦謂討論之重蓋以凡庸之筆擬為聖哲之辭凡號發而令施欲言約而體備所謂有制有詔皆欲見心見情苟非語中經綸學通今古文掞河漢氣侔芝蘭則何以裁成帝謨誕告羣聽是以一世數人之傑無愧前修求復三代兩漢之風猶有遺恨矧今潤色鴻業恢張皇猷出言如綸道難明之法意若古有訓勵丕作之庶工苟非降才之爾殊誠恐動人之效淺如臣底滯何所發揮一違螭陛之班久斷鈞天之夢自慙鉛槧甘永墮於塵蕪長分桑榆難重收於翰墨敢謂漁樵之散迹復堪黼藻於斯文望鳳闕之深嚴負鵜梁而悚恧兹蓋伏遇皇帝陛下追還朴質剗革雕華起之江湖之中付以禮樂之事騏驥一躍期十駕之與齊洪鍾千鈞付寸莛而發響臣敢不勉殫末技仰答殊私日月麗天莫效昭明之助雷霆驅令誓彰鼓舞之神臣無任辭免左侍郎兼侍讀奏劄臣竊以三銓任劇亞旅班清稽近比以具存在真除而尤重蓋以選部抑揚之柄實關人才通塞之機匪徒拘資格之微文必欲稱權衡之公選如臣器能譾薄識趣迂凡荐罹憂患之餘寖隔雲霄之夢冗散再收於孤迹踐揚疊冒於殊私方汙兩制之華俄畀六卿之二使年歷嵗遷而后至猶位尊德薄之是慙矧涉日之未幾而叨榮之已甚至若邇英之席尤髙執讀之聨昔聞疇政路之舊臣今以處禁塗之宿望雖云暫攝詎可冒居伏望皇帝陛下察父垂慈隆天遍燾並回誤渥改授時髦庶禆聖世之審官亦助宸襟之典學辭免兼侍讀奏劄臣祗聞寵渥倍切戰兢臣竊惟勸誦名官邇英髙選開元之擇耆學實賴於質疑興國之擢名儒允資於顧問皆參處故老舊臣之重或詳求洽聞博物之流斯能發揮於聖謨所以開廣於上意如臣淺陋暫此攝承每懷越爼之慙安有執經之益方念不當於久假豈宜更玷於為真非比他官更容序進伏望皇帝陛下亟收成渙俯察由衷别延鴻碩之儔用效緝熙之助毋使妨賢而積愧庶幾量分以少安謝兼侍讀表勸誦在後方懷承乏之慙積薪居前驟玷為真之寵惟學術處衆人之底而班聨躐三侍之先非分所安以榮為懼中謝竊惟金華列職均以論説名官麗正置員尤以顧問擇士蓋敷繹經誼拘以分章摘句而周覽史籍得以隨事獻言豈獨閲塵編而夸稽古之榮所欲監成憲以明救時之務故司馬據漢紀而陳法度變更之病蘇軾因寶訓而述賞罰善惡之規儻非儒紳宿望之流曷副帝幕上遊之選伏念臣見聞單淺涉獵迂疏蚤事槧鉛不過書生之陳腐晚汚筆槖莫殫禁從之論思入閣未補於萬分代庖甫逾於纍月誤蒙序陟實愧前修兹蓋伏遇皇帝陛下清明在躬緝熙典學無他嗜好惟留神載籍之文當此修攘猶不廢儒書之務尚取材於末藝俾陪論於細旃臣敢不俯罄微忠仰酬殊遇求歷代之訓寧敢希倚相能讀之才進堂下之言或能效輪扁至愚之慮臣無任謝賜生餼表紀桑蓬而興感俯念親恩捧綸綍以知榮仰勤君賜出大官之蕃渥為私室之寵光臣某中謝伏念臣憂患餘生遭逢昭代因心盡孝莫酬父母之劬勞委質移忠懼負聖明之任使自塵邇列適踵多虞體旰食之懷方務裨於撙節積素飱之愧敢更冒於匪頒寧謂微蹤亦關睿聽賁詔旨之溫潤萃賚典之豐腴酏醴孔嘉廪庖有繼秪載殊私之厚豈云故實之常兹蓋伏遇皇帝陛下祿謹詔功錫先豫善斂敷五福均符欲壽之情體貌羣工優示共賢之意臣謹當職思歸美食戒過浮覆餗預憂曷辱大亨之禮投醪圖報期臻既醉之詩臣無任謝牲餼狀餉餽相望府無虛日餼牢甚腆官用彝章行慕有羶禮循考牧致大亨於鼎象侈備物於魚麗割肉以歸奚取詼諧之辨賜生必畜敢隳鄉黨之儀明堂大禮畢皇后賀皇帝表禋祀合宫邦儀維穆霈恩端闕民福攸同慶洽天人歡均家國恭惟皇帝陛下遹承寶命寅御珍圖闡列聖之彌文恢九筵之宏制灌玉清廟聿嚴孝饗之誠升煙太虛丕格嵗成之報靈心歆顧協氣旁流臣妾叨正坤闈助修隂教迄成熙事幸際休期瞻宣室之受釐率掖庭而稱抃辭免權禮部尚書奏劄銓管劇曹久慙充位春卿髙選忽俾攝官聞命若驚拊躬增惕竊惟古三后之典禮固異有司今六職之分聨均為率屬必得老成之彥與夫鴻碩之英克踐前修始符妙簡伏念臣迂踈末學憂患餘生九載丘園退安於間散兩年班列驟玷於清華在小臣已極超躐之逾於公朝曽無毫髮之補深虞幽黜乃辱褒遷方國家激厲人才之秋正陛下愛惜名器之日况復職司於獻納尤難身冒於寵榮自揣甚明人言可畏伏望皇帝陛下廣隆天之覆垂察父之慈曲鑒由衷追還成渙非特安臣子愚戅之分亦以裨明時綜核之心辭免除御史中丞奏劄竊以國家之弊實由官邪法令之行必先近始自昔中司之建號稱獨坐之雄本朝多虛位而不充纍聖必得人而後畀竊觀近事寖異昔時上下之情隔塞而弗通縉紳之氣萎苶而不振久矣紀綱之弛玩幾於邪正之混殽天誘宸衷躬發英斷當庶政更新之始乃羣心聳聽之時必得不畏強禦深明國體之人庶幾大有振作以慰天下之望如臣弱植惟抱朴忠積年流落之餘絶意清華之夢雖塵禁列常負隱憂身玷論思猶乏秋毫之益職當彈劾難求風采之強伏望皇帝陛下睿鑒博臨乾剛獨運矧屬萬幾之親攬尤須百辟之肅清願别柬於儒英以增重於天憲庸副厲精之治免纍知人之明辭免除端明殿學士簽書樞密院表臣聞命震驚拊躬局蹐竊以事樞之重兵本所關僉預籌帷體鄰丞弼用人得失繫國重輕矧今內當更化之初外飭禦戎之務尤宜精選宿彥允合衆心而後朝廷繇輔相而尊天下受仁賢之福豈應親擢首及凡材如臣識淺學迂質微能薄久安田里與世闊疏自玷班行略無補報乃者乾剛奮發元惡殄除徒以微臣孤立之蹤置之絶席敢言之地片忠未吐誤寵驟攽旬浹之間恩華狎至不惟濫陪宥密難稱隆知至於多取器名殊非素志况收召諸老人望方歸布列羣工儒猷不乏如臣極陋焉敢冒居伏望皇帝陛下察臣非據之危鑒臣由衷之請許其懇辭成命克保廉隅使之姑處舊官少殫綿薄臣無任第二表封章上逹懇辭樞管之嚴淵聽未回仍拜宸綸之渥敢申再瀆終覬曲從竊以當平世而本兵猶非易事以儒臣而經武必屬全才矧邊徼未底於求成而貔虎尚勞於逺戍方改絃而易轍圖繼好以安民中謝伏念臣資本凡庸學非淹貫自還班列未效涓埃比濫長於霜臺惟恐辜於風憲為陛下息邪而扶正或可輸忠助陛下厭難而折衝若為稱職雖二府班聨之暫闕然四方耆舊之鼎來豈容未淹旬浹之間遽俾晉冒樞機之任伏望皇帝陛下旁搜逺攬公聽並觀念兹多事之秋宜得殊常之彥不遐有佐俾運籌帷幄之中無競維人庶消患廟堂之上姑安舊次免速煩言謝除端明殿學士簽書樞密院表持綱憲府甫叨耳目之司涉筆幾庭驟玷腹心之地更化方新於庶政用人首及於孤蹤居帷幄以知慙捧絲綸而增懼中謝竊以萬兵之柄在於強本而折衝四輔之官難以具臣而充位矧太阿倒持之久當神樞獨斡之初外欲銷戎冦之祲氛內欲肅朝廷之綱紀必得壯猶之老始參基命之嚴伏念臣學淺而識迂材綿而器薄頃觸危機而去國久絶榮望之萌心十年畎畝之忠無階自逹兩載班行之迹欲去未能幸日月之昭明適雲霾之屏息豈期簡拔誤取戅愚獨俾霜簡之抨彈少吐丹誠之激烈忽驟緣於人乏俾晉預於廟謨自惟周旋一職之常材何以參典萬幾之丕務瀝懇辭而惕若思報效以茫然兹蓋恭遇皇帝陛下德照百官治嚴八柄厲精更始大明兩觀之誅公聽並觀載廣四門之闢遂令疏逺乃冒延登臣敢不蹇蹇匪躬孜孜盡瘁愛君體國惟務竭於小心繼好息民思勉裨於大計臣無任謝賜對衣金帶鞍馬狀書殿幾廷方冒殊常之寵天間御府併叨蕃錫之加德不稱以懷慙眷愈隆而增懼伏念臣起家韋布比質駑駘子路縕袍安有輕肥之念塞翁失馬久諳禍福之心值聖明濬發於乾剛俾孤逺濫顓於風憲未踰旬浹何補秋毫俄晉斡於鴻樞更鼎來於異渥曵婁且燠煥珍帶以紆華磬控生榮騋文韀而騖駿特循舊比增賁孱軀兹蓋伏遇皇帝陛下駕馭羣工衣被萬物敝思豫改有如好善之誠既間且馳庸示求賢之篤而臣折腰有愧顧影自憐拾芥取青敢詫明經之效陳廷拜賜終慙稽古之功辭免再賜對衣金帶與鞍馬奏狀被命之初已經宣賜安有浹旬之近洊膺蕃錫之加稽首雖榮拊躬若厲伏望皇帝陛下察臣驟蒙奬拔未有補於秋毫憐臣深畏滿盈實難勝於天寵特頒睿旨追寢誤恩庶寬淵谷之虞彌載乾坤之造辭免兼權參知政事奏劄一介戅愚誤蒙拔擢承乏幾庭力輕任重方慙非據見具控免洊攽隆旨俾攝政塗與聞國論如臣初無材術徒有朴忠使之涉筆本兵猶難冒處若復共二諧弼必致顛隮矧僉典樞務稽之舊比任亞疑丞上兼參預尤為超躐恩榮狎至震懼罙深夫量材受任弗輕以假人者君父之明陳力就列不能而知止者臣子之誼伏望皇帝陛下曲垂睿照俯諒衷誠毋反汗以為嫌必得賢而共政辭免除參知政事奏劄成命初頒師言未穆微臣自揣倍切兢惶臣聞褒陟有序則上既可以正國體而尊朝廷遷進太數則下或無以厲廉隅而壓物望伏念臣遭值陛下更化之始親蒙眷簡擢長風憲凡弊政之當革官邪之當糾猶能為陛下一一疏舉甫及旬浹而拜僉樞之命曽未信宿又俾暫陪國論是時巨蠧雖除庶事未定內而政地適多虛員外而諸老驛召未至是以不敢崇飾虛遜黽勉共職逮今僅踰一月而臣智識短淺材力綿薄其於邊條之科瑣有司之程度且未暇究見顛末况修明綱紀選拔人材豈有涓埃小裨海嶽忽蒙聖恩躐置東府在臣進退誠不遑安矧今衆正旁開耆英就列器能既出臣之右年德又於臣為髙詎應以一介孤逺之蹤乃獨先白首魁壘之彥臣用敢披瀝忱悃仰干洪造伏望皇帝陛下憐臣粗明於分義察臣深畏於滿盈略反汗之小嫌還出綸之誤渥儻陛下未忍捐棄或尚容備數舊官免速顛隮實為全覆所有恩命未敢祗受辭免除參知政事表右府充員罔功是懼東臺共政懇避弗俞顧自揣之甚明必終辭而乃巳中謝竊以二三大臣之遷進異乎凡百有司之選除雖日月至焉尚欲熟觀其器識使名稱籍甚尤當詳試以事為矧平時望實之未孚而一旦超踰之太驟甫四更於旬浹俄三冒於恩綸伏念臣孤立班行遇知明聖天威濬發首擢長於霜臺風憲未張復晉陪於斗幄幾務叢積則謀謨之安取文書繁劇則省閲之靡皇遽因承乏之官徑畀為真之寵惟昔者濫施於名器繇權臣久擅於福威每假邦彝私植恩地既曰更新於聖化詎宜循襲於陋規覆轍在前改絃恐後方今環布列序者甄收或未遍陸沉逺外者招徠尚有遺苟大僚拜徙之日聞實公論譏評之可畏伏望皇帝陛下深圖實政無取美觀周大老歸首起耆英之望范宣子遜尤髙廉退之風俾愚臣姑即於故官庶積久漸收於微效下人輕上爵當澄徼幸之源髙位實疾顛亦免滿盈之咎臣無任謝除參知政事表涉筆紫樞未究萬兵之本聨班黃閣驟叨兩社之崇責重望輕身微恩大臣某中謝竊以立政造事必資碩德之臣前疑後丞夫豈敘遷之位名副其實則有折衝銷萌之效用非真材則招括囊尸素之譏歷考前猷悉繇博選范仲淹纍更劇任而後參預於慶厯之際歐陽修久養雅譽而方弼諧於嘉祐之初皆推衆正之宗乃在同寅之列矧當攬權而更始莫若籲俊以為先綱紀欲修弊蠧將革一相聿新於總職四鄰尤賴於得人如臣者惟有朴忠本無智略生平所學獨懷尊主之誠粵自立朝期踐為臣之誼夷險悉安於愚分榮貴固非其初心敢謂殊知荐蒙顯擢長南臺之風憲坐席靡溫陪右府之訏謨除書猶濕偶緣人乏疊被寵光矧日月之未淹曽涓埃之莫報三垂徂定曷裨前箸之籌諸老鼎來每愧後薪之積甫冒柄除之暫攝復驚宸命之為真沐雨露以滋深履淵氷而益懼懇辭弗獲躐處非宜兹蓋伏遇皇帝陛下秉哲在躬推誠任下去凶而舉元愷咸服大舜之公分職而責孤卿方董成王之治肆令微迹上弼清衷凛然稱塞之難誤此延登之異臣敢不恪堅素節勉翼熙圖輔周典以靖四方汔思來效述臯謨而贊百揆惟務協心臣無任辭免提舉修史等兼職奏劄提舉國史院權提舉實録院權提舉編修國朝會要同提舉編修勑令竊以幾庭預政方膺共二之求史觀提綱參預約三之法忝冒僅踰於旬浹寵榮疊拜於宸綸揣分難勝鞠躬以避伏念臣性資滯固學殖荒蕪寡謏見聞粗記右尹祈招之什拘牽文義安識司空城旦之書惟聲明莫盛於纍朝而述作若稽於前代華簡編於翰墨炳金玉於科條必求殫洽之英始稱纂修之任矧是本兵之寄適當經武之秋使専意於憂邊猶虞曠戾暫與聞於出命實負凌兢儻更兼潤色之工將必速顛隮之悔伏望皇帝陛下大明委照全度包荒察所控之由衷亟收還於成渙文謨武烈既允屬於三長蕭規曹隨宜併顓於一老庶安愚分免纍洪私政府緣以旱蝗同執政乞去奏劄臣等仰惟陛下寅畏天命法商宗之秪懼昭事上帝如文后之小心恭儉寡欲無逸德過行以干隂陽之和寬仁愛人無嚴刑峻罰以召乖盩之氣不幸權臣弄兵三邊百姓橫罹鋒鏑挽輸科斂海宇繹騷陛下引咎責躬怨艾深切屈已就和凡以為民是宜天意悔禍庶徵時若三辰順軌而自春徂夏時澤又愆兼旬以來螟蝗大作白晝過都羣飛蔽天乃甲子之日星文變異衆目共睹推原災咎實在臣等夫以陛下天姿明聖而臣等不能究宣職業以贊維新之政陛下宸衷惻怛而臣等不能推廣恩澤以慰更生之民賞罰過差刑獄淹滯積成愆繆感動穹旻致使陛下展轉焦勞獨任其咎一人慊然抑畏於上而諸臣偃然尸素於下事為倒置誼豈遑安伏望皇帝陛下亟奮威斷並從黜免庶少寬於聖意亦漸格於天心臣等謹已出郊待罪伏乞睿旨即賜處分臣等無任丐祠劄子臣一介鯫生至愚極陋惟知涉獵章句以為應舉覔官之資遭值孝廟臨軒策士誤蒙親擢遂竊虛名遍塵三館兩持使節遽丁內艱甫及終喪復叨收召旋自都司濫躋柱史將聘鄰壤甫竣使事即伸更迭之請巳蒙陛下除職與郡竟以罪行臣向來區區出處本末如此人或知之不復辨數自是纒綿憂患屏息田里首尾九年絶意榮望中間國論鄉評善類復用陛下記憐孤逺畀以郡寄偶因入奏再玷班行遂繇奉常寖升從列冒兼兩制猥厠六聨屬大正於朝綱俾晉顓於風憲蔑聞勞效忽預樞機曽不踰時又參大政陛下用臣既傷於太驟微臣揣分自愧於非才然方是時外之耆老檄召未來內之宰輔虛位實衆臣冒昧承乏不容終避加之和使雖遣尚未堅決苟求去位殆謂辭難今揆度機廷無非妙選明儒宿望並集本朝張旜渡淮更成可必若復貪戀榮祿則必上負誤國之罪下獲妨賢之譏兼臣積憂薰心早衰多病狀似強健中實疲羸一有煩言重罹大譴陛下雖欲保全亦無及矣仰冀陛下鑒臣懇懇之危衷全臣區區之晚節許解機政改授外祠凡未委溝壑之前皆圖報君親之日臣即已出郊待命伏望聖慈即賜處分臣無任第二次丐祠表臣某言早來具劄子面奏乞解罷機政畀以外祠出郊待命伏蒙聖恩特降中使宣押赴都堂治事者危衷亟吐溫旨未俞誼既難安理須再瀆中謝伏念臣無軻雄之學竊朝董之科流俗既譁其虛名清朝亦待以異數粗嘗有志矧當勵精更治之時自審非才終匪扶顛持危之手下有譏評之交至上而譴告之相仍久合丐於免歸迹恐鄰於規避今則信使通而無壅敵兵撤以盡還百萬生靈行有息肩之漸二三宰輔又皆同德之良何取臣愚尚妨賢路竊考祖宗之盛際最為體貌於近臣或自詭於投間率從容而去國孝皇晚嵗自黃洽蕭燧之外比比有人陛下初年由鄭僑何淡而後寥寥罕見得非貪戀不明去就之幾是致傾搖終費保全之力臣之當去今也其時苟必待公言彈劾而后歸亦豈是聖主延登之初意伏望皇帝陛下矜其悃欵惠以始終許退處於田廬俾夤修於香火珍臺間館倘舊觀之復還墜履遺簮亦後來之知勸臣無任第三次丐祠劄子臣昨以輔政亡狀連具封章仰干旒扆乞從免歸豈謂天聽崇髙臣言拙訥未能感動尚示眷留一日之間兩勤中使宣押此所以待元勳茂德顧臣何人乃敢當此然體貌之禮在陛下既極於優隆去就之誼在愚臣難避於煩瀆伏念臣本無材術徒抱朴忠方其壯年強健之時粗可盡力州縣簿書之務誠不自意屏息八年遭逢一旦夤緣兩地倏已半期勞效蔑聞罪戾崇積自叨簡拔物望不孚街談巷議公肆詆毁矧陛下躬親萬幾新美庶政和議既成根本尤當自治流民雖復經理尚須良謀圖事揆策合屬耆俊今內有白首魁壘朝夕論思之故老外有勤施四方獨當一面之重臣至於舊學鴻儒幾廷宿望或尚辭命召或久處燕間年德既居臣之前績效又出臣之右豈容後先倒置逸勞絶殊揣分度時宜去決矣區區危悃竭盡於斯臣恐勤宣押未敢再出郊外見居家待命伏望睿明亟賜處分臣無任第四次丐祠劄子臣近三具表劄祈解機政伏蒙陛下禮貌優渥申攽詔旨又蒙兩遣中使至臣私第賜臣批答不允仍斷來章及宣諭令赴堂治事臣一介孱陋心非木石感激恩遇退深戰栗豈不貪戀明聖固欲輕違軒陛自干方命之誅實緣私計怵迫誼不容留須至煩瀆天聽臣聞人臣事君之誼不以苟去為髙人君待臣之禮不以苟留為恩蓋才術駑下謀謨淺拙自知無補求去已晚何足為髙委任既隆課效蔑聞人言籍籍雖留何用未可為恩臣於二者可謂兼之若復遷延顧望遲疑不決國有清議朝有憲章亦非陛下所得而私雖欲不加汰斥不可得已臣晝度夜思計之甚審瀝血刳心呼天號父惟有拙誠更無他説陛下與其留臣以及於物論沸騰之際孰若聽臣引去於罪戾尚輕之時非特陛下有以保惠微臣微臣亦得以自全晚節更生之賜孰大於斯臣昨日嘗奏劄子乞尚書省繳進未蒙處分今再附敕使申奏欲乞聖慈檢會前劄併賜降出除臣一在外宮觀臣瀆犯天威下情無任第五次丐祠劄子臣自前月二十九日以後兩嘗面奏五上封章乞解罷機政伏蒙聖慈特飭中使宣押者三宣諭者再早來又降御筆備行嘉奬曲示眷留陛下恩遇微臣至矣盡矣顧臣草芥微生迂疏末學何以仰承體貌之重感恩至骨流涕何言儻於誼可以少安臣豈敢固執愚見惟是輔政半期績狀蔑著欲去之心雖因今日而有請宜去之罪不待今日而始彰何俟人言自知甚審臣自還卿列繼沗從班職在論思事之利害無不當言者方權臣橫挑兵端雖不謀之在廷然命使調兵豈無眹兆臣不能先事救正逆折其萌坐見師徒撓敗糧械喪亡三邊繹騷赤子塗炭臣宜去之罪一也托胄擅朝威福由已兵敗國危人怨神怒臣又不能蚤白其姦使禍稔惡積意將罔測致陛下親發威斷僅克翦除臣言固已晚矣臣宜去之罪二也復讐本為大誼而權臣規畫無素輕易寡謀兵連禍結敵得歸曲於我首禍雖誅猶肆強橫邀索無厭臣時以備員二府又無深謀至計以折衝銷難陛下為之屈已就成歸俘增幣雖幸疆埸稍定信使巳通然耗竭事力虧傷國體有過無功人言籍籍臣首居參預豈容委諸人以自解臣宜去之罪三也自春徂夏雨澤愆期兼旬以來飛蝗蔽野漸害苗稼星文亦變災異稠重咎證不虛天意可畏臣之尸素衆責交歸臣宜去之罪四也罪之大者有此四事其他過謬未易悉數容其自效已是寬恩是尚得為無名乎况又有大不可者臣賦性褊介遇事輕率常是少所回護且復拙於關防或因形似易致猜嫌積疑成間積間成隙非特不免身危亦將上誤國事目前難以力辨他日終當自明加之賦分涼薄福過災生五十之年蒲栁早衰目視昏花精神眩瞀省閲文書尚且費力況望其建明大議論經畫大政事乎臣非不知數犯天威當膺方命之戮然區區拙誠竊謂與其以不去獲罪於公言不若因求去而獲罪於君父之猶為可解也欲望天慈特回宸慮亟賜俞允免速顛隮臣不勝幸甚辭免除職與郡奏劄欽聞威命罙震懦衷竊以通籍殿中示優賢之禮分符閫外資御衆之才雖纍朝以華輔弼之歸然近世尤吝器名之假如臣者謀非經逺功不蓋愆內懼滿盈而挻災外虞曠戾而招謗疊封章而丐去紆宸眷以曲留至於再遣王人親形詔札臣之得此抑有榮焉惟是殊恩久無前比豈容駑下併冒寵光苟控避之弗堅將顛隮之愈甚伏望收還成渙改畀叢祠不惟自計之甚明抑亦人言之少塞辭免皇太子受册轉官奏劄聞命震惶靡知所措伏念臣病悴餘生迂愚末學頃者承乏政地備數宮僚亡補涓埃旋即罷斥屏居田里望絶雲霄兹以册寶告成例攽賞典邦家大慶臣子至榮而臣席寵已多逾涯是懼矧乃無功而受祿尤慙不稼而取禾更冒穹階難安私誼伏望皇帝陛下曲垂淵鑒俯亮愚衷追寢誤恩庶全微分所有恩命臣未敢秪受再辭免除端明學士宫觀表奏牘上聞冀趣收於誤渥詔函中錫未濬發於俞音輒攄怵迫之誠疊冒穹窿之聽臣某中謝臣竊惟班髙邃殿蓋體貌於勳賢祿厚真祠本優崇於耆老顧方從於廢黜曷并竊於寵靈伏念臣狷介不移戅愚自信棲棲寒迹山林之日居多耿耿寸心畎畝之忠徒在偶遭親拔猥預繁機欲裨更化之清明固知陳力之短淺器小任重果速顛隮咎大責輕訖蒙恩宥自屏居於田里久安分於漁樵憂患相挻弟昆凋落疾痾不貸齒髮衰頽靜惟坎壈之餘殆絶榮華之望豈圖眷軫未忍棄捐肆頒渙號於崇朝盡復政塗之異數叨踰過甚局蹐難勝恐益重於悔尤敢洊伸於控免伏望皇帝陛下廣惠慈而待下惜名器以馭臣念臣孤蹤兢惕之深察臣平日循守之素貰其煩黷許以懇辭或追寢於隆名俾祝釐於間館一俯再傴願垂鑒於由衷曲謹小廉庶獲全於末路臣無任謝端明學士宮觀表班聨祕殿仰依龍扆之光官庀祠庭俯遂燕居之佚省循莫稱慙懼弗遑中謝伏念臣初乏片長素忘求進當睿斷更張之始丕振朝綱拔微臣孤陋之中俾専憲席未閲兼旬之久晉參兩地之華憂思徒罄於乃心何裨廟論望實不孚於衆聽遽費嘖言凛危迹之疾顛戴洪私之全宥身棲農圃紛白髮之寖生夢繞觚稜耿丹衷之獨在詎期軫録驟賁寵靈還舊觀於隆名沛新恩於間祿顧兹起廢豈曰勸功瀝伸懇欵之誠覬安私誼洊奉溫純之詔迄閟俞音兹蓋伏遇皇帝陛下覆幬如天照臨若日務全體貌將加厲於臣鄰靡間瑜瑕示昭明於公道特憐寒迹嘗誤深知曲推抆拭之仁庸錫便蕃之渥臣敢不益堅晚節罔替初心修香火之勝緣敬祈曼夀答乾坤之大造誓畢餘生臣無任
