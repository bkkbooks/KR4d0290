body:
  text: 提要後樂集二十卷别集類三宋臣等謹案後樂集二十卷宋衛涇撰涇字清叔華亭人徙居崑山登淳熙十一年進士第一人王楙野客叢書乃謂潮至夷亭出狀元甲辰衛涇果魁天下者也纍官參知政事封秦國公卒諡文節其事蹟不具於宋史惟南宋翰苑題名記載涇以開禧二年七月官中書舍人兼修玊牒官直學士院十月除吏部侍郎兼侍讀三年十月除禮部尚書十一月除御史中丞宋史宰輔表載開禧三年十一月丙戌涇自中奉大夫試御史中丞除端明殿學士簽書樞密院事丁亥兼權參知政事十二月壬戌涇與雷孝友同除參知政事嘉定元年六月乙亥罷為資政殿學士知潭州而集中謝表自潭州以後又嘗一知福州再知隆興府其歷官歲月尚可考見涇初號拙齊居士改號西園居士後築堂成取范仲淹嶽陽樓記中語題之曰後樂堂遂以自號并名其集原本凡七十卷乃其子樵所編嘗刻之於永州歲久亡佚明楊樞淞故述僅存其名而其本已不可見今從永樂大典中裒輯編次釐為二十卷衛氏在宋世以文學知名涇諸父膚敏紹興間為禮部侍郎立朝頗著風采涇弟湜亦湛深經術所著禮記集說已别著録涇所作大都和平溫雅具有體裁歸有光震川集稱其文章議論有禆當世當韓托胄用事時隱居十年於所居石浦闢西園堅卧不出其進退之際蓋能以禮自守者今即集中諸奏疏考之其應詔論北伐劄子謂兩國相敵持重者安輕動者危應兵常勝首事常沮力詆托胄開釁之非詞意極為切直其劾易祓朱質林行諸狀亦能抵觸奸佞侃侃不阿他所論列並中窽要在當時可稱正人特其執政未久宋史又佚不傳其大節幾就湮沒幸而遺文復顯猶可据以見其仕履之大略故著之於録補史文所未及焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
