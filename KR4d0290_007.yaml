body:
  text: 後樂集卷七宋衛涇撰表狀明堂禮成賀表王者之堂行王政紹講彌文天子之孝事天明丕承靈貺一純所格四表交欣臣某竊以聖朝遵三嵗之祠古制復九筵之秩皇祐合祛而肇始紹興間舉以為常肆參述於間規凡四行於宗祀恭惟皇帝陛下遹光駿命祗迪燕謀之德之純茂建中和之極我將我享允通精祲之交對越靈心告成熙事更旁流於霈渥用敷錫於嘉生臣心拱闕庭身棲農圃想多士奉璋之盛莫綴駿奔同斯民擊壤之安共陶鴻律瑞慶節賀表辰㑹于蒼龍尾就盈數焉社鳴而聖人生時純熙矣紀休期於震夙增寶祚之榮懷臣某中賀恭惟皇帝陛下大德懋昭小心抑畏春秋鼎盛屬萬國之本於元良弓矢載櫜躋一世之民於仁夀昔在髙宗享國丕若有夏歷年率由嘉靖於庶邦式克洪舒於景命於皇盛旦高掩前徽臣頃玷邇聮自干大戾心傾葵藿幸逢漢日之再中身在江湖徒望堯雲而三祝又五百年生聖聿開良月之祥三萬歲成純丕祝後天之算臣民愷懌宇宙清明臣某中賀恭惟皇帝陛下治襲緝熙業成耆定祈天永命泰元增神策之休陶世至和皇極斂洛書之福茂迎誕序益鞏珍圖臣敬效嵩呼竦瞻星拱彤墀在望惟存北闕之心金鑑效忠願贊南山之夀又冬日在尾聿開千嵗之符國夀齊箕丕篤一人之慶乾坤薦祉海㝢䝉休臣某中賀恭惟皇帝陛下業懋緝熙法循恭儉邊垂不聳永交玉帛之歡年榖順成盡洽農桑之化兹標誕序式對昌期天開有永之齡民獻無疆之頌臣身棲田野心繞闕廷職在叢祠惟效祝釐之敬呼同嵩嶽願賡歸美之詩又杓建乾方旬餘陽數占鬱葱之上瑞紀震夙之初生臣某中賀恭惟皇帝陛下志氣如神光明不疚孝儉冠百王之德蓋本天姿休嘉正三代之符方綿世祚屬兹華旦翕若歡聲衆星拱極以常尊萬嵗呼嵩而必夀臣昔陪邇列今玷真祠地闢天開喜協大來之頌日升川至願賡多益之章辭免除資政殿學士知潭州奏劄自天有命無地措躬伏念臣樗櫟散材崆峒末學頃緣忝竊自速顛隮䝉公朝抆拭之恩賦真館優間之祿聮榮規禁席寵里門每憐孤跡之兢凌曲荷至仁之全度二年香火一意漁樵敢誤隆私并頒異數加職視政塗之舊起家臨南紀之雄曾未服勞於隆名而曷稱矧方試郡豈閫寄之能勝在私誼既所未安顧公言實為可畏伏望皇帝陛下皇明委照聖度包荒俯矜懇惻之愚盡寢便蕃之渥姑仍舊列再畀叢祠尚期犬馬之餘生圖效㳙埃於異日再辭免除資政殿學士知潭州表臣甫上巽章遽頒溫詔恩光滋厚感懼交深伏念臣起自諸生本無才術受爵不避竊位寖高每自愧於罔功且久尸於間祿更䝉選擇俾與蕃宣固當勉效於驅馳庶或少圖於報稱苐惟南楚夙號大邦方潢池帖息之餘正碧幢拊循之始非威望素著不足以鎮安封部非識慮深長不足以濳杜奸萌兼斯二者乃克勝任而臣早衰多病力不逮心儻冒昧以祗承將疾顛之難免矧升祕殿庸待有功既未施毫髮之勞是亦重淵氷之懼敢伸危悃洊瀆嚴誅伏望皇帝陛下俯霽霆威廣垂日照亮其辭非貌飾蓋學心孚察其誠匪身謀寬為國慮併回新渥姑續舊祠庶允穆於師虞亦少安於微分潭州受告謝表江海摧頽已規終老湖湘逺重忽玷起家驟晉隆名洊勤溫詔靡皇懇避苐切凌兢臣某中謝伏念臣奮自諸生親逢熙旦學雖是古材弗逮於昔人慮切愛君智靡周於當世頃聨清貫但務直躬放歸坐廢者八年更化首瞻於一日又因顛越竟負寵靈修香火以杜門課農桑而卒嵗敢圖記録復荷使令顧是庸虛若何稱塞兹蓋伏遇皇帝陛下至仁覆冒盛德感孚體貌臣鄰愛養黎庶四通六闢闡大公至正之塗上際下蟠修極治太平之業既以兼收於衆雋亦復弗棄於散材臣敢不砥礪壯心激昂暮景雖乾坤博施難酬報答之私而民社布宣試竭撫摩之力俟臨所部續奏以聞臣無任南郊禮成賀表丕靈承于上帝拜况于郊用敷錫厥庶民並受其福備成熙事美叶嘉生中賀恭惟皇帝陛下翼翼小心兢兢行道氣和格天地之應百榖用成兵寢極帝王之功四方無侮肆循巨典間舉縟儀泰畤八觚肅圓丘而蕆事細書一札撫方夏以湛恩臣濫守麾符阻奔籩豆懷綏楚甸使僅知縮酒之供迹託湘流愧莫奉受釐之對辭免郊祀特㫖轉官奏劄伏準尚書省劄子勘㑹更化之後親祀南郊熙事備成慶均中外安丙衛涇俱以近臣宣勞藩閫各特轉一官者聞命震驚罔知所措竊念臣踈庸晚學衰朽餘生頃自祠庭驟分藩閫盡出清衷之簡記敢辭末路之馳驅適當俶擾之餘孰若拊摩之急粗殫綿力甫閲三時仰慿聖德之宣昭幸底軍兵之綏靖雨暘咸若年穀仍豐仕不覬于能稱人亦安於拙政粵從更化始講親郊精誠上格于天神慶澤實均于中外而臣屬縻遐徼阻造昕朝既莫預于駿奔且蔑聞于治狀忽叨進律亶謂罔功徒緣嘗厠于近班遂許例霑於渙渥揣微躬而曷稱懼公議之難逃伏望皇帝陛下量廣乾坤明垂日月鑒由中之至懇略反汗之小嫌庶保孤蹤尚圖來效所有省劄未敢祗受郊祀加恩謝表宣室均釐及長沙而承惠徹侯啓國因茂苑以疏封併增食采之腴罙積伐檀之愧臣某中謝伏念臣心誠拱北職實宅南清廟肅雍阻預駿奔之列紫壇溫豫莫宣騎導之勞敢圖天咫尺以不違例霑人三百而無眚兹蓋伏遇皇帝陛下靈承于帝敷錫厥民非功不侯曲念遺簮之舊多與之邑庸昭上胙之朌臣俯僂中慙凌兢下拜包茅當貢敢忘王祭之供蓴菜可思尚乞戶租之食臣無任謝加邑表泰畤八觚敷錫配天之澤衡山千里祗承零露之恩官既特遷邑仍多與併衍真腴之食益增假守之華臣某中謝伏念臣族本單平材非超卓徒守朴忠之節誤䝉神聖之知馴致顯庸難逃幽黜清時有味甘竊廩以奉祠白日無私遽起家而分閫於皇更化有赫親郊宣室受釐賈誼正留於湘水雲陽奉玉馬遷實在於周南敢謂熙成特加蕃錫兹蓋伏遇皇帝陛下仁深逺服恩厚舊臣上帝是歆豈洪休之專鄉爾身在外等近列以疏榮臣敢不祗服龍光力鞭駑鈍厠大夫而陪議期無愧於隋官詔御史而著中願有稱於漢令臣無任瑞慶節賀表千載應期咸覩堯齡之永十月上夀仰瞻漢典之新四海嵩呼萬邦星拱臣某中賀恭惟皇帝陛下乾綱獨總離照重明守成光紹於基圖更化聿來於福祿流虹繞電式膺眷祐之申就日望雲悉遂瞻依之願臣猥分藩閫阻造闕廷近指南山歌一詩而報上載同湘水流萬折以歸東謝賜臘藥表一札細書賁于寒谷萬金良藥益以珍奩戴大德之好生惕微躬而增感臣中謝伏念臣叨分藩牧再見嘉平楚軍多寒愧乏撫循之實湘魂易悴况驚遲暮之年敢圖內府之匪頒不間外方之遐逺餌由仙授服可使其翼生器有禮藏銀豈容於羽化兹蓋伏遇皇帝陛下仁深念舊令謹授時所寶惟賢召匠不嫌於百計其疾在腠用醫欲使之十全臣幸逃殞越之虞當效糜捐之報臣無任元正賀表春王正月肇稱獻嵗之儀天子萬年增衍泰元之䇿永膺多福敷錫庶民臣某中賀恭惟皇帝陛下道體泰亨德儀震動太嵗在酉民益富於酒漿休命用申化愈張於琴瑟嘉與林林之衆並臻啿啿之祺臣承惠守藩馳心戀闕讀離騷賦既逢湘水之孟陬奉寬大書願布楚鄉之農事謝賜夏藥表六月徂暑甫許合於銅符一札成文遽寵朌於珍劑熱中頓釋拜下益共臣某中謝伏念臣久佚祠庭驟膺藩閫倚清淑之衡嶽寧慮鬱陶造卑濕之長沙反逢蒸鑠鼎來和餌隨解焚氛益以朱提之珍賁于赤社之分此蓋伏遇皇帝陛下對時令謹念舊恩深歌南風之薰不私殿閣賜西山之藥無間江湖衛生既免於臥痾報國敢忘於盡瘁瑞慶節賀表天開赤伏之符篤生元聖日在蒼龍之尾式應昌期華渚流光綿區稱慶臣某中賀恭惟皇帝陛下德全神聖功極帝王協休運於千齡紀誕彌於載夙十九載離明之治大振權綱億萬年鼎命之凝永延福祚臣幸叨近列猥守逺藩奉十月之玉巵遙瞻漢闕望一星之夀軫仰贊天工謝賜臘藥表細書賜郡正臨大蠟之辰上藥頒庭就賁中金之器拜承恩㫖頓失寒顔臣某中謝伏念臣假守蠻荆馳心象魏賜金所以褒循吏愧治狀之蔑如和藥所以活功臣慙勞能之無有嵗忽忽而遒盡皇剡剡以揚靈珍劑芬馨似出蓬萊之菜鐐奩焜耀有光蘭菊之餐此蓋伏遇皇帝陛下加惠舊臣寵華逺服念長沙之濕河魚之疾奈何飲上池之清廄駒之病起矣仰體好生之德誓殫盡瘁之年元正賀表嵗在閼逢三日先甲律中大簇萬物出寅兹惟行夏之時孰匪就堯之日臣某中賀恭惟皇帝陛下湛恩汪濊受命溥將三光全寒暑平愈加寅畏五穀熟人民育益厚撫摩玉衡占七政之齊木鐸謹百官之徇履端於始受祿無疆臣承惠守藩馳心望闕孟春之月為陬月已開嗣嵗之興長沙之星曰夀星請效封人之祝謝賜夏藥表庚金流火欲焚荷芰之衣申錫自天又拜蓬萊之藥分朌器寶彌浹汗珠臣某中謝伏念臣一出宅南再逢徂暑北窗之凉有味豈不懷歸西風之鱠可思誰能執熱徒念報恩之無策屢欲引疾而難言赤箭之良忽鼎來於御府朱提所出又賁飾於私庭兹蓋伏遇皇帝陛下後天奉時視人猶已遣將帥以守衛不忘饑渴之懷知臣下之勤勞預軫痡瘏之念致兹珍劑馳及遐陬臣既免負薪之憂惟思結草之報臣無任瑞慶節賀表十月維良斗正乾剛之位一人有慶帝開震出之祥屬是昌期敢忘伸祝臣某中賀恭惟皇帝陛下先天法道首物體仁以英睿之斷總攬權綱以慈愛之心密參化育二十載無為而治視古獨隆億萬年有道之長自今以始臣叨䝉聖眷猥守藩封望北闕以馳神威不違於咫尺指南山而稱夀頌莫既於形容謝賜對衣金帶鞍馬表襲衣寶帶出自掖庭駟馬繡鞍來從廄庫下賜式昭于體貌拜恩有靦于面顔臣某中謝伏念臣韋布素心駑駘末技絲積寸纍欲學為裘外彊中乾偶逢市駿比嵗屢叨于器使頻年數假于服章兹叨書殿之大名又被聖朝之縟典特頒上笥且解左驂顧朽質之甚華于遐觀而有耀兹蓋恭遇皇帝陛下政猶御六賞不褫三以臣嘗禦楚國之寒衣非宜薄念臣久處長沙之濕馬必用良遂興衰鈍之憐乃錫便蕃之渥恩榮賁飾修身益謹于道存矍鑠驅馳報國敢云于齒長潭州丐祠劄子臣輒瀝愚衷上干睿聽伏念臣冒膺隆委起殿大藩自惟心志之早凋無復事功之可見雖殫駑鈍何補毫分仰賴陛下聖德之宣昭朝廷威靈之逺憺峒民妥息年穀比登田里相安獄訟漸簡官兵之廩稍僅足倉庫之儲蓄增加臣忝竊居多滿盈是懼吳楚相望越數千里一家兩地災患頻仍功緦之喪交馳訃問三孫幼子相繼夭亡皆繇微臣命薄食浮福過災生之所致闔門賤纍日夕念歸方陛下欲久任牧守之時而廷臣有循例引辭之奏黽勉滿嵗又踰兩月迫於私計出自懇誠況拙技之已窮將曠官之難免慮貽物議徒負君恩欲望聖慈加惠衰蹤興憐舊物許釋閫寄改畀叢祠庶少佚於餘年且獲全於末路干冒宸聰臣無任第二次丐祠劄子臣輒披中赤上瀆睿明臣去年八月嘗以災患頻仍私計不便奏乞宫觀差遣伏䝉聖慈特降詔書不允訓以忘家之誼期於治化之孚仰惟君父至恩在臣子所當縻捐庶幾稱塞黽勉官守不敢嗣陳又八閲月緣臣材術空踈賦豫凉薄入仕以來叨塵中外任使僅踰十考居間殆二十年䝉陛下疏寵起家㑭分閫寄適承兵盜之後姦弊百出雖鞭䇿駑鈍補苴緝理迄無毫分可以自見重以齒髮衰晚疾病交攻酬應事宜智慮短淺省閲文案目視昏花入春多寒脾胃凝滯飲酒頓减舊苦足弱遇濕轉加非少休息醫藥難效深懼寖隳職業自速罪愆矧惟全楚重地抑豈養痾之所顧圖報之心實切而知止之分當明伏望聖慈察臣别無規避憐臣非敢為欺許解藩符姑從祠廪儻犬馬之力未疲於他日則螻蟻之義敢負於夙心干冒天威臣無任第三次丐祠劄子臣某近具奏再乞祠祿上干天聽本合祗候回降緣臣賦分淺薄久叨榮寵福過災生兼多病早衰不善調攝近於正月十八日感冒風寒忽覺力乏氣弱雖可勉强履地然語言不甚周正臂膝舒緩醫者謂心力過度脉氣虛損為風邪所侵度須旬月服藥調治方可漸愈竊念閫寄至重誠非養痾之所伏望聖慈檢㑹前奏豫臣祠祿使得退歸田里一意醫藥因得休養庶可少延殘息實出天地生成之德干冒天威臣無任第四次丐祠劄子臣某敢干違命之誅再上籲天之請臣近纍具奏乞罷就祠祿疊奉詔㫖尚閟俞音始者投誠君父徒以桑榆漸迫蒲桞易衰精神瞀昏心志凋耗故祈間退以佚餘年雖䝉天聽未回尚可勉强治事忽為風寒所中臂膝緩縱舉動頗難語言亦覺澀訥不正治療踰月尚未减損病在經絡平服未期若非專意醫藥在臣一身為末疾沉痼終成廢人若或頻頻在告於臣本職雖委之僚屬深恐廢事反復思慮進退靡遑竊念臣嘗忝近臣義當體國伏讀明詔祗服訓詞豈不知數易有送迎之費久任有責成之圖而臣病軀非可卧治徐行尚須扶䇿何以延見吏民安坐猶且欹傾何以省閲詞訟至於朝拜行香皆恐不能親事猶復貪戀榮祿不懼滿盈恐災咎之愈加將溝壑之難免是用祈哀再干洪造欲望睿慈俯憐舊物察臣朴直素非矯僞特降指揮與臣宫觀俾得生還里廬一意將理庶延殘喘免致顛踣實出天地生全之賜數冒天威臣無任謝免荆湖南路安撫大使兼知潭州依舊宫祠表籲天請命方虞雷電之誅稱物施仁遽霑雨露之澤荷恩益腆撫已增慚中謝伏念臣少也過庭嘗聞詩禮之訓晚而遇主濫陪宰輔之司雖迂踈素乏經世之逺猷而周慎常謹律身之小節坐罹讒毁皆出怨仇馬援謗深誰與辨明於薏實羲之誓苦但期終老於蘭亭豈謂大君未忘一介起於間地付以名藩而臣景迫桑榆衰先蒲桞憂畏深矣直類傷弓之禽疲瘵苶然久抱負薪之疾既不獲黽勉以承命又深懼稽遲之速辜夙夜靡遑進退維谷念父母之於厥子惟疾痛之為憂而天地之於群生俾飛潜之各遂力布由中之懇果䝉從欲之私琳館優遊尚叨厚廩海邦深逺仍許便居此蓋伏遇皇帝陛下體道宅心用人惟已不遺簮履之舊物每賜記憐尤矜樗櫟之散材曲加芘覆致兹孤陋亦獲保全臣敢不克戒暮塗益修素履甘山林之寂寞一洗五十七年之非慿香火之因緣上祝億千萬嵗之壽辭免除資政殿大學士知隆興府奏劄臣昨兩具奏乞罷就祠館歸休田廬疊拜璽書未賜俞允欲投誠君父再申前請忽準省劄除臣資政殿大學士知隆興府江西安撫使填見闕者更移重鎮加畀隆名厚恩如天局蹐無地伏念臣䝉陛下記憐付以分閫之寄黽勉夙夜庶幾稱塞所幸年穀屢稔枹鼓不驚憑藉威靈粗免曠敗臣年齡已暮識慮就昏疾病交侵災患頻有自揣凉薄終難報效未敢遽乞骸骨且欲上還印綬姑竊祠祿以佚病軀此臣由衷之情非有一毫欺僞湘中事簡訟稀猶懼弗克負荷江右襟帶之州地望雄重民物繁夥相去何啻倍蓰豈臣衰病所堪况大學士之稱前朝夲以優禮勳舊尤非無功所宜冒處繇逺移近雖陛下欲俾少慰其歸心求退得遷使微臣何以自逃於物議不避煩瀆再有奏陳欲望聖慈檢㑹臣前奏特降睿㫖與臣宫觀差遣倘暮齒得全於休息則此身終誓於糜捐所有省劄臣未敢祗受干冒天威臣無任再辭免除資政殿大學士知隆興府表一命循牆所祈從欲十行賜札未拜曰俞凛誤渥之難任瀝忱詞而洊瀆中謝竊以崇儒書殿美名無過于大稱牧帥蕃宣重地孰加于濳躍必德望素高者克堪華選必治行有異者始副殊遷如臣奮自羇孤進非介紹蚤嵗玷名于俊造中年屏跡于耕樵屬聖治更新愧罔功于輔政荷公朝念舊遄假寵以分符自託迹于湘流類素餐于河側私門多故公務有妨矧迫衰遲易生疾疢精神惟恐其不逮政事每虞其未醇徒積曠瘝敢云報稱嘗再上叢祠之請欲少全末路而歸既淵聽之莫回又湛恩之有忝力求反汗更冒揚綸臣固拙于身謀豈弗慮難居之誚臣雖踈于世故詎不知自近之榮私竊揆中實難拜下伏望皇帝陛下制恩以義賞善惟公令無憚于亟還印何嫌于久弄博咨耆彥改畀徽章許臣結香火之緣為國祝乾坤之算則爵罔及惡德庶允合于前言而譽不進無功抑有裨于實政臣無任謝新知隆興府受告表命出自天序進內朝之職恩隆易地洊持外閫之權懇辭粗罄於寅恭訓飭重勤於申命凌兢亟拜俯仰惟慙臣某中謝伏念臣性拙弗移材踈自信當孝廟七臨軒之際偶冠儒科屬陛下一更化之初叨居政府感精神之聚㑹忘蹤跡之孤單參預何功亶為孚實顛隮罔覺宜爾速辜退思維務于省愆均佚又從而起廢俾兼榮於月殿以承惠於星沙䇿磨朽鈍兩嵗有奇考試功能萬分無一幸不致于乏絶乃免蹈於譴訶然弱質易衰斜日自傷于鵩翼况歸心未遂秋風每憶于鱸魚載騰上印之章反被賜書之渥中聨禁直班實忝於文明外擁侯藩望益尊于濳躍詎應濫及仍斷牢辭兹蓋伏遇皇帝陛下建官惟賢用人由已遵虞典陟明之制考漢條察治之規謂臣親被選掄嘗與聞于國論知臣屢膺更迭必熟識于民情加以隆名往哉督府臣敢不欽承睿奬恪守朴忠居寵思危當佩聖賢之謨訓投間置散祈酬君父之慈憐臣無任新知隆興府到任謝表解湘堧之舊組幸免黜幽分洪井之新麾猥膺試可奔命敢言於道逺抗容俶抵於司存爰進爾民具宣上指臣某中謝竊以維斗所直是為控引之區循江以來厥有臨觀之美在昔謂之督府於今升曰濳藩謀帥孔難得人乃重减宴而餘於粟仲舒之德績可傳免賦而裨之財韋丹之名聲不朽必有材之是似則共理以奚難矧九重弄印以疇咨方百辟盱衡於誰與如臣者年衰戒得日奏罔功比承惠以宅南每懷憂於敗北偶值連嵗豐登之候適當清朝綜核之時粗知戢吏以安民稍可整兵而立武皆由帝運何有臣能及兹所領之邦非昨苟安之地生聚繁夥習俗輕揚儻控御失宜易致弄兵之患而撫綏無狀曷銷珥筆之風迫甚促行冒焉即次顧弗容於俯避何以副於仰成兹蓋伏遇皇帝陛下操約御詳循名責實並觀內外初無輕重之殊加惠黎黔勿問邇遐之間爰晉殿帷之高職俾臨襟帶之奧區報稱則亡凌兢曷已臣敢不益堅晚莭仰答殊知惟玩愒是懲田里能銷于愁歎庶蕃宣小補冕旒或釋於顧憂賜夏藥謝表守藩引疾甫離地濕之區賜璽更生亟拜天題之詔實以鐐奩之劑薰其寶殿之凉臣某中謝伏念臣智匪十全材非百試比分湘閫每懷卧閣之慙兹易洪都預有負薪之懼矧未求於民瘼敢自覺於神疲當流金鑠石之時正惟奔命被飛雪圓氷之貺遂可清心兹蓋伏遇皇帝陛下德並好生恩推解愠爰賜珍良之品以昭長養之私授南嶽之銀砂已屢承於聖惠賜西山之丹鼎願益廣於君仁明堂禮成賀表肅霜届莭嘉觀萬寶之成吉日用辛敬秩九筵之祀光增謨烈事軼簡編臣某恭惟皇帝陛下剛健日新聰明時乂希夷體道誕膺滋至之休淵默凝神坐撫寖昌之運謂孝以嚴父為大而聖以響帝為能爰稽汶上之圖仍舉洛中之典合宫陟配既親三嵗之祈宣室受釐益茂一人之慶臣昨叨政路兹守帥連侍祠莫率於臣工肅展奉璋之禮宅牧敢同於父老形為擊壤之歌明堂加恩謝表大饗告成仰叶房心之次細書均惠俯臨牛斗之墟鈞天逺隔於九重駢邑遽加於三百循墻莫避蹐地知慙臣某中謝伏念臣頃備四鄰愧無一善洊玷竹符之守粗知茅祭之共籩豆靜嘉阻預駿奔之列旗常婀娜莫瞻魚雅之容敢圖簡上帝之心且欲教諸侯之孝越在外服益以圭田兹蓋伏遇皇帝陛下㳙選休成參侔開闔燭明四極肇修五室之祠逆釐三神敷錫庶民之福重此采薇之遣帥忘其不稼而取禾臣敢不進服龍光退鞭駑鈍配天其澤詎容私受於君恩食土之毛願使同霑於聖化臣無任瑞慶節賀表太嵗建亥符三豕之渡河衆星拱辰賔六螭而出日乾坤齊久華夏均歡臣某中賀恭惟皇帝陛下纘禹儉勤躋湯聖敬嗣無疆之大歷惟德動天惠難保之小民以仁守位應千齡而載震斂五福以誕敷臣濫守銅符阻陳金鑑西江水逺但遡海以朝宗南浦朝飛惟望雲而頌禱謝賜臘藥表賜一札之璽書歡同挾纊拜萬金之寶劑憂釋負薪恩重和鬚感深至骨臣某中謝伏念臣比叨再命洊長十連材乏參苓曷蘇民瘼質同蒲桞坐閲年華方虞寒籥之嚴凝忽被溫綸之寵渥仰翠管銀罌之來下覺朱簾畫棟之生輝兹蓋伏遇皇帝陛下禮遇舊臣澤加新府憫其疲瘵錫以珍良俾無晦𡨕風雨之侵庸效屏翰蕃宣之力臣敢不布中和之樂職問疾苦於窮閻五色有光日服仰承於魏帝十全為上嵗終益謹於周官臣無任元正賀表厯正夏時驗三陽之交泰祥開吳分應五福之照臨四方無虞一人有慶臣某中賀恭惟皇帝陛下體仁以長求道之端八十七萬七千而統元復見堯年之丙子三百六旬六日而成嵗載觀羲仲之寅賔誕敷啿啿之祺均錫林林之衆臣一違北闕七見東風過九江至敷淺原濫司鎮撫以立春下寬大詔惟謹奉行隆興府進葛布表垂裳在御歌奏五絃掌葛征財職修九貢前件物治由女事出自山農雖帝殿自有於微凉然方物乃所以昭德服之無斁仰裨節儉之風衣亦有名俯偹恩榮之賜又虞帝垂裳諧五絃於夏律吳都産葛備九貢於周官江介司十連之區方物效諸侯之獻前件物鮮如浣火細稱含風輕軟生凉不减升蕉之弱被服當暑亦同絺綌之清已踵豫州舉侯藩任土之制願同工部叨朝廷列賜之榮謝賜夏藥表侯服剖符敢憚薰心之暑恩綸分寶載頒苦口之良瞑眩用瘳鬱陶有忸臣某中謝伏念臣初無善狀洊守雄藩去湖即江漸近蓴鱸之境玩嵗愒日甚慚竹馬之童氣方溽於伏庚恩忽流於令甲鼎丹分餌鋈白作奩南土爾居自乏雙金之貢西山無極猥瞻五色之光兹蓋伏遇皇帝陛下動惟厥時豫馭其幸凉生殿閣既思雲漢之側身地接衡廬更虞山藪之藏疾速置郵而傳命隆體貌以厲廉臣敢不謹視一方之人各思寸膚之愛臣無任丐祠劄子臣坎壈孤蹤昨䝉誤恩起家分閫浮湘兩載無補事功屢章丐祠更叨進職改帥江右控免弗俞黽勉之官已十閲月豫章比之長沙差為簡靖然控引蠻越責任不輕俗喜珥筆吏多舞文臣奉法循理不敢苟且每事必須剖白是非務使姦邪屏息直已忤物寧免怨仇去年諸郡嵗事幸頗豐稔今春峒丁小警尋已平寧入夏以來稍苦乾旱臣祗受詔㫖精加祈禱幸而得雨各已立秧接續更獲沾足則秋成猶或有望目下畎畝粗安府庫粗給綱運起廢無滯官兵奉廪無虧莫非慿藉朝廷得以玩愒逃責然臣蚤衰多病筋力弗强政拙心勞神疲形悴老態已具目力漸昏加之一出四年孥纍多病量材度德既恐妨賢尸位素餐亦足招譴自揆甚審誠非飾詞欲望聖慈令臣早釋郡寄歸休田野或未忍棄捐即畀一祠祿差遣稍便醫藥不勝天地父母生成之恩臣冒犯天威臣無任第二次丐祠劄子臣某近以治郡罔功衰年多病嘗具奏劄陳乞退間或畀祠祿伏䝉聖慈特降詔書不允臣仰戴天地大施糜捐不足報稱深願勉扶孱質圖效民庸庶幾少副陛下委任責成之萬一臣以拙戅昧於攝生今夏苦熱異常觸冒寧免暑毒緼客邪於經絡入秋以來遍體忽苦瘡癤在股一疽疼楚焮腫幾大於杯呻吟一榻之上為廢寢食踰旬始潰至今尚妨步履雖牽强酬應須人扶掖又緣臣屢更憂患氣血早衰因此傷動轉覺疲憊若非一意休養未能復舊支離之狀吏民所覩靖念閫寄至重非臣養痾之地儻或隳弛職業自速顛隮上負聖主覆露之恩下乖微臣進退之誼臣竊為懼是用再瀝忱悃塵瀆睿明伏望聖慈容臣姑奉叢祠暫還田里使得稍便醫藥全度餘生他日未委溝壑别備驅䇿臣所不敢辭言實中情期賜矜允臣無任瑞慶節賀表龍姿日表聖符繼作之君虹渚電樞瑞洽大來之慶亶惟良月屬是昌辰侈華祝於黔黎沸嵩呼於蓋壤臣某中賀恭惟皇帝陛下天臨四海子惠萬民危微允得於心傳勤儉克全於躬履世臻極治功已底於更絃節紀誕彌命益隆於凝鼎臣叨居近列猥守逺藩再拜稱萬夀觴雖阻趨於漢闕十事上千秋鑑願竊效於唐臣謝賜臘藥表守濳邸之銅符再逢清祀分禁庭之珍劑又賜細書帝有恩光臣無治狀臣某中謝伏念臣一寒晚出多病早衰夙夜服勞恐負洪都之新府烟霞成痼願修黃石之舊祠氣方凛於折綿言已溫于出綍兼金百兩直東海之爛銀五色一丸殆西山之仙藥嵗云暮矣欲並成哉兹蓋伏遇皇帝陛下體視群臣躬持八柄雖爾身在外曾微橫草之功續乃命于天庶免負薪之疾臣敢不望咫顔而下拜誓九殞以為期臣無任元正賀表行夏之時鳳紀始四時之布立春之日鸞路先三日之迎叶氣交通歡聲洋溢臣某中賀恭惟皇帝陛下體元乾長視吉履端隂慝旁消溫厚勝嚴凝之氣陽和普施財成全輔相之宜廣木德之發生衍蘿圖之昌熾臣神馳北闕迹繫南州太極稱觴莫與元朝之獻夀呼韓欵塞佇觀正月之來朝
