body:
  text: 後樂集卷十五宋衛涇撰書留守制置黃侍郎劄某猥以非材承乏政地緣國計不支急於就和他悉未暇凡更化後所以維持經久之圖曾未及與一時諸賢相與熟復講求和使甫行某旋即罪斥某不自量揣冒處非據獲戾固宜但於門下以夙昔傾鄉之功而匆匆有懷未吐至今為恨自還田里杜門念咎加病悴人事廢絶不能以尺書自通前冬令外孫軍資見過領所誨函因循亦弗果修報徒有尊慕拳拳之私日夕往來于中茲沐謙光洊枉真翰存勞有加何以得此此情愧感不容筆墨殫敘也侍郎一世儒宗向忤權姦怡然袖手幾十五年海內善類益知斂衽下風歸陟從班未究猷為之盛上以江淮事任雄劇自全閩易鎮少藉威望足以震疊側聆開藩首舉荒政發廩勸分不遺餘力無異富公青州時其所全活抑不可勝計矣行即報政入登廊廟盡展素藴必有光明俊偉傳於無窮者某竊伏山林拭目見之幸甚幸甚答江淮宣參常少監劄某間違儀矩轉矚許時瞻仰之心未嘗少置比每於廟堂書中竊見遇事精明區處詳審不勝嘆服且動中機會幕中之畫可謂獨賢惟是應酬鮮暇不克一一明别具報惶恐某疏拙亡取輔政非才自知甚明半嵗之間雖粗自殫竭然衆責交至有過無功久當引去以和議未定遂成淹緩甫聞安濠撤戍亟上章丐免而罪戾崇積竟煩清議上恩保全俾歸田里殆皆庇存所及自是杜門一意省循天下事得諸老偕時賢相與扶持獨為太平幸民豈非至願乍歸塵冗且十二嵗小女疾暴亡憂撓未果附便上狀忽蒙専介寵賁誨帖存問勤渠展玩慰感亡以借諭排悶布謝莫究所懷萬一何由晤見敢冀為眷簡方厚珍嗇粹和嗣膺持槖之寵與李參政壁劄某伏自陪侍三館之遊荷一見傾蓋情均手足中間契闊嵗晚再獲同朝情好益篤適時多事每蒙開心相與咨詢下及某亦未嘗不罄竭愚慮所愧無所禆補自惟短拙誠無以愈人至於朋舊惟知用情事之可否利害輒抵掌劇論寧失於侵忤若媕婀面從退有後言生平所不為也暨權邪既誅濫吹憲府區區正望參政借重廟廊圖回久大某得自勉於職業之所當為不謂煩言遽興雖力沮止之迄不見聽相公既翩然引去某遂踵賢武而退屏居以來人事一切廢絶獨念於相公情分二十餘年如一日懷仰之勤每落清夢不覺吳蜀萬里之逺也某竊聞旌騎還里緑野午橋左右圖史間以觴詠有足樂者近新進士嘉定家教授相過能道燕處之詳極用自慰第相公抱負經濟之藴未盡展究當復為宗社之重一出使斯文有所蒙賴事業益以光明俊偉此海內善類所共屬心也至望至望與提刑李祕書􅐉劄某别奉矩度不知幾寒暑頃嵗再塵朝列適時多事數勤真翰所以相與之意甚厚逮今感藏去國以來多病頽懶人事盡廢平生知舊例成闊絶雖有尊鄉之私無以自見敢意眷存逺煩専介寵貽誨飭詞采燦爛意氣傾寫顧何以得此展玩不容釋手感悚感悚祕書名門雋望長才偉識經綸開濟之事業皆所素講方敵勢披猖荆襄要地備禦規畫隱然長城之固朝家蒙賴為多更化甫浹旬觀使參政令兄遽爾引去某巳大失初望而拳拳於門墻不能不為過慮蓋漢卿諸賢亦以為言但是時議論紛紜已不容一某之綿薄殆不能支未幾且以罪斥它不待言而喻矣繼審復申前命間中聞之深以為喜賢者所至治聲隨風而流借重憲節亦既許久良棟大璧當為明堂泰壇用豈外臺所可淹恤詔趣計在旦夕續得馳慶某疏拙亡取向以用踰其分自速訶譴荷上恩保全其歸杜門田里不覺五年一意農圃退揆罔功坐叨間祿已為徼幸近者忽被進職守藩之命已再上免牘得請乃幸耳某去嵗自秋徂冬苦於多病至使往來都城滯留數月及此始克修謝中曲萬緒莫究一二鄉風苐切悁系餘冀酌時之宜倍加珍護通前漢州魏校書劄某昔年班行數奉顔采適當多事於一時諸賢未及吐露中曲然此心卷卷知所敬嚮繼承以讜言直道翩然勇去徒有嗟惜而巳逆曦之變料歸艎未逺嘗從臾當路猶覬復留又有尼之者今不復可言逮權叨誅斥上鋭精更化收召衆俊虛寧方急而賢者難進抗辭甚力旋聞遽罹心制未幾某亦以罪行矣杜門念咎不敢與世相聞昨見邸報知申詔趣覲乃承自詭外庸益仰識度過人甚逺每惟先朝擢用人物未嘗不踐揚中外錯綜粗細故其望實堅凝器業閎大皆足以鎮安宗社聳聞敵國百年之間名德相望蓋可數也閣下蚤負大名操行剛正進退不苟此其所存豈易以淺近窺測及茲暇日培植深厚講究聖賢功用異時行事深切著明無愧前修可也某叨竊間廩又且滿秩願一意休息投老農圃春首忽有長沙之命控免弗獲冒昧一出殆非得巳適承冦盜甫定紀綱縱弛之後凡百極費區處幸得一稔公私賴以少寬頻年衰病非復故吾度嵗即上歸耕之請吳蜀萬里邈未有再晤之便日徯逺用猶得拭目田野間耳郡事紛冗稽留來使撥置布謝未究所懷尚容續訊它有可以規警因風毋靳幸甚與湖北制置趙祕撰某惟殿撰學識之正材猷之逺潔廉之操亮直之風播在搢紳蓋非一日當宰邑時已推雅望今茲盡護外閫乃三垂輕重所繫天下安危所喜鎮撫得人疇不交賀嘗記退之謂栁中丞曰用儒雅文字章句之業取先天下武夫關其口而奪之氣今殿撰是已又謂所以服人心者在行事適機宜風采可畏愛殿撰又有焉此真識時務之俊傑某何足以當俊乂之稱自念衰朽朅來鄭鄊聞長者之譽益熟何當一遂識荆之願耶引領茸纛臨風悁結剔冗占報不敵所施尚惟恕照應大諫劄子某逖違符采嵗籥洊更疏候寢興仰髙杓嶽侍讀大諫英氣邁生正色敢言擢長諫坡雅稱上意奏篇剴切竦動朝端惟扶植清議培養善類以禆君德以正國是區區有望僭敢誦言啓沃輔台匪朝伊夕某分甘間退洊領劇繁去國八年三叨閫寄眷言甌粵重增江湖地大事叢衰遲何稱靖原攸自端出吹揚一再控辭俞音終閟循墻莫避黽勉欽承已遂拂龜詎忘摧謝有嚴牘禁莫致駢儷皇恐皇恐惟是離家浸久三徑易荒異時扁舟松江得全仕止之義又在所以終始之尚賖瞻承更期葆育粹和參酌氣序式副前禱知福州日上廟堂論楮幣利害劄子某嘗考楮幣之制始于四川交子雖行于乾道而實胚胎于紹興之初時方渡江兵革未息因措置糴本嘗用督府主管財用張澄奏請於行在所置交子務造交子三十萬先用之于江淮中書建言交子錢引并沿邉糴買交錢係祖宗舊法乞先樁撥一色見錢一百五十萬緡印造交子一百五十萬道分給諸路以充糴本令公私同見錢行使期于必信決無更改已得旨施行而言者交論謂初未嘗樁撥見錢恐無以取信于人或雖樁而不足或已樁而别用則民間疑而不行行而不久貨財不通獄訟繁興重立法禁將不能勝遂寢罷交子務其糴本止用關子是時所乞樁錢止一百五十萬未為多也已不能辦其後紹興末年因軍興復置交子務體倣民間寄附會子印造官會張官置吏論建漸廣至乾道間遂決行之初不過三百萬增至七百萬又增至千萬而止立為定界頒行之始民旅便之未幾價直少減孝宗一日宣諭宰執盡發內帑錢銀置場收換特降御筆日下罷會子務盡廢官吏換及七百餘萬民間反思得會子蓋官會之行本助養軍每月支遣立定會子錢銀分數官會與銀價常相為消長會子輕則銀價重會子重則銀價輕緣既收上會子民間艱得銀價頓減時王琪為殿帥一再白廟堂言銀價折閲不免用殿司回易庫錢收買軍人所請銀兩今錢巳闕少乞仍頒行會子以便軍民蔣丞相當國因為奏稟孝宗聖訓有曰朕欲盡數收上它時終為民害又卻如此力請不已黽勉從之自是不可復收矣然孝宗每軫宸慮屢諭宰臣云朕于宫中積得會子無用潛與焚毁不計其數外間不知自紹熙以來用度滋多展界添印馴至開禧既啓兵釁費耗無涯見行會子通計一億四千萬其弊極矣朝廷措置收換權宜之術不得不出諸此一億四千萬之數收及一半以舊會折閲較之價適相當軍民初不甚以為病獨是豪宗富室之藏楮者驟見折閲下至中産更相附和不肯藏蓄得官會者惟恐用之不早遂至散溢于外無少異于未曾收換之時視之稍輕價亦隨減此本人情之常若上下堅忍徐徐經理未必不能漸復其舊緣官司稱提太急民間反以為疑雖施行多端措置百計令愈急而民愈疑事之既往不可復論如福建潘倉令州縣以戶籍等第藏會非不切中其病奈何迫之太甚財貨本流通之物如泉源之在天下或流或止隨地之宜民間欲藏不待強之而后藏也如不欲藏而強之使藏必有扞格而不應者如飲酒然勸之飲則不飲戒之勿飲則愈飲矣潘倉之説行八郡官吏奉承又過刑禁苛密期限嚴峻至有鬻妻子售器皿賣田宅願就低價以應令者若非朝廷覺知稍從寬釋幾致生事雖一時會價增至八百以上聞者莫不稱快然未數月四方會子輻湊而至價即減落而創法者旋自悔悟至死猶有遺恨積漸朘削至今春才及六百二十事之傳聞不如親見實非以陳憲善稱提而增長也已而又復加損至今不過六百上下八部價貫無大相逺乃不相傾而民間通行執會便可得錢此非虛張髙價以事欺罔之謂也某材術短淺知識昏暗誤蒙朝廷差擇三冒閫寄首尾五年自揆衰晚雖無趨時干進之念然豈不體悉朝廷之意勉思效職苟逭譴責以全末路所至每切究心亦屢申稟守中半之制而持之以久嚴減價之禁而行之以寬執此而行始終如一若稍覺流通則姑從其便或漸致縱弛隨即申舉或諭以文榜或嚴以約束目前若不快意庶幾久而無弊自至閩中始出官錢依官價兌換及差官點檢潘倉所行民間收會之數雖心知其不可亦不免隨例舉行而猶有不能稱提官會之議間亦得之道塗若苦自辨數愈見紛紛故一向隱默待其自定向見議者陳述謂官司不貴重會子致會價減落此猶不識痛癢事當論其實而巳自中半入納之法行所厯三路州郡民間行用總不過六百上下而官府一同見錢入納作七百七十行使每會一道比民間增二百上下其為貴重孰甚焉議者又謂朝廷以新會一換舊會二為不合失信致會價之減此尤不然且四川交子固嘗折鬩矣亦嘗以新易舊矣當陜西用兵增廣糴本引法寖輕幾至大壞朝廷遣使措置用新引一道換舊引四道民間初不以失信而不行然其功不在于收換乃在于換引之後三十年不出泛料而后通行然交子止行之西蜀今會子遍于東南多寡不同輕重不無少異姑舉彼以明此而已大要樁撥本錢則權出于上會子獨多則人情易惑然安可坐視而不救權宜之術自當時出而用之惟斟酌輕重相度緩急隨時量力扶助維持優遊寬舒使民由之而不知待其久而自定毋課效于目前可也又有大利害關繫州郡根本者焉今之議者莫不曰不惜官錢兌換可以增長價直殊不思官錢有限會子無窮兌換未嘗間斷而價之消長全不相關蓋多寡之異理勢使然非區區兌便所可遽回也某不敢僣論大體姑以三路言之交割見在之數會子日增見錢日削福州自嘉定以來十年之內程提刑與黃侍郎交割有錢三十二萬會子才七千餘緡至六年二月蔡侍郎與葉尚書交割總數雖為增羡而錢之增止二萬官會已至十五萬有竒及去年十二月陳提刑與蔡侍郎交割見錢通上二十五萬比葉尚書任內又折見錢五萬官會則三十萬貫矣此某到任交割之數也以三月之頃而侵兌交割見錢五萬則所餘二十萬貫不出三二年俱變而為會亡可疑者其它七郡大抵皆然向有十餘萬見錢者今止存一二萬緡爾朝廷雖有免銀官會嵗約十一萬三千餘貫然除宗子月俸全支見錢及諸縣數內截撥兌便提刑司經總制錢之外于此義有移兌見錢之去已十二三本州每月兌換諸廂居民多至萬緡少亦不下六七千貫非侵移交割見錢何所取給蓋自中半入納之後應干窠名錢物無非中半而所出有全用見錢者諸軍料錢春冬衣賜名為中半支出又改三七分而三分官會今隨用見錢兌買又如嵗計闕米支遣諸處收糴之外本倉就糴宗子食不盡米及月支零米亦是純用見錢今嵗適值科舉舊例人兌一貫以納到試卷為凖計兌過三萬六千餘貫中半所入既不足以支所出則又侵移交割見錢之數紐計數復侵過七萬餘貫所餘十三萬其能久為稱提之用乎若以必出見錢依官價收兌而後可以稱提抑不知數年之後諸路州郡見錢淨盡將何以為繼乎幸而時和嵗豐邉鄙不聳常若今日猶之可也脫有水旱盜賊萬一或至調發州縣所儲既無錢銀純是會子何以使人何以集事必至縛手無策當是之時任其咎者誰乎某嫠不恤緯私憂過計非一日矣畏縮而不敢吐露今以衰病日侵願丐祠祿退就間散若有懷不盡非某平日所以拳拳體國之誼鄙性雖不能詭隨亦素不事沽激平心定氣敢托利害之實卒為朝廷陳之官會之多勢已至此若謂必樁撥見錢而后可以稱提是誠不知時務欲以畫餅療飢者若夫培植國計撙節用度經費之外痛加裁抑日積月纍稍有贏餘暗銷會子之數如四川交子三十年不出泛料庶乎其尚可為此在朝廷加之意而已非某疏外所敢聞也答嘉興鄭郎中定簡某昨蒙台翰貢院二字仰荷不鄙夷之意但非所素習本不敢承洊勤嚴戒之及勉為之殊不能佳謾以繳納恐未必可用儻别得精筆與免出醜尤幸畏暑如焚弗克一一視所施以報并冀恕照某皇恐小貼子云某少意字畫有欠少及不端正處匠者必曉得略漆潤不妨但不可太齊整古人謂繒帛鋪中主人狀貌非不端正只令人可憎耳院字左傍如了字之勢士子恐以為佳識卻須令修卻燥筆或稍近立筆為佳更以台意指示之若燥筆須令修去也答提刑程少卿卓某伏領别緘垂諭會子事敬悉此今日末流之弊更無它策惟有隨宜措置扶助維持之久以待其定庶幾尚可為耳且所為稱提猶權衡之於物也權與物均而生衡言權與物均齊而衡所以平今會猶權錢猶物也既會多而錢少是權重而物輕勢已至此何術稱提而使之平乎議者之説正如諺所謂投明要到不管夜行強以難行而又責近效世必真有巧婦能作無麵不托而后可也拙者但當退避毋妨賢路而已矧某衰晚多病益不勝任豈可坐尸榮祿自速曠敗近已力丐祠祿且盡具底裏言之廟堂謹録拜呈乞澄按之暇特為詳覽或理所未安事有未盡望條示見教某誠懶作書又以此事曲折甚多思有以復來命寖至稽晏并乞台恕幸甚與泉州真直院德秀某丁卯戊辰間備數朝列適時多事雖間得欵晤竟未得少吐中曲俄以罪行杜門卻掃與世幾絶頃在江湖見士友往來具知直院以孤忠徑節危言鯁論聳聞中外持節江左振厲風采不避權強區區此心每切歸敬嘗因懇請草草幅紙念一致此悃未能也比見邸報審膺妙柬擢鎮價藩日徯千騎經從庶得近謁以遂鄙願而某本以非材用踰其分頻年叨竊廪祿亡補公上福過災生正月中忽感寒濕之疾幾為廢人在告服藥今幸小愈氣血就衰終未復舊力上祠請蒙恩從欲旦夕交賤事即就道自此歸伏田里養痾待盡豈復有為之想茲辱台翰副以珍帖展誦再三恍不知所謂豈愛之厚忘其醜耶不敢當不敢當直院方盛年植立已如此更持以堅忍養以和平異時德業光明宗社有賴在斯文斯人矣某己卜十二日出關途中儻得邂逅一見幸甚扶憊具謝老草并乞恕照答周知縣宇某夏中歸棹小泊津亭特勤枉顧極慰三十年間闊之懷病體支離莫遑造謝還舍日事醫藥念具尺書敘下悃未能也清才雅韻宜在渠觀以階逺用回翔州縣已為弗稱况又淹恤耶有如孳孳愛民而不任吏廉德尤為人所信服然愛民誠是也當鋤強梗以安善良不任吏誠是也當有以制其命而為我用不爾則意向未免稍偏而黠吏反以文書弊精神此則不失為賢者之過一轉移之易耳某託在布衣之舊方欲疾少間道所欲言且以政成為吾邑賀遽聞奉祠之命悵惘纍日貽箋告别復為長者所先慚負千萬來使立俟報姑是布露尚容續狀與滁州蓋知府鈞某間違顔度轉矚十稔可勝懷仰奔走江湖又復入南平生於書尺自懶鈍加之吏役一切廢弛便中一再辱誨問所以眷存之意甚厚銘戢于中俱不及以時答若非知照有素宜得斥絶専使又枉真帖連篇纍禇乃知雅量寬宏未易以淺近窺測慚感不容言矣尊舅抱負竒藴遇主逢時便當立大勳業小試偏城未足以究施設滁城傍山議者難於建築長才臨之遂有髙深之固千里恃以奠枕策勳即有異擢圖本熟觀但切嘆服殘冦垂亡又敢俶擾邉境聞近日迫於時勢復欲奔竄彭城以延旦夕淮鄉因得小安或主安靜以苟安目前但以事勢觀之終恐不容安靜南北朝時河南山東或得或失何常之有獨炎興議和南北遂成隔絶今日講解一節只可作後段商量惟有戰守可以保江淮耳古今局面各自不同此未易言也某一出五年三叨閫寄徒勞無補滿盈挻災春初一病幾殆蒙上恩與祠遂得扶病以歸今雖稍可支持而氣血凋耗意象摧頽如八九十者杜門養痾待盡而已亦久絶口不及時事因來教妄及之切勿它示也與李端明大性某違去儀範幾三十年無非尊仰之日中間書疏蓋不輟自閩山之歸杜門養痾姓名例不至中朝非敢獨取疏門下必沐矜諒端明尚書碩德宿望冠冕一世貞元朝士靈光巋然冠位六卿久當進陟丞輔抗章勇去再屈君重鎮臨鄉邦吳儂何其幸也棠隂蔽芾父老歡迎足見惠澤之在人者甚盛甚休某衰朽餘生待盡田里復遂受㕓之託闔室欣幸短箋贄賀已飭吏筆再此控露下悃萬分偵伺麾旌壓境尚容嗣敬未間敢乞體承眷倚珍護粹沖即膺召拜與江淮制置李尚書與某衰病杜門人事曠闕嵗時春秋不能頻貢籖府之敬拳拳尊鄉實勤此心敢謂眷私不忘特枉専使寵貽真翰存問周悉雖謙德有加在某何以得此奉玩慰感非空言可諭也尚書輟自邇列出分顧憂精神之折衝籌帷之經畫一以靜鎮浮議莫搖殘冦遊魂尚爾陸梁旋即屏遁勳績彌茂物望日隆除拜計在旦暮忠義招徠之初乘其鋒而用之不可謂無助豢養以備捍禦恐未易屬饜盍思所處至國計民力皆如台慮變通之道正賴老謀惟體國之素詎容以家事辭耶某奉祠養痾薾然餘息無復志念慿藉雲天之覆苟安田里尚何言者引睇棨戟無繇親近臨筆依依春中以少幹留旁邑及此甫獲修謝莫究願言自餘敢乞上體眷倚崇毖粹和亟奉制函晉登樞輔以究規恢之業與章都鈐人範某杜門養痾私事亦多聒擾閲日鮮暇疏得拜問下情但切瞻仰便中屢蒙賜誨不得一一拜答皇恐二子學業荒疏羣試有司偶爾綴名樵為江東首選尤謂僥幸皆出尊舅平昔訓飭之賜方此懷感并蒙寵問之及豈勝悚仄益覺修謝稽緩也想蒙恕察尊舅強健如壯嵗某早衰殊不能企望所諭榮滿欲祠何太早計兼樵書中須南北攻守編年方當講求康濟一世事業它日策勳如留侯卻尋赤松之遊未晚偶遣人去山間略此拜覆某十月末方能展掃先塋尚圖侍見未間更乞倍萬保重以迓詔除之渥與左曹蓋郎中鑄某平昔荷知愛相與殆同親手足有少意見敢僣言之尊兄向自倅安就除荆門因入制幕自倉而漕事勢便順自不容卻宣勞邉瑣首尾五年望實既孚物論歸重此誠足賀去嵗姨母慶夀兵祲未息牽於國事無繇便私人或以為疑而識者固相諒及召節之頒殊用贊喜又在制閫誼當一見君相吐露所懷旋拜為郎之命板輿可以就養較之日前事體不同然八十者一子不從政載之禮經三數月間當以親老為言力上祠請若以事君之日長事親之日短為説詞直理順聞者心悅前面地步儘寬亦斜飛卻引之意所以老茂德而永髙位未必不在此舉某此懷欲吐久矣若終隱默非所以答知已又非託至親之誼切乞恕罪纍日紬繹于中不能巳冒昧及之仍勿他示至祝與淮西制置趙徽猷善湘某嵗前秋中蒙書誨且有惠貺因循浸稽修謝去秋側聞詔用念馳賀幅入冬即苦寒疾屢瀕於死今猶羸乏人事益廢惟此心尊向賢者未始少忘敢謂眷存専使特枉誨問情詞謙篤展玩豈勝愧感郎中以一世人物之英親被主知出當一面開府以來號令精明恩信孚洽士馬思奮小試輒效屹若長城儻江淮盡歸總統山東忠義乘其鋒而用之掃蕩殘冦修復陵廟其有期矣志念日深規模益以宏大當使事業光明千古豈但震耀流俗而已某衰朽無用猶竊間祿以佚餘景無復它念惟慿藉餘庇與老農老圃獲安一飽寧非幸事扶憊拜此不究所欲言餘惟為宗社厚自保護與運使鞏郎中嶸某靖念請違德範不記嵗月之流駛幸甚蚤在令弟提舉慈恩之舊託契投分不為薄中間洊領誨飭所以慰藉殊寵惟是江湖契闊習間成懶親知書問初欲鄭重修詞而因循過日迄多不報雖非其本心而迹涉弛怠若此何以自白惟覬寬大仁明度外之照不然無所逃罪祕閣郎中材髙德粹宜繇坡掖以究儒猷之盛回翔麾節外庸居多凛然難進之風有識加敬歸踐禁密此其時矣某衰殘無取一邱一壑已規終老忽蒙上命畀以舊封顧已試罔效愧見江頭父老尚賴崇篤契誼凡百悉教告之豫章素簡淺重以送迎之頻兵費之廣又非昔比豈短拙者所能辦集茫然未知為計某已於中浣前一日就道參侍不逺有懷悉俟面控謝提刑丁郎中必稱某巳别修記府之敬洊奉真翰罙承謙眷三復藏感惟是某衰朽亡堪再冒閫寄未知稱塞紹興初趙忠定諸公繼守是邦考之文集及前輩之所誦説規畫切當足以鎮安人心牢固根本但比嵗以來凡百雕弊財力益殫某備數六年之前已無善狀矧多病摧頽智識短淺支吾目前巳未知為計何敢論度外之事去嵗麻城之擾已覺震動誠有唇齒之勢郎中有志當世且周旋蜀道燕居深念必有以處此尚得從容齋閣求所以警教亦豈敢不殫竭綿薄僕僕道途客塵滿襟略此布謝并露下悃萬一餘須面控不復縷述謝袁州滕大卿強恕某逖違誨度俄周嵗星人生能幾回别可為太息也頃自閩出以病丐祠杜門田里日事醫藥與世相忘有如當世名德雖拳拳此心知所尊仰若音訊疏濶勢則使然去冬誤沐上恩復畀南郡控免弗獲冒昧重來已試罔效愧見江頭父老方念少定親布尺箋視事甫踰月即有邉遽敵破五關直趨江面齊安初陷人情震恐緣建炎間有烏珠內入之路議論紛紜莫知所適某謂備禦無素凡百非倉卒可辦舉動張皇未必能集事觀聽易駭姦黠生心將有它變姑鎮以靜隨宜區處且以防遏江面為急己而向熱水亦漸生援兵稍集敵為遁計諸處追襲間亦小捷四月中旬始得安帖坐是所賜真迹久稽修謝未識蒙寬照否大卿儒宗碩望宜蚤踐坡掖遂階逺用輟從九列洊鎮名藩所以儲天意飪民瞻之日久矣治最徹聞徵綸計巳在道某衰朽亡堪只合退屏大似剩此一出適與事會其不至乏絶誠有天幸天幸安可數恃耶無能為役自知甚審早晚即為歸耕之計耳滯留來使謹此布謝萬一尚容嗣敬謝沿海俞制置建某丁丑夏中富沙請違誨度轉矚六稔玉節臨江東嘗記一再交訊杜門多病益覺頽懶知舊書問例成濶疏然拳拳尊鄉未始食息忘去故冬迫於上命強顔復出到郡甫踰月即有邉報云殘敵將內入二月中果犯浮光破五關繇麻城直抵江岸齊安首嬰其鋒孤城無備又乏外援僅八日而陷轉而攻蘄援兵稍來但束手旁觀旋亦不守一城積尸二十萬沿淮三百里間四散殺掠數不在焉其禍慘矣已而王辛等以朝家督趣之嚴議邀其歸路而庸愚輩不知出奇設伏或據其險要或乘其半渡乃聲言邀截為備殊草草敵乃屯聚巴河纍月反得生計探騎四出分道而遁且巧詐百端以驅掠吾民易敵兵之服每戰必使居前吾軍但知勦殺不辨其為吾民俟其器鈍力疲彼兵乃衣所脫吾民衣服乘其後率不能當抵捷報中勝負往往出此廟堂未必盡知又人情所不樂聞往往不以實告而完顔鼎輩於是得以各擁精鋭整陳而返識者謂敵本乘虛而入如蹈無人之境向來歸順人為之鄉導鄉落居民無得免者然在兵法自犯深入之戒奈諸道之兵散漫無統人各有心莫肯用命所謂邀截不足使之懲創秋髙馬肥敵其復來廟論必有成算疏外非所得知緣此念念一介致候承之敬濡滯至今蒙専使寵賜真帖亦稽修報諒在髙明必矜恕未忍過之也某幸爾藏拙剩此一來適遭事會敵勢亦類強弩之末志在冦抄江面無虞實有天幸敵雖暫退正當汲汲備禦如救頭然自度衰拙無能為役已力叩造化再干間祿苟佚餘景更乞遊談之助因風并有以警告之幸甚揮汗姑此稟謝萬一未卜詹覲臨筆悁馳之至與趙察院至道簡某别去矩度恍若纍載自壬午冬杪得奇疾屢瀕於死雖幸苟活而疲瘁骨立非復故吾親舊書問例成廢絶去冬見邸報忽覩除目然士論歸屬蓋己久矣未遑尺紙為慶便中首辱墜誨盛德謙虛逈出前輩非今薄俗所能也區區感歎不可勝喻在某不特有後時之愧因循至今無一字之報揆之彛義宜得誅斥尚恃度外之照藉以無恐然此心愛之萬一亦無由得達察院以和平純篤受知君相賢者得路四海善類無不蒙福然職事所在自不容默某竊謂彈劾當審大體既已得居是官稍犯手者決不可輕官職自有分定名誼千古不磨察院髙明不待贅語而某託契眷至厚豈敢效俗獻諛因進愚𠂻略至小庵看視畢工因得拜此景迫崦嵫尸居餘氣侍見亡日臨書惘然餘祈體眷尊生以究宏緼回吳制幹劄某重沐垂教義學事敬悉讀書最患無師友慨然有意振起之又賢尹為主盟甚盛舉也後學抑何幸耶熟復來示規橅閎闊位置悉當某雖顛頓憂患中不覺竦然起敬然區區或愚慮過當向見親舊為此者率不竟蓋主師席者尤難其人而其間節目抑有非意慮所能盡及今既垂成所費止欠一旬作輟當不繫此某晚陋荷不鄙夷固願致薄少之助若大體定更可悠久要不患無合尖也所戒顧君書甚不難但某與之通訊固不數未嘗扣以毫髮事鄙意正不欲爾李兄寓其館以鄉曲長上之意風諭之宜無不退聽別紙謾納去匆匆姑此拜報未究所懷萬一病倦少稽來使併乞矜恕與吳監元劄寵惠東坡拂水竹此奇物也前輩題識雖不存然一展視便知非凡筆所及某近方得東坡及淮海三數帖皆紹聖間往還真迹今復承雅貺誠可寶惜感藏千萬但黃氏散落之餘尚可搜訪否或有出售者幸冀一報山谷所謂蛛絲煤尾中皆為人所寶玩小費正不憚耳至祝至祝日來體氣當益充實萬金方固佳亦是尊親妙年易取效爾鋟木以廣其傳尤見用心之仁也某連日以齋醮少滯耒介撥置略此布謝荒塞不既所欲言并幾恕察與周太尉劄某近匆匆修謝計已獲呈清視區區有懷不能自巳每見漢武皇嘗欲為去病治第乃曰胸奴不滅何以家為竟絶大幕立功萬里外羌人之叛充國巳年七十餘矣上老之問誰可將自言無踰老臣者屯田便宜不恤異議卒滅先零馬伏波當烏桓之擾年亦六十二慨然請行據鞍上馬以示可用某竊謂三人者真將軍志業如辭一官一職乃書生小廉曲謹不足為太尉道今太尉但當仗忠誼勇往直前不萌毫髮顧忌掃滅殘冦一清中原歸報天子從赤松之遊未晚自可以眀哲保身何有鳥盡弓藏之慮若謂一丘一壑足以自老惟以靜退為髙則非某所知也某屢欲進此言於執事連嵗以衷病杜門邈未有合并之日敢因奉夀觴及之太尉以為然否餘惟尊嗇至禱鄭提舉劄某夏初附來使具稟謝之削深懼荒率失事大之恭爾後多留山間又苦脾疾不常姓名不敢數登記府然區區尊慕德誼實未嘗一日廢不悉尚蒙矜恕否時事遽如許諸公方當深念郎中憂國之誠諒不能忘今弭節既久畿內蒙福多矣某偶有所聞或可助諏詢民瘼之萬一者某寓居江湖間自曉事以來每見陂湖之利為豪強所擅農人被害無所赴訴澱山一湖廣袤四十里澤被三郡沿湖民田百年無水旱之患蓋湖之勢髙而水清江之勢下而水濁湖以瀦水遇旱則資灌溉江以泄水遇水則可通放且湖水不壅則江中海潮往來濁泥得湖水衝動不能停積凡通湖浦溆無壅塞之患江湖之水相通乃為農人之利也數十年來湖之圍為田者大半皆出豪右之家旱則獨據上流沿湖之田無所灌溉水則惟知通放湖田以民田為壑兼湖水既不通濁潮貯渟通湖水道浦溆皆為之湮塞江湖既隔絶旱無所灌溉水無所通泄旁湖被江民田無慮數千頃反為不耕之地細民不能自伸抑鬱受弊而已每為慨念淳熙間今吏書羅丈為使者因閲詞訴遣僚吏相視利害之實即以上聞即日報可被旨開掘山門溜五千餘畝乃一湖喉襟由是數十年之害一旦盡除灌溉之利亦漸復八九年間小有水旱果不為災此利害曉然易見者紹熙初忽為中天竺寺挾巨援指間使司吏輩並緣為姦子宜徐丈亦不深究遽爾給佃因民詞再得旨開掘事雖施行緣冒佃者不曾行遣小人無所忌憚今春復有頑民數輩約從毁撤向來禁約石碑公然圍築稍孰何之者輒持刃相向更有甚可慮者不止此凡良民惟從事常産趂逐湖田者率是頑獷方趙永王貴盛時初創築此田多招納亡命逃卒以為爪牙豐年僅幸無事稍歉即羣起為盜出沒江湖間客旅為之絶迹居民亦被其毒此某丱角所親見今不早除它日為盜賊之淵藪無疑此尤可念也浙西多仰陂湖之利非它處比前後圍褁陂湖禁戢甚嚴且載甲令臣僚申請尤多某得淮東陛辭日曽論此事甚詳少定或檢尋得當録拜呈求教誨也某以先妣襄事在九月方勉強躬土木之役憂冗萬狀鄉中父老有請且某粗知本末臨筆不覺縷縷
