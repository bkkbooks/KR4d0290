body:
  text: 後樂集卷八宋衛涇撰表狀辭免知福州奏劄聞命震恐無地措躬伏念臣材術迂踈齒髮頽暮仰䝉陛下曲軫遺簮之舊屢叨出綍之榮再領州麾四閲年序雖知殫竭何補毫分爰自去秋迫於疢病願投散間少冀休養詔諭未允退省惶懼屬時凶歉職在拊綏洊有申陳慮成規避敬宣德意勉䇿疲駑民物稍蘇里閭按堵方圖嗣嵗力控歸田之請敢謂聖恩逾厚改畀南邦緣臣衰病交侵心知凋耗龍潜重鎮已愧罔功閩嶠名區曷勝隆委儻昧於知止强所不能豈特私誼難安抑亦人言可畏敢瀝忱悃上瀆睿明伏望聖慈察臣粗謹亷隅素安分守收還成渙姑俾祝釐庶遂初心獲全晚節實出天地生成之大造再辭免知福州表易地非材輒控告歸之請自天而命備宣均逸之恩惟當祗誦於堯言猶冀趣銷於漢印臣中謝伏念臣强顔分閫屈指五年頃守湘中既無善狀逮移江右亦愧空餐洊嘗丐祠未䝉賜可十事九律之是守姦猾忌之再衰三竭而不休顛隮必矣誠知樂土今在全閩至因元㑹以選侯尤見清朝之重典然臣欲遂養疴之願何心復希坐嘯之榮環轍而卒老于行敢辭王事御馬者不窮其力是效君慈伏望皇帝陛下俯鑒忱辭收還成渙别求良吏俾之表東海之民姑使病軀退而祝南山之夀新知福州府到任謝表江右承流久慙玩愒閩中謀帥猥玷推遷地愈重而難勝天蓋高而莫測恪共三命入撫四封臣某中謝伏念臣逮事纍朝曾微他技解裘釋布䝉孝廟之隆知襆被乘軺辱光宗之親遣暨聖王之御極由郎吏以記言孤蹤既恥於倚冰微笑竟生於偃月十年退屏百念俱忘㑹逢琴瑟之更張參預樞機之典領自玷物議旋反里門侵尋再閏之餘忝冒專城之寄左洞庭右彭蠡險阻備嘗引甌粵控蠻荆勳庸何有視䕃願休於一壑引船敢望於三山矧是合沙重於他鎮向來七聚今分為八郡之雄前此十連多以均三事之逸豈容衰病復强蕃宣兹蓋恭遇皇帝陛下視邦選侯量能授職正月上日方修肆覲之儀價人維藩首被改除之寵至攽重申之命勉令共理之行遵海而南知風之自臣敢不將明德意謹固邊陲民通文書已不待常衮之教身為障蔽當少效劉安之忠更祈從欲之仁早遂投間之願瑞慶節賀表天開九陛共瞻甲觀之祥日近三山敬效華封之祝望昕朝而稽首託露奏以輸誠臣某中賀恭惟皇帝陛下道契兩儀功高八極掩井鉞參旗之耀調箕風畢雨之和命哲命吉命歷年實厚皇穹之眷得位得名得其夀聿昭大德之符風露戒寒星虹紀節臣欣逢穀旦倍激葵心郡竹剖符尚阻八百國冠裳之覲海桃成顆願羞三千年花實之珍瑞慶節進貢銀表旒冕視朝共慶千秋之節梯航效貢聿來萬國之琛矧叨符竹之分敢後野芹之獻上件銀坤珍所效邦用攸資旅薦于庭寧復裊蹄之詫物將其意願同金鑑之藏又十月為陽適際虹流之旦九州任土敢輸琛貢之誠前項銀山澤所鍾實為可寶租賦之外非取諸民顧無惟品之三願效充庭之一謝賜臘藥表芝檢朌綸寶奩實劑屬當凝沍頓起疲癃臣某中謝伏念臣已負典藩更叨易地雖粗間於職業曽未滌於癢痾敢意隆私誕稽彛式輟太醫之製品極精良鏤內府之珍櫝加絢飾恩光逮下寒屋生春兹蓋恭遇皇帝陛下曲軫臣鄰肆覃逺外慮節宣之或失俾調適之具宜拜手知榮銘心圖報臣謹當規思藥石體念閭閻雖南土稍溫更收功於芝术俾小民均惠庶興詠於袴襦謝賜夏藥表炎赫流金念南方之疸熱雲章封璽分內府之珍良佩服寵光冞深兢惕臣某中謝伏念臣久違軒陛屢玷翰藩顧蒲桞之衰殘浸踰暮景問閭閻之疾苦罔替初心荷睿眷之弗遺舉彛章之加賁錫以上池之液燦然白鋈之奩兹蓋伏遇皇帝陛下端已嚮明施仁及物俾滌除於痟癢咸順保於和平臣敢不恪謹攸司推行此意九頓首而后拜敢獨侈於君恩三折肱而知醫期盡蠲於民瘼臣無任丐祠劄子臣某一介庸陋伏自壬申之春䝉恩起家三膺閫寄行涉六載叨榮已甚課效蔑如頃在江湖屢祈間退每勤詔諭未賜俞允復於元日易鎮全閩天地恩深糜捐莫報辭不獲命黽勉入南領事以來九踰晦朔戢吏奉法愛人節用粗知殫竭始終弗渝惟是地大事叢力小材薄憂責尤重風波易生蕞爾孤蹤凛然朝夕所幸田里粗安拙政軍民綏靖盜賊屏息所屬州縣間被水傷絶長補短猶得中熟凡百郡計足了目前其他别無規避實以蚤歷憂患復苦多病心志凋耗齒髮衰殘加之禀性愚戅不能詭隨直性徑行寧免忤物內懷曠弛之懼外有怨憎之虞若不控告君父必將自速罪戾欲望聖慈姑畀祠祿庶幾保全末路休養餘齡悉出覆燾生成之賜臣無任第二次丐祠劄子臣某輒瀝悃誠再干慈造臣昨具奏乞罷就祠祿休養餘齡恭奉詔書未賜俞允聖恩深厚加惠舊臣不忍棄捐曲全體貌祗服明訓感極涕零而臣退自省循叨竊過分位居方伯榮寵已極矧復洊更三鎮之雄祿二千石貪冒已多豈宜蠧食六載之久空坐縻於嵗月實何補於毫分臣猶自知而况公議兼臣暮齒寖薄桑榆疾病交侵衰殘具見心思凋耗筋力弗彊目視昏花省閲良苦七閩地大物夥全藉精神折衝以衰病日加之身當八郡浩穰之寄脫有曠敗上纍生成是用祈哀歸投君父欲望睿慈檢㑹臣前奏特降指揮與臣在外宫觀或得保全晚莭休息病軀儻未委溝壑之間終圖報乾坤之施至仁從欲得請為期臣冒犯天威臣無任瑞慶節賀表統接千嵗聿開良月之祥夀介萬年爰罄後天之祝嵩呼聲震星拱心同臣某中賀恭惟皇帝陛下濬哲文明剛健中正法大舜無為之治紀已載周符三代有道之長世何勤卜久斂錫民之福共殫報上之誠臣猥以近臣幸逢盛旦彤墀九級雖莫陪舞蹈之班金鑑一書所願述發揚之志辭免轉官宫觀奏劄子乾坤施厚螻蟻命輕既推從欲之仁復被進官之寵感深隕涕愧極汗顔惟是恩禮過優須至再干天聽伏念臣賦分涼薄逢時盛明內備位于疑丞外迭居于方伯負乘致寇溢滿為災故於暮景之餘年而得風淫之末疾所以力求祠祿不惟休養病軀亦慮榮寵過多咎釁所積若復無功而增秩是為求退而得遷於國豈無濫賞之譏在臣實有滿盈之懼雖獲間退愈速禍災伏望睿慈收還渙汗許臣以本官職歸奉香火下獲安于愚分上不纍于公朝辭免再知隆興府奏劄自天有命無地措躬伏念臣衰朽餘生侵尋暮景竊殊庭之廪稍每愧空餐掛神武之衣冠未諧夙願方須嵗月力悾悃忱豈期誤渥之頒復畀潜藩之寄雖牧人御衆粗殫愚慮而課功計效曾蔑前聞苐慚粃政之居多敢謂棠隂之未改矧氣血寖銷於宿疢而精神弗逮於曩時考之先朝熙寧元祐閒再守是邦者僅二人想其才望之優治行之著如臣迂拙曷稱使令冒昧而前顛隮必矣欲望皇帝陛下至仁念舊盛德包荒憐臣之器易盈察臣之心知止收還成渙仍領祠官庶免纍于公言亦獲全於末路再辭免再知隆興府表申豫章之命仰戴鴻私上需奏之辭俯勤溫詔聽未回于當寧躬敢憚于循墻臣某誠惶誠懼頓首頓首臣頃自甌閩嘗嬰疢疾荷雲天之大施畀田里之遄歸暮齒寖高餘生能幾豈謂録名于丹扆乃令竊寵于青氊顧治效無聞微去思之可紀况人情易玩慮隆委之難勝若韋武陽功被于八州若王仲舒令孚于千里誤叨殊奬曷跂前修伏望皇帝陛下寬再瀆之誅廣重明之照念臣素嚴王事敢即家居察臣未報國恩靡遑身計今兹控避實出誠忱願姑置於陳人用别謀于良帥君制命為義奚拘反汗之嫌牧以地得民試副虛懷之切臣無任知隆興府到任謝表祗奉真祠粗安愚守欽承親渥特畀舊封顧懇避之弗俞已凌兢而就次臣某中謝伏念臣遭逢盛際積荷殊私曩者付以三州曾無勞效今歸又復五稔尚竊廪頒驚齒髮之寖衰念涓埃之未報凄其素履藐是丹心忽䝉狎至之恩言俾獲再分於閫寄江山見熟入境如歸父老來迎與臣相問竊考南昌之俗殆非數載之前當精鋭消散之餘乘財粟殫亡之後若嚴期㑹或者謂之煩苛苟墮因循恐難逃於曠戾退軫淵氷之懼仰慿覆幬之隆兹蓋伏遇皇帝陛下恭儉保邦寬仁御極四垂寧謐無改容動色之虞比嵗豐登有薄賦輕徭之令尤資牧守之任必重循良之求敢謂孤蹤復叨共理臣所當激昂視政黽勉簿書竊就短以求長庶將勤而補拙材謀弗給敢圖加䇿於事功法令具存但務恪修於職守少須嵗月終遂丘園謝賜臘藥表臣某嵗晚奔程甫臨舊鎮恩醲尚藥猥及微臣拜溫詔之丁寧忘寒威之凛冽臣某中謝伏念臣抱痾里社叨命麾旄見吳頭楚尾之氓正相勞苦味堯漿禹糧之賜頓愈伶俜敢曰彛章亶為異渥兹蓋伏遇皇帝陛下疇咨作牧軫念宅生九還出金鼎之餘三錫煥銀罌之寵臣謹當堅氷霜之節廣天地之仁皇恤孱軀要先求於民瘼願開夀域庸茂對於王休臣無任謝賜對衣金帶馬表宫笥頒衣粲精鏐于束帶帝間錫馬耀錯采于據鞍醲厚拜恩回皇撫已臣某中謝伏念臣江湖衣褐田里扶笻摩拊編氓既乏蕃宣之績驅馳王事又無疆埸之勞豈謂隆私垂憐舊物重以巽申之命假之復鎮之榮藻飾身章光華客路兹蓋恭遇皇帝陛下寵綏群庶奬厲臣工敷賁聿隆將託一方之寄便蕃有渥亶膺備物之華臣敢不飭厲支離鞭䇿遲鈍慰安牧養敢希循吏之聲衣被服乘難答聖君之貺丐祠劄子臣某樗櫟非材桑榆暮景久叨間廪每負素飱比沐誤恩再畀南郡控辭弗獲冒昧重來已試罔功愧見父老領事甫踰月忽值金人內入衝破五關直抵江岸懲創往事人情震恐紛紜論議未免張皇臣見得備禦無素積習滋久倉卒枚舉徒駭聽聞循例調兵委官提督捍禦之外一切鎮靜務安民心仰賴宗社有靈天心眷顧陛下聖略宏逺大臣廟算無遺制帥得人諸將用命歸寇就戮奔竄亡幾日騰凱奏淮壤肅清臣因得以逃責實有天幸然寇賊雖遁防秋在邇保護江面正當汲汲有為之時而臣衰朽多病心力凋耗私竊揣度無能為役自惟䝉被國恩深厚毫髮未報餘年誠不足惜所慮上誤國事欲望聖慈改授祠祿俾得歸休田里少全止足之誼别選賢牧共圖雋功實出天地父母生全之賜臣干冒天威下情無任第二次丐祠表臣某進貢需章僣干閒祿旋頒溫詔尚閟俞音意有未孚理容再瀆伏念臣衰年多病短技易窮慚冒昧以重來曽涓塵之未效閭里粗諳其習俗吏民頗熟于教條勉布中和覬寬憂顧初稍愆於雨澤喜未失於農時穀價就平秋成有望雖無善狀儘可偷安而臣材弗應於時須老將至於耄及平居牧養或竭寸誠一旦折衝素乏良算今邊虞甫靖幸無避事之嫌而自揆不能敢言陳力之誼伏望皇帝陛下至仁念舊明照無私察臣言實由中知臣情非飾詐仍俾退休於真館庶幾少佚於餘齡臣無任明堂禮成賀表星動房心肇舉明禋之盛禮行丙巳聿昭熙事之成臣聞嚴父而配天不但為民而祈福汶上洛中之意積和可接於萬靈皇祐紹興之彛揆事再行於三嵗率履不越思戢用光臣某恭惟皇帝陛下丕闡鴻猷誕凝駿命濳伏孔昭簡在上帝之心明發有懷克篤前人之烈謂祭主於敬而必簡念禮起於義而不拘屬當泰畤之祠載飭合宫之享時和嵗美薦德馨於粢盛武偃刑清逹治音於金石月星明粲風馬宴娭惠我無疆遍於率土臣邈居外服逖侍中嚴旅舊弼以相儀莫與駿奔之數以祠官而歸福但深忭頌之誠明堂加恩謝表宗祀告成普覃異渥井腴衍賦猥及微臣顧惟何勞獲冒斯寵臣某中謝伏念臣罔功郡寄得請祠庭爼豆之事嘗聞莫進陪于多士天人之際相與幸親見于明時既無諸侯助祭之勤曷被皇極錫民之福昔焉食采取數已多今斯加封為恩太侈莫知報塞苐切戰兢兹蓋伏遇皇帝陛下誠格上天道躋邃古宏開九室悉均祼瓚之休大賚四方盡省酎金之罰誤令臣等亦竊皇休茅土疏恩如拜威顔之咫尺竹宮無事惟祈天子之萬年辭免轉官宫觀奏狀臣衛某狀伏准十月九日省劄備奉聖㫖特轉一官依所乞差提舉臨安府洞霄宫者仰戴鴻私不知論報已望闕祗拜苐于臣子辭受之義尚合控陳伏念臣膂力既愆治郡弗績有辜任使常恐罪行屢丐真祠休養羸疾聖恩從欲已不勝愚庸之幸至于加畀崇階優寵太過漢世增秩之典所以施於二千石有治理者如臣無狀宜黜而遷若復貪冒必煩清議欲望朝廷俯鑒忱悃將特轉一官指揮與之寢免止令備數祠官祗奉香火區區至願伏乞指揮再辭免轉官宫觀奏狀臣衛某狀近具奏申辭免特轉一官伏準省劄十月二十五日奉聖㫖不允令學士院降詔者仰見聖恩隆厚假寵微臣感極涕零九殞莫報惟是材能謭薄叨竊踰分蕃宣未久疾疢交攻曾無絲粟勞效可以自見再尋香火之盟已叨間廪遷官隆渥拜賜無名於誼未安公言可畏實難冒昧祗受不敢再具劄子煩瀆天庭欲望朝廷特賜敷奏收還特轉一官指揮姑俾悉仍其舊庶幾名器不至濫豫亦所以曲全臣下辭受之宜伏候指揮受寶璽賀表元㑹蕆儀受三朝之圖籍神章協瑞襲纍聖之緝熙帝眷益隆人心丕應臣某中賀竊惟自古興王之運必有上天受命之符如江表玉麟謾侈當時之證若汾隂寶鼎徒崇異代之文未聞三光五嶽之久分復見一祖六宗之盛觀去珠獲返全璧來歸兹成功無得名焉非上聖孰能與此恭惟皇帝陛下嚴恭自度勤儉不矜握乾闡坤道高莫及畫羲畀姒邦舊維新瑤琨之故物皆陳輿地之侵疆亦復四七際而為主正同赤伏之祥億萬年而敬休永保蒼姬之籙臣欣聞曠典屬奉叢祠莫簉鵷行瞻威顔之有喜苐深鼇抃慶景命之無窮受玉璽賀皇后表內政惟修輿圖寖復外戎底貢寶玉來歸事光宗社之傳喜溢宫闈之邃臣中賀恭惟皇后殿下道隆周姒德配虞嬪家于國以先齊動循家法坤承乾而順治坐闡坤珍於皇受命之符旅集㑹期之旦鴻威逺暢隂教肅成臣叨寵祠間欣聞綸布莫趨魏闕對揚天子之休偕與華封上祝聖人之夀玉璽恩轉官謝表璿穹昭假誕申受命之符玉璽來歸咸被霈天之澤遂容間散叨與褒升臣某中謝伏念臣積冒恩私寖踰分制荷皇慈之念舊安祠廩之空餐戎兵振而復版輿曾莫宣勞於王事寶璧還而告宗廟又非參論於朝儀何有微功坐膺殊渥此蓋伏遇皇帝陛下以上聖之質啓中興之圖恭儉格天寬仁育物謂慶均寰宇矧嘗擢二於政塗雖身逺觚稜亦俾序遷於品秩訓詞溫厚服佩寵榮迹混漁樵顧隆恩之難報誠存畎畝願休運之彌昌臣無任瑞慶節賀表運際昌期辰㑹蒼龍之尾帝隆景命星流華渚之光罄寰宇以均歡效祠官而歸福臣某中賀恭惟皇帝陛下化凝清靜道揖登閎垂拱無為廣虞舜合民之德嚴恭自度邁中宗享國之年儉修而農扈屢豐順助而邊烽寖息於皇瑞慶永迓熙平臣迹逺松江心傾葵日夀觴旅賀莫陪十月之朝寶鑑前陳願紀千秋之節又嵩呼萬嵗方承陽館之釐花覆千官更紀露囊之節天保定爾我應受之臣某中賀恭惟皇帝陛下在躬清明躋民仁夀太平有象時無一物之疵無逸元龜坐底三垂之靖誕彌厥月長發其祥凡康寧好德之疇皆垂拱成功之治臣閒農已老進旅無階析玉祈年尚想猗蘭之茂範金作鑑不勝葵藿之傾又十月為陽虹流紀瑞四方來賀鼇抃均歡夙塵輔贊之司敢露祝延之奏臣某中賀恭惟皇帝陛下克勤克儉益聖益明建內修之政則逐日以新恢逺御之方則因時而惕歷年溥於施澤享福由於任賢令節載臨休符畢萃帝錫與齡之夢民懷躋夀之仁臣席寵嚴宸偷安閒館乃身在外莫遑虎拜之躬我武惟揚㑹見龍光之格又虹流電繞有開必先嶽貢川珍無逺弗届允極後天之慶歡均率土之濵臣某中賀恭惟皇帝陛下體舜無為躬禹克儉申休命以事上帝斂時福而錫庶民同軌同文茂建平戎之業卜年卜世益延過厯之期臣屬逺龍光阻陪鵷綴想漢庭之上夀且舉儀文冀唐室之中興願陳歌頌丐致仕劄子臣某輒瀝危衷上干天聽伏念臣桑榆向晚蒲桞易衰叨竊廪祠溢逾涯分粵從壬午衆疾交攻荏苒嵗華無繇痊愈忽自夏杪病勢轉增肢體腫浮吐痢併作百藥俱試有加無瘳危在膏肓奄奄氣息羣醫環視針砭莫施福過災生理容有此默然自省知止為宜唯有掛冠恐可銷咎頽齡殘喘庶或小延伏望皇帝陛下念臣先朝之舊輔憐臣暮景之餘生仍前守本官職致仕忍死以待得請為期觸冒天威臣無任皇帝登極恩轉官謝表接千嵗之統帝大賚以惟均正三品之階臣罔功而曷稱臣某中謝伏念臣苟安野處未報國恩方飛龍在天咸仰乘時之造而老驥伏櫪阻陪立仗之班衰遲自隔於景光叨昧乃膺於寵秩兹蓋伏遇皇帝陛下離明繼照解澤旁流故當品物之咸亨罔俾匹夫之弗被桑榆薄晚吁嗟陳力之艱葵藿向陽莫喻傾心之至臣無任皇帝登極轉官謝皇太后表真人有作咸與為春散吏何功預叨進律臣某中謝伏念臣竊名一第被遇四朝身佚里居久承於覆露食浮祠廩未報於涓埃敢期解澤之流又拜升階之寵兹蓋伏遇皇太后陛下母儀萬國子視羣臣謂亨嘉之㑹罔不向榮故慶賜之行亦惟求舊雲天皓皓靡容摧謝之躬畎畝惓惓苐切糜捐之誓臣無任賀皇太后垂簾聽政表崇徽中壼稱制內朝三后在天益光于景鑠四方來賀咸沐於湛恩臣某中賀竊稽垂帷之規實輔承祧之寄明穆康獻紹隆于西晉和熹順烈儷美於東都率總權綱祗寧基祚然自昔習聞之久豈於今親見之榮恭惟皇太后陛下化協關雎德符坤象當先帝膺圖之日允賴弼成肆嗣王求助之時尤資保祐禮從宜而有典邦雖舊以維新臣屬守祠宫阻趨文陛著長樂之頌曾莫擬于形容詠思齊之詩苐不知其舞蹈明堂禮成賀表聖統維新彌文具舉明禋由舊巨典告成聿懷歸美之私敢進受釐之慶臣某恭惟皇帝陛下位居得致道本執中當宇宅憂雖謹亮隂之訓越紼行事靡忘古昔之稽天地合祛而必敬必莊祖宗並侑而來格來享以教諸侯之孝故得萬國之歡臣屬逺清光莫躬顯相禮儀既備無庸考月令之書功德可歌竊欲獻我將之頌賀皇太后表宗祈謹始百辟駿奔釐事告成四方鼇抃臣某恭惟皇太后陛下體存恭肅志切憂勤徽稱甫正於東朝大享聿嚴於秋月上參周典有光清廟之容下陋唐文徒侈神宫之制禮儀既備福祿攸崇臣屬守外祠莫瞻肆祀教民以孝咸知母道之隆自天降康益慶皇圖之永明堂加恩謝表嗣聖親祠誕布熙成之慶老臣退屏猥叨蕃錫之恩侈矣僥踰惕焉登拜臣某中謝伏念臣崦嵫餘景江海孤蹤積糜粟以偷安凛伐檀而知愧方禮行重屋罔不肅雍而身逺嚴宸莫遑奔走及旁流於大澤乃均衍於真租兹蓋伏遇皇帝陛下仁以長人孝惟繼志謂服采實先朝之舊故疏榮無在野之遺敢效請纓或幸器名之假苐思扶杖以觀德化之成臣無任明堂加恩謝皇太后表合宫成享肇布湛恩閒館偷安乃叨慶賜臣某中謝伏念臣蚤汙華近晚迫衰殘當九重肆祀之秋實多士駿奔之日猥居郊野阻侍壇垓既微塵露之勞曷稱井畬之錫兹蓋伏遇皇太后陛下功高佑聖禮厚遇臣方誕受於蕃釐亦俯矜於舊物多與之邑顧下拜以奚勝得盡其心苐退循而惟謹臣無任改寶慶賀皇帝表運啓皇圖撫有舜封之舊嵗更洪號喜逢堯歷之新誕播王言式孚民聽臣某中賀恭惟皇帝陛下躬全明哲性禀溫恭龍德居中綿厯聖相傳之統麟編書正嚴一王謹始之規揭寶慶以紀元見璿流之衍祉臣間叨祠祿阻簉廷班象魏頒時榮睹授民之政魚占有嵗願符憂國之忠賀皇太后表尊推坤德當一王纂緒之初正體乾元標億載紀年之號綸音胥布綿宇增欣臣某中賀恭惟皇太后陛下兼總政權聿修邦典順璿璣之密運頒玉歷以更新益固蘿圖逺踰椿嵗臣祠叨奉祿時慶改元三徑間投與睹皇朝之盛事兩宫歡意願同帝統之垂休寧宗皇帝祔廟慰皇帝表弓劔既藏敬舉九虞之祭豆籩有秩祔升七廟之靈臣中慰恭惟皇帝陛下德性純明孝思昭格奉寢園而鳩事嚴翼室以燕神雖蒼生冞切于慕思願丹扆勉從于寬抑臣退休方幸進旅莫陪慰皇太后表欽奉堯陵已陳虞祭聿嚴文廟載舉祔儀臣中慰恭惟皇太后陛下孝格神明功扶基祚爰潔蠲於清鬯用安妥於皇靈兹畢送終願寬追逺臣久竊祠釐之奉阻陪廷綴之趨夀慶莭賀表離明正序千齡際堯母之生坤極尊居萬載輔陶唐之治後天申祝率土增歡臣某中賀恭惟皇太后陛下性禀慈仁德推淵懿方熙朝啓中興之運屬華旦開初度之祥夀衍莊椿慶延豐芑臣琳館久叨於間祿玉巵莫贊于溫顔闕又聖先堯母千齡開震長之圖徽嗣周姜萬國仰坤元之極歡騰華夏慶洽宫庭臣某中賀恭惟皇太后陛下性本大慈德符厚載輔先帝中興之運保嗣君繼明之資挾日以升均照臨于南面如天之久增炳耀於東朝爰届誕彌普伸善頌臣遙瞻彤管阻奉玉巵欵欵一誠敬效華封之祝綿綿萬夀永居長樂之尊天基節賀表天子垂萬世之基照臨有赫帝厯邁千秋之節悠久無疆昔濫綴于邇聨今敢陳于善頌臣某中賀恭惟皇帝陛下龍姿特起駿命誕膺作者聖述者明于斯為盛得其名得其位以莫不興載夙在辰三呼隱地臣迹棲郊藪神鶩闕廷如日重光匪直上兒寬之奏與天齊夀當永歌韓愈之詩又長發其祥次開基之一日嵩高維嶽符率土之三呼方竊廩于祠官敢贊辭于祝史臣某中賀恭惟皇帝陛下智由天錫善與人同生民而立之君克明克類大德而得其位丕顯丕承羲爻甫玩於泰亨周雅遂歌于震夙四方來賀萬夀無疆臣何幸暮年與逢慶莭身在畎畝莫伸虎拜之恭目極雲霄第仰虹流之瑞賀皇太后上尊號表化美關雎夙昭於后德位尊長樂肇正於母儀萬福來同彛倫攸叙臣某中賀恭惟皇太后陛下象參博厚躬服儉勤隂禮教六宫吻合周官之制利澤施四海密扶漢道之登齊家治國茂著于宏規備物顯冊宜崇於徽號臣棲遲野處聳動郵傳思日贊襄莫相彌文之舉願言保佑益綿丕祚之興皇太后上尊號賀皇帝表聖而有原缺聿新南面之儀禮所宜尊爰正東朝之號孝形海宇和應天心臣某中賀恭惟皇帝陛下運啓興成時乘信順大禹敷文命方謹祗承太姒嗣徽音率先歸美欽乃慈顔之奉煥乎顯冊之彰臣逖逺昕朝聳聞巨典江湖養拙莫陪百辟之趨香火祝釐第贊兩宫之慶代吳侍郎謝除次對表憲部攝官久玷二卿之列祠庭詔祿躐升次對之聨榮不蓋慙感因至泣伏念臣性資戅拙緒系單平驅馳州縣之勞荏苒嵗年之晚䝉夀皇之柬拔自計吏而為臺臣㑹聖上之嗣興由宫僚而綴法從凡遭逢之若此豈意望之敢然雨露恩深雖驟加於長養桞蒲質弱已遽迫於衰殘退莫補於事為進何裨於獻納洊貢投間之請卒䝉從欲之仁豈謂隆私更攽異數越漢家之故事俾視真除假堯閣之崇名增賁行色兹蓋恭遇皇帝陛下德並乾坤之普惠加簮履之微憐臣願保於餘年聽其善去察臣粗堅於素守借以寵光臣敢不詔子及孫惟忠與孝奉琳宫之香火願上祝於遐齡掛神武之衣冠冀終全於晚節免貽譏於清議亦少報於天恩代辭免權監修國史劄子中大夫參知政事臣李某伏准尚書省劄子備奉聖㫖李某權監修國史日厯同提舉編修勑令者竊以石室紬書遽叨曲領金科埀範併預纂修自驚忝竊之餘疊拜殊常之寵伏念臣見聞單寡資禀鈍遲讀左史之九丘猥續先臣之緒業考成周之八法莫諳盛世之彛章矧當經理之秋獲備賡歌之後寸隂是競用志戒分服勤雖嗜於簡編量力或妨於機務况筆削之嚴將昭垂於萬祀而憲修之設實品制於百為一有舛差殆關治忽必潤色討論之素習與德意志慮之備知庶幾得人于以任職儻容昧陋懼速顛隮伏望皇帝陛下鑒察愚衷收還誤寵緝登三之典願仍畀於鴻儒謀畫一之規冀專歸於哲輔勿俾非才之冒處且令孤迹之少安所有恩命臣未敢祗受取進止奉御筆降詔不允代進聖政表皇家盛際紹開揖遜之期聖政成書茂對光華之旦悉上篇章之富仰干旒冕之嚴文明一時休烈千載臣某中謝若昔治功之盛具存簡冊之垂列宿森羅於燦圖書之府羣經錯綜斯昭天地之心况莫大於親傳詎可稽於史載禹躬承乎舜命雖不過於一言虞書述乎夏時並用稱乎二典欲示無窮之法必先有永之傳恭以尊號皇帝陛下躬睿智之資履升平之運天縱之將聖而輔之以學日新之盛德而本之於誠凡舉而錯之事功與出而加乎民庶制度成一王之法文章有三代之風魚躍鳶飛陶成多士雲行雨施澤被萬方同躋夀域之中孰越化鈞之外恭惟皇帝陛下聰明時憲精一執中見聖人而師之豈逺求於準式以天下而養者宜莫尚於繼承爰敕庶工崇成巨典史編載筆稽諸日厯之詳聖制冠篇倬爾雲章之美臣等取材何有奉詔惟嚴雖欲盡於形容恐徒勞於摹寫撮機要示軌範視古庶幾有典則貽子孫自今以始代進㑹要表舉綱撮要近叨五載之餘踵事增華仰續一朝之典昔嘗經于再上今乃集於大成臣某等中謝竊以熙寧廣慶歷之編乾道次政和之作皆相祖述具有章程欲示纘承可無裒彚恭以至尊夀皇聖帝陛下聰明履位剛健繼天躬盡道以事親永懷舜慕統得傳而與子默體禹功凡而設施因革之間見于號令文為之末有條不紊可舉而行宜侈鋪張以光久逺述太初之前事雖已屢書考大歷之後來尚多闕録緒成卷帙繄俟聖明恭惟皇帝陛下令聞廣聲淵謨承志謂危微親授何資記注之詳而典則所貽或待簡編而信爰諏往實俾嗣宏摹顧游夏之措辭若為稱贊然禹臯之見聖則異傳聞臣等繆與討論幸終撰集作春秋之一藝慙非襲舊之能寶訓誥之百篇庸闡藏書之盛
