body:
  text: 後樂集卷十九宋衞涇撰祭文祝文雜文祭何澹文嗚呼近年輔臣行輩蟬聯惟公終始身名泰然如青天白日之無滓如黄鐘大吕之在懸豈非重厚足以鎮俗知識足以知先文不特魁南宫之多士而足以華國學不特備九重之顧問而足以鈎𤣥所養足以動人而悟物所運足以持危而扶顛若抱黄河泰山所鍾之秀而得三光五嶽未分之全也故其兩升中司風望肅整徧儀二府樞機密旋揚休山立之色久輝映於列辟金鏘玉鳴之論常宣暢於上前人莫窺其涯涘已獨妙於眇綿去中台之咫尺遡長風而孤鶱若掉富貴之鞅不急功名之鞭出分兩鎮歛惠十連俄急流而勇退欲西陌而東阡賦歸來兮一紀快步武兮蹁躚樂竹宫之高寒尋香社而盤桓冕旒簡注為三朝之元老搢紳具瞻為一世之大賢方藉黄髮星弁之重顒俟衮衣赤舄之還胡粃糠於濁世竟凌厲於飛僊濟川之舟夜移奠楹之夢已傳有來我門忽墮遺牋驚讀妙墨泣涕漣漣自惟疎逺素辱知憐方時多艱宿師三邊本兵之地安得再借疇昔折衝禦侮之力留鑰之都安得重煩向時治軍振旅之權括蒼摩雲鼎湖接天公有精爽凌風跨煙尚其髣髴來舉我籩祭吳侍郎獵文嗚呼士生尚志蓋在𢎞毅豈無它美皆德之細公生也厚金玉之粹蚤從明師講道養氣尊其所聞名高自畏自厯小官厥臨孔惠中登臺省望駿於位晩為國計邊患方熾守荆諭蜀不以難避士皆期公廊廟之器一閑四年竟作長逝嗚呼尚德好善孰如公之恭且懿也憂國愛民孰如公之篤且至也傾已下士孰如公之坦且易也親仁急義孰如公之勇且銳也天不憖遺國用殄瘁某守此邦感德無地有㫖者酒有泚者淚死生交情辭不盡意祭邱樞密崈文嗚呼自昔賢哲死生之變有關乎世道之盛衰夫受才於天者既宏則貽福於斯人者當大其所施曠間世而始鍾胡一朝而永違信蒼旻之難詰使黔首之疇依公之堂堂萬夫榘規喬嶽屹鎮景星燦垂厯事三朝屢更險夷惟真弗渝惟堅弗隳或出或處一節靡移銷伏羣枉斷制大疑人有元氣國有址基邊陲俶擾呼吸安危身為長城手摩瘡痍明堂一柱泰山四維物望紛属璽詔交馳庶幾大用抗函力歸云何微疢乃不憖遺某蚤從幙府已辱顧知晩荷情誼屢見書辭俛念愴然意繆所期馳奠寓誠匪勤其私祭譚參議文襲慶將門服勤儒學及師東萊所見者卓七捧能書遂拔頭角鳧舄一飛虎符再握漢庭用老采玉遺璞使客諸侯落我帷幄克同寅恭有斐瑳琢如何繁霜閼此蘭葯幕中之辯孰揚孰𣙜老成日凋典刑日斵公亦往矣誰返其樸遺詞冩哀有泗如濯哀哉又沂水望族山西將門業受東萊學有本原七薦賢書南溟化鯤舍武而文金友玉昆旋紆墨綬洊擁朱轓晩辭英簜參幕湘南論議老成德齒達尊余所嘉賴有光帥垣一疾遽嬰曾不控寃談笑幻泡達人大觀嗚呼玉樹之摧雲愁晝昏景寂溪堂詩遺夢庵典刑儼在胡然九原文以寓哀聊薦一樽參議所居有溪堂所述有夢庵祭運使蔡大博文惟公行不為崖文不為瑑由外考中可以洞見遇事而決剛也百鍊味道既腴其瘠靡變霈而為澤剖符擁傳清廟將歸為玉之瑱胡然一疾劑弗及嚥好同寮寀居接里縣疇昔之夜笑語繾綣倐如遊飈疇不驚眩吉人云亡善將安勸西江有波清酒可奠又嗚呼公乎去將安之春江水生大波倒吹蛟鰐之時嗚呼公乎去將安之萬山一蹊天黑虎躨荒驛風豗嗚呼公乎盍亦留諸維南有浦可釣可詩厥産魚稻民秀風熈或臺於顛或苑於涯是燕是宜公乎留斯朝與雲來暮與雲歸叢祠香火鄉社豚犧我民其兒公乎留斯有轊於軺有翣於帷公不我留我涕漣洏實殽在俎釃酒在巵死生交情公勿吐之祭周通判文藩條之寄舊號繁劇貳車得賢允有禆益我來甫爾公已云亡雖欲不傷如之何而不傷祭雷叅政孝友文惟靈逢時休明高步騰驤任大司成文明對敭擢中執法扶持紀綱開禧之末於赫陽剛公於是時白簡凝霜政化既更治具寖張股肱以輔羽翼元良八年於兹庶事用康九重眷遇一日靡忘祈解機務洊貢封章温詔勉留莫挽歸裝進職延恩出牧藩方渙此異數實維非常尋以訃聞帝心䀌傷亞保之崇褒贈是將哀榮周備命數焜煌某頃塵近列接武周行今守江右咫尺鄭鄉引睇山川出雲之祥尚期霖雨惠澤八荒豈意歸柩道由南昌涕泗交頤敬酹一觴祭王少卿母太碩人文柔懿維則壽考且仁肅穆婦儀光於德門篤生賢子秉是正直載旜萬里名震殊域挺挺風烈忘身徇公猗歟母訓實維教忠自鎮神臯晉貳卿寺榮奉板輿有華綵侍象服魚軒曷不百年嗟嗟淑德沄沄逝川瞻睇慈幃登拜弗及菲奠寓誠涕泗於邑祭安康郡太夫人章氏文嗚呼彤史不作懿範罕聞孰如安康蔚其清芬齊家睦族曰儉與仁念我疇昔實䝉拊循及以女歸恩至且勤飲食教誨母慈則均餘四十載追惟若新邇者菜衣出守江濆就養以行以榮以欣旋乃違豫還息里門相彼異稟藥喜可臻云胡不淑荒厥澗蘋重念幼子冠而未婚治命炳然許妻以孫方將卜吉用永世姻庶幾魚軒復來顧存欵昵讌語朋集賓親奄忽仙去有懷曷伸惟古五福全者幾人孰如安康備於一身繙繹貝葉久悟性真死生之變等於浮雲哀榮始終奚憾幽窀我獨感舊隕涕沾巾曾是衰薾奠酹莫親敬飭二弟往薦斯文淮東提舉任謁諸廟文天子臨軒遣使凡部封之内事之利病民之休戚吏之臧否皆得聞焉其任顧不重歟某承命此來大懼弗克勝任惟神聰明正直血食此土一作受職此土使者顧相與表裏焉以無負臨遣之意神之所宜鑒也禮有常謁敢先厥初又竊惟有功於民者悉在祀典聰明正直以福是邦視事之初敢不祗告惟神其左右之東海提舉任謁殿文夙夜出納命於虞書周爰咨詢播之詩雅使者之職其來尚矣厥今倉廩之儲山澤之利雖事任不同而觀風問俗之意則未逺也某起自諸生出將使指置司之郡禮有常謁佩服古訓敢告厥初潭州到任謁南嶽行廟文南方之嶽是為衡山衡有平物之功嶽有鎮安之義此銓德鈞物之權實帝攸司而節宣風雨庇䕃生人所以為此邦之福也某分梱於此密藉神休祗事之初敬謁行廟惟帝其隂相之辭殿文某猥以諸生濫與將指朞年於兹體學道愛人之念佩行已有恥之訓蓋願學焉而未能也䝉恩易莭方匄祠以歸屬有行日敢不祗告潭州謁殿文兹分帥閫兼領郡符惟宣聖之訓是遵惟斯民之務是急莅事之始吉蠲以告亦曰千乘之國敬事而信節用而愛人使民以時聖有格言某敢不勉潭州時祭南嶽正廟文於皇喬嶽奠居南服人無疵癘嵗洊豐熟守土䝉成皆帝所福以時修報祭不敢瀆潭州準郊赦祭南嶽行廟文聖上明德恤祀至諴感神徠祗郊禋穹昊饗答熈事告備沛澤旁流申命守臣聿嚴祀典蓋所以廣天地之仁而同幽明之慶也嶽為百神之宗南土之望躬飭明薦罔敢弗䖍唯嶽有神尚其鑒之潭州時祭南嶽行廟祝文嶽宗百神鎮此南土潭之為郡密承帝休祀有彛儀尤嚴冬報守臣庀職敢不告蠲敬謁行祠以祈鑒佑又維衡是嶽雄鎮南服睠此熊湘實嶽之麓民和年豐皆帝所福禮嚴冬報敢不秪肅又春首四時祀嚴八政當春而祀郡有彛章維嶽鎮南衆所怙命吉蠲明薦罔敢弗䖍惠相我民實惟神賜又天下五嶽衡居其一載在祀典有文有秩某自領藩條春事載及時和嵗豐民用寧壹惟帝惠相既昭其實敬治潔蠲期保終吉謁眞武祐聖廟文竊惟真君以治輔正以福德民聖天子以閫外寄某亦欲其扶植正類以為編氓之福耳祗事之始敢用昭告惟真君其黙相焉潭州謝雨文徂暑未闌慮或愆於亢旱精神方啓響遽答於甘霖既屢慶於豐年尚敢忘於去日伏念臣某恭承龍渥久鎮熊湘志在乎民每勤拳於雨若政先於食惟冀幸於秋成庚伏正中午陽方熾禱嘿孚於一念應靡俟於崇朝未適西江尚見三登之盛載祈南楚賸騰百室之歌辭殿文某聞敬事而信節用而愛人使民以時惟先聖所以教邦諸侯者如此某諸生也從事斯語獲免於戾繼自今尚當終身誦之以不負所學告而後行如初禮辭南嶽行廟文某猥以非才來守兹土比及二年凡所以隂隲下民無水旱盗賊之憂而使某得以展布四體行君之令者惟帝是怙今叨易地泝江有日敢以此心質諸神明而後問津焉隆興府準明堂赦祭諸廟文蕆事合宫禮既行於三載流恩㝢縣祀咸秩於百神恭奉德音肅陳芳薦仰祈昭鑒顯賜迪嘗隆興府社後祭諸廟文風清露潔秋過半兮民免啼號誰之賜兮報禮有常吏敢後兮牲幣既豐酒則㫖兮馨香所薦來肹蠁兮永佑我民祓凶咎兮社後祭諸廟文倬彼甫田其耕澤澤勞農勸相實吏之職風雨時若疾沴不興隂相嘿佑惟神之靈時殷仲春恪修常事徧於羣祠以享以祀神其芘貺惠我豐年指日秋報吏敢不䖍時祭諸廟文禮有功烈於民則祀之矧今嵗事告成昭報在冬郡有彛典欽神之休以介終惠惟聰明其鑒之又某自領帥閫嵗洊易春疵癘不作豐稔相因隂助黙佑亶惟有神嘗觀禮典法施於民禦灾捍患祭祀惟均敬展春祈侑以此文隆興府吳城山龍王廟祈晴文惟神興雨成雲變化無際時則為澤過則為沴方旱而霖物䝉其濟方穫而潦害且不細嗟我農人當此歛穧零雨其濛終風且曀並走羣望浹旬未霽築場納禾公私所繫下奪民食上妨國計惟爾有神廟食世世害於粲盛胡然供祭爰即祠宇肅陳牲幣亟導晴曦盡驅隂翳收歛神功以須嗣嵗隆興府謝諸廟文穫稻納稼兹維其時農將赴功而雨妨之吏患其然敬請於祠旋惠以晴有如所期嵗事備收厥賜不貲遣吏以謝神其鑒茲隆興府龍王廟禱雨文鸛鳴垤而零雨望切輿情龍嘘氣而成雲敬申誠懇乃四月之維夏正三時之務農膏澤少愆嵗事未卜惟神所宅實福此邦儼威靈於今古之間妙變化於須㬰之頃用遣一介之吏䖍修百拜之誠願施隂陽開闔之權亟下風雷鼓舞之令大為霖於三日以加惠於一方神無常享於誠少鑒微衷之請旱不苦禱而雨庶幾循吏之風禱風雨池文大旱之望雲霓於民心而甚切祈雨以介稷黍在吏職以敢安誠恐未孚禱猶莫應凡有祈禳之典悉殫真切之誠乃眷靈湫比加顯號由積功烈故被寵光方仲吕之載臨適常暘之為沴苗則槁矣人皆仰之敬為千里之民庸遣一介之吏厯陳悃愊恭扣隂靈願於呼吸之間亟下風雷之令大為霖於三日以加恩於一方百畝之田勿失其時正當夏長一年之計在於種穀庶遂秋成又禱風雨池文旱既甚而滌山川寅奉責身之詔雲能出而為風雨敢稽走望之恭惟吳源之赫靈至李唐而彌著有旱必禱隨感而通張曲江甘液之詩權文公時雨之記一時答貺千古流芳顧拙政之無堪視前人而有愧念聖主軫憂於宵旰而藩臣若履於淵冰恭即靈湫洊申誠悃願以一勺之水霈為三日之霖神既賜於豐穰吏敢忘於昭報庵山廟祈晴文嗚呼穀自布種下秧以至於秀實其成之艱矣農自于耜舉趾以至於刈穫其致之勞矣忽雨不止坐妨收藏嗚呼成之艱致之勞者豈不甚可惜乎天乎神乎忍為之乎某憫農夫之勤苦悼小民之怨咨耳簷溜如聞啼號目嘉穀如割心髓奔走羣望未臻嘉應惟神受百年血食之奉主一方雨暘之權用敢躬謁祠下稽首祈哀神其驅掃隂霧軒露霽華既全嵗功亦活民命蓋竹廟祈晴文嗚呼成一嵗之稔難為數日之晴易畀其難者而不畀其易者豈神有愛於民歟抑吏之不肖無以媚神而然歟吏知罪矣雖然雨不止穀不收嵗荒民流上帝震怒吏且誅殛則凡血食於此土者其得漠然無情哉闔隂闢陽披霧出日在俄頃之間耳敢奉薌幣以祈辭殿文某守藩南州閱嵗有半節用愛人之語雖未必能盡行而居之無倦行之以忠蓋終身誦之也去之日不敢不如始至謹齋潔以告福州到任謁殿文某恭承皇命移鎮此邦視事之始謹齋宿以祗見於學宫惟是從政之方敬事之義平昔之有得於格言者其敢不允蹈之福州時祭諸廟文祭有常序祀有常儀率循以行其敢不肅惟是若雨暘蠲灾沴以隂佑乎民者神亦有常職也顧神其垂鑒焉又神之在祀典者為其有功於民也率時春祠在吏有彛敬矣相予嵗事惟神其克鑒之福州準郊赦祭諸廟文聖上秩盛禮於泰壇衍洪恩於坤紀申命守告於羣祀蓋欲幽明兩間均此大慶也唯爾有神尚克鑒之福州禱諸廟文百穀用成奄觀銍艾乃秋之杪滛潦為害黄雲滿野一飽是期壞於垂成神其忍之吏親於民莫或遑處齋祓乞靈奔走祠宇驅除隂沴導迎秋暘成此嵗功報祀敢忘又水歸其壑冬月之常儻天時之雨溢實收斂其有妨今者雷宜伏而時作霓方徂而未藏惟神依人而行其亦式赫厥靈亟與排積隂而升太陽也禱鱔溪文旱而禱雨正沾足以為期時尚屯膏意精神之未格輒以羣生之望而忘再瀆之愆惟爾神舊號於靈源凡故老能言其響應願從今後四滂沱以流恩毋若初祈一沾濡而斂惠謝鱔溪文一時不雨已再控於禱祈三日為霖俄遍敷於膏潤載覩感通之速遥知變化之神適是承流其敢忘德願從今始曰雨而雨曰暘而暘式赫厥靈潛天而天潛地而地辭殿文千乘之國治有要道敬事之外節用愛人某尹藩弗績易地來閩行無越思維聖之訓朞年於此上下相安以疾丐辭累牘得請謁謝而去聖師鑒之福州辭諸廟文某易地閩徼俯仰彌年拙政平平初無偉績年榖順成田里晏靖匪神隂相曷濟登兹祝釐得俞從容引去吉蠲以謝靈娭嘉之隆興府再任謁殿文某曩者叨臨帥閫正以諸生伎短退懷愧慊今拜申命敬用躬謁臨事而懼洙泗格言視民如傷澗瀍遺訓敢不敬承隆興府再任謁諸廟文某昔者被命作州仰藉威神之助幸逃曠敗今被新組載臨舊封惟是黙相俾寒暑調而雨暘順使某得以體上意而寛民力是所禱也隆興府釋奠五賢祠四首西漢南昌尉梅福東漢處士徐穉東漢豫章太守陳蕃晉豫章太守范甯唐江西觀察使韋丹五公之賢邦人是祠從祀於學有嚴舊規共命復來適維其時酌奠以告敢不肅祗又嗟嗟五公相去千載碩德偉望表表在人列祠學宫以明有敬迺釋奠已率由舊章爰遣僚吏祀以時禮願言顧之式副詠思又逸士之高風循吏之善政皆可為百世之師故廟而祀之牲酒潔蠲庶幾來格又籍甚遺愛藹然清風人心歸向萬古攸同巍巍象設隣於學宫粢盛牲醴既潔且豐春秋奠饗普宣無窮隆興府禱雨諸廟文惟神血食兹邦不知幾百年矣而吏於此者朝往暮來不一二年而去然則神與吏之於民孰為最親去此蓋五年誤恩復來逮茲嵗除甫視郡篆未獲奉牲瀝酒致告於神遽有祈焉世謂臘前三白豐年之祥今臘無幾日嵗將及春霜乾彌旬積雪不下旱蝗為孽慮在嗣嵗某竊憂之未及下車敬為是禱神其布彤雲嘘朔風俾剪水飛花臨風舞絮庶幾民有豐年之望無疫癘之虞實神隂相吏亦得以辭其責惟神其鑒之謁廟文某奉天子命分閫兹土鎮撫方面牧養小民某之責也雨暘以時疾癘不作神之職也視事之初齋心以告惟神其克相之春祭文春主乎生草木萌動發榮吐秀神實司之於春日而舉彛章用不敢怠長我百穀育我庶民郡守之望於神者宏矣肆其相之又令肇青陽滋生萬彚爰卜兹辰俶興穡事唯爾有神尚克相畀庸薦嘉穀式修彛祀祈晴文農家作苦稻漸登場滛雨為灾穗將生耳為黎元而請命望穹旻以輸誠伏念臣初領郡符敢逃吏責教條未具莫臻天地之和刈穫有期遽爽雨暘之節積為霖潦害及粢盛用是隠憂莫遑寧處靡神不宗靡神不舉尚冀感通惟天為聰惟天為明輒申祈禱願回真造俯鑒微衷縱諸陽閉諸隂盡消沴氣崇如墉比如櫛共樂豐年禱雨文吏䝉恩於朝布宣德意神受命於帝協贊化工均食於民各揚厥職如政刑之有爽吏敢辤其愆若雨暘之不時神實任其責方四月之告旱仰九重之軫憂爰飭庶邦徧走羣祀取一勺之水可以資羣龍之變化注三日之雨庶幾蘇百姓之焦枯吏固得以藉神之休神亦可以承天之意龍潭禱雨文兊月之收成在邇正切望霖屯膏之沾潤未周若為蘇旱輒指潛珍之所䖍伸霈澤之祈其始自今毋時或惰噴泉溪畔早騰變化之蹤報雨峯前亟布沾濡之賜嵗其克稔民敢忘休皇子百晬凈髮文伏以天開蕃衍時對長嬴續蒼宫之震索迎朱陸之離明燕應祠而垂裕熊協夢以儲精啓𤓰瓞之昌盛顯芣苢之和平秋序踰半晬日就盈承璇源之帝錫藹玉稟以天成備儀犀幄臨澡禖屏喜溢椒庭之邃香浮蘭液之清拂紺髦而雲委呈寶鍔以霜凝善頌交集嘉祥遹膺茂覃訏之粹質永耆艾之修齡奉慈宸兮愷懌聯華蕚兮輝榮受百福兮穰穰簡簡繼多男兮蟄蟄繩繩潭州勸農文勸農必以嵗二月故事也太守到郡嘗勞父老於北郊矣視事既久益習知民俗利病今復進父老而告之豈特勸耕循故事而已思求夫害農者併以告焉乃者兵事既息民得安業嵗仍小熟天實相民今東作方興霢霖霑足深耕易耨不勞爾力天之相民又似可卜然水旱之數無常天時不可數恃惟在勤苦可望有秋湖湘之俗素號淳樸非有游觀侈泰之欲以蕩其心非有工械伎巧之蠧以分其力民無末作多事南畝農田之利宜自知之太守所慮在於妨功害農之習陷溺其中或不自知也好訟終凶大易所戒出入州縣逺投監司拘繫囹圄涉厯時月豈無妨功害農者乎父子兄弟親戚隣里根連株逮動以十數豈無妨功害農者乎日閱訟牒每每嘆息偶涉絓誤百無一二率皆故違義理明犯禁法自抵罪辜而不知悔如忿心所激爭鬭所不免也今或十金之未償或一語之不順便相殺害不死不休累及千連蕩破家産此爭鬭之害一也貧而失業典賣所不免也今或已絶而言典父賣而子贖交易年深尚訴準折契要明白堅執詐偽富者吞併則以倚當為典賣貧者昏賴則以典賣為倚當交相論訴不顧是非此典賣之害二也爭田者不明指所爭之因但以强耕盗種刼奪禾穀為名爭地者不明指所爭之界但以發掘墳墓暴露骸骨為主苟欲動官司之聽不知蹈誣罔之刑此詐妄之害三也豪民放債乘民之急或取息數倍積日累月或託名典本筭至十年奪其屋使不得居奪其田使不得食流離困餓曾不之恤此債負之害四也至於强暴之男略人之妻以資嫁賣富豪子弟誘人之女以為滛奔大辟具獄因姦者半風俗不美莫此為甚此誘畧之害五也其他訟事未能悉舉守令承流宣化教民易俗今其若此責將誰歸姦宄起於貧窮禮義生於富足故願父老轉相告語率其子弟勤身從事益務本業凡此弊俗宜痛革之豪家大姓存恤小民客主相資貧富相養家給人足各相親睦忿戾不生爭訟可息還淳反樸庶有期矣若乃追呼之煩以奪農時徭役之重以傷民力則守與令責也咎實在余必不汝諉父老幸聽毋忽又勸農以文不若除病農之實太守去嵗出郊蓋嘗與爾父老言之此邦接湖北諸邑昨以旱告太守既為爾減租發粟矣然田租可寛而難於盡捐廩粟有限而難於徧及所幸上流小稔彼此通融方春東作穀米價踊勤身從事爾農顧不當力以此自勉歟雖有饑饉必有豐年此天理也良農不為水旱輟耕此人事也人事既盡天理自還太守去此有日矣敢復以是為爾農告隆興府勸農文聖天子寛仁節儉愛養基本爰命牧守共理爾民而專領農事方春之仲太守祗奉國典親行近郊進父老而勸之非特應故事而已夫空言莫如實用率下莫如正身太守視事以來宣布德意勤恤民隠一工役不敢輒興懼其奪民時也一獄訟不敢以淹懼其妨民事也均折變之額懼下戸之重困也嚴受賕之禁懼姦吏之侵尅也凡有可以寛吾民者不遺餘力矣爾民可不思所以自勉乎去嵗賴天之休雨暘時若他郡或憂旱而此邦獨不事於桔橰他郡或秋澇而此邦獨不妨於銍艾嵗則大熟粒米狼戾雖天時之適然亦力穡之明驗也方春東作以興嗣嵗可不益思所以勉之乎人皆曰穀賤傷農以其價直亷而錢少然古者百畝之田匹夫耕之足以供一嵗之食環廬植桑女修蠶織足以供一嵗之衣𤓰瓠果蓏雞豚狗彘毋失其時足以供日用之費而冠婚喪祭務從儉約鄉黨隣里不起爭訟故一嵗之間用錢極少戰國之時民多背本逐末費用漸廣李悝有言曰一夫五口一人率用錢三百五人終嵗用千五百社閭嘗新春秋之祠用錢三百然一家之内常費猶不滿二千若以今時較之儻能自蓄雞豚足以供春秋之祠自勤桑蠶又可省千五百之費此外惟有輸官一節耳其餘省事省費無所用錢雖云穀賤何傷於我太守非敢虚辭以相勉此古人已行之事載在書冊爾父老明聽太守之言歸語爾子弟相率勤農出作入息夫耕婦饁不辭三時之勞可享卒嵗之逸閨門之内仰事俯育含哺鼓腹而有骨肉團欒之樂鄉黨之間出入相友疾病相扶而有隣里輯睦之歡租賦早輸則無追呼之煩詞訟絶息則無請囑之費父訓其子兄訓其弟子子孫孫克守其訓再登三登世為太平之民不亦善乎古詩亦曰自今以始嵗其有君子有穀貽孫子于胥樂兮貴賤不同理則一也父老尚聽之哉福州勸農文八州之地福為最廣而人亦最稠農家之子去而從釋氏者常半耕夫焉邑十有二瀕海者三之一負山者過其半負山之田嵗一收瀕海之稻嵗兩穫民無甚貧而亦無甚富嵗無甚稔而亦無甚儉其俗不侈不陋而率稱是蓋瀕海則資水利負山則仰泉脈霖雨太溢則兩穫者微傷而負山者倍熟驕陽為沴則一收者易損而瀕海者倍收二者雖異也然爾農於此則不可以不勤太守承乏是邦行一朞矣去夏闕雨有禱隨格入冬雨濕久閉忽開已而嵗得中熟春前一夕臘雪彌山立春之日朝陽散彩仲春以來土膏沾洽此又今嵗宜麥宜稻之應爾曹可不知所勉毋游于觀毋憚于勤毋舍本逐末毋喜鬬好訟是穮是蓘不為水旱輟耕則東作而西成負山瀕海何擇焉父老其勿以太守之言為忽再任隆興府勸農文予與洪民若有夙昔去此六年䝉恩再至父老攜㓜迎予近境予揖父老問勞亡恙涉春禱雨食不下咽夜聞簷溜披衣起視日冀霑足慰我農人二月既望勸相于郊予心汝知予言汝聽不尚嚴刑不事苛斂不興横役不縱㸃吏有一妨農必戒必戢農之自妨蓋亦反思毋習游手毋好珥筆毋屠毋沽毋博毋鬬予之戒汝非獨今日人心本善久而益信土脈膏動俶載南畝庤乃錢鏄深耕易耨修迺陂塘有備無患人力既至天時可必乃亦有秋百室盈止適我願兮年豐何憂抑又有言悉為汝告興甿有教力田有科取士於農以其志純語而子弟耕養之暇俾習詩書則知孝悌烝我髦士此其選也予言非迂諦聽毋忽游澱山留題嘉定改元中秋月夜衞清叔拉龔立道朱景淵觀潮道褐夜己半乘興泛舟二十里澱山湖風露浩然明登山寺挹晨光景氣清絶飯已回櫂薄暮夷猶蓼岸蘋洲之間買魚更酌相與樂甚復載月而歸進叔仁叔正叔曾叔偕行橅楷樵模樗侍越明日書此以寄住山悟老福州屏山亭題識古語云君子之居一日必葺郡圃累政葺治稍覺成趣參政何公廣曠宜創越山洞天尚書葉公闢栁塘雲觀侍郎蔡公重修蕃宣樓屬以修廊予丙子初夏眎事登覽樓觀燕堂後有萬象亭石林葉公所建危峙城上樓觀相望亭之外瓦礫蕪穢雨輒不可往來遂續行廡複閣凡至怡山間不論雨晴公餘可以縦步極暑夜坐露氣襲人城隅有月臺就址結亭以四山環繞如屏名曰屛山洞天畧高其楹名曰雲關萬象之東仍翼以廡始稱扁榜文山鄭君育所書花塢循舊徑鋪石夾塼庶能久欄楯亦以便遊觀也獨雲關至澄瀾廡未周以病丐祠不果後之同志者嗣而成之
