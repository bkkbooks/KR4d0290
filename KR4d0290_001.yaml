body:
  text: 後樂集卷一宋衛涇撰外制從事郎趙汝談特授行太社令制宗室之賢而文若漢間平唐賀白蓋不多見如爾之力學好修辭章雅健良足嘉尚置之曲臺益懋器業朕將有觀焉可朝散郎行大社令洪伋特授大理寺簿制漢儒以簿書獄訟為非本務然廷尉天下之平文牘叢委鈎稽無法吏並緣為姦民命顧不重耶爾生於名閥才諝有聞繇稷嗣之聨列理官之屬體朕此意思所以稱其職者佇對褒陟可承議郎幹辦行在諸司糧料院林拱辰依前官特授行大理寺主簿制廷尉之獄民命所繫朕以文法吏與儒者參用厥有深旨爾學識敏茂嘗决兩科宰劇甚優曉暢世務蓋有用之材也列屬棘寺益試爾能其鈎考稽違參訂疑誤庶幾助朕哀矜欽恤之意毋曰簿書期會而已也可通直郎太學博士錢廷玉除太常博士制奉常專禮樂之司兼夷䕫之任昔之勤勞王家者亦於是而紀成績焉至唐則以博士掌戎府書檄古今用人是或一道爾蚤躋膴仕繼收雋科蔚然聲稱達於朕聽比橫經於學省旋列屬於頌臺未究爾材當為時用矧克濟世美自許功名方贊畫軍旅之間豈特聞俎豆之事策勳既至論賞孰先可通直郎賜緋魚袋王克勤依前官特授太常寺主簿制爾總角知名被遇烈祖讀冊府之書踰三十年矣頃又以力學自奮名第徊翔州縣既用復跌然遂得以其餘暇涵養逺業豈老其才而后用耶朕愛惜人物振拔滯淹比加收召俾置曲臺簿領雖卑與聞禮樂之事往遊其間以俟褒陟可從政郎光州宜城縣令邵峴以淮南運判李洪申管押第一次糧料至蔡州軍前乞旌別特改宣教郎制自削舉員限歲額改秩之制益嚴爾為令長轉護軍須率先諸邑部使者以績狀聞度越彞章升華京寺足以旌爾能矣夫用民力於有事之日固當寬民力於閒暇之時祗服恩徽勉思惠養可袁㮤因講筵論語徹章習學文字轉承信郎制魯論終篇儒臣第賞爾習刀筆亦與有勞遂陟武階抑云幸矣可不勉哉可迪功郎徐晃兊換會子局賞循修職郎制楮幣濟貨泉之阜通而未免更易之煩爾以監臨第勞應賞俾陟文資尚勉職業可朝奉郎行太常寺主簿劉彌正差出淮上相度驅磨措置事件有勞特授朝散郎差遣如故制朕操馭臣之柄有勞必録所以存公道示激勸也日者兩淮貨泉壅滯出納隱欺重水潦之為災趣春和而議貸爾以儒者該練將指咨詢得其事情馳以歸報爰進一秩庸旌爾能其益勵於逺猷以對揚于休寵可修職郎李圭用玉牒日厯聖政會要四處進書賞循從事郎制金匱奏篇纍勞第賞爾與名其間豈以久而或遺敘陟文資亶為華寵其思所以稱此哉可陳良彪除閣門舍人制朕惟烈祖上閣置舍人以擬三館儲材之地實為右列之清選爾早游庠序嘗冠名科久服戎行譽處彌懋朱華列屬不試而命足為爾寵其益思奮勵以無負待遇之意可從事郎行國子録陳振依前官特授太學博士承直郎兩浙轉運司幹辦公事陸峻依前官特授行國子録制儒林之官博士掌教學録主規所任若不同而訓迪糾率以納人於善則一也爾振性資端靖勤於厥職其進為博士以誨諸生爾峻辭華敏贍蔚然有聞其俾為學録以齊胄子各推所學作新多士副朕育才之意嗣對褒陟可宣教郎扈仲榮迪功郎陳模併依前官特授祕書省正字制朕惟人材之難得而儲養之不可無素也故萃四方之英雋置之三館如護圭璧如植杞梓以俟異日之用焉以爾仲榮文藝器識西方之秀爾模性質行誼南州之良列屬學宫賢問彌暢試言制苑論議可嘉蓬萊道山俾職是正未足以究爾藴其讀未見之書優游涵泳咸以事業著明於世豈惟副豫期待之意而爾亦有休顯之稱可迪功郎張令敏用憲聖慈烈皇后上仙掩攢賞循從事郎制慨念憲聖因山之役今十年矣爾嘗與宣勞格應遷秩齎伐有請豈以久而汝遺祗服恩華思效職業可僞保義副尉梁法特授秉義郎制朕興六月之師復中原之境凡衣冠之舊族與襁負之遺黎孰匪故臣皆吾赤子爾奮自管庫率先來歸俾超進於武階示深嘉其志尚永肩忠義共建功名可朝奉大夫新改差知袁州軍州兼管內勸農營田事余崇龜依前官特授尚書都官郎中制文昌諸郎上應列宿而都官在唐尤號清選至以騷雅振盛一時蓋官無崇庳得人而重古今豈有異耶爾材學純茂器采詳華頃繇書林出領名郡治行可紀亟俾召歸司𨽻秋聨益試能事其推素藴勉紹前聞以副識拔之意可朝請郎守尚書刑部郎中賜緋魚袋奚士遜依前官特授尚書右司郎中賜如故制中臺總機務之繁都司冠郎吏之選豈特付受書奏亦以助正紀綱非更踐中外練習典章不以輕畀爾器質淑茂才術疏通歷試節麾蔚著風績分曹憲部以平允稱惟時省闥之聨藉爾老成之望爾其彌綸闕失糾正稽違俾吾二三大臣圖回其大者而不以薄物細故纍其心斯為稱職嗣有褒升可朝請大夫荆湖北路轉運判官專一措置提督修城宇文紹彭可特授尚書度支郎中制朕規恢鴻業寤寐人才或外總於臺綱或內參於邦計委任攸在重輕豈殊爾名閲之英儒雅飾吏比洊更於麾節亦懋著於事功錫對便朝議論不詭其輟湖隂之將漕進聨民部之名曹矧邊瑣多虞調度方急司度之任厥惟艱哉往殫乃心以佐而長均節其有無俾上用足而下不匱是為稱職嗣有寵章可朝散大夫尚書左郎官田淡特授行尚書吏部員外郎制十年去國有嘉難進之風千里承流茂著惟良之績兹對揚於文陛爰進陟於名郎爾學問邃深材猷敏劭培養滋久望實益孚六曹均𨽻中臺三銓獨為高選惟精識足以別流品惟明決足以革姦欺其殫乃心以佐而長朕將於此觀逺業焉可朝奉大夫行大理寺丞劉炳特授行尚書兵部員外郎制朕惟烈祖之朝尤重郎曹之選非賢望素著或治行卓絶不以輕授爾舊自儒學安於平進比以從臣之屬召自逺郡錫對便朝而議論激昂慨然有志於當世朕甚嘉之為丞棘寺旋躋省戶朕之待爾厚矣方疆場多虞武部之職非平時比也勉行其言往佐而長思以報朕且無負於所知可朝散郎行祕書郎兼國史院編修官實録院檢討官戴溪依前官特授尚書兵部員外郎制朕惟烈祖之朝尤重郎闈之選蓋必柬求賢望非特褒表外庸爾魁壘耆儒卓絶雋軌文詞贍典足以冠冕士林行義潔修足以羽儀朝著道山史觀久矣並游中臺望郎得卿而重矧諸曹之決事惟武部之獨清優游其間以須逺用可從事郎許沆可依前特授行國子正制蜀自昔多材而去朝廷萬里無路自達朕甚念之爰命師臣歲得薦進爾奮自儒科行藝純備舉者以名聞比繇召察列屬胄監分任糾正之事盍推所學使多士有觀焉可朝奉郎國子博士莊夏除國子監丞制學館儲才之地異時卿相由此其選升進録用正不容以遲速久近計也爾文藝之美見推士林器識之茂稔於朝序紬經訓胄轉而為丞班聨滋高兼掌教法不特關決庶務而已優游其間益就逺業以副朕之所期待者可朝奉郎史厚祖除大理寺丞制朕患夫法家者流拘於文而不察夫人之情也故選用理官必更誡以民事庶乎習知幽隱凡我庶獄酌情法之中而審於用刑焉爾藝精科律濟以儒雅頃司評讞蔚有能稱嘗轉而丞矣通刺名郡揚歷居多肆豫命汝復還舊署以究所長其益知盡心以稱欽恤之意可朝散郎行國子監丞林孔昭除大理寺丞制廷尉天下之平也朕患典獄之吏寬者失之縱急者失之苛國朝以仁厚為政與其急也寧寬丞佐之任擇人惟謹某奮身儒術清介有守周旋胄監譽處彌休擢居理官僉論稱允傳曰與其殺不辜寧失不經又曰如得其情則哀矜而勿喜爾其祗若古訓折獄蔽罪必惟其中使民自以為不寃則無負遴柬之意可朝奉大夫太常博士魯幵除太常丞制朕以季秋大享於明堂欵清宫朝太廟彌文縟典職在奉常雖典章具存而必得博物洽聞之士相與講明之爾馳聲膠庠蚤擢名第徊翔州縣晚而登畿處以議郎咸推直筆肆疇久次就俾為丞益殫爾能叶贊熙事濟於休成嗣有褒陟可戶部侍郎丁常任降兩官放罷制朕惟士大夫出處進退之間當存禮義廉恥之節職列禁從衆所觀瞻此或不知他復奚望爾蚤繇推擇屢試事功乃虧行己之方屢致煩言之及頃承人乏擢領神臯恩寵若斯職分宜思稱塞建明何有日夜惟望晉遷果為清議之弗容致謂宿愆之佚罰俾從鐫斥少警惰偷惟服寬恩勉圖後效可來處和引班太疾降一官制朝儀貴肅賓閣是司乃詔相之不明致疾徐之失度俾鐫一秩姑小警之可內侍吳回等各降兩官制災祥之示戒恐懼引咎者人君之道也火禁之不修弛慢失職者有司之責也具官某頃繇選擇祗事北內融風為沴上驚重闈朕躬自貶損冀答譴告爾職在警宫懷不能安抗章自列貶官二等尚庶幾知過者然諉曰有數而重置人於理此又夀慈之寬恩也其可不務省循益加共恪以稱朕奉親之意哉可內侍王師圭等各降兩官制朕惟事親之道務極其至故凡祗奉於重闈者不愛高爵厚賞以寵榮之庶幾恪共乃事以稱朕意頃者融風為沴北內夜驚朕躬自貶損上答譴告爾等職司警宫儲備無素昧於引咎偃然自安此言者所以不汝置而罰不容己也貶官二列尚服寬恩益務省循以圖報效可朝請郎充樞密院編修官兼國史院編修官兼實録院檢討官周震依前官特授知大宗正丞兼職如故制朕惟伯臣司宗古重其任國朝以同姓典屬籍必擇賢望為之二其制始於熙寧然秩清務簡號儲材之地以爾早負儒學屢奏民庸蔚然聲稱達於朕聽分教王邸載筆機廷皆一時妙選兹俾敘遷往贊糾合訓齊之事班高列丞將有試用益加懋勉以副柬知可朝奉大夫行大理正喬夢符特授行大宗正丞制宗正置丞秩清地嚴亞於中祕皆儲養賢望以須器使爾學術醇茂材識敏强司斷理官惟明克允典治詔獄守正不阿蔚然聲稱簡於朕聽訓齊屬籍之事命汝參領兹為敘陟未究逺猷優游其間朕將有試焉可朝散郎樞密院檢詳諸房文字兼國史院編修官兼實録院檢討官趙時逢依前官特授試將作監兼職如故制二監亞於列卿班聨彌峻而大匠省繕營之役尤號清簡所以儲養材望選授不輕爾宗枝挺秀優於政術把麾揭節洊著外庸為郎名曹列屬右府未足以究爾藴兹繇敘進俾長工正夫分職雖逸勞之異而用賢何日月之拘益懋逺圖嗣對褒陟可京西宣撫申忠翊郎吕渭孫斬違犯紀律人朱勝及捕殺作過人蔡飛等特轉三官仍令宣撫司更與升擢授從義郎制朕比攬宣司之奏謂爾能誅偏校之失律及適戍之尤無良者軍政當自是少肅矣肆嘉忠勇躐進武階然為將之道恩信為本至於誅殺不得已而用之祗若豫訓毋專尚威可朝散郎行將作監主簿孟導依前官特授行軍器監丞朝奉郎添差權通判溫州軍州兼管內勸農事賜緋魚袋趙師淵依前官特授行將作監主簿賜如故制戎器置監以飭武備而訓工程作之事總𨽻尚方職號清簡蓋儲養賢望以待器使選授不輕爾導名閥之彥材諝足稱飾以儒術爾師淵宗枝之秀學行俱優深識時務或敘進丞二或擢居簿正優游其間益懋逺業朕將有觀焉可朝散郎行軍器監主簿賜緋魚袋章燁依前官特授行司農寺丞賜如故朝散郎權發遣安慶軍府兼管內勸農營田屯田事章升之依前官特授太府寺丞朝請郎幹辦行在諸軍糧料院賜緋魚袋柯甲依前官特授行軍器監主簿制七寺二監之屬雖分職有繁簡逸勞之殊而儲養賢望以待選擇意則均也爾燁質性端靖更踐惟舊爾升之材術通敏自喜事功爾甲老成練達蔚有典刑金榖出納之司訓工程作之任或為丞二或居簿正各殫乃心往贊而長俾邦計優裕而戎備修飭咸迪厥官嗣有褒寵可館伴正使鄧友龍降一官制朕於侍從之臣待遇加厚然念賞罰之柄勸懲所關倘或近而或遺寧免人之竊議具官某夙推時望服在禁塗烏府抨彈獨高風采黃扉論駮助正紀綱期奮勵於逺圖每講明於大義有來使介爰命館延雖能執禮以折狂狡之情胡乃移文而致異同之失俾鐫一秩庸示至公勿因纎芥之嫌而怠激昻之志可館伴副使譙得遇降一官制乃者鄰使來庭朕命從臣館之汝實為之副使使指所在責不汝專獨不與聞之乎矧朱華列屬凡朝㑹詔相之事繄汝所素講也顧使逺人周章於進見之初謬誤於文移之際亦無以辭其罰矣姑從削秩尚勉後圖可中奉大夫直文華閣知太平州軍州兼管內勸農營田使河南縣開國男食邑三百户富琯依前特授中書門下省檢正諸房公事封如故朝散郎尚書都官員外郎兼國史院編修官兼實録院檢討官譙令憲依前官特授樞密院檢詳諸房文字兼職如故制二省出政之原西樞本兵之地朕嘉與二三大臣圖回治道而分寮設屬以彌縫其間非揚歷中外習知典章者不在兹選以爾琯名臣之胄器度詳華出領價藩課最可紀爰升宰旅付以糾正之權爾令憲儒科之秀問學深醇入踐郎闈廉靖有守擢贊幾廷俾專檢核之任其各殫乃心率厥職不以薄物細故軫廊廟之慮使吾大臣謂爾曰能嗣有褒陟往惟懋哉可朝散大夫賜紫金魚袋陳景思依前官特授江南西路轉運判官朝請郎江南西路轉運判官賜緋魚袋章良能依前官特授江南東路轉運判官賜如故制入聨扈從之班出領澄清之寄內外雖異眷注則均爾景思名輔之孫見聞廣博才術足以濟時嘗冠列卿二攝武部爾良能士林之秀問學淹該文章足以華國進陟螭陛寓直北門皆接武於禁嚴尚回翔於麾節朕惟祖宗用人之道必以事任詳試其能所以儲養望實之孚成就器業之美是用大江東西分命將漕爾宜體朕此意職思其憂凡一道財計之盈虛列郡生民之休戚均節咨訪施置罷行少須最績之聞即對褒延之寵益加懋勉不汝遐遺可降授朝散大夫充寶謨閣待制提舉建寧府武夷山冲佑觀賜紫金魚袋辛棄疾依前官特授知紹興軍府兼管內勸農使充兩浙東路安撫使馬步軍都總管賜如故制師帥承流本以寬大奉行為首㑹稽並海思得文武牧御之才屬此疇咨得於已試惟素望夙煩於鎮壓則赤子必善於撫摩其即祠廷往分閫制具官某謀猷經逺智略無前方燕昭碣石之築宫何愧海濱之至駕華山騄耳以行逺詎忘烈祖之知久矣踐揚蔚有風采爰擢登於禁從將旋畀以事功其才任重有餘蓋一旦緩急之可賴為吏太剛則折此三期賢佞之未齊朕惟甸四方而用俊民豈以一眚而掩大德其以濟南之名彥載新浙左之旌麾夫才固有其所長政亦貴於相濟往者盜鬻為害賴卿銷彌居多今聞懷綬以重來必且望風而屏去惟寬嚴之不倚庶操縱之適宜噫黃霸治如其前終歸長者粵人輕而好勇務在安之可顯謨閣直學士通議大夫樓鑰可特落顯謨閣直學士制素韠甫終緬想從臣之舊丹書來上駭聞吏議之新雖重惜於修名難獨寬於常典具官某時推宿望久服禁塗齒德寖高衆謂老成之彥丘園自適肆嘉靖退之風何倚廬在疚之時有移牘徇情之纍豈愛人姑息或牽邑子之言然紊國憲章致佚姦民之罪具閲有司之成案遂罹緣坐之微文其悉褫於華名姑小懲於私謁善不掩惡朕何心賞罰之施過斯知仁爾尚勉省循之誼可李壁除參知政事封贈三代并妻制曾祖母恭人郭氏贈隴西郡夫人鵲巢積纍茂延三世之芳象服昭華併萃一門之盛肆疇材於台路知流福於宗祧並舉徽章逺揚淑範具封某氏肅雍迪行聖善著儀族望華腴藹出汾陽之胄閨闈恪敬儷如冀缺之家信隂德之有基侈義方之重訓篤爾曾孫之慶為吾共政之良宜正號於小君用疏封於望郡魚軒錫命雖不及於生前彤管增榮尚嗣褒於身後告于幽穸服此湛恩可祖中任朝奉大夫知陜州贈宣奉大夫擬贈太子少傅宋考父之益恭驗世家之必達魯臧孫之有後信名德之可傳方隆體貌於政塗爰考源流於先哲肆頒命綍式顯祖風具官某學術貫乎古今行誼昭乎日月扶聖經而黜異論仲舒獨號於純儒為民牧而孚惠心子産尚存於遺愛偉百年之物望誠故國之世臣厥有名孫為豫良弼兹登庸於兩社宜追賁於九京愍章已峻於文階徽冊遂躋於宫保報本反始豈特慰蒸嘗之思自葉流根於以顯公侯之服尚歆異渥益大其門可祖母碩人史氏贈德陽郡夫人周諸侯纍功而致位蓋端本於召南齊大夫積世以為卿實發祥於懿氏眷時淑德燕及後人俶登亞相之班追峻層闈之寵具封某氏儉慈為訓法度是循婦儀不失於蘋蘩母範悉遵於圖史宜家宜室肆詒奕葉之休生子生孫皆聳熙朝之望兹得爽邦之彥載嘉流慶之源爰賁君封用荒郡社閨門垂則益觀積善之長廟室增輝永侈含飴之報昭於厚穸服我蜜章可父燾任敷文閣學士通奉大夫提舉佑神觀致仕丹稜縣開國伯食邑七百戶贈少師端明殿學士諡文簡擬贈太師餘如故儀圖近弼慨想故家眷岷峨萃人物之英而今古號儒猷之盛謀謨道術則二范相望於奕世文章事業則三蘇擅美於一門閴爾百年于今指李具官某心潛六藝望冠先朝著書立言自有家傳之述作執德秉誼不為時好之轉移繇秩宗禁近之班賦真館優閒之祿載筆得麟經之體遺編儼金匱之藏兹眉山之信書續元祐之正學惟厚施不食其報故流慶在於後人宜爾象賢弼豫共政肆追榮於徽冊用峻陟於維垣以增禰廟之光以昭世德之美作角招君臣之樂朕方倚贊於基圖續緇衣父子之詩爾足聨芳於譜牒益啓乃祚永孚于休可母秦國夫人楊氏擬贈秦國夫人朕觀商周得賢之盛悉有家傳稽春秋尊母之常亶繇子貴疇爾趨庭之彥屬豫秉國之均宜渙茂恩載揚遺懿具封某氏率禮不越積行有源慶澤占鳴鳳之祥淑範嫓鳲鳩之德相梁鴻以法度儼然舉案之恭教鄒國以詩書美矣擇鄰之訓體蹈姬姜之善胚胎房宋之良肆登任之方初盍推崇於所本胙封維舊寵渥用新益裒脂澤之腴不改車鄰之壤瞻言慈閫無復觀翟茀之朝配爾禰宫尚嗣有鸞章之賁其欽褒顯允極哀榮可妻碩人張氏封宜春郡夫人朕資賢政路方嘉朝夕納誨之良考象家人亦賴晨夜相成之助惟時淑德嫓我柄臣肆登贊於機衡用峻開於湯沐具封某氏行遵內則範著婦儀宋之子齊之姜動聿符於璜瑀鍾之禮郝之法居自警於針圖積和順以無違宜憂勤之有佐兹侈弼諧之寵宜均伉儷之榮荒奧郡以疏封畀脂田而示渥冠時命婦為郡夫人其躋翟茀之華以答雞鳴之善夫子之家治不惟觀法度之循人倫之化行抑有資風教之始祗承休渥益懋徽聲可太中大夫充寶謨閣待制知泉州軍州事兼管內勸農使候官縣開國男食邑三百户林采依前官特授知平江軍府事兼管內勸農使封如故制朕加惠侍臣緬懷夙望與其剖符於南服許以便私孰若移鎮於中吳俾之自近允諧公論申錫贊書具官某學識造微材猷經逺肅抨彈於憲府久著直聲壯屏翰於名藩嘗騰善最方內修禦備外固封圻惟今行闕之右扶實古長洲之茂苑端藉威名之震疊抑先惠政之撫綏非豫禁路之英曷任顧憂之託爰輟從於鄉郡俾典領於奧區爾其宣布上恩愛養民力節財用而均賦調屏姦惡以安善良使田里無愁嘆之聲京師䝉潤澤之及時為稱職嗣有褒章可知處州被召徐邦憲降兩官罷與郡指揮制朕惟為臣之誼在乎守道不渝儻高論以釣竒於效忠而奚取爾頃繇東觀出綰左符㑹最課之著稱俾昕朝之入對意其耳目所睹記或能利害之講明乃過為臆度之私曾靡究事情之實進說幾成於簧鼓防虞弗念於隂桑良駭豫聞姑令外補暨抨彈之來上知狂斐之焉逃其削兩階以靖羣聽祗承寬渥退省初心可內侍楊榮顯除御帶轉歸吏部制中禁宣勞嘉忠誠之惟舊外銓敘秩昭任使之至公具官某廉以律身恭於事上周旋庶務靡辭夙夜之勤謹毖一心坐閲歲時之久肆疇乃績深簡豫知俾齎閥於天官仍屬鞬於宸陛職寓承流之峻階參橫列之崇惟盡瘁可以答上恩惟能謙可以永終譽祗服休命毋忘訓詞可承議郎尚書戶部員外郎黃犖朝散郎尚書戶部員外郎費培並升郎中制尚書郎皆天下高選也而惟二千石久次乃正其秩序所以崇資望示至公爾犖名臣之裔蔚有賢譽爾培以法決科夙著吏能或列屬小銓或分曹民部第勞當陟咸俾為真歷踐既深褒進亦異其思所以稱朕命毋曰有司之彝典可通直郎充棗陽軍使兼知隨州棗陽縣黃叔溫特授朝奉郎制將臣失律士卒奔亡羣小剽攘邊氓驚擾爾以邑令還定勞來按堵如故戎幕第勞賞疑從豫躐晉三秩亶惟異恩益務撫摩以圖報稱可李弼解閣職轉官制朱華列屬日侍邃嚴其徙他官則增秩以寵之亶為優渥爾繇才選嘗司詔相兹領內祠之佚爰疏取幸之恩毋曰彝章盍思忠報可盧思恭刪修敕令供檢文字轉官制事之變而無窮法以隨而更制奏篇來上第賞有差爾嘗𨽻名齎伐以請俾增茂秩祗服優恩可壽慈宫額外掌箋奏成忠郎宋良輔轉一官制朕祗奉壽慈靡所不用其至凡奔走執事之人第勞懋賞雖微必録爾以刀筆吏服勤其間例當遷官吾不汝靳益思謹恪以稱恩榮可講筵所沈師顔循資轉一官制頃史觀以成書來上第賞有差汝服勤其間閲歲滋久今其任矣齎伐以陳俾陟文資益知自愛可隨龍壽慈宫祗應李穆轉一官制爾事朕初潛寖更任使序勞通秩亶謂優恩宜加懋勉以圖報稱可江西運判方銓以遞角違滯行下根究違限降一官制邊亭肅戒羽檄交馳儻非期會之嚴何取郵傳之速矧關軍計實𨽻漕臣檢柅不時已負曠官之責稽違奏報寧無慢令之嫌其黜一階以警諸道勿因微眚尚勉壯圖可大理少卿陳景俊奉使回轉一官制朕慨念神州勉徇交鄰之舊載馳使傳允資覘國之眀既専對之來歸豈勞還之可後具官某夙揚聲績自許事功久振譽於郎星比升華於卿月屬修歲聘遴簡時材見漢官之威儀深慰遺黎之望得月氐之要領具言亡敵之形庸奬賢勞肆增命秩其益殫於壯藴以共贊於逺謨可講筵吏人李世興等因論語徹章各轉一官制魯語終編儒臣第賞爾等咸以刀筆周旋其間俾通一階厥有彝典益知匪解期稱所䝉可閣門宣贊舍人張師游張允濟應奉人使一十次各轉一官制曾子曰動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣此言禮之足以針人也審乎此則凡朝㑹儀容辭令揖遜之節朕以朱華之屬司其詔相而使逺人觀焉意固有在矣積勤至於絫十增秩之褒厥有彝典朕以不汝靳也益加共恪思所以稱此哉可知廬江縣俞建部押民夫運糧過淮措置有方特轉一官制令長任民社之寄分護餉道至於越竟姑從權宜部使者謂爾條教素孚發軵有紀爰命進秩以旌爾勞其思盡職分之所當為且協濟吾事是為報效可封彥明樞密院禀議賜錢轉一官制朕申飭邊備搜羅將才每命機廷親加咨訪爾曉暢軍務議論可采賜金增秩歸耀私門益思奮勉以副功名之會可韓顯忠捕鹽賞轉一官制朕惟山澤之利未能捐以豫民而吾民以私鬻冒禁具獄來上每為之惻然然捕賞有格不豫何以示勸俾升一列用答爾勞祗服新渥其體此意可內侍楊旦轉一官制朕愛惜名器勸勵臣工獨於奉親務從其厚爾執事北內周旋兹久第勞應格敘進一階而銓曹考課得之者不與焉可謂幸矣益思共恪毋忝恩榮可奉使夏王德等轉官制敕具官朕比遣使軺往修鄰聘爾等俱膺材選俾從於行眷言萬里之勞何惜一階之進勉祗新渥益勵逺圖可錢廷瑞使屬充醫官轉官制比遣使軺往修鄰聘爾以材選俾從于行既竣事以無違豈勞還之可後肆頒懋賞爰陟文階毋曰彝章盍思忠報可魯之頤隨父宜奉使以醫官同行轉官制爾父頃繇朝列將聘殊鄰爾從于行名與賞籍閲時既久賫伐以陳躐進文階足以為出仕之寵可不思所以自勉哉可邢天從奉使職員轉官制朕頃馳漢傳逺聘龍荒爾從於行已事無爽爰俾一階之進用酬萬里之勞服我恩華勉而忠報可掌儀丁顯明等轉官制朕歲遣聘使每命典客之屬從於行豈特儀容辭令資詔相之勤蓋以往來傳道之習熟抑於覘國有助焉爾等祗率厥事馳驅良勞嘉萬里之言還俾一階之序進益思忠報毋忝恩榮可閣門宣贊舍人浙西副總管龍叔漢使屬轉官制朕歲馳驛傳往聘龍廷凡曰在行亦惟遴選爾以朱華之彥總戎畿內執羈而從不憚其勤逮此勞還可稽信賞其序升於勇爵以歸耀於行營祗服茂恩勉圖忠報可潛邸人范俊王昌應奉有勞各轉一官制朕愛惜爵賞以勵臣工爾等祗事潛藩亶為幸會序勞增秩抑匪彝章宜思忠飭毋使人謂朕私汝也可朝散大夫直祕閣兩浙路轉運判官程準依前官特授尚書户部郎中總領浙西江東財賦淮東軍馬錢糧制朕惟分道總餉事權匪輕今兩淮宿師責任尤重矧弊蠧猶在利源未疏非是通材孰寬思顧爾奮於名閥蚤著能稱司績銓曹吏謾浸革將輸畿甸心計素優俾還農部之聨往董兵儲之寄惟簡稽尺籍則可以舒供億惟考核賦程則可以杜隱欺使民不加斂而軍無乏興是為稱職可
