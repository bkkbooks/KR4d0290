body:
  text: 後樂集巻二十宋衞涇撰詩送蓋少卿晞之赴太平州三釡果何樂萬鍾豈云輕當知昔賢士及親乃為榮憶昨使東淮循陔蘭芳馨維先司徒公大篇寵其行喜我諧禄養勸之力身名俛仰四十載嵗月何崢嶸髯卿世濟美中外稔踐更勇退甫宴娛起家俄詔徵秩真二千石選授參陪京時哉春陽中光風助嚴程歌亷盛襦袴迎伋森斾旌矧伊太夫人九十顔如嬰朱轓從板輿此樂誰能并緬懷平生好相友真弟兄我今抱永慕撫舊秪愴情塗山古名邦官府號太平故秋適淫潦所至多疲氓政須事安集未可施敲搒長江戍水犀形勢足干城時雖急規恢不用邀功能君年壯於我宏圖在南溟報國豈憂晚事親宜竭誠道院日餘暇北堂慶方增戲綵供笑粲捧觴壽期齡孝立忠亦遂俗美政易成奏最亟歸來勿云厭承明張德輝以詩見遺需酒因次韻解嘲廷評一石了獄事謫仙一斗百篇詩君才盤盤壓今古肯使英名誇昔時濁醪妙理清有聖此意豈復達士疑我慚鼷腹怯鯨量咄咄隠几成書癡舟行遇順風畫船昨日吳江西風雨滿江鼓棹遲客帆過眼撇波去坐㸔舟子相猶夷今朝風忽發東北縦帆如飛揭百尺來者寸步不可前停艫悵望求弗獲風從何來天何為順喜逆怨人自私世間萬事亦爾耳乘除妙理君安知呈張德輝韞櫝君子藏枉尋吾道曲絶物忌太清狥世未免俗人言俗難醫我見清可濯安得直上挽天河一洗俗塵千萬斛為楊仲起壽天台高壓東南州秀鍾千古生公侯君才槃槃第一流學優顔閔卑由求天意端為斯文憂妙齡掉鞅從英游筆力挽强回萬牛金玉精美價未酬文章從古天地讐演起大業難延留騰驤萬里須騏騮行㸔大對悟凝旒擢冠多士騎鰲頭歸來雙親喜氣浮充閭佳瑞樂事修煙霄衮衮殊未休整頓乾坤攄壯猷䇿勲稷契伊吕周請公為酬白玉舟他年名遂高千秋却揖劉阮尋浮邱上親庭壽中興申甫來高崧卜人吉夢占維熊生賢應有造化工吾家積善慶所鍾公跨鸞馭從蓬宫襟懷廓落凌秋空居鄉恵愛先困窮譚笑萬戸生春融在官履行潔且忠此心須信天可通福善有道非濫䝉嵗寒乃知栢與松從今風虎依雲龍扶揺萬里乘長風結知丹扆恩厖鴻金貂赤舄華吾宗尊榮安壽仁之功從教綠鬢宜方瞳義方垂教慚倥侗青氊欲使揚祖風勉䇿駑駕追逸蹤它年樂事來迎逢燕山嘉譽難獨隆宴堂清曉祥雲濃槐庭晝永隂重重千嵗風月誰與同敬祝王母偕僊翁元日到湖上勲業須年少棲遅秪自憐若為車阨首未試翼垂天拭目㸔新厯傷心惜去年湖山一舒嘯春信滿梅邊次德茂沌中韻沌路隨江轉疎籬匝岸斜寄身千萬里慰眼兩三家老矣思為圃歸歟學種𤓰遥知荷鋤倦一酌散腰麻挽高宗皇帝章四首大業高千古斯文炳六經無刑深帝澤不戰夀生靈神聖非殂落乾坤有晦冥難名是天德刻畫謾丹青致治勤三紀怡神夀九齡玉巵傳漢殿寶冊煥堯庭慶事方頻舉哀歌詎忍聽萬邦惟戴舜億載奉慈寧厯數千齡在謳歌四海歸地雄元帥府天授上皇衣洗甲乾坤凈投戈日月揮成功有如此今古獨巍巍江右龍飛後臨安日暈時煌煌周禮樂肅肅漢威儀魚水君臣㑹耕桑父子嬉誰歟老文學重述中興碑悼外姑安康郡太夫人章氏有美夫人徳家齊周召来義襟賙梓里孝養備蘭陔爵視三槐貴年登九袠開追榮知未艾卿月近公台鷄犬相聞地湖山百里間自憐同子姓無復恃慈顔薤露聲徒切靈輀去不還擬為臨穴慟哀淚已澘澘悼倪尚書厯事三朝久清居一世尊心惟在王室手不炙權門横浦流風好香山逸興存經綸未渠展此意向誰論舊草揚庭制旋髙曳履聲胸襟忠憤切官職去留輕定力鰲為動浮言蜮自鳴太𤣥從白首性地轉分眀入館論心舊同朝託契長鱸鄉各歸去鷗水久相忘正喜山中隠俄傳橘裏蔵遺銘最竒絶讀罷淚淋浪長沙鹿鳴宴送諸進士楚材從古擅豪雄况是長沙世著忠鳴鹿三章新得句摶鵬萬里穏摩空科名直寄文詞表事業相期氣莭中畎畝平時憂國念盍将長策沃宸衷上皇太子壽有叙某竊以夀星八月而眀瑞紀秋銅之旦元良萬國以正禮嚴端冕之朝喜動君親慶綿宗社恭惟皇太子殿下畫堂毓秀朱芾呈祥屬金行沆碭之時禀玉裕温文之質承顔聖父六章光步障之詩繫望函生四徳過樂歌之賛與齡有永施祉方新某昔綴宫僚兹分藩閫莫與商山之老同侍賓筵願譜唐代之詩載揚儲徳謹賦拙律二首仰祝遐算千秋冒凟震威俯伏渙汗嘉辰鷄㦸瑞煙髙蒼震丕承九廟祧潮駕天吴彰海潤氣涵雲漢毓金昭分隂資善時稽古辨色含元日侍朝欲識斯心仁夀處謨参聖父五兵銷南極秋中夜有輝經旬先與玉衡齊祥開逰震天方眷徳懋元良日自躋風爽銅聲諧户御月眀銀鏤濕宫題遥知侍宴歡魚藻曽忝賔筵漫舞醯為樂提刑夀二首千里瀟湘秋氣清使星髙並夀星眀雲槎端向銀河上仙桂真從璧月生好善優優樂正子騰光熖熖李長庚㑹㸔初度稱觴後徑駕鋒車入帝城繡衣持斧按蠻荆三見門弧喜氣盈孟子能令棠粟發不疑更使漢刑平好將兩手摩銅狄長對三秋正玉衡聞道中宵思賈傅江湖未可老鱣鯨為運使蔡國博夀二首橘顆圍僊飽紫芝菊潭釀酒拍金巵九秋沆碭成功日六轡光華初度時試問江湖勞漕輓何如朝夕密論思預知來嵗生朝後便著宫袍拜赤墀西山南浦氣葱葱夜擁長庚粲碧空惠露昔霑江漢表使星今照斗牛中晚粳已喜霜前熟宿麥應從雨後豐十一州人還得飽繡衣夀斚與民同古林邱支笻來訪古林邱轉盡山腰俯碧流峭壁千尋懸石磴蒼崖百尺護龍湫行人跡斷煙常暝過鳥聲閑意更幽小憩已銷塵俗慮溪山奇絶是兹遊晚晴雨斷風回忽報晴山顛初日掛銅鉦雲烟藏迹千峯翠草木增華兩眼明桑野枝空蠶杼歇溪泉溜急水車鳴鳥啼花笑渾如喜此去山齋只一程沈氏書堂東山風景壓東吳更築書堂映碧梧詹尹詩存家有寶齊齋記外更無圖洗除紈袴為緗帙掃蕩膏粱入澤臞早晚歸舟行霅上青燈深夜聽伊吾五日子刻立春客中春到不知春庭草青青入眼新對酒可無人作伴照書却有雪為隣雕盤玉笋傳生菜寶勝金花錫近臣我已棲遅寧事事有誰曾為嘆長貧次德茂用惟直南樓韻眼明仍見大江浮貪㸔青山倚柂樓落日鷄豚秋保社輕風蘋蓼晚汀洲長征倦馬思夷路不下驚鷗避急流亦有琅玕何所贈漫歌平子側身愁山行後觀及通鑑五代之際成敗得喪廢興之跡因為感慨用前韻溪山適興且閑行緑蘚蒼苔任㸃裳㸔鏡已侵雙鬢碧憂時每覺寸心傷馳名擾擾終安用浩飲陶陶計亦長千古英雄誰可問纍纍邱隴水茫茫次韻呈與叔兄野塘古岸飽經行風雨塵埃笑滿裳尊酒清江君意厚片帆千里客懷傷出門求益謀何拙掃几觀書味更長歸去飛篷試回首一川煙水正微茫次韻高仲貽贈別金盌輕抛入釣船夜寒侵被不成眠近傳奏疏三千牘今見新詩十二篇故國音書憑過鴈江城烽火照晴天移舟鐵甕城邊去信與名山舊有縁月夜登吳江垂虹平湖萬頃天無風試上垂虹月滿空豁目直窮煙障外諸峯渾出有無中混同天地纎塵絶倒影星辰萬象雄却笑三山遊汗漫恍然身世到蓬宫為師席李上舍去智夀四首當時騎氣擁函闗奕代清才擅謫仙鼻祖嬋嫣有餘慶至今名世更生賢屢將大手占倫魁槐市英聲早四馳肯與鱣魴爭尺水鵾鵬行矣化天池道義須知耐嵗寒論心還喜臭如蘭龍鱗幸許同攀附乞與春風借羽翰美景良辰幸與同瓣香聊以祝南豐它年妙斡洪鈞手盡納羣生夀域中夜坐深山五月清無暑露氣漙空午夜寒草際鳴蛩更强聒滿懷秋思寄毫端次與叔兄山行韻隂雲凍合不成飛行李留連嵗律遲山色宜晴更宜雪別來應有憶山詩與進叔弟䇿杖山行遣馬還孫氏掣電追風古見稱駑材空負渥洼名何如手植青藜杖雲屨風裾自在行登寺中蕭疎極甚不見一僧獨坐雲堂數刻口占蕭條古寺僧何處癡坐方床午漏長怪我溪山慣來往不惟魚鳥解相忘張嵓拙軒􅀢寺用壁韻幾陣涼風清不盡一天秋色渺無邊僧房好處閒窻牖把定山椒紫翠煙別吳荆溪八載江湖甫召還深言應又忤天顔九重不見饑民色只㸔先生兩鬢間去年靈麓未空寒一客南歸不足歎學子今翻辭使斾歸來只得片碑㸔家數文章有路尋雲韶殊世不殊音小生不幸生來晚纔識先生識水心金鰻井詩上彊鎭游精舍寺見金鰻井至一所崎嶇鳥道古木隂翳仰視巖石壁立如飛來峯氣象下枕溪流為龍母潭聞與鰻井相通鰻井由來嵗月深泓澄一鏡絶塵侵要觀變化神功妙㑹見飜為旱嵗霖開化寺前古木數株葉密隂繁極可愛繫舟其下賦此古木蒼然幾嵗周摩空老幹䕃溪流舉頭未見征帆下來向清隂繫小舟憶環谷古梅百花頭上春光到雪壓霜欺意更奇嵗嵗倚欄相望處水邊竹外最南枝故園一別換年華客裏㸔花更憶花昨夜西窻無限月伴人春瘦一枝斜小山遊翠峯寺攜枕席寄宿僧堂僧甚多而不與人相接戲成癡坐禪闗日亭午靜㸔博山香一縷欲知世上炎與涼三扣金僊三不語欲至淛江送子寔聞潮早不果行小詩寄別尊酒清江欲語離事多八九苦參差飛潮更捲征帆急盡作西牕去後思聞和叔撫琴蓐收傳令待殘更斗轉參横露氣清誰弄瑤池三尺玉怪來萬壑動秋聲皇帝閤春帖子芳意傳梅信東風到栁邊王春在除夜明日是新年綵勝黄金縷青絲白玉盤内家迎淑節先奉太皇歡遲明魚鑰九門開警蹕聲清繞殿雷穆穆天顔應有喜捷書新自北邊來沈沈廣殿靡遑安玉食丁寧減太官野宿貔貅三萬竈重裘應軫鐵衣寒壽成惠聖慈祐太皇太后閤春帖子一德坤元厚三朝母道尊含飴供樂事戲綵見重孫北内風光別僊家日月閑紫皇天下養金母住人間栁色侵宫瓦花隂覆綺疏鵲爐煙馥郁賸閱妙乘書銀旛㸃綴鬬宫嬪小字横斜篆縷新嵗嵗詞臣供帖子從今便數八千春文孫親上萬年巵姒婦嚴粧五翟衣不用都人須數蹕内庭跬步即重闈刁斗轅門五夜深思齊文母正闗心身臨大練無他費湯沐先捐鉅萬金皇帝閤端午帖子五日天中候南風物阜時三邊寛大詔億載太平期御服齊官獻生衣暴室供金箱初進入一一耀黄封日轂過亭午金徒緩報衙邇英催晚講分賜壑源茶靈開玉壘靜無塵聖澤新覃雨露匀束縛仇頭藏武庫梟羮不用賜羣臣逺人新有約和書並塞狼煙指日無聖主憂民軫宵旰宫中猶綰辟兵繻壽成惠聖慈祐太皇太后閤端午帖子清禁傳呼近紅雲擁紫皇菖花浮九醖請祝壽無疆邊頭傳吉語井絡報平安今嵗端辰別慈顔一笑歡綵縷新纒臂靈符稳揷釵承平多舊事閑教小宫娃雙人翠艾垂朱戸三角瓊糜護箬衣聞道内家行樂祕先將節物奉重闈深宫永日鎮長閑心靜多繙蘂笈篇侍女身留香案側旋燔金餅炷爐煙人間無處避炎蒸身在瑤臺最上層學士大書金字帖宫中巧篆絳綃繒原跋先公叅政文集七十巻皆樵執簡膝下隨録日藁襲藏者也先公平昔著述尚多而樵自入仕居侍旁之日少於是藁録之備諸弟之留侍者有焉孤苦餘生悉未裒集樵兹來守永偶公暇因以所藏者纂類校讎又命館賓嘉興貢士常南仲相與覆校敬鋟諸木而以櫟齋叔父湜所編年譜冠諸帙首伊欲罄先公之遺文具載備録以至行述諡議史傳隧碑併俟它日續鋟木云紹定壬辰冬旦嗣子樵謹書
