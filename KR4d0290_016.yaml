body:
  text: 後樂集卷十六宋衛涇撰啓及第謝知舉王尚書啓楓宸肅穆甫披踈直之衷臚句飛騰俄占英髦之右上動九天之鍳下慙一日之長非據之譏不勝是懼竊以自科目之習既勝而學術之用不明初以為進身之階巳乃無致君之略措之事業而謬戾責之節義而抵牾故雖取天下之盛名未足為君子之能事欲掃末流之弊豈無拔俗之人因其巳至之資持以不移之操益厚所養庸觀厥成老於世故則蒹葭既霜之餘逹於時宜則刀刃發硎之始既成身而進德可尊主而庇民惟其功用之不渝庶乎名實之相稱如某者猥從末學出簉英躔非卓爾而不羣敢褒然而為首顧家傳之訓誨與師法之講磨嘗原聖賢德行之大端粗識古今理亂之至要比承清問輒進瞽言謂更化以善圖成濟時之急務貴毋失纍朝立國之本意以振起斯世積廢之治功懼不足於對揚致誤膺於親擢靖惟忝冒厥有夤緣兹蓋恭遇某官才過萬人學關百聖夙隆重望蚤掇殊科惟其素負宰輔之姿故能厭服縉紳之議久踐揚於中外結知眷於冕旒持荷雨露之邊聽履星辰之上纍更柄任未究逺猷將以乘日月中興之機思汲引山林特起之士豈期愚鈍夙荷陶鎔方天府之獻書既䝉推擇及春官之較藝復預選掄兹超越于等夷遂許傳於衣鉢顧惟成就端有始終某敢不仰止前修服膺盛德力勉欲行之學思副難居之名庶無負於巳知或少禆於世用一得而足嗟小器之易盈十駕以馳尚大賢之是效謝黃參政啓興四方之英俊咸造于廷擅一日之科名遂為之冠視等輩以有靦對寵光而若驚竊惟古今治忽之所關獨以風俗苟且之為甚常揆救時之䇿莫如更化之宜必也端本正源使天下回心而向道非曰變政易令俾斯民聳聽而駭聞苟徒取髙皇帝之法而紛紜則正與董仲舒之說為背戾某比承清問冒獻愚言謂當世之可行即漢儒之遺意然而後進狂妄末學謬踈雖有草茅之忠豈無科舉之纍惟聖上勵精之久而羣賢輔治之勤既有經邦之人上開敢諫之路某雖不敏志有所存蓋嘗間家訓之嚴亦頗有師承之自惟其委曲而詳說是為直諒而不諛既共上於奏篇遽叨塵於異等自量何以而得此哉兹蓋伏遇某官當路於時事君以道聳巖石具瞻之望持菁莪樂育之權彥聖有技者每至而必容耿介自持者何言而弗受雖居槐棘之貴不棄菲葑之微致兹孱庸亦與陶冶某敢不仰體公朝作成之隆㫖茂明學者逺大之成規勉副難居之名不為易盈之器惟忠與孝期力行孔孟之言抱義處仁尚可見魯衛之士謝田宗簿尤郎中李編修羅校書陳郎中啓獲從廣延冒上愚對旅塵一攬首玷臚傳拜解褐之寵光撫躬榮甚顧造廷之英俊揣巳惕然竊惟禮樂詩書四術之異教文學政事兩科而同歸若昔大猷思皇多士行修于家者必可用于國言出乎身者必可加乎民尹雖處畎畝而耕每懷味道而負鼎說未繇版築而舉巳欲濟時而作舟卒克遂其壯圖今可質之載籍良以素養任萬鈞之重故弗苟售規一組之榮自更秦厯漢以來有發䇿决科之纍圓冠方屨飾步趨之陋容斷簡殘篇傅傳注之碎義或張皇而不提其要或猥并而不别其條以取世資以追時好方肆言而靡諱意其抱王佐非常之才逮既貴而蔑聞曽不過俗吏所為之務華罕副實行多違心此期年而化反指為書生之空談而三道之要未免涉辨士之詭說上以是砥其捷徑下以是梯于榮階至求剴切而沃心疏明而逹體告嘉于內拳拳秉愛君之誠展采乃僚亹亹識當世之治輒自奮于網羅之外竟莫屑于程式之間致兹賤儒之名唱于叔代之議斯亦為士者過也豈但有司之責乎我朝循規摹于三年略繩墨于一日考詞章之精粗以度其氣質之厚薄酌論議之崇庳以占其局量之淺深紬繹所傳典刑具在景仁嘗耻于身獻文正不矜于志盈凡平生慷慨而聳聞即始進雍容而槩見上方憲章祖武收攬人豪思得前輩之實材庸副明時之盛選如某者咸謂迂濶自知朴忠少維究懷于簡編壯頗妄意於竹帛然而位非百辟烏能陳四方之綱職非九卿安敢建萬世之䇿恃主聖而容直忘巳賤而貢誠念鋭于有為則迎合幸進者得以釣爵祿而丕績弗用成志厭于無補則畏縮却行者得以苟嵗月而盛德不及究欲調和元氣而四逹在汛掃頽風而一新初何識知妄有論建豈期偕圭璧之薦遂獲近冕旒之光貸其狂愚冠于等級並逰竊笑果揚粃之在前諸老駭觀胡積薪之居上叨踰臻此稱塞若何兹蓋恭遇某官持美以效君好彥如出巳操修緶以深汲借朽株之先容嘉其吐詞似梗槩而足取庶乎措事或方略之可條故于對揚為之第奏致令孱品辱在殊倫某敢不期報以䝉求適于用涉道甚淺愧未窺游夏之淵源託儒自文誓不效𢎞寬之潤飾謝蕭尚書葛舍人黃校書顔祭酒啓冒進愚言方切空踈之懼大踰始望躐居英俊之先退自揣於么微實難任於光寵非前逹巨公與為之宗主則後生晚進何自而作成雖據非宜尚知倚重自科舉之習既勝而學術之用不明初則以為進身之階巳乃略無濟時之䇿措諸事業而謬戾責之節義而抵牾故雖取天下之大名未足為君子之能事欲振末流之弊豈無拔俗之人因其已至之資耻為易盈之器益厚涵養愈堅操持老於世故則蒹葭既霜之餘逹於時宜則刀刃發硎之始既誠身而進德可尊主而庇民惟其體用之不渝庶乎名實之相副如某者猥從末學出造英躔非卓爾而不羣乃褒然而為首顧家傳之訓誨與師法之講磨嘗原聖賢德行之大端粗識古今治忽之至要若有逺志不惟近圖顧擇詞之欲明而用力之不足豈期初步忽玷殊科此蓋伏遇某官主張斯文振作多士當朝廷規恢之日正人物興起之時謂軟熟之語或失於太卑而矯激之言又幾於過甚惟其雖直而不訐乃為有用而可行弗圖謬妄之文端被敷陳之力某敢不茂明至意克勵所存豈特一時毋纍大儒之題品尚期他日罔辜聖主之明揚謝宇文給事啓冒進愚言云云此蓋伏遇其官主張斯文振作多士以夕郎批勑之手為宗匠取材之規謂軟熟之語或失之太卑而矯激之言又幾於過甚惟其醇正而有用是為直諒而不諛弗圖謬踈之文獨借品題之力夜誦三人之對加以權衡朝出一語之褒皎乎氷鑑致兹孱瑣端出陶成某敢不益厲所存仰酬殊遇至于感激所期無負於巳知將有建明或可少施於實用謝平江知府謝右司啓承詔上愚奏篇稱善擢於常品畀以倫魁得之非宜惕若自愧國家左賢右戚前疑後丞萬世之䇿治安下公卿博士而議四方之民疾苦令郡邑守相以聞朝有闕政既熟數於前野無滯材可深拱于上猶且廣延修潔之士急聞切直之言咸造王庭親諭朕志輟一日萬幾之不皇暇詢三皇二帝之所繇昌與夫風俗之樞機首以道法之總要何勞求謙受也如此凡以抒下情非淵識谹議而有餘且曷稱上㫖矧復攀許蔡宋陳之雋軌冠楚秦閩粵之英材匪拔其尤必玷斯選如某者乏鄉曲之譽非郡國之良蚤嘗窮經邈未涉道壯欲論事戅不逹權髙弗能開口取軒冕以從富貴之圖卑不能俯首服耒耜以作溫飽之計徒思素業之罔敢墜故負初心而為此遊適丁比興遞在推擇進或譏於太鋭行寧憚於少遲洎逮試於春官復見收於執事好非今樂知音巳分於難逢學乃古兵遇戰豈期於輒逞然狂惑不足以奉對幸聖明能受於盡言故上古之事引經以對而不敢以寡陋辭而當世之務悉意以陳而不敢以避忌隱甫仰塵於燕覽俄首預於鴻傳榮雖及親辱實在國逺日畿而言邁瞻雲舍以攸歸閭巷駢觀謂天私於爾室朋游交賀指地秀於它山由其無聞是以有託巳量自知其弗稱人言詎識其自來今日所䝉大夫之賜兹蓋恭遇某官豐規範窳清檢律貪馳四牡以歸周秉一麾而出守下車布庠序之教比屋聞弦歌之聲蓋常衮移風當時僅得歐陽之一士而文翁成化厯載始出司馬之諸儒欲示魯多姑從隗始某是用交修不逮增益未能盛名之下難居當落華而取其實君子之愛以德願浚源以等所歸庶畢此生不孤大賜回余狀元謝及第啓造庭之對士得危言親䇿之初上尤加意謂千載逢辰之幸實四方刮目之時必有偉人首應盛舉恭惟簽判狀元七閩挺秀六館蜚英早推文虎之雄出應飛龍之㑹惟素明於治體故式契於上心人驚一鳴咸避三舍某適陪著位先快臚傳南省程書見講明於經術髙軒引卷辱藻麗之辭章感嘆之深敷宣罔既回鄒狀元謝及第啓妙柬儒英作新文氣大春秋尊王之㫖獨探其端偉慶元進士之初卓為之冠恭惟簽判狀元琳琅峙秀奎壁含輝天與非常之才人知致逺之器屬朝家敷求於偉厚俾習俗盡革於澆浮果以國士之無雙置諸天下之第一由公選而為舉首足昭董氏之潜心以治經而位封侯行邁公孫之徒步鼎來富貴不可及也壯志功名捨我誰哉某濫簉詳參與披傑作十年往事慚拜寵之略同今日得人自立科而未有遽辱染雲之况徒懷報玖之誠謝語不工喜悰則倍回莫狀元謝及第啓名魁淡墨第錫彤墀率由舊章雖為布韋而少屈出乎其類蓋舉簮紱而未聞國慶得人士歆稽古恭惟簽判狀元鍾巖壑英靈之氣挺圭璋特逹之資學有淵源識窮壼奧周官兼習儒宗未遜於賈逵漢事洽聞典式尤詳於應劭屬當今日大振斯文訓言親灑於丁寧好尚欲歸於醇正宜詞場之巨擘視科第如摘髭素稱萬選之錢卓冠千名之佛位辭第一孰踰籍甚之聲恩拜非常不異褎然之首鸞棘巳更於民事鳳池佇贊於皇猷某猥以踈庸濫塵參考緬懷世德昔嘗並於英游益振家聲令獲觀于盛舉投珍過禮裁報難工惟有襲藏傳諸永久回夏狀元謝及第啓伏審拔萃春官拜恩天陛席珍以待夙推獨步於璧流鼎足而居果見先登於金榜聲聞四出觀瞻一新恭惟簽判狀元文章夙成學問精詣素號萬人之敵蚤升三舍之優發言為詩義深明於有六以意逆志思每蔽於無邪是惟器識偉厚之賢仰副訓告丁寧之㫖既天心之允協亦物望之攸歸雖詞華取士從古以然而科目得人如公蓋寡淵源師友諒不負於生平砥礪功名更相期於嵗晚某自惟末學獲與斯文蘭臭同心所願論交之久箋題銜袖益欽陳義之髙謝語不工喜悰則倍回曽狀元謝及第啓龍飛在天首埀親䇿龜為前列足見嘉謨惟當寧虛懷之初尤衆人聳目之際名參鼎甲色動紳緌恭惟簽判狀元學術純明天資夷淡江山秀氣不徒纂組之工風雲盛時將有進為之志肇承清問卒上忠言有此先登出於親擢豈特奏篇之爭誦見謂修能之莫量固知異時必有逺業某適陪著位實快臚傳明月夜光何俟品題之力髙軒引卷第慚謙損之多感歎云深敷宣罔既燕賔館謝燕啓姑射神凝望仙居而咫尺鎬京飲樂侈主禮之便蕃弭莭承恩班荆有喜又惠孚邦國禮遇臣鄰眷星駕於農郊俾雲需於候館有兩君之反坫繼好方隆走三命以循墻拜嘉如隕又越疆而使有嘉四牡之歸致館如初重拜羣臣之燕周旋主禮整暇王程信篤交歡惠加成禮未央宫殿逋違龍鳯之姿既醉威儀即聽驪駒之闋永言道阻敢怠心存真定府謝燕啓長驅北斾辱館大都髙㑹西池秩筵再命仁深逮下德茂懷人恤逺道之征驂侈多儀於宴爼行百里者半九十敢怠周旋以萬期而為須臾肯懷縱肆又畢昴之躔未更百舍雨露之施來燕中塗恩厚送將義嘉聘報馬煩轡殆克知行路之難酒旨殽嘉不異在京之樂戴洪私而甚寵復成命以遄歸謝花燕啓雲近蓬萊屢飭鎬京之燕花迎劔佩恍回燕谷之春駿發輝光布昭慈惠為酒食以寓合歡之意於芝蘭而明與善之心灼灼其華巳驗二南之化油油以退尚循三爵之規汴京謝燕啓出疆載質方休挾日之程設席肆筵均被需雲之渥車馬頓清於行色豆籩首辱於司存播物無垠交鄰有道義篤兩君之好惠加六轡之濡宴以示慈即啓東都之道路臣能承命佇瞻北帝之闕廷汴京謝燕啓雲龍北闕初微專對之能車馬東門又辱序賔之燕去如始至說以忘勞體君子之長人送使臣而以禮譬諸飛鵲夢巳繞於南枝曾是放龜意尚餘於左顧朝見畢謝在館燕啓上萬年之觴若覩繞樞之瑞饗四方之客丕承在鎬之恩候館退朝賔筵錫命禮嚴秋覲樂廣春臺金罍深念於勤勞玉食靡專于威福出稱警入稱蹕未逺清光宴有好飱有陪敢奸大貺謝射弓燕啓射正巳而後發弓矢斯張宴序賔而以賢禮儀既備與天持滿度地居材軫思一介之來侈示五侯之制不能而辭以疾敢纍有司既飲而盡其心尚歌雅什回范提幹光啓薦諸公朝允合搢紳之論謝于私室尚循世俗之文非所敢當秪以為愧伏惟某官懿文通貫奧學逢原翠竹碧梧籍甚名家之秀紅蓮緑水藹然入幕之聲既步武于日邉盍明揚于天上至珍橫道人爭得以為榮健翼摩空子何往而不到某稔聞雋譽未覩英姿為國舉賢竊有後時之嘆逢時遇主當宏先世之規庸玉其成乏瓊以報潭州回鄉貢進士謝解啓寵膺鄉賦榮與計偕咸謂得人有光勸駕貢元先輩淵源探學錦繡摛文頴脫囊錐名定登于千佛唱傳臚句事復踵于三元貽翰相先贈言敢後良深期屬罔究敷云回轉運司進士謝解啓星臺得雋天府登賢貽翰相先贈言敢後某官漕元箕裘嗣學錦繡摛文萬里鵬程忘筌蹄之舊迹九賓臚句指衣鉢之新傳尚聽臚音嗣陳賀語福州回鄉貢進士謝啓鄉曲貢英士有得色賢能偕計人無間言貢元先輩筆底波瀾胸中丘壑抗三萬卷之勍敵傑作巳先聽十一刻之漏聲奏篇亟上傳誇殿陛增輝里閭某幸殿兹藩屬當勸駕辱摛詞而莫報儲慶語以嗣陳回免解人啓藏器以須稍淹雋軌得時則駕亟暢逺圖貢元先輩文謝町畦學窮根柢年少氣鋭盍早際于風雲業成行尊為後進之模楷兹奮龍津之躍倚觀鵬路之翔某猥辱曵裾更貽銜袖念單詞之匪報儲慶語以嗣陳回轉運司進士謝解啓朌綸拔士倚重皇華鼓篋程能敻膺妙選漕元先輩敷腴學殖渾灝詞源繇抱負之瓌竒宜發揮之烜赫四方輻輳豈徒角勝于鄉閭九陛臚傳行即褒先于俊造某既觀盛事且辱摛詞感欣併集於微衷期望更存于嗣嵗有官人云某官漕元家聲赫奕世業豐腴既仕學之兼優尚功名之未愜棘闈掉鞅不難角勝于布韋楓陛傳臚行即褒光於俊造宗子云屬籍蜚英巳髙雋軌使華論秀更聳榮名某官漕元才邁飄然德晞卓爾宦而隨牒夙知職業之修試有鎖㕔兹預賔興之選回太學進士謝解啓虞庠教育學成行尊周詔賔興名髙實稱監元上舍胸中武庫筆底天葩陪國子先生之游蚤宜脫頴上春官宗伯之選兹果彈冠繇發䇿以决科亟蜚英而騰茂回國子監進士謝解啓虞學直溫之教允謂美成周鄉賢能之賔肆偕妙選監元學士詩書素業禮樂名家熟臺閣之機豈徒濡染就文章之伎聊復笑談巳鶚舉于秋風即鵬摶于春浪回武學進士謝解啓夏官拔士將應世須秋賦程能卓膺妙選監元上舍學原姬孔業寓孫吳繇抱負之瓌竒宜發揮之烜赫巳知得雋豈胡簋之果殊㑹見絶倫驗貂蟬之自出回湖南帥鄒給事啓故里數年頗得蓴鱸之趣新綸三錫又喧竹騎之迎有愧循墻幸諧接軫恭惟某官經綸自負富貴不移去國甚輕空費萬牛之挽得君徒重屢遷五馬之榮每歎鼎科近多厄㑹凄其三紀孰為嵗月之深惟我二人分任江湖之寄如老僕巳踰於分量在明公當勉於功名地褊長沙不待漢宫之妙舞曉行湘水便騰楚岸之離歌歸㑹風雲洗清河洛某逺勤損翰敬佩撝謙憶飛鴻踏雪之邊曽留指爪將孤鶩落霞之候又快歸心回知撫州劉郎中啓一麾出守喜棨㦸之遙臨十國為連幸官曹之相接方期執訊遽枉惠音伏惟某官鼎貴名門震時才具典型文獻壽草木于平泉步武班行軋星辰于碧落銀符屢綰琳館多娛肆疇巳試之庸式重于蕃之寄雙旌入境五袴興謡無事尋幽逸少之墨池亡恙得間訪古半山之釣石猶存姑崇二千石起家之榮即膺三萬户封留之寵某如雲出岫似雪乘舟冦殘師老之餘籌邊動止訟理政平之暇憂國同之回知台州曾郎中啓叨被帝俞出分郡寄念交符之云始于斯何先幸擊柝之相聞其則不逺恭惟某官器函剛實體具中和逺繼聖門家學之傳力究君子躬行之本其德則三者備矣于道則一以貫之發而為典則之文施之成豈弟之政作朋三壽信有神明之護持斂惠一州未符中外之傾屬而某夙承緒論兹竊餘光未遑問訊之修遽拜誨音之重其為感愧罔既敷陳回史知府彌忠啓月宿南斗偶當初度之逢日薄西山第愧此身之老何煩錦句想記綈袍恭惟某官風月胸襟雲霄氣宇文華甚富况出守于文江吉德夙多更為藩於吉水因推殘賸加賁衰遲某方念劬勞難勝褒拂語諸賔客俱免事於禮文畏我友朋乃欽承於嘉惠回王知府啓婆娑榆景羞遇弧辰特沐貽緘巳為過禮屬多軍事不講禮文若煩妙句之寵加又匪至情之相與有懷感佩容面控陳回京知府銓啓老得長安頗愧懸門之矢客來臨賀更貽銜袖之珠細讀名章難當厚意某官婆娑珍館傲睨繡鄉江西之𣲖甚清源流有在松坡之詩未逺伯仲相傳因詠古風見華初度某衰遲已甚褒拂非宜廢蓼莪之篇適深傷感得木桃之惠莫辦報誠回羅察院相啓還第數年自樂吳江之冷起家十乘莫回漢詔之溫慚巳去而復來喜舊交之新貴恭惟某官儒科雋望畿甸名流若素官于朝曾識此君之異告嘉猷于后盍居邇列之榮以所守之堅剛且入司于彈搏旋有虎豹在山之勢自無豺狼當道之虞一時之公是公非少煩區别九陛之汝為汝翼即可階升某逺辱損箋第深巽謝諸公登臺省國有人焉歸老任乾坤吾知免矣回王監簿衡仲啓十乘元戎强顔再至一鄉善士委汗相先喜甚發函情同傾蓋某官璧雍宿學玉筍名流生龍劔之墟斗纒紫氣仕虎符之地澗擁紅泉聿髙知止之標旋賦間居之樂鈞軸有舊除命將新某稔聽月評式欽風誼弛於負擔第瞻橘隱之清及未治行猶見蒲輪之召回張教授自明啓分梱㑹藩有愧本來之面目埀弧初度更慙巳老之頭顱厚意謙勤大篇鼎至某官充然抱負久矣材名指洪崖挹浮丘頗多逸氣發天津至西極尚屈雄圖肯簸弄於明珠相摩挲於朽質某巳當晚節所慮冥行張老之頌美哉既承嘉惠榖城之書何若乞保餘年回傅學録知過啓皇覽初度甫愧前修我有嘉賔過形善頌粲若夜光之美增其暮景之華受言藏之巳敬緘於緹襲匪為報也姑槩寓於柔箋餘俟靣陳尚蘄心照回葉通判澄啓老夫耄矣有慙朱紱之初大夫賢哉亦侈烏絲之寫美如金玉妙協宫商方飛紫塞之烟塵盍罷珠簾之歌舞虛其所應既莫被於管絃卻則不恭第有光於篋笥回史通判復祖啓癯然一老生而逢沂水之春厚甚二車歌以比嵩髙之什珠盤耀日錦瑟聞聲顧興念于劬勞豈當䝉於褒拂三章重拜愧非知己之辭十襲謹藏庸識同寅之好回俞通判遷啓余髮種種頗負蓬弧辦句多多有來别賀明月之珠簸弄蜚霞之佩頡頏荷眷意之過勤愧衰年之莫稱似難講此正飛塞北之塵何以復之便入江西之𣲖回蔡通判汝揆啓不知老至羞看六矢之懸奚以文為乃枉二車之况知官逰於道院即𣲖入於江西屬際多艱謾勤清詠既無折衝樽爼之勝盍罷鳴鑾歌舞之娛其夢非熊曾莫恢於武略且麾唳鶴急往助於王師無以效酬第知藏感回胡檢正元衡啓重來橘社堪憐華髮之生近有梅園深軫左弧之念名章甚寵厚意難任某官閲世浮雲養間白日向來藏壁多傳授於伏生今此建儲定招延於商皓齒雖耆舊句甚清新某自視歉然無可慶者况周家之遣戍於我何安以李絳之同年冒而下拜回衆幹官啓揆豫初度取數巳多凡我同盟過情相譽觀陽春之寡和宜肆夏以升歌赤壁飛灰珠簾罷舞懸弧無取以資射士之行唳鶴奚為往助王師之勢所宜返璧恐誚投珠敬十襲以深藏愧七襄之不報回丁提刑必稱啓雪鬢餘生月正居於南斗星軺名使時方憩於東湖特費清吟徒增愧色某官名髙璿漢興寄珍臺十八公之松舊聞入夢一千年之鶴今見歸來自是當家從而壽我某劬勞在念褒拂非宜慮日暮之倒行莫能至逺愛夜光之可照敢不拜嘉賀林提刑介生日啓凱風應候仰壽宿之髙華彌月呈祥增使星之炳煥朋來燕賀丕輯鴻禧伏惟某官久簡帝衷蚤登郎省揚鑣日甸財用足而刑罰清澤施天民謳歌形而福祿至届逢初度宜衍修齡某竊庇皇華增欣丹悃載瞻英簜阻奉流霞之觴竚聽絲綸進列甘泉之侍賀趙提刑生日啓星臺紀壽麟趾開祥峻惟嵩髙届斯榖旦清庥所逮歡忭可知敬惟某官大雅不羣咸亨有慶晉躋中祕式旌報政之勞洊畀皇華益茂祥刑之績平反植于門之德耆艾騰魯頌之聲宜衍修齡浸登大任某阻陪壽斚輒奉慶箋菲物將誠别方疏目併惟容照寵以笑留又英藩育粹壽旦迎休預對潜陽弗踰再宿敬想屬部胥為歡聲載惟某官協于發生具是溫厚望著羽儀之右仁行繡斧之間彼長庚一星瑞亦鍾於同姓凡先甲三日訓實謂於前期超冠復亨庸標鼎盛申衍千秋之算峻參兩禁之游某阻致一觴愧慿尺削不腆薄物粗如副箋併惟眷私寵以笑領通新知平江府沈侍郎皥啓伏審寵繇漢從薦鎮吳邦神爵頴川為多以歸黃霸竹馬并州之信載迎細侯和氣素孚先聲愈偉恭惟某官兩都循吏元祐故家久入承明宜布親聞之德意昔試馮翊具存巳驗之民功佩新渥之絲綸植舊藩之牙纛尺五天之近凛若威顔之不違十萬户之間歡然治理之亡恨翩哉惠肯慰彼來思秩增自有於主知履聼將因於祖武某退安衰境猶玷釐祠無由伺朝市之音遂亦闕緘題之敬忽聆求舊光究惟良受滕公之一㕓愧非薤本荒陶令之三徑益借棠隂是用微𠂻倍深多慶回新平江府卜教授啓接軫桑麻悵未瞻於犀表育材芹藻欣獲邇於鱣堂敢圖如水之門遽辱飛雲之翰伏惟某官識髙衆雋學富三餘含英咀華文章肆於外探賾索隱德行閎其中盍登瀛洲尚淹泮水自此升矣寧久嘆於寒氊行將見之即寵承於溫詔某自惟閒散竊慕聲猷側聆講席之新不勝折履之喜增明眊眼飲觀絺繪之辭載飭報緘殊愧瓊琚之詠有懷慶幸莫既敷云賀李大諫生日啓辰㑹角亢之宿時正仲秋光聨牛斗之墟祥開初度式燕以術俾熾而昌伏惟某官挺挺真諫臣之風飄飄謫仙人之氣忠言逆耳共推先見之明勇退急流茂著于蕃之績久安真館未究老謀倚需黃髮之詢勉為蒼生之起某濫分符竹再覿桑蓬細酌流霞滿挹西山之爽以介眉壽遙占南極之星賀沈侍郎生日啓簮紳之望輝映明時弧矢之祥慶符吉月恭惟某官班聨上雍屏翰金吳凝香森㦸多應物之清風均賦簡條有樂天之善政十萬户䝉福既共此以為良八千歲為春不期然而自壽願乘華旦歸輔巖宸某久偃䕃庥實深頌詠杖藜懶出莫陪賀客之趨食芹猥將聊寓野人之敬尚惟鑒在惠以容存又書雲物于觀臺祥開翼旦瞻使星於南極壽紀誕彌慈惠所覃頌聲交作恭惟某官器凝峻整德秉粹和望髙持槖之班權重分符之寄棠隂戀舊復興廉袴之歌芝檢催歸蚤思鄭履之聽積添線日申衍椿齡某借潤餘波阻登賀厦有懷善頌輒奉慶箋不腆菲儀具如别録賀沈侍郎正旦啓太清精厯屬開定閏之正上雍親臣方屹在畿之屏嗣彰績用滋擁靈和恭惟某官仁熟三吳化宣兩漢寓北門修撰之綴帝念不渝符南國蔽芾之思民安惟舊即還規地遂峻履星永應元㑹之鼓鐘胥贊中興之宗社某幸郊潜之樂只繄㕓芘之勤斯蒹葭兮水一方合并雖阻椒柏之觴千嵗頌禱曷勝併惟𢎞明有以鑒體賀趙提刑正旦啓厯更出甲對轉物之歲鈞運啓逢辰頒在畿之使斧受天純佑為民具依恭惟某官望振宗盤部安澄轡慶宣五極桁楊自偃於列城化積三年藜藿不搴於深谷班通東壁之祕趨上北辰之居茂乘泰亨遄見晉接某休蹤江冷獲芘星臨龍節不遐阻前趨而道謝鱗書謹始因後賀以通誠欣頌之深𢎞明或鑒賀劉提舉正旦啓厯攽積閏並受端元一建常平上宣惠利宜綏景福用對明時恭惟某官動合道彛蔚為使範朞年而變藹于隰之休聲千里曰畿稱有華之寵寄聿迎嵗策遂秉郎蘭寢階列從於甘泉永㑹三朝於太極某漁鄉息影龍節埀光春動盤椒聊致一詞之賀波平船葦不知數舍之遙併惟𢎞明有以鑒領回趙提刑賀正旦啓王正次春巳盛發生之氣皇華遣使聿宣寬大之書恭惟某官德協陽中性全仁內並迎首祚增介蕃釐一郡無刑既上禆於乾施大廷有遇願亟應於泰交某阻胥賀以詹馳辱駢詞而勤寵永言愧謝莫既精忱回劉提舉賀正旦啓夏正頒春先於受嵗周詩遣使及此建臺敬惟某官政助發生德培溫厚常平行水式尊六百石之權有詔賜環即相萬年觴之慶某尚阻盍簮之賀乃勤削牘之先奉謝匆匆曷紓悃悃賀劉提舉生日啓犧畫陽全麟祥慶紀結蟠仁氣誕育時賢部分畿日之右扶人仰使星於南極恭惟某官諏民選重將指寄隆惠和隨漢傳之馳歌頌洽周原之膴臺居晝永允為遐壽之符坤載物齊足驗丕平之器即言還於四牡備去從於六飛某遲莫婆娑光華映借敢後一箋之遣以伸千嵗之祈不腆彛儀粗如副墨甚慙猥菲併冀麾留又先中秋之七日維嶽降神罄西浙之百城式歌且舞伏惟絪緼育秀沆瀣融清宸筵久想於鳯儀澤國何淹於龍節食貨通而兼足禮樂逺而有光喜初度之載臨宜蕃釐之狎至枕中寶笈益延久視之方天上玉堂㑹錫遄歸之命某獲安野處實藉使華聲馳薄陋之彛敬致壽昌之祝宣慈儻鑒容納為榮賀趙待制希懌生日啓周系發祥詩美維城之固漢基增厚史稱盤石之安屬秋杪之嘉辰慶宗英之挺世恭惟某官風猷凝逺德履粹夷賢㑹聖期允符休運家情國禮參對殊榮方宣績於近藩行疏恩于兩社載臨誕日罙介壽祺某屏處窮閻阻陪賀紱莫效勤拳之祝敢陳菲薄之儀伏惟台慈俯賜鑒察賀趙提刑冬至啓土圭測景載臨雷復之辰玉節乘軺宜萃雲升之祉恭惟某官英聲勉碩德望閒平鋤姦允協于隂消奬善有同于剛長既聨華於內閣仍因任於外臺一道春風巳著平反之效九門曉色行躋獻納之班某息影江郊庇身臺宇奉觴為壽阻靣致于賀忱慿楮修詞第心馳于善頌回黃教授賀冬至啓嶰竹鳴聲權輿生氣泮芹將采戩榖斯辰比姑效于一觴兹何勤于駢牘敬惟某官中和育性溫厚契仁屬亞嵗借陽春之輝聞諸生待時雨之教氊寒官舍夫豈久居鵬擊天池㑹當橫騖某老安漁社塵滿筆床道長之賀無文甚慙縟施姻盟之私不置聊寓謝音賀沈侍郎冬至啓荔挺藝生式應仲冬之令栁舒梅放允將小至之詩當賢牧之逢辰宜修靈之介祉恭惟某官中和布政清靜寧民峻陟禁涂親結冕旒之眷重來茂苑增多襦袴之謡順履陽剛即儀樞輔某偷安閒館席庇崇牙薦壽稱觴莫踵賀塵之後修詞削櫝第懷善頌之私賀趙提刑㦛夫冬至啓五紋弱線行占晷運之長六轡皇華坐想風生之望格于畿甸具是休嘉共惟某官焜耀天支澄清星使以刑期無刑之志足召氣和于知至致知之微諒猶日益願乘來復亟奉勞還遂階兩禁之華庸副斯言之屬某收蹤祠祝席庇郊居榖旦初陽適慶逢于道長葦杭數舍爰敬寓于神馳不勝欣愈併惟體亮賀趙尚書汝述冬至啓嶰筒初氣兆生物之一陽漢輔列侯對統天之亞嵗易明復吉禮重履長恭惟某官源流慶霄屏翰行闕瞻麟趾之公族星聽巋然相虎門之王朝辰猶懷止願乘和應亟踐弼諧某老矣家居依於㕓庇雖愧無拔薤之告而喜耕買犢之春數舍馳心不果雜朋簮之賀五襦盈耳尚惟增繡線之工莫既欣愈併幾省察回嚴州趙知府啓聞弦歌之聲昔焉幸㑹處江湖之逺久矣闊踈翰貺維新襟期如舊伏惟某官仙潢演秀儒級蜚英稔中外之踐更深聖人之簡注入儀郎省方向顯榮出撫侯藩雅安平進眷言瀟灑之郡允為名勝之區山髙水長逺或想於子陵道邁德融近可宗於文正宜從容而坐嘯佇華要之趣登某老矣退休臞然多病竊觀祈嚮之語曷勝銘悚之懷清風來故人愧七襄之莫報癡兒了官事惟二天之是依摧謝有嚴鋪陳罔既通新知平江府王司諫啓出處雖殊久相孚于意氣披承未遂惟竊仰于光儀喜建屏之更新顧騰箋之可後恭惟某官老而益壯厚以鎮浮諫垣久著乎直聲帝扆夙深于妙柬事至能應笑談斯措國於安功成不居寵渥乃從天而下方左符之特起旋休命之鼎來峻陟蘂珠增嚴畫㦸第恐追絳之召亟崇聽履之班某屬耳郵傳傾心旅賀今有五袴與邦人偕樂于詠歌願受一廛俾野處獲寧于庥䕃允懷慶抃罔既宣陳賀王大卿生日元春啓頌獻椒花正紀四時之始門埀蓬矢適先二日之期喜動周畿歡騰吳㑹伏惟某官雅標山立榮問川流正笏崇班凛難進易退之節剖符近輔藹去思來暮之謡逢初度以順履端延修齡而介豐福某依仁有幸贊慶為深瞻茂苑之雲莫效一巵之祝近長安之日即歸三事之聨僣羾菲儀庸將芹敬倘埀容頓實倍感榮賀史丞相生日啓恭以天基稱夀甫踰三八之辰魁輔挺生亶應半千之運君臣慶㑹朝野歡呼恭惟某官道大擎天功髙夾日訏謨定命開社稷無疆之休談笑折衝磨崖石中興之烈三陽交泰初度載臨拱龍極以調元階符同耀衍龜齡而備福神嶽比崇某退惟閒散之蹤上賴燮和之庇傅說之用若霖雨願永濟於蒼生吉甫之頌如清風更賡歌於峻極潜馳菲禮敬侑夀觥賀史丞相除少師啓伏審顯膺鴻册祗對寵光崇列朝端晉極二公之峻衍封邑賦益昭異數之隆慶溢昕庭歡騰率土恭惟某官識窮今古身佩安危獨運廟堂得蚤正素定之策再扶社稷增重煕纍洽之休國無危疑人用靜一乃若茂陵躋祔􅟹清廟之多儀悉繇盛德感通輯洪文之祕寶所宜褒表以穆聽聞然昔拜師垣嘗控免情詞之懇切而今長孤特詎足為位望之重輕蓋上慰於前靈亦下存於舊典不可辭者其以是乎功更藉於祗歡踰汾陽二十四考之盛道愈光於寅亮恢周家八百餘年之基某隱約自安尊瞻不替屬聆明制倍激欣悰和堯民擊壤之歌實均舞蹈勒唐士齊天之頌尚獲形容
