body:
  text: 後樂集巻五宋衞涇撰内制賜端明殿學士簽書樞宻院事督視江淮軍馬丘崈臘藥勅書勅卿以右府之耆英専督軍之重任臘寒方力籌幄良勞頒上劑於寳奩示中宸之宻眷益資冲輔勉究茂勲賜成都潼川府夔利路安撫使程松臘藥勅書勅卿以西樞之望撫全蜀之師方栗烈之蕭辰實注懐於舊徳往頒珍劑益輔冲襟賜資政殿學士知潼川府費士寅臘藥勅書勅卿望隆廊廟任重翰垣屬寒籥之方深軫眷懐而良厚趣頒嘉劑以介珍調賜兩浙東路安撫使錢象祖臘藥勅書勅卿望髙兩社任重十連屬氷雪之蕭辰睇蓬萊而注想宜頒良劑加衞冲襟賜端明殿學士湖北京西宣撫使薛叔似臘藥勅書勅卿視儀政路増峻中權方栗烈之蕭辰實注懐於舊徳往頒珍劑益輔冲襟賜工部侍郎兼樞宻都承㫖樞宻行府參贊軍馬吳總寳謨閣待制湖北京西宣撫使陳謙臘藥勅書勅卿席寵禁塗贊謀督府方嚴凝之届序念匽薄之良勞宜有珍頒以昭眷遇賜鎮江府駐劄御前諸軍都統制山東京東路招撫使郭倪臘藥勅書勅卿内嚴巖衞外總師干當寒籥之蕭辰錫寳奩之名劑益綏爾衆均識朕恩賜主管殿前司公事真州駐劄策應兩淮郭果臘藥勅書勅卿總嚴凝之衞提犄角之師屬此盛冬錫之名劑其推上澤均洽士心賜侍衞馬軍行司主管侍衞馬軍行司職事戚拱御前諸軍都統制田琳董世雄趙淳御前諸軍副都統制馮拱陳孝慶魏友諒彭輅毋思畢再遇臘藥勅書勅汝等分總戎昭力摧冦虐屬嚴凝之在候念蒙犯之惟艱爰賜奩珍式昭恩意賜宣撫使程松銀合湯藥勅書勅程松商飈届候邊地蚤凉眷吾斗極之英盡撫坤維之衆比聆凱奏深奬竒勲既虎視於三秦諒鷹揚於萬旅惟兹多算悉禀成謨載疇玉帳之勞爰錫寳奩之劑益加攝衞迄濟規恢賜御前諸軍都統制王大節孫忠鋭夏藥勅書勅汝等任隆將閫威憺邊陲渉九夏之炎歊撫三軍而勞勩攽之珍劑賁以寳奩其推廣於惠心俾均霑於部曲賜御前諸軍副都統制魏友諒莊松王鉞王大才等夏藥勅書勅汝等分綰兵符克清邊祲貳元戎之統御履九夏之炎蒸爰攽奩劑之良庸示轅門之寵賜御前諸軍副都統制馮拱夏藥勅書勅馮拱汝禁旅分屯方肅清於海溆采薇久戍嗟載渉於炎蒸嘉而控禦之勤軫我眷懐之切特攽珍劑庸示異恩賜寳謨閣學士通奉大夫四川制置使知成都府楊輔銀合夏藥勅楊輔卿夙推舊徳就撫蜀都雖渇見於儀刑念莫踰於望實倐更炎序彌軫眷懐往頒奩劑之珍式助生經之衞勉寛憂顧佇俟來歸賜池州駐劄御前諸軍都統制秦世輔銀合夏藥勅世輔汝兹膺親擢往䕶上流念征馭之良勞屬炎歊之届序往攽珍劑以衞生經其欽體於眷懐尚克修於戎律賜興元府駐劄御前諸軍都統制彭輅銀合夏藥勅彭輅汝甫膺親擢往貳戎昭念征馭之良勤屬炎歊之届序錫之良劑示我眷懐尚寛西顧之憂亟底邊陲之靖賜江州駐劄御前諸軍副都統制兼知光州劉光鼎銀合夏藥勅光鼎汝分提禁旅往䕶邊城方征馭之良勤屬炎歊之届序亟攽珍劑以衞生經其撫勞於兵民以肅清於氛祲賜端明殿學士中大夫知興州充利州西路安撫使兼四川宣撫副使安丙夏藥卿勲書彜鼎職亞機衡分重寄於坤維憺皇靈於闗塞諒精忠之有相豈寒暑之能侵往攽奩劑之珍庸示宸旒之眷賜建武軍節度使沔州駐劄御前諸軍都統制王喜夏藥卿峻陟齋壇寵膺將鉞親提王旅克復秦關當凱奏之還歸諒暑行之勞勩爰攽良劑式示至懐賜侍御馬軍行司職事戚拱夏藥卿駔駿分屯䕶我陪都之重貔貅久戍履兹炎夏之辰載嘉扞禦之勞深軫眷懐之厚往頒靈劑尚體茂恩賜御前諸軍都統制趙淳畢再遇田琳等夏藥汝等任隆閫制勲茂戎昭屬氣序之炎歊撫兵民而勞勩攽之珍劑賁以寳奩其推廣於惠心俾均霑於部曲賜御前諸軍都統制董世雄夏藥汝禁旅分屯夙䕶上流之險采薇久戌載更癉暑之炎嘉而扞禦之勤軫我眷懐之切特頒珍劑庸示茂恩賜知樞宻院事督視江淮軍馬張巖夏藥卿制勝籌幄夙倚紫樞之望撫師江滸屬臨朱籥之辰諒底定之有期嘉旋歸之匪日爰賜上奩之劑式昭中扆之恩賜資政殿學士知潼川府費士寅夏藥卿舊弼撫藩夙倚折衝之略朱煒届序載嘉盡瘁之誠爰軫眷懐徃頒靈劑庸輔節宣之適迄圖綏静之勲賜華文閣學士中大夫知江陵府湖北京西宣撫使宇文紹節夏藥卿出藩入從復宣閫外之威當夏問涂俶履離明之序周爰靡止嘉歎不忘頒上劑以輔和宜疾驅而毋憚賜寳謨閣待制四川制置使吳獵夏藥卿宣威北塞方疇漢水之勲分閫西陲復借雪山之重炎蒸届候徒御實勞錫上劑之珍良輔冲襟於匽薄賜督視行府參贊軍事沈作賔夏藥卿通班禁路贊畫元戎就分北固之符適踐南訛之候賢勞備著睠軫良深宜攽奩劑之珍往致冲襟之輔賜沔州駐劄御前諸軍副都統制李好義銀合夏藥勅好義汝比建殊勲分提勁旅屬撫循之良勩適炎燠之御辰其攽奩劑之珍庸示眷懐之渥益殫忠藎迄靖邊氛賜象祖斷章批答口宣有勅朕疇望經帷登賢政路士喜端人之復用民欣舊徳之來歸其勉罄於謀猷勿過形於遜避賜李壁斷章批答口宣有勅朕妙柬儒猷晉參國秉巳趣攽於成命實允穆於師虞其畧謙函亟秪寵渥賜張巖斷章批答口宣有勅朕儀圖舊徳擢冠鴻樞方衆聽之具孚宜壯猷之亟展其蠲巽牘以對龍光宣勞將士口宣有勅卿汝等克修戎職秪䕶明禋眷言匽薄之勞深見忠勤之助迄臻熙備良用歎嘉賜皇子榮王告口宣有勅朕敬共明神稱秩元祀眷言上嗣克覿祲容宜先祭澤之頒益衍璇源之慶賜嗣秀王告口宣有勅備成熙事誕舉慶條有嘉族老之賢克相宗祈之典兹頒茂渥共對閎休賜少傅吳環告口宣有勅竣祠重宇沛澤剛辰載嘉肺腑之英聿相豆籩之事其秪餕惠茂介神釐賜少保謝淵告口宣有勅告成元祀敷錫蕃釐嘉時左戚之賢克相上儀之舉欽承祭澤亟報恩徽賜太尉楊次山加恩告口宣有勅宗祈間舉熈事備成眷言姻屬之賢宜被神釐之賜亟秪寵渥益介壽祺賜三省官滿散瑞慶聖節道場乳香口宣有勅誕序發祥臣工歸美嘉元台之率屬集勝果以儲休爰錫寳熏用旌善禱賜太尉李孝純加恩告口宣有勅卿以母黨之賢相宗祈之禮式遵彜典茂舉慶條晉荒公社之封仍衍爰田之賦亟秪命綍庸壯戚藩賜保成軍節度使譙令雍加恩告口宣有勅合宮竣事宣室均釐眷潛邸之舊臣陪近班而相禮宜敷惠術亟服恩綸賜保信軍節度使吳琰加恩告口宣有勅季秋序正宗祀禮成眷戚畹之雋臣實外家之尊行宜膺慶澤秪服恩綸賜師垂批答口宣有勅卿地居尊屬任重宗盟比旌使範之勤庸晉孤卿之秩已孚成命其畧撝函賜師垂告口宣有勅眷時伯父夙糾宗盟屬祖后之因山參史華而蕆事式遵彜典晉眡亞師其秪服於鴻私尚永綏於燕譽賜前參知政事錢象祖到闕傳宣撫問并賜銀合茶藥口宣有勅朕渇思舊弼召自東藩三節延佇於疾驅一葦喜聆於利渉迎加郊勞寵錫奩珍賜殿前司滿散瑞慶聖節道場乳香有勅環尹輸忠式際發祥之慶華封效祝載嘉歸美之誠錫以寳芬助其善禱賜歩軍司散滿瑞慶聖節道場乳香有勅提羽林之衞圖報上恩祝虹渚之祥載嘉臣節爰頒寳炷用表忠忱賜馬軍司散滿瑞慶聖節道場乳香有勅華渚流虹慶承天祐建章飭騎䖍效嵩呼載續異熏用循彜錫賜樞宻院官等滿散瑞慶聖節道場乳香有勅十月為陽千秋紀節廼睠鴻樞之輔聿嚴鷲嶺之祈頒以異芬表其忠悃又有勅卿等任隆樞極心拱辰居祝君壽於南山演佛乘於西竺肆攽馨烈庸奬忠勤賜樞宻院官瑞慶聖節御筵酒果有勅星渚流祥共伸善頌雲天洽燕爰錫豐恩特遣分朌聿資樂愷賜三省官滿散瑞慶聖節道場乳香有勅誕序發祥臣工歸美嘉元台之率屬集勝果以儲休爰錫寳熏用旌善禱賜三省官瑞慶聖節御筵酒果有勅堯年伸祝百辟同誠周宴示慈多儀疏渥載朌芳㫖庸表龍光賜三省官等滿散瑞慶聖節道場乳香有勅卿等位冠臣工心存君上屬流虹之紀節輔靈鷲以祝釐爰錫寳薌助成聖㑹文武百寮奏請皇帝聽政不允批答省表具之朕追懐内殿問安之時嘗見三宮席慶之盛念兹皇祖實貽後嗣之燕謀屛予一人獨有重闈之慈覆欲報含飴之徳甫諧移御之歡不弔昊天降此大罰共寢門之色養為日幾何愴奕世之母儀於今盡矣朕屬以元孫而秪遹思昭大孝於繼承即廬次以執䘮煢然在疚臨法宫而親事非所忍聞所請宜不允文武百寮再奏請皇帝聽政宜允批答省表具之朕自罹東朝之憂甫畢西階之殯故不釋絰帶而過毁方執通䘮雖内修政事以攘邉未遑總覽而封章狎至忱請弗渝期俯徇於輿言以仰承於遺㫖夫自庶人而至天子孰無慈蔭之思然執小節而阻羣情亦懼繁幾之曠勉遵聽理良奪孝誠所請宜允文武百寮三奏請皇帝御正殿復常膳宜允批答省表具之朕惟成湯罪已以興邦宣后側身而復古退循菲徳慨慕前猷雖邊祲之潛銷豈予心之遑逸夙夜秪懼當如敵國外患之猶存上下交修益以鴆毒宴安而自儆洊覽復常之奏備嘉尊主之誠臨大昕之朝敢忽苞桑之戒御中昃之食罙深嘗膽之思兹勉徇於輿情尚共圖於丕績所請宜允明堂大禮祭饗册文昊天上帝伏以清明上圓照臨下土三光循軌五位時序惕惟冲眇嗣承歴服夙夜秪畏罔敢怠豫物成季秋遹嚴報本犧牲玉帛於薦純㓗饗道助順惟皇無私迄圖駿功祈永休命皇地祇伏以至哉坤元厚載無疆母育萬彚配天其澤合祛修報秪率彜典黝牲黄琮貴純尚質來顧來饗此心對越蠢兹荒裔亂我中土百年於今民厭其徳闡靈右順永清四海太祖皇帝伏以五季濁亂腥聞於天篤生聖人時維烈祖肇造區夏挈提皇綱無疆歴服貽我後嗣施及冲昧獲膺傳序季秋宗祀陟配上帝思昭大謨圖復舊物綏予孝子克成厥勲太宗皇帝伏以宋有成命二后受之於昭宗徳克篤祖功混一文軌乾坤清夷丕哉基緒惠我無疆肆予冲人獲主禋祀歴吉季商禮嚴並侑顯承謨烈紹復是期對越在天迄用大介明堂大禮告五嶽文伏以諏辰商律蕆事總章維嶽之章靈氣攸宅敢徼貺施迄濟休成告四瀆文伏以涓吉季商蕆事重宇瀆祗有赫潤澤無窮敢覿隤祥迄相禋祀明堂大禮前二日朝獻景靈宮分詣奏告中殿後殿文伏以秪修宗祀夙欵閟宮惟真館之䆳清仰神靈之安妥躬嚴朝獻分命侍祠敢冀鑒觀黙垂綏佑祭九宮貴神文伏以誕修邦禮躬嚴重屋之祠敬事天神分敕九宫之薦庶靈斿之來格綏下土於丕平祭社稷文伏以大饗合宫百神咸秩瞻言五土徳被生人有國是尊即壇蕆事式嚴昭報永格靈釐祭后土句龍氏文伏以嵗屬親祠禮嚴宗祀欽惟土正有徳有功生民具依克禋克祀牲醴以告其永降康明堂大禮前二日奏告太祖皇帝太宗皇帝配享文伏以秪承鴻業間祀總章昭天地以合祛奉祖宗而並侑乘季商之穀旦闡列聖之彌文先事告䖍仰祈靈監明堂大禮前一日朝享太廟祀七祀文伏以親祠路廷夙祼清廟有嚴列聖之饗聿修七祀之儀神其來歆相予熙事明堂大禮畢謝五嶽四瀆文伏以仰乾坤之覆幬惟嶽瀆之髙深迥隔封圻阻修望秩兹備成於熙事舉昭報之彞儀尚祈陰陽之休迄底侵疆之復奏謝恭淑皇后文伏以席累聖之休靈承景命卜季商之吉間舉宗祈逮兹禮典之成均被神釐之錫睠言淑範嘗表中闈瞻兆域以興懐薦苾芬而昭謝祭謝東嶽東海南嶽南瀆文伏以陽館肇禋既備一純之薦陰靈默相敢修三望之誠爰秪率於舊章用丕昭於景貺更祈孚佑永芘函生祭謝㑹稽山永濟王文伏以季秋中辛總章大饗賴羣靈之隂相迄熙事之備成瞻言名山近在左浙往致齊明之薦庸伸昭謝之誠太皇太后諡册寳前一日告於太廟伏以詒謀燕翼愴慕層闈議行誄功受成清廟爰登徽册永著鴻名秪率舊章以八月一日上大行太皇太后尊諡曰成肅皇后不敢不告太皇太后諡册寳前二日奏告天地宗廟社稷太乙宮伏以太皇太后婦儀母範燕及三朝節惠尊名貽諸百世廼羣臣請諡於宗廟曰成肅皇后登崇寳册明著徽稱典禮有嚴先期以告太皇太后標劄神穴除去有礙窠木籬墻奏告諸陵表伏以慈儀厭世秪飭寢園神穴因山宻隣隧域屬庀工而經始敢先事以告嚴冀上妥於威靈庶黙敷於䕃祐皇帝行啟奠禮伏以慈壼纒哀寢陵蕆事甫臨逺日爰啟菆塗肆陳六綍之儀恭致兩楹之奠攀號罔及摧割奚勝皇帝行遷奠禮伏以甫違祖載已次壽原當復土之有期痛終天之永訣恭陳奠斚式薦哀誠太皇太后梓宫發引前一日初更總䕶使行夜奠禮伏以釁結層闈哀纒率土既畢方中之利倐臨祖載之期廞衞夙陳奠觴夕薦三靈不弔五内俱糜太皇太后梓宮發引掩攢文伏以制畢因山時臨掩隧神升絳闕上參列聖之遊地拱阜陵穆卜千秋之永攀依靡及哀慕奚窮成肅皇太后虞祭禮畢行卒哭文伏以日御遄流飈游浸逺既卒無時之哭爰遵易吉之儀兹卜剛辰祗成薦事太皇太后梓宮發引掩攢宫奏告安奉御容文伏以文母上賔漢塋蓋祔屬幽宫之揜隧即别殿以寧神對越在天永綏厥後遷祖宗神主於初獻㕔權奉安前時奏告伏以祖后賔空壽原叶吉庀役將嚴於主祏奉迎期妥於神游先事告䖍惟靈安妥前時奏告别廟伏以祖后賔空壽原叶吉妥修崇於主祏將升奏於神游先事告䖍惟靈安妥前時奏告四祖伏以重闈棄養將升奉於神游太室考儀爰修崇於主祏方工徒之庀役祈列聖之妥安涓日惟良先時以告前二日奏告天地宗廟社稷宮觀伏以祖后恩深追思罔極宗祧事重升祔有期載嚴齋告之誠仰冀妥安之佑奏告宗廟伏以慈養永違甫畢壽原之奉神遊如在將升清廟之嚴敢告先期尚祈歆顧祭告太廟土地伏以棲神廟祏庀役事嚴方繕治之云初冀威靈之黙祐先期以告迄惠於成權奉安奏告伏以太室考儀將嚴登祔有司庀役式謹繕修爰蠲告於齋庭覬妥安於主祏嗣嚴寅奉永底宴娛
