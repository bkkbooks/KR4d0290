body:
  text: 後樂集巻十四宋衛涇撰申狀牋書初任辭免添差差遣申省劄子某伏覩四月七日三省同奉聖㫖殿試上三名朕既試以文藝亟欲觀其政事可特與添差差遣仍釐務者竊惟添差之設朝廷所以優賢今自舉行之初宜得碩材以為時用如某一介草茅問學荒淺何以稱塞况在某尤有所未安者比以諸生獲奉大對不自揣其狂僣嘗言當今節用之䇿有及于添差妄授之弊今某偶玷兹選儻或不知辭避冒受非常之寵是某躬自言之而躬自蹈之也非惟有愧于私心誠恐得罪于公議欲望鈞慈特為敷奏將某所合該前件指揮權賜寢罷仍舊設一合入待闕差遣庶幾少安愚分冒犯鈞嚴某下情戰栗竢命之至第二劄某伏凖省劄以某控免添差恩命聖恩隆厚未賜俞允跼蹐兢凌若無所容竊惟添差指揮朝廷所以昭示至公寵遇寒畯徳意優渥某一介㣲賤苟義所當受何敢喋喋更為矯飾之言徒以晩學嘗聞父師之訓每謂士之大節莫嚴于始進人臣之獻言必期于可行某比于廷對貢草茅之愚僣議及此誤䝉㧞擢豈以其言或有可採今若輒冒榮寵身違其言筮仕之初無以自信他日將何以事君區區此心實不遑安期于得請欲望朝廷力為敷奏權依累舉體例授一合入待闕差遣使某獲全辭受之義所有前件恩命朝廷異時舉行亦未為晚疊冒鈞嚴退竢斧鉞第三劄某昨具劄子控免添差差遣迄賜敷奏五月五日凖省劄備奉聖㫖依已降指揮不得再有辭免者某竊惟辭免恩命其禮有差一命而上辭不容以至再再則從列之臣乃可然亦不敢過是惟執政大臣始許至三即止躐等則僭矧某一介踈逺驟䝉朝廷㧞擢何敢干犯名分輒言辭免區區愚懇徒以義廹於中布露情愫望相公以成就後進而已且朝廷䇿士豈徒專尚虚文臣子獻言亦豈志在一第取之空言將以施之實用而言之可採亦庻幾少裨於國政也某於奏篇之首嘗言陛下即位以來六䇿多士亦嘗採其所言而見之施行者乎豈科舉之士華文少實而不足於用歟抑臨軒賜問特循祖宗之故實而僅不廢歟皇上過聽擢寘首選方竊自幸以為一得之愚或有可用而公朝取士將不至于應故事而已也今其言縱未䝉朝廷行之天下豈不能行於某之一身耶近時添差之員非不為多添差之官非不為州縣之蠧先儒有言天下之官豈以徇故冗耶前日之命在朝廷誠為異數在某亦不敢多辭向非對䇿僭言及此則某即已祗受何敢求異於人恭覩詔㫖亟欲觀其政事乃君父使令之意人非木石孰不激昂奮勵思以寸長稍自表見而某所以力辭而不知止者誠以筮仕之初不可不謹一言之出猶與行違異時有大利害孰數於前豈惟搢紳鄙辱朋友訾笑其亦何以自信於心則是一旦自棄于言行不相顧之地而為小人之歸也夫既為小人之歸後日聖君賢相雖欲湔袚録用事勢有所不可公論有所不容寧不上負作成之恩下辜期望之素則今日之亟用適所以為某終身之屏絶也仰惟朝廷清明陶成天下之化所以砥礪人材振起頹俗實惟相公之任而使一士之初歩冒居其所不安内懐欺名之愧外貽識者之譏貪竊寵榮不顧名義自今日始豈吾君吾相之心哉是敢不避呵譴披瀝肝膽上干洪造伏望鈞慈察其何人而敢甘冒僭越之誅固拒君父之命是豈過為沽激自取好名之誚隠之于心實有不能自已者司馬温公與吕申公辭起居注章凡數十上温公始辭而復受之申公以同辭獲命温公聞之曰前日非朝廷不能從但辭之不力耳章再上竟不果受某之不肖非敢自附于先哲之萬一然賢愚之分雖異辭受之義則同炳然此心猶如皦日終冀相公垂聽鑒其出于中心之誠從容一語開陳於黼座之前俾如所請授一合入待闕差遣不惟得以全㣲臣始進之節抑足以見公朝待士之禮亷恥之維益張辭受之義益著豈獨小已之幸抵觸威嚴無任戰慄俟命之至祕省乞補外申省劄某一介疎逺問學荒拙濫塵冊府已踰三年每懼無所補報亦欲更歴民事勉効綿薄兼以私計不便欲望朝廷檢照更迭指揮特賜敷奏陶鑄在外差遣一次某干冒鈞嚴下情無任又某晩學空疎昨䝉收召周旋冊府首尾五年叨竊已多毫髮亡補去嵗九月嘗以更迭為請欲勉効綿薄更歴民事䝉降指揮不允官卑人㣲不敢繼陳因循至今每切慚懼伏望鈞慈特賜敷奏陶鑄在外合入待闕差遣庻安愚分亦便私計紹熙二年八月十四日三省同奉聖㫖除提舉江南東路常平茶鹽公事替黄黼成資闕乞外申省劄某疎賤一介行能淺薄昨䝉收召擢寘郎闈旋陞宰掾叨竊已多毫髮亡補日虞曠敗方清朝綜核名實更治考功某向雖持節兩路僅踰嵗年渉歴未久欲望朝廷檢照更迭指揮特賜敷奏除一在外合入差遣敢不究心民事少圖報効亦便親養尤為人子幸願辭免除右史申省劄某聞命震驚罔知所措竊惟右史分侍殿㘭夙號清選必簡求於雋彦或參用於老成如某者器資至凡學識殊淺再塵班列亡補事功比嘗控於愚衷祈更試以民事敢圖親擢猥及鯫生矧方求去而得遷是曰徼榮而飾行自知甚審人言謂何欲望朝廷特賜敷奏追還誤寵改畀真才仍檢㑹某劄子除一在外合入差遣庻幾小已全進退之義公朝協選授之宜所有恩命某未敢祗受再乞外申省劄某晩學荒陋再塵班列行及二年每懼無以補報今春嘗乞補外更試民事忽冒恩除控辭不獲黾勉就職期以秋凉復申前請繼有出疆之役兹幸訖事兼親老守官京口昨苦臟腑之疾雖已安愈人子之心日夕係念若得少需官次庶幾往來侍旁便於省問欲望朝廷特賜敷奏除一在外待闕差遣實便私計十一月十八日奉聖㫖除直煥章閤知慶元府填見闕辭免被召申省劄某輒有誠懇上千鈞聽昨凖尚書省劄子七月二十四日三省同奉聖㫖衛某召赴行在某聞命震惕莫知所措某竊惟朝制申嚴庶官不許辭免某位卑人㣲非敢犯分有辭仰恃聖朝隆寛盡下迫於私義輒敢控陳伏念某性資凡窳學業淺薄頃繇儒館濫將使指雖知罄竭迄無裨補轉徙未幾遽罹内艱豈意罪逆餘生尚䝉齒録甫臨吉月猥頒詔㫖仰戴恩私非某隕首所能報稱縁某憂患以來疾病交攻心志摧落加以偏親夏中卧病召醫治藥方幸稍瘳而某渉秋復苦瘧疾形體支離坐是恭拜成命忽已幾月未能犇走就途深慮稽違自干典憲敢具情實控告朝廷欲望矜容特與敷奏姑寢召命改授祠禄或在外待闕合入差遣假以嵗年使得休養且便私計異時或可上備驅使某不敢辭辭免知贛州申省劄某聞命之初不勝震懼伏念某學業迂踈性資愚戅徒繇末第獲並英游頃自宰僚擢陞柱史屬親老多病力祈外補所冀便私繼以叨塵非據遂致煩言杜門省愆不敢毫髮覬倖而某罪釁崇積竟罹家艱零丁孤苦偶爾不死自念賦分凉薄憂患相仍加之弱質蚤衰志氣頽墮益無榮進之望敢圖誤恩抆拭試郡自非公朝收拾士類不遺葑菲某何以得此惟是章貢名邦責任尤重雖尚需闕次未應控辭某退揆非才稽之舊比起於閑廢止當奉祠儻或冒居切慮重干清議伏望朝廷特賜敷奏姑寢成命改畀祠禄庶安愚分辭免兼中書舍人申省劄子某驟聞寵命載愓危衷伏念某素乏才能重罹憂患比起家而為郡俄奉詔以趨朝留寘頌臺躐塵清貫曽未淹于嵗月顧奚補于㳙埃乃玷恩綸俾兼詞掖惟中書出令之地實天子代言之司識匪蓍龜恐幾㣲之或昧文慚斧藻于潤色以難工雖號攝承詎應忝竊儻稽控避必速顛隮伏望朝廷特為敷奏許收還于新渥姑専領于舊官既穆師虞亦安愚分辭免加食邑申状某近再上表辭免轉官恩命伏䝉聖恩降詔不允不得再有陳請除已祗拜詔書外凖閤門降到轉官告一通内帶行加食邑四百戸食實封一百戸照某該遇去年十一月二十日郊祀大禮赦書依例加恩近已凖告加食邑三百戸今來轉官告内帶行加食邑實封事某自揆疎外疊冒恩華若不控辭恐貽物議不敢别有奏陳欲望朝廷特賜敷奏許免帶加恩庻安愚分第三次丐祠申省劄某昨以疾疢交攻不任閫寄累嘗具奏陳乞投閑仰䝉公朝未賜從欲感激隆天厚地之恩非不願勉竭駑鈍圖報萬分近自秋晩故疾復作目視昏花心神怔憒問醫視藥略無少效日省案牘隨輒遺忘若非早得歸休立致狼狽欲望朝廷俯念由𠂻之請實廹衰盡初非矯情亦非避事特與檢㑹前後所乞宫觀文狀亟賜敷奏俾得以桑榆暮景終老林壑實出造化終始生成之賜伏候指揮進士及第謝皇太子牋某等言伏䝉聖恩賜某等進士及第者旒冕臨軒垂聽而問布韋造闕悉意以陳戴聖度之優容湛恩光而下被榮逾褒衮惕甚履氷竊惟勤學為太平之原流化自京師以始周之王世子而與俊造齒示不廢善良之求漢之子大夫而有孝悌聞必使居輔翼之任盖玉質之既粹則金聲之迺彰凡以言揚繇其教染故郡國舉茂異之等而鄉閭獻賢能之書多士以寧得人為盛允賴元良之正聿來黎獻之臣兹錫第於彤墀冝貢誠於青禁伏念某等材奚足算技亦無他徒知畎畆之愛君遂欲草茅而言事漸兩朝之率育丁三嵗之比興輒妄試于有司不自量其無學見聞甚陋烏識朝廷之冝悃愊則忠庶盡臣子之義方懼猥塵於乙覽豈期僉預於臚傳冒寵實多拜嘉敢後兹盖伏遇皇太子殿下雅崇經術敬接儒宗講就將於閒燕之清賛涵泳於雍熈之洽振洊雷之隆響有鳶皆飛揚少海之餘波何鯤不化遂令庸品亦玷賢科某等謹當允蹈初言篤持晩節射天門之䇿得之若驚望甲觀之光敢不再拜某等無任除宻院謝皇太子牋執法南臺曽未裨于風憲本兵右府忽躐預于事樞叨再命于浹辰繇九重之親擢恩深感極責重力㣲中謝伏念某自守戅愚初無學術久安田里已絶望于華涂孤立班行每願殫于忠悃當天地清明之始䝉君父特達之知責以盡言寘之絶席埋輪而辨梁冀之逆夙懐嫉惡之心騰章而白霍雲之奸仰助去凶之政囊封尚濕綸詔復攽驚帝渥之殊常俾廟謨之參預方未寢甲兵之問媿難裨帷幄之籌望鶴禁以知歸念鴻私之曷報兹盖復遇皇太子殿下徳充三善本繫萬邦傳東序之經蚤富多聞之學辨南陽之牘克除羣慝之根于問安視膳之餘見樂善好賢之至肆令淺陋首被柬求某謹當思盡其忠不負所學重暉重潤幸瞻主鬯之儀惟時惟㡬勉賛折衝之畫某無任除參知政事謝皇太子牋幾廷陪議蔑裨宥宻之謨政地掄材誤玷疑丞之選褒揚大亟懇避弗俞聫黄闥以懐慚望青宫而知感中謝竊以柄分二府均欲得人任重四隣豈容充位必擇爽邦之哲艾始副更化之清明如某者賦性戅愚奮身寒逺周旋中外㣲它技之可稱踐歴險夷惟此心之自信徒以班行之孤立遂䝉君父之異知方畀之南司長憲之官驟付以西樞本兵之柄豈謂攝承之暫徑叨參預之崇再月屢升攷前聞而希有小材大受揆弱植以難安矧内而百度之欲修與外而三邊之未定念曷當於委寄恐虚負於延登兹盖伏遇皇太子殿下學廣多能徳充三善龍樓日侍助成乾斷之剛鶴禁肇開允繫震維之望念慮靡忘於國體薦敭時達於宸聰迺使㣲臣與聞廟論某敢不勉攄丹悃圖報鴻恩綴虞室之股肱願繼明良之盛瞻漢庭之羽翼喜依暉潤之新某無任賀皇太子元正牋三朝之㑹四海月吉始和一人之正萬邦天休滋至誕裒蕃祉茂對端辰某中賀恭惟皇太子殿下明繼黄離剛潜蒼震星暉海潤徳已達於九圍玉裕金聲學更宗於三善履端於始與物為春某濫守虎符阻瞻象輅心馳魏闕莫隨諸侯北面之朝口誦楚詞惟祝太一東皇之夀又端月御辰嵗稱獻嵗前星垂耀宫曰春宫一人元良萬邦和悦某中賀恭惟皇太子殿下剛潜洊震明炳重離左右之皆正人誠身有道朝夕之視君膳立愛惟親茂對三陽永膺百福某久違金馬假守銀菟濯足升泉曉尚行於湘水舉頭見日身未近於長安又帝從震出實闗一索之祥元自乾亨久積初潜之慶和薫四海喜入兩宫某中賀恭惟皇太子殿下徳盛温文幾參兢業龍樓曉駕祥開曉日之重鳯律囘春大襲春闈之慶肅視九重之旒冕光膺萬國之貢珍某屬守洪都逖違青禁陪位太極殿阻觀獻夀之儀衣服外寢門遥想問安之始又堯年起丙載新鳯歴之頒夏正建寅仰協龍杓之指萬邦以正百禄是遒某中賀恭惟皇太子殿下賢智夙成温文天稟春囬嶰谷剛潜蒼震之亨日出嵎夷柔麗黄離之吉履端於始長發其祥某舊忝儲寮今叨藩牧後天下之樂濫假寵於虎闈布正月之和逺馳神於象魏賀皇太子生日牋瑞鍾彌月式臨十四月之期候正中秋允兆八千秋之夀臣民胥慶宗社増輝某中賀恭惟皇太子殿下天錫聰明日新問學心懐兢業賛成堯舜之無為徳盛元良坐致殷周之有道聿來長發茂介延洪某席䕃東皇殿藩南服儲闈有慶莫陪拜手于鵷聨帥閫攸拘惟劇馳心之燕賀又祥光赫奕前星符千載之占瑞氣鬱䓤初度應九秋之正慶綿宗社歡浹華夷某中賀恭惟皇太子殿下道本聖傳徳由天縱龍樓問寢無非怡悦之心鶴禁崇儒益富緝熈之學兹臨震夙彌介熾昌某嘗侍賔筵久共侯度衣冠甚偉莫陪羽翼之聫福禄無疆請祝岡陵之夀賀皇太子冬至牋黄鍾協律一日驗於復來青輅發祥萬物由乎震出裒時蕃祉茂對初陽某中賀恭惟皇太子殿下海潤星輝金聲玉裕行一物而得三善儲徳克岐舞六佾而建九旗禮容有變履此迎長之候昭哉滋至之休某假守熊湘阻趨鶴禁合八能於漢殿莫陪北闕之朝啓九辯於楚歌請祝東皇之夀又堯雲在望又新五物之書漢日既長丕顯重輝之慶歡騰赤縣喜繞青宫某中賀恭惟皇太子殿下明炳繼離剛潜洊震虎闈獻頌豈徒履襪之供鶴駕通霄永使甲兵之洗萬邦以正百禄是遒某昔𨽻宫僚今叨藩牧珠躔連五莫瞻太極之朝圭景丈三彌望長安之近又鳯筩制律潜陽方動於黄鍾鶴駕通霄問寢式嚴於紫禁歡均寰宇慶溢儲闈某中賀恭惟皇太子殿下恭敬温文聰明淵懿一日二日兢兢參萬事之㡬再朝三朝業業致兩宫之孝適觀道長益届休滋某昔忝宫僚今叨閫寄象雷之復共欣出震之期迎日之長永仰重離之照又璿璣觀象一陽當來復之辰鍾律導和萬國共履長之慶丕膺純嘏允屬元良中賀恭惟皇太子殿下淵懿在躬聰明冠古親賢鶴禁不忘亹亹之心問寢龍樓常有怡怡之色兹與剛而寖盛宜受福以無疆某雖逺承華可無善頌休祥滋至當觀乾健之潜藏徳業彌新更玩震亨之修省隆興府到任謝皇太子牋某抗章求免甫離翼軫之墟被詔促行俶抵斗牛之分己望龍墀而拜寵載瞻鶴禁以輸誠某中謝某竊惟洪井之奥區實號阜陵之潜邸自隆興升府之後地望愈雄由乾道擇牧以來民生益厚屬近嵗偶鳴於桴鼓致清朝重遣於油幢久弄印以疇咨期植旄之僉允而某就衰景廹己試技窮任棠水薤之規粗知佩服黄霸米鹽之政敢怠奉行每懐一日必葺之心居乏三年有成之績賴褒揚於黼扆遂改畀於藩垣當黜蒙遷莫副大稱之職祈閑得劇仍専盡䕶之權雖還鄉足以為榮然負乘豈能無懼既宣上指敢昧殊知兹盖伏遇皇太子殿下功妙參乾道明出震朝日夕月光輪重被於賡歌學禮讀書申閲助求於謀帥肆令朽鈍猥與甄鎔某敢不厚自激昻期於報稱當使政平郡國無勞辨牘之明更令盜息潢池庸賛撫軍之略福州到任謝皇太子牋江湖襟帶之區久孤委寄閩粤衣冠之㑹又玷蕃宣申巽命以維新望震宫而知自某中謝伏念某壯猶祈退晩豈貪榮聽元戎之五更喚醒松江之夢安故山之一壑頗懐菊徑之荒第以當宁簡知累朝恩遇託股肱之親信畢筋力以馳驅南北東西惟上意之所用禮義㢘恥則中心之不忘柰已試之罔功乃求閑而得劇督府尊雄於它鎮儲潜炳煥於神光曽是非材若為勝任兹盖伏遇皇太子殿下動無過舉居必正人夙成稟玉質之温宻啓賛淵謀之决遂使賔僚之舊洊叨閫鉞之榮某敢不歸仰元良布宣寛大於天文為星紀重暉有爛於前星以聖化冒海隅増潤更資於少海謝寳翰後樂二字牋臣某言伏䝉令慈親灑寳翰頒某後樂二字者衡宇偷安竊㣲言而佚老儲宫念舊飛妙墨以標名榮光燭天愧汗流地某中謝伏念某才疎意廣實淺名浮然生長呉王闔閭之城嘗習聞范公仲淹之語謂不以物喜此乃古仁人之心故雖在里居皆當後天下而樂尚友一鄉之善輒營環堵之居冒假寵於黄麾辱垂光於緑字閒鷗渴驥潤涵少海之波翥鳯盤龍輝粲瑶山之彩假大書特書之賜擇獨樂衆樂之安拜手知榮拊躬曷稱兹盖伏遇皇太子殿下日新盛徳天縱多能先物沈幾夙辨南陽之牘褒功記徳躬題東渭之碑謂某嘗陪羽翼之聫欲竊桑榆之煖憐某屢守股肱之郡願全樗櫟之天丕加鴻藻之摛庸作菟裘之寵某敢不寳兹大訓銘在懦衷松栢嵗寒益厲後凋之節簞瓢陋巷永堅樂内之誠上留丞相劄子某所陳交子之弊前牘粗見一二某竊體朝廷本意惟務便民但逺方事情纎悉曲折一一非親渉歴有不可隃度逆料者某既見公私不以為便日夕講求亦參攷乾道間己行始末乃知議者始謀殊不審今日之弊盖所必至朝廷剏法便民民苟不便必不憚於改法苐恐首議之臣業己誕謾展轉遮䕶以風㫖動揺屬部俾淮民實情兩路通弊壅於上聞此則清明之朝所當察也某昨所申審竊念入納分數於嵗課増虧誠有闗繫然目下不過鹽商少優官司少損其興販折閲及行使阻礙等弊未能盡見至若因交子不可通行遂致官㑹艱得客旅不至物貨稀少市井蕭條淮民無以為生行者居者均受其弊利害尤切盖官㑹流轉必資客旅客旅既少官㑹亦無官㑹既無價直必貴價直既貴客旅益不來勢實相為消長斷無可疑某非不知竊禄偷安可以苟延嵗月向來辨析私錢己觸憎怨今交子為患雖不一度其勢逮某僥倖終更猶未至於極敗而不可支然念一介無似誤䝉委使民間利病職在咨詢惟恐弗及聞知若知而不言盡為身計則善如負朝廷何如負百姓何由是隠之於心反覆紬繹屢作復輟懐不能己卒以吐露因到任半年合條具事件併録奏聞更乞察其區區懇惻願欲裨補公朝之萬一詳賜觀覽博詢在廷參酌施行庶㡬兩淮獲霑實惠少革故吏奉行欺誕之習某至㣲極陋賦性介拙自頃濫綴朝行孤立自守矧方居逺外誰復助之仰恃大丞相至公樂育謙虚無我有以照臨容䕶之耳如一毫渉私是為欺罔固不敢屈邦典以累大造也亦惟廟堂有以矜念之幸甚上沈運使作賔書某近以部胥隨使客行草率修狀繼淮隂陳監税及魏知丞行各具幅紙當次第塵崇聽不以煩瀆為罪否山陽攝事諒勞神用葉守已有趣行之㫖第須入奏未免小濡滯爾和糴未得台翰之先嘗聞一二昭文亦言已作書宻諭少緩之意日來諸處皆告病己一切弛之矣平糴本良法但先後失時反為弊政要是八九月之交農人有米質債方急富室邀以低價之時有司出此則可以持平公私俱利十月以後場圃一空小民所有悉折而歸大家民間既無米而所在和糴是徒為富室増價牟利農人反食貴米不如凶年所諭未見儲蓄之利先致科抑之擾誠是也某竊稍毫髮亡所補日虞譴何此一司専治獄案四方奏報日至窮日之力不暇給往往州縣之獄凡死囚必作情節奏讞幾無復有詳覆者累朝好生之徳固當從寛然殺人者率不死亦何以為政此又姑息之一弊也尊契丈向嘗渉歴亦以為然否因筆謾及之廹冗篝火布此莫究所情萬一餘惟為眷注方厚崇䕶茵慿即奏詔歸之渥拳拳真禱上淮西張運使書某自承玉節建臺未得専修慶牘比兩辱真翰亦久稽作報兹又領近帖展玩冞劇愧感所論荆襄利害極為詳盡且曲當事情賞罰之説尤切中時病平甫作略不凡廟堂深知之近因除授頗云云遂惹物議然其才决不容久閑也但謂彼使之來即誅之竊有疑焉倘見得彼已分明有何不可若彊弱衆寡之不敵恐未可輕言至于備禦誠不可不嚴可戰可守而后可和此不易之理所遣使輕脱誤事賊情叵測且明告以師期邊頭亦整宻否比聞分遣幙屬招集忠義想施行必有次第以往事驗之恐不可與大軍襍用須就其間推擇頭目人為之統率萬一可用以出竒牽制不知髙明以為如何最是此間動息彼無不知而此絶無間探何以禦敵耶因筆一一垂教幸甚兹因便介姑此少謝謙施未既所欲言餘遲嗣布上京知院劄某恭以某官天與駿明之才夙負經濟之學器博量閎識周慮逺參之本朝名輔當在歐富韓范諸老之間故其坐廟堂華戎震疊宗社光榮天人之意盖可見矣惟天下方來之變何窮人主悠久之意難持大臣之責任彌重相公燕居深念必有以處此某心乏精㣲言其梗槩伏冀鈞照某伏惟朝廷清明號召四方之賢俊共起治功某一介晩後藝學無以踰人材術不足經世何以上貽簡記猥䝉召㫖此知院相公垂意人物不間逺邇有如鈍頑亦在齒録欽惟大公樂育之度非為私徳顧某宜何以報惟當勉勵初心益堅素守期不辱于知遇拳拳之誠有如皎日與四川制置丘侍郎崈劄某恭承以西清秘職總梁益劇任詔下之日公論翕然謂宜盖疇咨在廷徳望威名無出公右者然振代儒英踐揚中外且領計使已再期便應真居三事星峩一面猶煩坐鎮豈天意益飪具瞻公衮台路固若時登用耶執事是行不特為西人賀抑為天下賀也某誠切某惟今全蜀之寄事任雄劇孰不謂然有如識者之慮民困於重征兵習於世將培根本於閒暇察事機於隠㣲異時規恢逺圖亦必基於此本末先後之序執事胷中所固有不待講而明至若百州生人翹首俟惠必有以慰荅其望嵗來莫之意矣某恃眷無外僣越慚恐留守制置丘侍郎崈劄某杜門野處逺竊宏覆寧不知幸謹熏祓拜狀上詗記曹瞻睇髙牙邈在雲景未辰趨覲敢乞為宗社倍重練輔粹冲佇聽廷揚進持魁枋式慰中外善類之望某區區䖍禱某嵗在戊午嘗僣列私記旋䝉誨報甚寵爾後屏居田里繼罹艱棘孤苦萬狀不自意全比及免䘮復纒於多病餘息僅屬人事益廢坐是湮晦姓名久不塵几格跡若闊䟽然平生師仰之地其歸鄉依慕實不以書疏有無為間也未審尚沐矜宥否侍郎三朝舊徳巻戢大猷退處不競之津且十年上心清明洞燭羣枉近者鋒車趣還延和錫對論議剴切聞者興起謂宜直總三事蹔煩䕶鑰北門傳聞道路朝家力欲規恢今敵勢若可乘國恥固當雪獨不計在我者何如傳云盍姑内省徳乎無闕而後動晉武將平呉羊祜言既平之後當勞聖慮矧事緒不止一端成敗未易隃度先生為國元老休戚同之燕居深念必有以處此矣某一介晩陋憂患摧傷之餘學業荒落志念頽墮益不堪時用偏城逺次上恩已厚未知所以稱塞它何足言者兹因修敬并叙悃欵且仰恃知予素深輒復僣及亦區區嫠不恤緯之憂切乞有以警訓存全之某幸甚至望與鎮江宇文侍郎劄子某託契門墻蓋有年矣晩綴班行䝉一見之初顧與特異意氣傾冩平生得此於人殊寡區區銘戢未易名言拜違顔誨倐踰半載無日不勤尊慕尋常於書䟽懶拙復困多事跡成疎闊中間辱賜翰之先亦稽修謝朝夕負愧無以自文尚冀海嶽宏度未譴斥耳侍郎鎮護北門兵民按堵方三邊繹騷長江増九鼎之重且號令精眀區畫曲當物論翕然所以儲天意飪民瞻端在是矣某晩陋亡取濫塵朝蹟嵗月推遷叨竊踰分無非門墻吹噓教誘之賜寧不知感惟是知慮短淺無一毫髮可以裨補未知免戾之䇿日徯來歸庶再得所親依也督視臨行言相與素厚凡百想通情和議竟可成否賊騎去來不常閒探亦得其端緒乎因筆切乞寵報一二不敢廣也撥置姑此摧謝萬一未即侍對敢乞為宗社崇重即前虚左之拜與江淮宣撫丘尚書劄某一去門墻浸更年所鄉者掃軌田廬嘗得時貢㳙史之敬朅來班行久安媮墮驟困醻應節春秋承興寢越至於今竟成曠弛獨有此心尊慕道徳炯然不誣兹審疇咨大計僉屬真儒晉陞常伯之聨増重中權之寄成命一出人心翕然易危為安端在此舉尚書四朝耆徳宜端委廟堂以穆王路屬時多虞迺煩經理實惟尚書生平抱負必將措之事業天意固有待耶側聞行臺所下教命切中機要愜滿物情防秋非逺疑慮多端萬全成算計己先定中外益恃以無恐矣某冒昧此來初不過為之郡計誤恩復留宿數月遂爾徼踰非教誨成就有素何以得此哉自惟學殖荒落文字蕪纇處非其據重以時事方殷瑟縮就懦無補毫髮日懐尸素之懼惟尚書先生不吝警告深所願望邇來邊報無它否北土早凉自來敵常用衆或言入㓂必自安豐鍾離歴陽徑趨江面彼懲覆轍未必盡然要是彼情難測且蓄全力以伺我想區處略盡正不贅言耳數月以來當路大明黜罰觀聽為之一新都人争傳以為端有所自三軍聞之當亦吐氣此亦折衝之一助也因筆僣及自餘心曲非筆舌可究姑此少見賀厦萬一併叙謝悃未即侍拜敢乞為宗社生靈保輔冲粹佇凝茂勛丕對顯册式副具瞻某不勝歸依頌願之至與倪侍郎思劄某拜違誨範十閲寒暑拳拳此心每知尊慕頃嵗若節春秋往來苕霅間念一造門墻憚於人事趣不果昨拜建寧所賜真翰仰認撫存之眷時適留先塋失於即稟報揭來京塵擾㡬旬月欲拜尺書叙此梗槩久閑驟爾酬應誠出黽勉復墮因循倘以踪跡之闊疎擢髮不足數其罪尚恃平素知照有以諒其中曲否兹審上眷舊徳召還故官仰知一世望實之尊當徑總三事乃慰物論此特登庸之階未足多賀也某晩陋亡似憂患摧傷之餘無復榮想故冬以章貢及𤓰被㫖白事忽沐誤恩留寘班行宿留推遷遂爾忝竊實踰涯分疇非侍郎夙昔吹嘘之賜寧不歸感惟是賦資鈍懶加之多病廢學謬當文字之選自揆荒拙日虞曠敗且負鵜梁之愧兹幸大匠來歸朝夕遂獲親近必䝉有以訓警存全之其忻幸不啻百倍它人也囬首道山陪侍之日已二十年人生聚散固有時耶但屈指同舍所存無幾尤可太息自餘所懐即容面既留守制置丘樞宻崈劄某拜違誨範屈指十有六年拳拳尊慕有如一日故嵗夏中嘗得貢尺書旋拜真翰為報爾後汨於多事坐成曠弛雖此心炯然亦何以自見尚賴寛明矜宥幸甚權臣誤國妄啓兵端不特南北生靈肝腦塗地且耗竭國家五十年儲蓄國力殆不可支神怒人怨禍將罔測宗社有靈儲宫宻言於上奮發英斷一朝誅斥曽無留難天日清明中外幸慰相公以累朝耆徳宜即歸廟堂以副厲精更化之意主上以敵情叵測和議未定欲少借威名徳望為諸將素所歸屬者鎮拊之姑畀留鑰以須委任使敵人聞風震疊坐銷氛祲亟臻綏靖盖虚揆席以待也某晩學荒陋加以憂患摧挫多病早衰無復有為之意再玷班行强顔二載遂叨從列職在論納不能先事有言致上勤獨斷宜䝉罪斥聖恩猶以為孤立擢長憲府甫及旬浹未有毫髮裨補遽俾晉貳㡬廷兼攝政地真是承人之乏辭不獲命冒處非據食息惴恐且事權散失之久巨姦専擅老貪同惡一意順從執政於所施行事至有絶不與聞而耿史之徒實専之者今方稍稍收拾猶未盡見首尾事隨日生文書山積疲精神於期㑹簿書之末勢當少清之且伺隙乘問寧無其人所繫尤大非筆舌所可道自量綿薄决不勝堪日徯衮衣之歸正位鼎席儻辱加惠門墻之舊使得佐下風庶少寛罪戾某夙䝉知遇不薄不敢於此時為鬲上語也某已拜書至此忽令子宣機見訪出示所賜鈞翰再拜捧讀慰感千萬但日來邉頭雖無甚警報而權臣輕信妄作呼吸羣小忽遣數軰往兩淮招集雄淮一軍目前惟恐所招不多全不揀擇淮西至踰七萬皆用効士廩給所得多羸弱饑民不􅄺手面無營柵無統率己多有散而為盜者顒望相公開府此等事皆可隨宜處分己一面議遣常寺丞叔度及林拱辰分𨽻揀汰縁日費浩瀚己有乏興之憂事緒非止一端相公早出一日則江淮一日受賜昨日已再有趣行之㫖相公必深體上意且有以稱孝宗知人之明於四十年之先也撥置略此拜覆未究欲言霜寒次舍間益加保䕶行膺顯册與陸待制㳺劄子某故嵗以謁陵之役獲扁舟造門䝉飲食教載之意甚厚至今猶落夢寐間也拜違恰一嵗周日困塵事不獲以尺書至几格便中兩辱誨翰欽認尊謙申玩慰感亡以借諭某伏䝉垂戒先國太夫人贈典尤荷不鄙即以轉達毛紫㣲仍取誥命附來使申納敢乞眎知某憂患餘生無復榮想偶沐誤恩留寘班行馴至叨竊己踰涯分且時事如此自揆晩學荒拙亡毫髮裨補日夕惴懼未知免戾之所儻眷念不替因風更有以警訓之某深切願望匆草稟謝所懐莫既伏祈鑒察與黄正言劄某拜違顔範不記嵗月之流駛雖音訊曠絶而尊慕徳誼炯然此心當求於形迹之外嘗蒙寵賜真帖亦失於修謝尚幸寛宏未督過耳比審側席思賢趣頒召節諒深驩慶方元惡竊弄威福之初正言抗奏逆折姦萌使曲突徙薪於是時貽禍稔惡何至此極耶益知先見之明非衆人所可企及也某晩陋亡取再玷班行久欲引去忽值主上更化擢寘中司遽叨近列控辭弗獲冒處非據日負憂責凜若淵氷未知攸濟所幸自是親炙誨論庶有以警策其不及少寛罪戾想必䝉矜念也匆匆姑此布露萬一自餘悃欵須面待以既
