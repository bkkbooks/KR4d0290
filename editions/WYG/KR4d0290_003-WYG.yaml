body:
  text: 後樂集巻三宋衛涇撰内制錢象祖辭免參知政事不允詔勅具悉古有格言共政其惟圖舊時方多事强本斯可折衝卿德鉅才全器閎識逺身歴三朝之久望參諸老之間自陟進於樞衡益具曕於巖石比頒召節入侍經幃屢陳造膝之嘉猷莫匪濟時之急務與其養恬祠舘以奉清閒之燕孰若密禆廟論以究圖囘之勲爰攷師虞復陪鼎席昔宋庠之於慶歴公著之在元豐皆以宣力四方再登兩社迄臻大用俱為名臣朕之遇卿抑何異此其殫素藴勿徇冲懷所辭宜不允錢象祖再辭免參知政事不允詔省表具悉人君虚己任賢惟推誠而相與賢者得時行道豈辭位以為高卿出入三朝險夷一節曩因去國毎興當饋之懷旋起殿藩即下趣歸之詔衆方想聞其風采朕尤喜見於儀刑自聆啓沃之規罙識忠誠之藴屬政塗之虚位疇物望以登庸夫思之至故用之為不輕信之篤故待之為無間厥今北敵雖求和而備禦不可以暫弛西陲雖耆定而控御宜急於良圖所當惜日而有為庶頼同心而共濟深謀逺慮方與卿等勉之曲謹小廉顧豈朕所望者所辭宜不允仍斷來章賜資政殿學士中大夫知隆興府充江西路安撫使程松辭免除資政殿大學士四川制置使兼知成都府恩命不允詔勑程松省所奏劄子辭免除資政殿大學士四川制置使兼知成都府恩命事具悉維昔擇建蜀牧必屬侍從名臣其自二府臨鎮者由乾德至今裁六七人其選不益遴乎卿以英髫早躋嚴近竭節匪躬有排奸之勇持平處正真凝重之才訏謨斗樞之庭已疇碩望奉使井絡之域亶藉忠親用加學士之大稱全付西南之鉅屛寵靈特異節制加尊維文翁化俗之方本於勸學若武侯經逺之畧先在養民寛予顧憂咨爾多算况王事靡盬義不得辭人才至難無出卿右當思養志之孝無靳叱馭之勤所辭宜不允辛弃疾辭免除兵部侍郎不允詔勑具悉朕念國事之方殷慨人材之難得外而鎮臨方面欲藉於威望内而論思禁列將賴於訏謨熟計重輕之所闗莫若挽畱而自近卿精忠自許白首不衰敭歴累朝亶為舊德周旋劇任居有茂庸建大纛以于蕃趣介圭而入覲雖戎閫正資於謀帥而武部尤急於需賢勉圖厭難之勲宜畧好謙之牘所辭宜不允賜通議大夫丘崈辭免除刑部尚書充江淮宣撫使不許辭免恩命不允詔勑丘崈省所奏劄子辭免除刑部尚書充江淮宣撫使不許辭免恩命事具悉朕惟義不可以不明功固當於馴致矧乃世讐之未復適茲邉釁之屢聞不得已而興師顧莫先於圖舊以卿躬士衡之明鑑有公瑾之盛心閲歷之多素存謹重忠義所激靡辭劇艱屬虚中權無逾宿望俾盡提於戎律仍進陟於文昌惟威名之獨高諒施設之易信叩囊底之智姑借重於疆陲攄堂上之竒佇折衝於廊廟禆贊自詭何言之謙所辭宜不允錢象祖辭免興復元依舊知紹興府不允詔勑具悉昔黃霸守潁川嘗貶秩八百石久之宣帝思霸長者為下詔褒揚復秩中二千石所以重師帥之任而風示天下也矧卿夙居鄰輔起鎮東藩十連資屛翰之勲千里徯中和之政儻微文之是徇非崇秩之盡還則恩禮未昭吏民安仰豈稱朕禮貎大臣之意乎亟祗茂恩毋事多遜所辭宜不允錢象祖辭免召赴行在不允詔勑具悉朕思靖邉氛興懷舊弼卿精忠體國沈慮識時召自輔藩倚攄賢藴矧淛河之東密邇王室謂宜朝受命而夕引道胡為上章以疾來諗惟吾股肱之望義均戚休毋徇一身出處之私勉副公朝圖任之切正茲渴想其畧撝辭所辭宜不允依已䧏指揮疾速赴行在不得再有陳請錢象祖辭免再知紹興府不允詔勑具悉朕惟舊弼實心腹之臣輔甸廼股肱之郡方起賢而自近矧謀帥之維難卿久踐政塗亶為民望綢繆萬務具殫夙夜之勤翌贊逺圖隱若深長之慮粤從去國毎切興懷茲稽輿論以賜環亟俾東藩而制閫徒得君重庶期憂顧之寛其沃朕心式示來歸之漸成命胡稽於俟駕冲襟尚執於循墻宜體國事之重輕勿泥身謀之出處其蠲巽牘以對茂恩所辭宜不允不得再有陳請錢象祖乞祠禄不允詔勑具悉卿環望宏材為時柱石深謀逺慮為國蓍龜起之輔藩規以自近寛大平和之政七郡之民安之緬想棠隂益彰世德矧神明之方壯奚疾恙之能侵胡為抗疏之聞遽動賦歸之興河東吾股肱郡端頼於分憂望之古社稷臣豈忘於圖舊勉騰治最難徇冲襟所請宜不允賜復慶逺軍節度使差充鎮江府駐劄御前諸軍都統制成閔辭免加食邑食實封恩命不允詔朕籲俊以尊上帝非惟常伯常任是頼亦惟頼虎賁之長越在外服簡恤爾士尚廸果毅以登乃辟肆予一人汝嘉用承天休賚爾多邑誕告有衆咸曰允哉毋或固辭共朕之詔所請宜不允賜成閔上表再辭免加食邑實封恩命不允不得再有陳請詔王者公予奪以馭臣人臣明辭受以事上古今之通誼也日朕躬郊拜貺均惠文武有懷宿將總戎於外雖無侍祠之勞而有制閫之功載加多邑以溥吾恩非妄予也卿其可異衆而獨辭乎所辭宜不允不得再有陳請楊炳辭免除權吏部尚書不允詔勑具悉天官冢宰之職歴代以來班序常尊至唐以宰相兼領豈銓綜之得失闗人物之盛衰匪望實素孚識鑒精敏莫副茲選卿秉心端亮履行粹夷論事有爭臣之風掌誥得王言之體比繇小宰之任攝承常伯之班繄爾宣勞於今彌嵗處劇煩而有裕嘉平允之著稱官無滯淹吏革謾隱肆疇已試之效孰如因任之宜昔山濤密啓公奏而舉無失才左雄收異登竒而號稱孤絶勉希前躅勿事遜辭所辭宜不允楊炳乞祠禄不允詔勑具悉文昌八座接武四近進退之際重輕繫焉屬當多事之秋尤藉老成之望卿學識純茂履行方嚴親被簡知徧儀華要比陞班於常伯仍冠席於邇英銓綜擅平允之稱誦説廣緝煕之益亹亹憂時之論惓惓體國之誠雖㓂盜之潜奔正事幾之宜察盍攄至計叶濟逺圖矧精神之方彊奚疾疚之為累遽祈均佚良咈眷懷安服厥官姑恵予采所請宜不允楊炳辭免寶謨閣直學士宫觀不允詔勑具悉朕惟魁壘老成之望禁路所推出入進退之間禮貎宜異矧挽畱之弗獲尤眷寵之當加卿位冠文昌時稱夀雋敭歴衆職周旋八年方倚重於典刑遽懇祈於間佚神明猶壯衆惜孔戣之得歸官政閔勞難强汲黯之為郡爰峻班於延閣以增賁於真祠既自取之甚廉胡抗辭而不已亟祗成命其畧撝函所辭宜不允呉總辭免除工部侍郎不允詔勑具悉中興以來元勲宿將孰如卿家父子兄弟朕方慨慕前烈規恢逺圖顧瞻周行有如象賢獨無在吾左右者是豈念功之意哉矧卿才畧優裕識慮精深出入三朝更踐惟舊列職延閣通班禁路踰二十年可謂老成之彦召從帥閫俾貳冬卿積望既高僉言咸允屬時多事尤頼世臣益肩報國之誠毋負敎忠之訓祗予寵渥奚以辭為所辭宜不允呉總辭免吏部侍郎不允詔勑具悉國朝班院自元豐以來小宰分職而治員多闕少法密文繁惟武選為劇吏緣為奸人受其弊非得疏通明練之才何以甄别流品擿發隱欺卿毓德名門世濟其美踐敭中外資望甚高儀圖爾庸留以自近雖禁途密勿均倚告猷然起部優閑未殫閎藴其以繕修之暇徃參銓綜之公僉論既諧巽函宜畧所辭宜不允呉總辭免知鄂州不允詔勑具悉鄂渚上流旁連蜀漢下控呉楚自昔用武之地在今擇守尤難卿被遇四朝險夷一節召寘從槖出贊元戎方倚壯猶勉從外補與其逺司於𣙜牧孰如近畀以蕃宣矧爾舊游諒多遺愛將肅清於氛祲抑有頼於威名忠報是圖謙辭宜畧所辭宜不允薛叔似再辭免端明殿學士侍讀依舊湖北京西宣撫使不允詔勑具悉元戎重寄襄漢上流非望實在衆人之先論議攷平日之素不以輕授卿秉持一節際遇累朝期盡瘁於國家曾何心於利禄比繇諭㫖就畀宣威俄渉歴於三時殫勤勞於庶務屬北兵之入冦在憂顧以方深朕惟責之専者禮宜優任之隆者位必稱是用通班祕殿視寵政塗肆體貎之有加諒觀瞻之益竦庶收來効迄展壯猶撝章屢騰貶損特甚盍體朕責成之意顧豈卿辭官之時勿復重陳亟其祗拜所辭宜不允不得再有陳請招撫使郭倪乞賜重行竄責不允詔勑具悉倚重戎昭方懋安邉之畧力陳私誼忽騰引咎之章卿夙負雄材蔚為名將父子相傳於忠孝後先接武於巖除將收地於河湟俾䕶屯於淮浦屬偏師之失律於軍制以當明諒憂國而忘家豈以恩而掩義雖因嫌而自别顧奚罪之可歸矧今巳廹於秋防頼爾用張於士氣若過形於貶損何所望於激昻其體至懷勉圖偉績所請宜不允張巖辭免除知樞密院事不允詔勑具悉周用吉甫文武為憲於萬邦漢得留侯帷幄决勝於千里矧圖囬於逺畧端倚頼於訏謨匪疇經世之材曷冠神樞之任以卿純誠許國茂識爽邦兩踐政塗有同寅協恭之助久禆幾省多折衝厭難之謀罄竭一心周旋歴嵗屬政事之修欲攘於外侮而甲兵之問方至於廟堂儻任責之既専庶成功之可必惟卿夙陪宥密當有先定之規摹身寄安危爰俾進參於心腹顧允諧於師錫且益聳於民瞻其即欽承無庸冲遜所辭宜不允張巖再辭免除知樞密院事不允詔省表具悉朕惟文武之柄雖異股肱之寄實均盖閒暇必先政刑之明而兢業尤以時幾為急矧機㑹之投間不容髮而樽俎之問期於折衝雖以兼資之上才抑當不分於用智庶幾算無遺策動有成功卿沈審善謀忠誠體國粤自風憲紀綱之地置諸疑丞輔弼之聨出入八年險夷一節屬孔棘於我圉期肇敏於戎公肆圖共政之良俾正元樞之任盍祗休命奚徇冲襟若以盡瘁為勞則今靡煩以它務儻謂不能者止則昔已著於茂庸僉言允諧朕志先定拊髀而思頗牧舍爾其誰稽首而遜䕫龍豈予所望宜蠲來牘迄展壯圖所辭宜不允仍斷來章李壁辭免除參知政事不允詔勑具悉昔樂正子為政賢者喜而不寐叚干木在朝敵人莫敢與爭盖惟吉士斯勱相我國家用真儒廼無敵於天下匪負楝隆之望曷禆柄任之圖以卿夙著家聲蔚有時譽文章規姚姒之上忠信行蠻貊之邦非道不陳於前言皆可復廷臣無出其右政將焉歸矧時庶事之方殷必待宏才而共濟既選衆而後用顧於卿而何辭萬幾之繁冀寛當饋焦勞之念一命而俯此豈循墻遜避之時宜體至懷亟祗成命所辭宜不允李壁再辭免除參知政事不允詔省表具悉朕惟圖任共政期於補弊舉偏屬多事之未寧得一賢而為重然望治雖切量才實難務因循者或怠於事功銳進取者又踈於謀畧患在文具無惻隱之實思得憂國如饑渴之人其心純於愛君而不徇名其智足以周物而無滯慮疇若予采信莫如卿爰自秩宗擢參宰席謹紀綱賞罰之柄懲苟且欺誕之風頼爾同寅惟今急務有用我者期月而可尚竊遲之若命官以相遜為能非其時矣矧千載休期之難得而先正教忠之謂何其絶撝函益攄素藴所辭宜不允仍斷來章李壁辭免權監修國史日歴同提舉編修勑令不允詔勑具悉朕惟史有三長提綱尤重法垂一定載筆實嚴漢命酇侯約講畫之規唐㠯元齡專纂修之任自昔必資於近弼矧今允藉於鴻儒卿文摹六籍之華學繼諸賢之統儷二班之父子相承筆削之謹嚴考三后之源流素達禮刑之表裏參陪機務方懋逺猷典領策書宜膺隆委况編年有世傳之法而著令以經術為宗討論雖列於羣工折衷盍歸於良輔裁其義例佇成一家之言凡厥條章務述累朝之舊既孚衆望奚事多辭所辭宜不允李壁乞祠禄不允詔勑具悉朕惟國家待遇二三大臣之禮與百官執事異盖所以託股肱心膂而與之同休戚也去就之間奚可輕議卿以安石之文雅濟德裕之經綸比與政機實從人望屬時多虞警奏日聞頼卿推誠協心畢力盡瘁方内畧定朕甚嘉之何嫌何疑遽欲求去且逆黨盡誅邉塵漸息信如卿之言矣獨不為朕講求安輯之方經理之政乎朕思與卿等宵旰圖治日謹一日庶幾安不忘危底於綏靖從容引疾自為計得矣而非大臣體國之義也益殫忠慮毋徇小廉所請宜不允倪思辭免禮部侍郎兼直學士院不允詔勑具悉朕焦勞圖乂寤寐求賢矧予兩禁之英允矣三朝之望久退安於真館誠渴想於辰猶且嵗屬親祠時當多事緝熙典禮期以接三神之歡播告訓辭將欲鼓四方之動端頼寅清之助孰踰潤色之長皆爾故官實諧師錫倚須前席之問宜不俟駕而行奚徇謙懷尚稽成渙所辭宜不允皇伯嗣秀王師揆加食邑實封制門下朕肅時禋祀裒對神祗稽經循大報之彛練日得中辛之吉祖功宗德聿嚴升侑之儀帝系皇支咸在駿奔之列眷言伯父克相祲容爰首錫於徽章用答揚於景貺誕旉明命亶告治朝具官某屬近而行尊身端而行飭炳玉質金相之美衍銀潢璿蕚之輝父子象賢襲王封於檇李弟兄竸爽綿世德於常華寵光萃於一門恩意隆於九族騂旄茸纛峻元戎節制之權赤舄繡裳視上宰班聨之貴甲第邇闕庭之邃夀宮仍使領之榮喜見儀刑時趨表著當總章之展采率公族以侍祠翼翼其隣嘉廼温恭之度雍雍以相輔予陟䧏之容迄用有成以作爾祉拓豐租於榦食加真采於圭腴於戲服冠履而祀明堂東平實陪於漢禮分脤膰而親同姓滕侯宜長於周盟益追孝於前人式永綏於令譽可依前皇伯奉國軍節度使開府儀同三司充萬夀觀使嗣秀王加食邑七百戶實封三百戶主者施行皇太子榮王曮加食邑實封制門下朕紹列聖之詒謀荷皇穹之申命䕶奉宗廟社稷靡遑康寧以承上下神祗罔不祗肅攷三嵗嚴禋之制崇九筵毖祀之儀禮備樂成精意孚於􅆄蠁仁滂施厚膏澤沛於黎蒸眷予主器之良宜守均釐之錫誕􅏡丕號旉告大廷皇子具官業尚淳修性資英敏咸韶濩武韻凝鐘律之龢璜琉圭璋體具隂陽之粹亹亹盡事親之孝孜孜殫就傅之勤密陪侍膳之恭尤篤含飴之愛嘉温文之日積信岐嶷之天成鼎席参華視上宰班聯之峻坤維賜履煥真王典册之榮䟽寵寖優處窮罙恪茲當杪秋之吉廼竣重屋之祠孰共迓于鴻禧念莫踰于元嗣爰舉邦彛之舊載加井賦之新於戯用德而典神天既格三靈之貺受祉而施孫子永綿百世之基茂對徽章益綏令譽可依前皇太子威武軍節度使開府儀同三司榮王加食邑一千戶食實封四百戶主者施行皇伯檢校少保師垂加食邑實封制門下朕卜季商之吉蕆重屋之儀滌慮儼乎齋房承神娭乎熉幄祼將有廟祖宗顧歆陟降在庭天地昭假載省眇冲之質敢専福祉之䝉茂舉慶條宜先族老具官某禔身端慤廸德粹純神明襲帝胄之華傳芳元凱博雅佩詩書之訓儷美間平源愈濬而流長行既尊而屬近貳公宏化峻參左棘之班授鉞總戎丕擁六旌之重真館久頤于閒燕寢園祗奉於烝嘗適親圭幣之祠實相豆籩之列偉肅雍之秉德陪獻饗以展容念劉氏祭酒之賢厚周室執膰之賜中加邑采併實井腴於戯美萬物之能盛多既荷綏成之貺親九族而致禋祀庸彰篤叙之恩祗服寵光益隆夀嘏可依前皇伯檢校少保定江軍節度使提舉佑神觀兼充秀安僖王園令秀王位檢察尊長天水郡開國公加食邑五百戶食實封二百戶主者施行皇叔保康軍節度使師禹加食邑實封制門下朕采冬官之遺制飭秋饗之上儀念王者之行明堂既達馨香之薦若天子而謂叔父當隆親睦之恩矧陪顯相之勞與覿煕成之佑肆頒褒綍用渙徽章具官某色裕而氣龢體莊而資粹父子襲璇源之系不隕其名弟兄聨棣蕚之芳則篤其慶眷禮優于三聖寵光華于一門孜孜殫信厚之誠亹亹廸中和之行建旄外屛有華秉鉞之瞻詔禄内祠罙謹祝釐之奉屬嚴禋之備舉鬯精意以潛通克竣祼獻之容亶自肅雍之助加爰田而奠食衍井賦以陪腴於戯斂時五福用錫庶民敢専鄉神􅅘之貺豈無他人莫如同姓宜首均家國之休勉廸前猷永綏令譽可依前皇叔保康軍節度使提舉佑神觀天水郡開國侯加食邑五百戶食實封二百戶主者施行隨龍保成軍節度使譙令雍加食邑實封制門下朕循累聖之彛章袚九筵之嘉薦鋗土鳴而應律逶迤雅奏之諧黼繡張而承神彷彿高靈之堕方舉欽柴之禮肆興伐木之恩褒我信臣錫之惠衎具官某才猷敏劭德度粹温蚤依日月之光親際風雲之㑹西平有子蟬聯增慶閥之華代邸修功密勿侍禁廷之邃威儀􅈺於上閤表著肅於昕朝自履滿盈愈思謙畏清都絳闕燕珍館以祝釐簜節琱戈擁齋旄而制閫屬時毖祀相我祲容其因渥澤之頒申衍爰田之賦以彰眷遇以聳觀瞻於戱備物可以告神明既聿懷於多福友賢而不遺故舊茲大賚於善人祗服茂恩益堅冲守可依前隨龍保成軍節度使提舉萬夀觀臨海郡開國侯加食邑五百戶食實封二百戶主者施行保信軍節度使呉琰加食邑實封制門下朕系隆景命祗遹先猷布政頒常倣黃帝合宮之制配天尊祖乘素商肅物之辰百禮洽而熙事成六樂諧而淳音暢克相祲容之舉實繄左戚之良舎爵書勞揚廷敷號具官某謙冲而自牧和裕而不流誦讀詩書雅有游居之樂制節謹度不為富貴之移載念中興之母儀孰踰憲聖之家法擁立稟簾幃之訓計安深社稷之功肆爾一門冠於四姓仲叔季弟交輝槐棘之聨累將重侯鼎列簪紳之盛自渉齋壇之峻退安珍館之熙譽處罙休典刑靡墜適講嚴禋之禮有來助祭之勤載衍爰田以華茂屬於戯賜文武之胙在周人先異姓之封褒湊溆之賢在唐室有同日之拜益綏吉履勉廸殊徽可依前保信軍節度使提舉佑神觀廣陵郡開國公加食邑五百戶食實封二百戶主者施行少傅呉瓌加食邑實封制門下朕推尊祖敬宗之心以靈承上帝憲規天矩地之制以祗事合宮祀以一純二精穆卜素商之杪申以三齋七戒吉蠲熙禮之成眷言四姓之英宜洽百神之祉誕旉綸綍亶告神緌具官某靖重而端莊忱恂而謙厚聨芳棣蕚夙推呉凑之最賢流澤椒塗時廼太任之近系累奕葉重侯之貴稱外家左戚之良居惟業于詩書動不踰於法度齋壇授鉞絢物采於元戎夏篆建壇亞班聨於帝傅燕真祠而均佚冠茂屬以陞華粤臨右饗之庭丕飭嚴禋之典威儀是力有來顯相之恭籩豆孔嘉於赫高靈之墮肆頒餕恵庸渙徽章晉荒崇社之封增衍爰田之賦於戯賀慶而親異姓敢專鄉於蕃釐賚予以錫善人宜首膺於寵渥永綏譽處益介夀祺可依前少傅昭化軍節度使充萬夀觀使進封崇國公加食邑七百戶食實封三百戶主者施行賜安南國王李龍􅩾加食邑實封仍加崇謙功臣散官勲如故制門下朕撫運重煕同仁一視饗帝秩九筵之禮對越在天寧神得四表之驩丕冒出日眷南交之舊服輸北闕之丹誠肆推拜胙之釐用亶在庭之聽具官某性資端順氣概沈雄襲累世之圻疆邈處鳶飛之域稟中華之正朔乆通象譯之朝康寜踰衛武之年蕃衍侈隴西之族念聲教遐霑于絶徼而琛航屢奉于職方屬遵三嵗之彛躬祓一純之薦顧祀天祭地雖莫與于駿奔然望日瞻雲實有勤于景慕豈無慶澤式寵藩臣增賁隆名益渙元勲之籍申陪多戶載豐真采之腴以均逺邇之恩以洽穹祗之貺於戯主祭而百神享朕方欽荷于靈祗謹德而四裔賔爾尚恪共于侯度祗承徽數益介夀祺可依前特進檢校太尉靜海軍節度使觀察處置等使兼御史大夫上柱國安南國王加食邑一千戶食實封四百戶仍加崇謙功臣散官勲如故主者施行光禄大夫知樞宻院事廣陵郡開國公食邑四千四百戸食實封一千四百戶張巖可加食邑五百戶食實封二百戶制朕按奉高之圖飭總章之祀我將我享對越天地祖宗之靈汝翼汝為實頼股肱心膂之佐迄崇成于煕事宜推衍于慶條申以贊書錫之祉祚具官某疏通而鯁亮慷慨而沈深正色立朝風采聞于天下謀王斷國智畧凑于上前曩擢貳于繁幾旋懇祈于均佚作牧輔畿則京師蒙福建牙方面則戎落憺威廼趣覲圭俾還政柄蹇蹇盡匪躬之節休休有容善之心士氣浸伸人材無壅比晉宥廷之長益攄籌幄之良公選將帥而軍之紀律靡不張大明誅賞而國之綱維靡不肅折衝厭難潛消畧地之萌固圉安邉尤謹防秋之備茲秩九筵而佑饗允資一德之寅恭羽衛星陳擁皇輿而先後官聨景附端使矩之委蛇顯相惟勤居歆有自增衍榦畬之食益隆樞極之瞻以侈嘉祥以昭委注噫陟丕釐上帝既黙孚􅆄蠁之交以敉寧武功宜克懋經綸之業欽承予訓尚逺乃猷可太尉李孝純加食邑實封制門下朕嚴總章右个之禮以承神酌西都左戚之誼以施恵三年大報具殫肆祀之誠四姓小族咸秉侍祠之德舉邦彛而由舊渙廷綍以惟新具官某器度端龢性資夷雅慶善鍾于名閥典刑似其前人廼祖廼孫幾七葉珥簪之盛難兄難弟騈一門授鉞之榮佩金印以聨華燕琳宮而均佚藹然令聞表于茂婣當少皥之御辰祓九筵而展采星輪月節瞻逺駕以遥興風馬雲車沛靈斿之來下庸廣配天之澤聿隆加地之恩實衍榦畬肇荒公社於戯昭受上帝既丕延簡簡之休錫予善人其可後親親之眷勿忘謙毖以對褒嘉可依前太尉保大軍節度使提舉佑神觀進封永寧郡開國公加食邑五百戶食實封二百戶主者施行少保謝淵加食邑實封制門下朕飭躬齋戒涓日休成將蕆事於合宮先入祼於太室粢盛潔而豐備璧玉精而華光受命於穆清敢専鄉祝釐之福在廟駿奔走時則有侍祠之臣旉以明綸錫之純嘏具官某禔身肅括制行淑均富貴尊榮冠西京之外戚風流醖藉廼江左之名家蚤繇東朝同氣之親屢膺南宮特拜之寵櫜兠㦸纛聳上將之威儀衡紞紘綖煥孤卿之命服居靡期驕之習日嚴辨色之趨率履無違承休匪懈屬竣儀於重屋首歸胙於層門有嘉相祀之恭可後疏榮之渥載荒新邑增衍本封於戯浹太后之族親朕方奉慈顔而致養有福事則慶賀爾宜先異姓以推恩祗服龍光永綏燕譽可依前少保保順軍節度使充萬夀觀使丹陽郡開國公加食邑七百戶食實封三百戶主者施行太尉楊次山加食邑實封制門下朕憲皇祐之舊章秩宗祈之明祀卜秋之辛而蕆事當日之午而廽車風馬顧歆彷彿靈斿之下星鷄飛動滂洋恵澤之流眷言茂屬之良克相祲容之舉爰頒制綍亶告朝倫具官某厚重而方嚴耆龎而福艾龍韜豹畧心傳黃石之編翟茀翬衣家衍曾沙之慶襲龜紫而蹈布韋之習居膏粱而無氣體之移閨門之訓尤嚴子弟之率唯謹夙宵匪懈譽處罙隆屬神鴹右饗之庭廼山立駿奔之列暨蕃釐之布䕶宜茂祉之函蒙益以多田實之真采於戯用休申命原缺
