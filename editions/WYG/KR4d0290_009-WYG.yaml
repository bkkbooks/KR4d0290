body:
  text: 後樂集巻九宋衛涇撰奏議集英殿問對問蓋聞道者適治之路傳萬世而無弊者也仁義禮樂皆其具也紀綱法度所以維持治具者也堯舜之所以帝禹湯文武之所以王者盖用此道也朕膺光堯之命承祖宗之緒思所以闡文謨而揚武烈者二十有三年矣志勤道逺治不加進夙夜祗懼莫敢遑寜故博延豪英訪以當世之務子大夫造延待問必有藴而欲陳者且唐虞之盛固未易議至若夏之尚忠商之尚質周之尚文皆綿世歴年不能無弊豈道有升降政有損益而然歟抑為治之具有未至歟今朕正心誠意體道之用將以格物而士風猶未一也敦本抑末崇尚禮教將以範民而俗化猶未醇也義不勝利何以厚民之生刑不勝姦何以防民之偽意者仁義禮樂之用與夫紀綱法度所以維持治具者非耶何視古之有愧也伊欲道與世興風移俗易士相與談仁義蹈名節而不矜靡曼之虛文民相與興禮遜趨本業而不溺奢侈之末習八政修而食貨足七教明而獄訟息措國如唐虞巍乎跨三代之隆而無忠質文偏勝之弊其策安在熟之復之詳著於篇朕將親覽焉臣對臣恭惟陛下聰明天縱並隆五三不自神聖謙冲退託親屈帝尊廷策多士訪以古今之治道當世之急務陛下豈以草茅之言為可用歟然自陛下即位以來六策多士所以與之講論治道亦不一矣亦嘗採其所言見之施行而有補於治者乎抑草茅之士華文少實不當於理而不足以措之事業乎抑亦臨軒賜問姑循祖宗之故實而不要之於用也夫科目之興始自西漢而賢良之策亦有時而措之用者載諸史册爛然可觀况陛下捨已從人如大舜不矜不伐如大禹廣覽兼聽以極羣下之幽隠開心見誠以來天下之讜言將與海内共臻至治夫豈崇尚虛文不究實用徒應故事而巳哉雖然君聽存乎廣大臣言貴於切近以陛下好問之勤願治之切而徒泛為之辭以娛觀聽非士之所學也臣聞成天下之治者固憚於改作革極弊之政者尤患於因循改作之患至於擾擾多事而因循之弊將有委靡不振之憂二者皆非所以為治而因時制宜則治道之所不廢也昔漢武帝以雄材大畧之資即位之初侈然不滿漢家之意嘉唐虞樂商周之言屢形詔策董仲舒待問廣延廼勸帝以更化善治卒之武帝紛更制度日不暇給而一時之治駸駸愈不如古豈仲舒之言有以誤之耶終日變易法令而不出於簿書期㑹之間正非仲舒所以拳拳於帝之意也知仲舒之更化不在簿書期㑹之末則知仲舒有救弊之名無變道之實誠古今不易之常理從是而加之意焉則以之振起治功掃除積弊躋一世於唐虞三代之隆如聖策之所問誠無難者又豈在於變法易令而以多事自累哉詩曰周雖舊邦其命維新陛下亦悟於斯而巳矣謹昧死上對臣伏讀聖策曰蓋聞道者適治之路傳萬世而無弊者也仁義禮樂皆其具也紀綱法度所以維持治具者也堯舜之所以帝禹湯文武之所以王者用此道也臣有以見陛下探治道之本源而知帝王之為同條共貫也臣聞道無精粗治有詳畧本末不可以偏廢而闔闢變化之用則固有所主宰也是故大原之所自則不外於一心之㣲而治具之在天下亦不可一日廢此堯舜之所以帝禹湯文武之所以王固不外乎此道然精一執中之妙宻相授受於心傳之際而皇極之編九疇之㫖君臣上下所以孜孜講切者豈惟繁文末節是務而庶績之熙九功之序水土之平禮樂庶事之備固其形見之末效而斯道之本原固當求之於精㣲之運誠不外乎中之一辭而巳不然堯舜禹湯文武之君不能舍仁義禮樂紀綱法度以治天下而繁文末節後世因欲持此以治天下不可勝窮之變則亦無具甚矣然則帝王之治固不難致亦惟探其本而不廢其末舉其全而不溺於偏求其所以致治之實用而不惟繁文末節之是徇則古今一天下也而豈有異道哉臣伏讀聖策曰朕膺光堯之命承祖宗之緒思所以闡文謨而揚武烈者二十有三年矣志勤道逺治不加進夙夜祗懼莫敢遑寜故博延豪英訪以當世之務子大夫造延待問必有藴而欲陳者臣有以見陛下念付託之至重思宵旰之愈勤疑治道之愈邈虛巳以問承學之臣將以講明濟時之術也顧臣㣲陋何以塞明詔臣聞天下非治效不進之可憂而人情安於苟且因循之可畏以陛下勤政願治之誠邁越前古唐虞三代之治疑若引手可致而二十三年於兹計筭見效曽未之聞者是安可不求其故耶毋亦願治之心雖切濟時之術實踈士大夫安於苟且以為成習而天下萬事有不得其序耶臣竊觀陛下即位之始鋭於為治念版圖之未復憤仇讐之未殄慨然奮發將一掃而清之一旦起故老於廢棄之中擢將相於儔常之列畀之大任責以成功而徒肆大言習為誕謾玩嵗愒日無補事功比比負責而去而陛下大有為之志亦自是少弛矣故夫前日之治傷於太急而今日之治又失之太緩惟其責效之速故誕謾之徒得以肆其欺罔竊取陛下爵禄而去惟其習於縱緩故庸常瑣瑣之流得以偷安固位自為保持之計上下苟且莫肯任責而治效之不進風俗日以壊士氣日以弱民生日以困刑罰日以峻徒為九重之隠憂而不思所以救弊之術者循是而不之反則天下之患殆將有出於意慮之外而何治功之成臣願陛下思所以濟治之術革人情於極弊之餘正紀綱明賞罰毋徒徇於虛名而必責之實用則今日苟且之俗將易而為趨事赴功之臣則天下之治有所不為為無不成惟陛下所志耳臣伏讀聖策曰唐虞之盛固未易議至若夏之尚忠商之尚質周之尚文皆綿世歴年不能無弊豈道有升降政有損益而然歟抑為治之具有未至歟臣有以見陛下想唐虞至治之極考三代治尚之偏圖惟厥中以為救弊之術也臣聞三代之治本於一道道之所在初無毫釐之差而救偏補弊特其濟治之術由於時變之推移而生於人情不可巳者也唐虞之盛忠質文之名未立也而忠質文未始不為用忠之變而入於質質之變而入於文此其世變之使然有不容禦則周人之處此若其極弊不可為之世矣自常情觀之必將厭委曲而務闊踈棄文采而尚朴素以求還上古之無事也然周之君方且務為繁縟之典凡可以管攝人心而隄防風俗者纎悉備具是豈好為多事而繁文末節如後世之紛紛也哉彼其損益之相因無非因人情之所繫而扶持設施之術固有出於法度紀綱之外此太和之效所以並稱於唐虞而彌文縟典皆足以起當世之治使周之子孫世守而勿變則千萬世而長在可也而何弊之可言陛下盖亦即其所以救弊之術原其所以為人情之慮者畧其異而反其同則唐虞三代之治亦在陛下運用而巳矣奚必拘於形迹之末哉臣伏讀聖策曰今朕正心誠意體道之用將以格物而士風猶未一也敦本抑末崇尚禮教將以範民而俗化猶未醇也夫士風之不美以其無所範也今陛下以正心誠意之學將以致格物平天下之效而士風之未一得毋以承末流之弊而源或未之正乎夫俗化之不善以其不知也今陛下敦本業而抑末作崇禮教而設防範而俗化之未醇得毋以流俗之漸漬者深而制度之不嚴乎臣聞古之仕也上下相待以成其美後之仕也上下相勝以敗其事夫仁義道徳之本孝弟忠信之實古人之所以修於鄉黨處扵庠序以為吾之所當為初無所覬於上而官爵禄位之設車馬衣服之奉古人所以用於朝廷之上者亦以為待天下士而非有徳於下故士知修於家以待上之求上取夫士以為天下之用上之所以待其士者愈厚故士之所以自待者愈不敢輕上下交相待而人才日以盛固其宜也後世則不然上設其爵禄以待士之求而士亦苟且修飾以有所要於上士懼其無以自達則巧取倖進不顧禮義而上亦懼其進之濫則多為之防以繩其來此後世之通患而按之今日則尤甚矣冐進之習滋亷恥之道䘮苟僥倖於一得則抵法禁而不知畏天下固未始無卓然特立之士也而以一眚之過而絶其終身之善以一人之失而疑及天下之士則亦自流於薄惡而巳矣而何恠於士風之不美歟臣故曰承末流之弊而源未之正也臣聞古之治天下者將以定民志後之治天下者將以便民情古者上自天子而達之於民尊卑貴賤之不相侔則服食器用之間截然等級之有辨古人非故為是無益之文也防閑之不至則情偽之相滋樂好之不厭而弊將有不可勝言深為之節嚴為之限故民志一定而分守自明彼其趨向之一而風俗之厚亦其理也後世則不然舉聖人所以檢押人心者一切惟人情之便而媮風薄俗亦復蕩然于法制之外富商大賈得以交通王侯而鄉曲豪右無别於貴近自後世有所由來而較之今日則殆將不止於是者車服上僣宫闈家室畧擬都邑輦轂之下四方之所觀瞻而此風益熾上下恬然相視不以為恠則亦日流於無節文巳矣而何恠於俗化之未醇歟臣故曰俗之漸漬者深而制度之不嚴也臣伏讀聖策曰義不勝利何以厚民之生刑不勝姦何以防民之偽夫率民以義則義之所在而利固存於其中則民心之禮義若可以厚其生也而義或不勝其利得毋以義利之不能兩立而趨於利則或違其義乎夫防民以刑則刑章之立可以不試而民畏也而刑或不勝乎姦得毋以刑所以防民而求以勝民則奸宄益不勝其多乎臣聞古者先養民又教民然後治民後世不知養民不知教民一於治之而巳耳夫日用飲食之須冠昏䘮祭之具聖人初非舉手以予民也為之立其官師制其田里又教之以君臣上下之大分民既知教而民生益厚故民樂出其力以供上之用亦不以為勞我而且厲我也後世教養斯民之事曽弗之講民生之用皆民之所自為而上之人又從而征斂困苦之今日之民其無聊賴甚矣而何義之能知山澤之饒舟車之筭香鹽茶酒之𣙜凡桑𢎞羊輩所以籠天下之利者無不悉為常賦常賦有限復令先期常數既殫復令别配凡陸贄所以進䟽於唐徳宗者無不盡用陛下加恵元元勤恤民隠形於詔㫖無非以寛民力厚民生為言而守令之不奉行徒亦文具而巳水旱有減放之令而督促如初嵗久有蠲除之科而追催猶故所謂禾稼如雲問之父老皆有憂色曰豐年不如凶年而况水旱相仍曽無虛嵗上下廹蹙如此欲民生之厚其可得耶臣聞古之制刑也所以厚民俗後之制刑者所以罔民利而巳矣夫古之聖人不得巳而制刑盖為夫不孝不友不婣不睦者是禁而山澤之利無不弛以予民而或為之限節盖亦禁其末作之為害而非奪民利以自殖也後世不明聖人制刑之意而禁網之宻條章之具無非與民爭利而茶鹽之商販酒𣙜之私酤毫髮之不貸纎悉之必計刑禁之既加而科罰又從而重困之今日之刑其寃濫亦甚矣而奚偽之能防故刑不足以勝姦則奸宄之習滋熾聚於山澤者為盜賊之區而刑餘之衆不得與齊民齒者亦將流而為盜陛下廣覆宇内逺近如一通商販之禁寛酒𣙜之征雖見於比年之詔而有司諉曰國用之所須無得以辭其責故上有仁心而下不被其澤有寛恤之美名而無寛恤之實恵所謂罔民以為利誘民以為姦不反其本而徒治其末欲姦宄之消其可得耶臣伏讀聖策曰意者仁義禮樂之用與夫紀綱法度所以維持治具者非耶何視古之有愧也誠如陛下所言則信知後世之治所以不如古矣陛下以古問臣臣不敢徒以古對陛下果有意於古也盖亦稽唐虞致治之原叅三代救弊之政一政令之未純乎古一設施之不合乎古者振起而更張之以作天下苟且因循之習以起天下趨事赴功之心則以之美士風善俗化厚民生去民偽亦惟磨以嵗月無不可矣不然陛下徒有慕古之名而無師古之實則今日之策臣者徒為故事而臣之所以告陛下者亦虛文而巳是將奚益臣伏讀聖策曰伊欲道與世興風移俗易士相與談仁義蹈名節而不矜靡曼之虛文民相與興禮遜趨本業而不溺奢侈之末習八政修而食貨足五教明而獄訟息臣愚以為世有先後道無異同由大原之所自出而觀之越千載猶一日唐虞三代即斯道以為治既有以措天下於無為之盛况陛下心傳之妙得於授受之懿則施之事業移風易俗誠無難者若夫士相與談仁義蹈名節而不矜靡曼之虛文臣以為莫若有以正人心民相與趨本業興禮遜而不溺奢侈之末習臣以為莫若有以定經制夫禮義者人心之所同惟其利害得失之心日勝是以忠純篤實之意日亡是固科舉之法有以壊天下之心術也今陛下徒曰嚴法禁謹隄防足以革士風之弊臣以為無以善人之心則未見徒法之可以自行也夫科舉之法後世即以之取天下之人材而天下之人材亦輻輳於科舉之内既取之於未用之初盖亦擇之於既用之後廣之以教化之本原而恃之以趨向之所在貪濁者黜之亷介者用之奔競者抑之靖退者進之旌直言以來諫諍伸士氣以通下情若是而曰士風之不美臣未之信也夫禮制固有一定之經惟防範之既虧故至蕩然而莫知限節是固民心之無常亦上之人無以撙節之過也今陛下徒曰躬節儉務朴素足以先天下之俗臣以為躬行之至雖為正風俗之本而禮制之未眀經制之不立則人心之無厭者方且苟於目前之便未見徒善之足以有為也今為之眀其禮定其經上而乗輿之服御固有其度降而公卿又降而士庶人冠昬喪祭之節宫室器用之制嚴為限量設有科條踰者有禁斷於必行貪溺者無所歆艷而豪右兼并粟腐貫朽無所用之則民志定而爭端息無甚富之民則亦無甚貧之民無甚侈之家則亦無甚弊之家人心有常風俗歸厚若是而曰俗之未醇臣未之信也厚民之生則莫若講節用之策省民之刑則莫若謹按察之使今日之利原竭矣不可復興矣無巳則有節用之說乎節用固多術也曩者固嘗限宫觀之員而宫觀之除濫予猶故也固嘗省添差之數而添差之恩妄授猶昔也佞幸之賜得毋有過度者乎虛籍老弱之兵得毋有坐糜廪食者乎節之於彼而又節之於此則民生之厚庶乎其有自矣今日之刑濫矣不可以復峻矣盍亦謹按察之官而使之加意乎命官非不謹也州縣之間責成案於胥吏而長吏不以為意付箠楚於獄卒而獄官慢不知情郡刺史足迹嘗一至於圜土之門乎監司之按行又能盡得於一見之頃乎謹之於彼而復謹之於此則好生之徳庶乎其洽民矣舍是而曰八政修而食貨自足五教明而獄訟自息臣恐未免於揖遜救焚之舉也臣不佞陛下召至闕廷賜之清問臣首以更化為陛下獻次願陛下正人心以美士風定經制以善民俗次願陛下節用以厚民生謹按察以省刑罰以為更化之說請復為陛下終始言之臣觀藝祖皇帝為天下除大殘致民更生兵不血刃而天下歸戴征伐既下諸國必先已逋斂蠲繁苛一以仁厚為本大抵兵以不殺為武刑以不用為威財以不費為饒人以不作聰明為賢此其立國之本意而列聖守之以為家法者也仁宗慶歴間承平既久一時事類少弛仁宗一旦振起之不過於増諌員減任子展磨勘雖一二節目之或殊而大體卒不改易故嘉祐之治振古無及社稷長逺終必賴之由此道也臣以更化為獻亦豈勸陛下以變更祖宗之法度哉士大夫之媮惰者從而振作王業之偏安者思有以規恢而廣大之萬事之積廢者思有以作新而奮勵之而不失祖宗立國之本意則士風之日美民俗之日醇民生之厚而刑罰之清固有不期而致則聖策所謂措國如唐虞巍乎跨三五之隆而無忠質文偏勝之弊其策舍此將安在耶陛下復策之於終曰熟之復之詳著於篇朕將親覽臣有以見陛下咨訪之意益勤而使臣等得以竭其愚衷也臣不度愚賤竊有拳拳憂國愛君之忠一旦得奉清光條當世之事陛下所以問臣等固巳畧陳於前若天下大體之所繫而國家安危理亂之所從出者雖聖策之所不及臣安敢有懐不吐上負陛下詳延之意敢為陛下畢言之臣聞宰相者朝廷之股肱也臺諫者朝廷之耳目也非有知人之明不足以進賢退不肖非有碩徳重望不足以鎮撫中外非有不窮之才不足以賛萬機之務擇相而任之者不可以不謹也非有公忠之操不足以排擊姦回非有剛強之守不足以肅清班列非有髙明之見不足以裨益冕旒擢臺諫而付之者不可以不審也苟曰以其久位而姑以遷之幸其無過而因以任之則何以稱具瞻之望起非常之功專求州縣之下吏捜索錢穀之細務姑以應故事而朝廷之闕失國家之大議有不敢言則何以通幽隠之情輔聖明之徳臣願陛下委任擢用之際詳擇而審處之疑之當勿復用用之當勿復疑必期有以盡其才然後可也陛下愛惜名器必無濫予之爵然技術藝能之賤或充斥於朝路而宫掖非泛之恩或不厭於公言可不有以節之乎陛下親近儒臣必無偏信之失然是非毁譽之説或出於細㣲而士大夫結托之私或競趨於權要可不有以抑之乎陛下誠於是而留聽焉任宰相而重其股肱之寄用臺諫以謹其耳目之司惜名器以勵天下戒偏信以示至公則兹所以策臣四者之弊特不過於事為之末非聖明之可慮也臣是以終篇之末論次其大者以為陛下獻若乃襞績故實以為有學彫繪言語以為新竒臣不惟不敢亦不暇惟陛下赦其狂僣而録其區區臣無任昧死謹對輪對劄子論體剛健之徳堅自強之志臣聞天君也易曰天行健君子以自強不息言天徳主乎剛健君徳貴乎自強故造化所以運用不窮而徳業所以光輝日新也恭惟陛下以不世出之資乘大有為之㑹飛龍之始厲精圗治憤寇讐之逆理悼版圖之未復疆場備禦之畧不忘於念慮規恢廣大之志嘗載於詠歌以陛下英武神聖銳意事功中興之圖日月可冀然歴嵗滋久一事未就仰惟天機洞照廟謨宻運草茅書生固難窺識而臣所得竊聞者自陛下即位以來八策多士大抵曰兵曰財曰民曰風俗曰人才曰賞罰曰刑政曰紀綱法度孜孜講求不外此十數端而二十六年之間凡所規畫凡所設施凡所建立孰非所以興利除害而課效無有捄過不暇行寛恤之政而民困未蘇作武勇之氣而士弱未振取財巳浚而常憂乏用用人雖廣而尚多遺才吏冗而未澄令行而數改舉目前之事曾無足以少稱陛下意者而何暇規恢復之大計事機易失時不再來陛下富於春秋聖子聖孫本支日茂以一祖八宗之業太上皇付託之重子孫億萬年之基緒陛下一身任之可不圖終慮逺詒謀燕翼為宏逺久大之規模僅可以苟安無事而遂巳耶臣甲辰之春獲偕諸生冒上愚對嘗謂天下非治效不進之足憂而風俗安於苟且之可畏大畧言陛下即位之始銳於為治不次而用將相委任而責成功一時之臣徒肆大言誕謾亡補往往負責而去而陛下大有為之志亦因是少弛故妄議陛下前日求治傷於太急而今日之事又失於太緩故庸常之流得以持禄保身成偷安之習上下苟且莫肯任事風俗日以壊士氣日以陋民生日以困刑法日以滋天下之患將有出於意慮之外者臣嘗以更化之說為陛下獻臣所謂更化非變法易令之謂也願陛下體剛健之徳堅自強之志振紀綱以尊國體明賞罰以厲媮惰起萬事於積廢圖大業於日新顧豈在於紛紛多事耶詩曰周雖舊邦其命維新此之謂也陛下過聽擢置首選兹縁故實誤恩收召綴員班行獲因輪對瞻望天日臣竊伏惟一介踈賤僣言朝廷大體則未信而諌聖人深戒若掇拾細故上瀆淵聽則又負夙心敢以奏篇之末議嘗蒙陛下所採録者誦言之惟陛下貰其狂愚取進止二論人才臣聞人君臨制天下所與建功立業者惟人材是賴然自古及今未有儲之不廣養之不素而能備大有為之用者也仰惟陛下臨政日久博觀今日人材熟矣以為果有餘也果未足也以為不足則内而朝廷外而郡縣百司庻府其在任者員備而無缺其待選者倍蓰而又多以為有餘則因循玩嵗而職業不舉委靡從俗而事行不修執政大臣所以圖謀於廟堂左右侍從所以論思於邇列皆陛下所親信委任非臣踈賤所得知也至於當世知名之士一時簡記之臣皆陛下異時之所拔擢録用陛下亦嘗致察於斯乎其自任以重輔導君徳不汲引親舊以為黨與不棄遺踈逖以誤信用足以當腹心之任者㡬人昌言正色别白賢否務存大體而不責苛細務振綱紀而不望風㫖足以任耳目之司者㡬人持節刺舉肅清所部不結權要以自售不借孤寒以示公足以膺臨遣之寄者㡬人勸課農桑使民安業不為姑息以要譽不肆貪暴以害民足以稱牧養之責者㡬人一旦邉陲有警羽檄交馳臨機料敵彈壓三軍之衆威聲徳望鎮撫中外之心足以備緩急之用者㡬人聖明在上天涵地育臣不敢謂舉無其人也聞之議者竊謂今之士大夫徇利而不顧義矜名而不務實習成軟熟則謂之得體稍知激昂則指為生事公清鯁亮者苦落落而難合脂韋容悦者常齪齪以自媒忠義篤實者以迂闊而見踈貪鄙巽懦者以僥求而倖進是以氣節頺敗而不立風采銷委而無餘庸庸垂紳黙黙尸位若大若小渾然一律前至者冒寵而無恥後來者效尤而何憚賈山曰士修於家而壊於天子之庭此之謂也風俗成矣國家何賴而况邪徑未塞羣小爭趨苞苴賄賂之公行干託請求之無厭附炎逐臭希寵爭榮陛下以至公之心而猶牽於毁譽之偏私以至明之見而未免於人情之曲徇邪正之辨未盡昭白是非之論未盡公當頽弊風俗沮壊人材莫甚於此臣願陛下光昭聖徳奮自宸衷念國勢之所以未張思人材之所以未振廣薦賢之路必惟賢者而後任盡任賢之道毋使不肖參其間窒其邪枉之門時出非常之斷崇奬骨鯁之士則諛黙之風自革簡拔靜退之人則躁競之徒自逺廣寛容之度毋疑人臣之為近名養敢言之氣毋使人臣之懐畏罪儲之日廣養之日厚風俗丕變賢能輩出一旦取而器使之唯陛下所志而曰人材不足者臣不信也將見主威以隆國體以固靜足以強根本動足以復土疆何弊之不革何事之不成何功之不立哉惟陛下留神省察豈惟臣之幸天下之幸也取進止三論敬天臣觀董仲舒告漢武帝曰天人相與之際甚可畏也又曰國家將有失道之敗廼先出災害以譴告之又出恠異以警懼之尚不知變而傷敗廼至以此見天心之仁愛人君而欲止其亂也是知天人之際其應若響災異之變良不虛發自昔帝王未嘗無災異惟睹變思懼則災異自弭轉禍為福未聞安於時數之適然而不思所以應天者也仰惟陛下嚴恭寅畏恪謹天戒二十六年之間兢業之誠有同一日人君患不勤儉陛下宵衣旰食菲飲惡衣勤儉根於天性人君患不慈恕陛下勤恤民隠謙恭接下慈恕本於至誠宫室苑囿無所増崇狗馬珍竒無所玩好游心典籍探賾道原凡君徳之所宜有者陛下兼而全之矣每遇災眚側身修行惟恐不至陛下畏天之誠真得聖人之用心矣竊見五月以來常暘為沴田苗既槁川澤多枯旱暵之災所及浸廣既踰秋序膏澤尚屯寛恵屢施禱祠㡬徧而旱氣盤結卒未盪除雲油然而復收雨將降而輒止陛下焦勞於上百姓嗷嗷於下羣臣左右相顧駭愕莫知所為道路傳聞或云諸郡間亦得雨而畿甸之内獨爾愆期此尤足以見天心愛君之仁正陛下恐懼修省之日也借曰君徳全盡無有闕遺陛下亦安可以是自喜也成湯至聖也政之不節使人之疾苞苴之行讒夫之昌女謁之盛宫室之營宜皆所無有也而桑林之禱必舉此六事以自責盖聖人畏天之深為民之切躬自貶損寜過乎厚出於此心之誠非有所勉強不得已而然也况夫庶事之間容有未正上澤壅格而不得下究下情抑鬰而不能上通天意人心不甚相逺以人求天上下不交則為否矣變異之見非為此乎頃者都城喧傳謂陛下内出詔音求言自輔人人踴躍莫不思奮側聽旬月始命都省降㫖言事而責躬之詔尚遲回而未下陛下豈以是為虚文而所以應天者不在此耶如近日避殿減膳徹樂奏告天地宗廟社稷臣知陛下將次第而舉行之矣臣竊惟仁宗皇帝在位四十二年丕烈懿範未易殫叙求其所以致治之盛莫若盡敬天之誠信史昭垂爛然可睹慶歴四年旱謂輔臣曰方嵗旱而飛蝗滋甚百姓何罪黙禱上帝願移災於朕躬七年以久不雨避殿減膳下詔責躬求直言戒勵百官罷免輔臣以答天戒仁祖敬天為民如此其切何災不弭何福不臻太平之盛冠古莫及良有以也臣願陛下逺監成湯近法仁祖謹思天變駿發徳音布宣罪巳之辭益廣直言之路陛下所以應天者至矣盡矣為陛下之臣而不能輔宣主徳實恵生民所以傷和氣而致乖異者宜如何自處也然後嚴敕大臣執政侍從以下及州縣之吏更相警懼思所以致旱之由為所以恤災之備封章來上虗心聽納庶㡬下情盡達精意感通上天降康災沴銷釋天下幸甚臣充賦館職恩許言事既得面對拳拳愛君憂國之誠不能自巳敢無一言先以開廣陛下之心所有政事闕失及當今急務續具條奏臣冒犯天威罪當萬死惟陛下裁赦取進止又一論彰恭儉之徳著憂勤之心爵賞當謹紀綱當振崇諫以得聽言之要寛民以盡恵下之實吏職使之必修軍政使之必肅臣恭惟陛下聰明天縱嗣承大統舜禹授受于古有光遵夀皇之成規對廷臣於黼座將以講求治道夫豈徒應故事而已臣側聞羣臣進言者多勸陛下即位之初當大有所設施以竦動四方之觀聽陛下聖意以循循為治臣有以見宸慮髙明度越前古固非常情之所能量度也臣竊觀自昔欲有為之君非不好大喜功志髙慕逺方其銳意圖治凡創端造業皆足以震耀羣動興起人心論治者亦皆喜談而樂道及閱嵗踰時意銷氣沮曾無尺寸之效而淪胥以敗往往銳始者必怠於終競虛美而本無誠心故其害至此孰若因人情之所欲審事勢之所宜圖實效而不隆虛名務逺謀而不趨近利其初雖若循循未快人意然盡力於躬行用功於悠久積日累月寖明寖昌計筭見效反出於欲有為者之上得失可槩見矣昔堯以兢兢日行其道舜以業業日致其孝禹之克勤湯之檢身若不及文王之翼翼小心武王之繼志述事凡詩書所稱此六七聖人不過畏天命保人心側身修行恭巳任賢慢逰逸樂之是儆是戒憂勤恭儉之是訓是圖初未嘗為驚世駭俗輕發易變之舉也然後世稱聖人盛治之極必曰唐虞三代豈非循循之效哉陛下以不世出之資享壽皇巳成之業踐阼以來薄海内外小大臣民傾耳拭目以徯維新之政陛下聖意先定周宻詳重謹於所發不為目前可喜之事誠有得於聖賢循循之義矣臣愚猶有私憂過計試為陛下言之陛下慈仁本於天禀未嘗不恭儉也而恭儉之德未信服於人心陛下日昃視朝咨詢忘倦未嘗不憂勤也而憂勤之志未昭白於天下爵賞所以勵臣工也而人以為多濫紀綱所以尊朝廷也而人以為未振有納諫之盛德而未聞行諫之英斷有恤民之仁心而未聞寛民之實惠詔百官以修職業而苟且之習未革勅將帥以勵軍政而貪刻之徒實繁半嵗之間課效未見救過不給衆人竊議有識憂疑毋乃陛下雖知循循之可尚而未能踐其實乎夫聖賢之循循與世俗之因循相近而實相逺也聖賢之循循亦順至理之當然力行而不息耳苟無誠心實徳悠悠玩日時乎無事則苟安而不慮事變之至則倉卒而無謀徇一時之娛忘千載之患此乃世俗因循之害非唐虞三代所以為治之意也况今日風俗頽靡百度弛縱人材削弱國勢未張汲汲有為尚恐不濟若猶因循其弊將至於不可為矣臣慮臣下或聞陛下有循循之忘遂希㫖迎合飾因循之説以誤聖聽非忠於為陛下計也臣願陛下剛健篤實勵精圗政躬朴素以杜奢侈之漸防逸豫以戒宴安之毒則恭儉之徳彰矣輟燕閒之暇以攬機務絶左右之私以親正人則憂勤之心著矣公予奪以示懲勸惜名器以待功勞罷内降之命遵累朝之法則爵賞知所謹矣毋以朋黨輕疑外廷毋以道學併棄賢士擇任耳目之寄大開公正之塗則紀綱庶乎振矣有奬飾而未聞拔擢有開納而無所施行非所以崇諫也務斥謟䛕之説䕶養忠直之氣斯得聽言之要矣貴近之濫恩未革無益之費用未省非所以寛民也條無名之横斂議蠲減而必行斯有恵下之實矣擢亷勤之吏以勵偷墮嚴按察之司以治贓汚則職業修矣昔之以賄賂進者果於棄而不用今之以貪黷敗者寘於法而不貸則軍政肅矣凡此八者陛下果事事而加謹物物而加察勿以小善無益而不為勿以小惡無傷而不去仁心善政與日俱新如火之然如泉之達使聖徳日以光大功業日以休顯斯足以盡循循之實矣苟懐安怠忽無所施為臣恐未免終墮於因循之説也惟陛下留神幸甚二論人才六事臣聞人材盛衰繫國隆替國之將興則朝多雋良精神可以折衝及其將卑士氣銷弱緩急不可倚仗此為國逺慮者所當憂也然材之盛衰不同非天之生材有時其所以壅閼摧傷之者固非一端也書稱用人必詢於僉謀孟子論賢必斷之國人盖人材至多非一人所能盡知所可信者天下之公議也公議所與從而與之公議所非從而去之予奪去取一本乎公議則人之賢不肖曉然而易辨矣若舍公議之所在信任左右以為耳目則愛惡毁譽或行其間浸潤膚受有不自覺左右所謂賢未必為公議之所與也公議所謂賢未必不為左右之所忌也其言亦間有合於公議者矣盖欲取信於人主而為他日不肖者之地也如是則䛕謟阿附之徒僥倖獲用而孤立獨行之士無自而進矣此人材所由衰者一也人主之徳莫大於虚心無我舜之所以大不過曰舍巳從人夫惟虛心無我則可以翕受衆正舍巳從人則能取人以為善苟或蔽有我之累無舍巳之誠則愛憎任情不得其正鯁亮者未必非忠也而終惡其忤巳䛕説者未必非佞也而終喜其順巳任政事者據誼執正則以為好異遵守成謨則以為稱職任言議者論奏無隠則齟齬難合少所建明則馴致進用抑不思鯁亮者果為愛君乎䛕説者果為愛君乎此人材所由衰者二也序進賢能大臣之職也人主不能自用天下之材故舉之而屬之大臣大臣進用乖方裁量失平則易其人可也達賢進能之柄不可奪也大臣欲避主疑以為自安之計遂不以明揚士類收拔人物為己任用舍進退惟奉成㫖不敢平章至使衡柄旁出進取多門大臣失職此人材所由衰者三也人材固未易徧識伏於䟽逺者尤不能知操柄者苟平心應物廣詢博採以為賢則用以為不賢則棄借未盡當十得六七矣奈何平居為親故擇官之意常多為國求才之意常少好趨進者以昵巳而亟用樂安恬者以疎巳而見遺權力多助者不能沮止孤寒寡援者不能薦進守格法則賢愚同滯務甄拔則槩量無準此人材所由衰者四也士大夫之資禀不能皆齊而其趨向亦各異亮直者或易至過抗而安於循黙者必指以為沽名剛正者或少所涵蓄而便於容悦者必指以為矯激私相詆訾浸淫不巳遂致人主入其言亦疑其為沽名疑其為矯激也而疾之彼固未免於或偏也就其偏而論之世之容黙者常多而剛直者常少人主又不能為之保持所以多者常勝而少者常見沮也此人材所由衰者五也士大夫所以重於朝廷者以去就不苟也有官守者不得其職則去然後可以守其職有言責者不得其言則去然後可以行其言夫義所當去聽其去非特足以全士大夫進退之節亦所以重朝廷之職守也若漫然欲去而不力泛然止之而即止去就義乖亷恥道䘮是人材之與紀綱上下交壊之也士大夫愈見薄矣此人材所由衰者六也由此觀之人材盛衰曰君曰大臣曰士大夫皆不能無責焉方今明盛之朝固無棄材之嫌而未免有乏人之憂者其來非一日也臣願陛下深維國家之安危憫惜人材之衰少先斷自宸衷公眎兼聴照臨壅蔽捐去愛憎奬納忠讜然後明詔大臣不私於進退士大夫不私於論議使羣材進無摧傷壅閼之患則朝廷之基本鞏固賢雋輩出建功立業無不如意矣此尤當今之急務也惟陛下裁之幸甚取進止
