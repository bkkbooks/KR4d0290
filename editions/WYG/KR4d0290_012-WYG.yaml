body:
  text: 後樂集巻十二宋衛涇撰奏議繳進御筆劄子臣等宻上奏事間恭奉玉音皇太子參决事朕有此意甚久昨日趙彦逾經筵求去奏及此此事斷自朕意不欲因人言批出卿等可商量教穩當欲待批出臣等仰見陛下聖明獨斷爲宗社大計不繇臣下奏請不勝慶抃臣象祖奏陛下欲得皇太子習知朝廷政事此宗社大計非臣下所敢奏陳出自英斷尤見陛下聖明臣彌逺奏此事當出自陛下宸斷臣涇奏陛下適所宣諭誠出獨斷然今日與真宗天禧間故事不同亦與夀皇淳熈末年故事不同天禧間真宗聖體不豫所以有此淳熈間夀皇已有倦勤之意今陛下春秋鼎盛正當躬親聽斷之時聖意不過以皇太子年齒長懋欲得習知政事令與宰執聚議庶幾習熟天下事體它時付託得人日逐於侍膳問安初無相妨臣所慮者恐外人不知妄有傳播撰造語言陛下聖明必能洞照臣象祖等惟朝殿奏事得侍清光退後凡有事件多是繳入非時無縁可得通達内外之意所以向來韓侂冑因此得以竊㺯威福稔成姦惡幾危國家今得皇太子㑹議臣等奏事既退或陛下有所宣諭或臣等有敷陳未盡之意皇太子於侍膳問安之際皆可以從容奏禀内外不至扞格不通且更不容外間别有人出入禁闥干預朝政豈非宗社大幸奏事畢臣等又奏適來所聞玉音聖意已定容臣等退而商議以聖意擬定御筆進入今謹用别幅擬進更乞睿覽如合聖意即乞御筆批降施行同宰執奏皇太子㑹議資善堂劄子臣等檢照國朝㑹要大中祥符八年二月十八日詔元符觀皇子就學堂宜以資善爲名此國朝資善堂所繇始也至天禧二年八月甲辰昇王益受仁宗舊諱爲皇太子四年十一月令中書樞宻院大臣並兼東宫職任庚午詔皇太子與宰臣樞宻使以下就資善堂㑹議此國朝㑹議所繇始也又續㑹要政和五年二月十日立皇太子宫三月七日出閣過府時皇太子未稱宫就資善堂聽讀又中興㑹要紹興五年五月八日詔擇日降制除防禦使伯琮孝宗舊諱爲節度使封國公就資善堂聽講先是宰臣趙鼎得㫖於宫門外造書院屋一區欲伯琮就學有司以圖來上凡建屋十有六間從約也至是書院成上曰只以書院便爲資善院俟除授訖命儒臣爲直講翊善悉知資善故事以前項典故言之則講堂資善初無異所講讀㑹議悉在其間今來皇太子既巳過宫開講已降指揮今臣等並兼東宫官日赴資善堂㑹議實與前項典故一同伏覩昨日降出皇太子奏劄仰見皇太子隆謙盛德加禮宫僚而臣等稽之舊章揆之私義有不容自己者皇太子地尊儲極國本至重既居新宫不應特以㑹議之故再臨舊所講學之地既未合典禮亦非所以示觀瞻况臣等備數宫僚許陪侍講學因而㑹議於勢便順若俯狥冲請以尊就卑誠非所安臣等不敢奉詔伏望聖慈特降睿㫖並依典故施行實爲允當取進止五月八日三省樞宻院同奉聖㫖宰執既兼東官官令就講堂㑹議乞蠲放總制無額窠名錢奏狀臣近者不避訶譴輒具申奏乞將潭州十二縣拖欠嘉定四年已前總制等無額窠名錢米昨來巳行倚閣見今無可拘催者乞與盡數蠲放以寛諸縣以惠疲民尋䝉朝廷從糧料院指定止將嘉定三年已前未解錢米許照大禮赦文蠲放所有四年零欠只令斟酌接濟圓融補解臣自合仰認德義不宜復有控呈竊縁潭州諸邑自㓂盜驚擾之後兵革供應之餘閭閻蓋藏非復疇昔州縣事力委是窮困前守臣曹彦約見得此錢難催遂以便宜倚閣散榜民間不許催理倚閣之後今已兩年總所必欲舉催諸邑何所從得前後失據公私徒擾所謂斟酌圓融不過移新掩舊舊數必令帶補則新欠將復如前徒掛簿書無益調度兼創殘累嵗僅得一稔疲民方幸少蘇前政倚閣之錢今日再行舉催儻或有補公家任怨有所不避實縁民力凋敝無處催理徒爲失信使貪吏並縁刻削豈不上負朝廷勞來安集之意况臣前所申述本州總制元額内一項南嶽施利錢一歲約二千餘貫巳䝉朝廷撥入本廟又一項常平抵當庫息錢一歲約三千五百餘貫已承提舉司取囘兩項尚占歲額無可趂辦總所既不爲豁除有司亦不爲指定徒令鑿空貼補其爲民害尤無窮也朝廷但照大禮赦書蠲放三年巳前零欠可見雨露均平之意但潭州係是連年瘡痍不比他路非略有施舍無以少寛民力是敢再披腹心欲望聖慈特出睿斷將嘉定四年分諸縣所欠畸零特與盡數蠲放劄下總領所照㑹在朝廷所捐寧有幾何而邑里之民受賜甚大其於保障誠非小補伏候勅㫖乞賜張栻諡劄子臣仰惟聖朝加惠臣下寵榮終始生有爵秩既顯其身没有易名俾垂不朽至於勲德節義聲實彰著不以官品亦特命諡其蘊德丘園雖無官爵聽所屬奏賜著爲定令以詔來世如邵康節之在元祐徐節孝之在政和是也二臣官不過學校幕屬爾而特得賜諡者以其學術重于時孝行推于鄉名位雖卑道尊德貴高視品秩所以崇儒學奬操行厲風俗也臣竊見故承事郎右文殿修撰張栻魏國忠獻公浚之子家本廣漢隨父出蜀因居潭州師事南嶽胡氏盡傳伊洛之秘遂以其道鳴於西南著書立言開廸後進四方士子皆宗師之其學雖本于仁義誠敬而造理精微遇事昭徹更厯内外治民訓兵理財聽訟所至有績可紀超出諸儒之右隆興初始以軍事入奏首勸孝宗皇帝以明義復讎正名絶㓂孝宗異其言而君臣之契合凡奏對開陳忠義憤激未嘗不以讎恥未雪不共戴天爲憂此宜其銳意用兵輕舉躁動而時宰有以恢復爲己任者謂㓂衰弱可圖廼遣泛使欲開兵隙栻又獨爲上言兵弱財匱官吏誕謾未有必勝之形而必勝之形當在早正素定之時不在决機兩陣之日又引諸葛亮景延廣爲喻在辨名實之分無令小人投隙以售其姦上爲歎息褒諭以爲前所未聞及詔以知閤門事張說僉書樞宻院事栻爲講官初無言責夜入手疏極言不可且詣宰相質之宰相慚憤不堪上獨不以爲忤親札疏尾使宰相諭㫖栻復再奏上意感悟命已終寢宰相實隂附說出知袁州申說前命言雖不盡用說竟以罪謫使開禧丙寅權姦擅朝妄起邊釁之時有如栻者鑒機識變守正不阿沮其萌芽則朝廷必不有過舉矣緬懐忠賢百世可師孝宗皇帝重其儒學因以引爲勸講擢贊宰司讒者忌嫉寵眷不衰連帥二藩有意召用而栻不幸殁于盛年位不克究然而學者至今尊其道德相與私號爲南軒先生官未及諡其家既不敢自有請門人弟子又無通顯於朝者爲之請士論湮鬱三十餘年暨臣到任列詞陳乞臣今將去郡若又隱嘿不爲一言則是上無以昭聖朝崇儒重道之公下無以慰逺人尊師尚友之義濫居所屬爲吏曠職甚矣臣愚謂宜下之太常使博士狀其行苟應得諡錫以美名使天下後世知儒學節義之貴過于品秩於以激勸誠非小補奏陞差李義充飛虎軍統領袁任充親兵忠義統領狀照對連年盜賊俶擾之後今方稍就平寧人心易於弛玩軍政不可不修要當精擇其人庶幾可以責任湖南一路所恃官軍惟飛虎軍與親兵忠義粗爲可用昨因調發累厯戰陣間有死損逃亡逐旋招刺多是新人當此事定之時正須修明軍政閱習武藝俾各精熟庶幾可備緩急惟是兩軍主將久闕正官誠爲非便今於本路見任滿替曽經試用稍有勞効將佐官内選擇二員皆是資序相當别無超越合行奏辟下項保明詣實欲望聖慈特降睿㫖將李義陞充飛虎軍統領袁任充親兵忠義統領補見闕管幹就乞給降付身發下本司給付祗受須至奏聞者一員忠訓郎飛虎軍正將李義元係班行出身開禧元年曽差部兵上邊嘉定三年又權飛虎軍統領收捕郴㓂立功前政帥臣曹彦約任内節次具申朝廷乞正差飛虎軍統領縁巳差許國遂止差李義充正將許國避嫌䝉朝廷行下令赴樞宻院禀覆職事統領見今闕人照得雖有統制官一員縁本軍所管軍馬稍多半係昨來宣撫司發回茶商改撥之人及今討捕撒戍回軍正賴主將相與修立軍政訓練士卒兼郴州等處探報江西南安縣赤水峒人昨因讎隙常有報復之意本路桂陽縣抵接界分切慮人情不安所合預作隄防設有不測正要曽諳練溪峒將官前去鎮壓其李義人材少壯職事公勤累立戰功久在山前人頗信服緩急可用今欲辟差李義充上件飛虎軍統領補見闕一員武翼郎前差充荆湖南路安撫司準備將領袁任出自名家寘身右列不廢儒學練達事宜兩任湖南差遣諳習民情長於撫御委之以事悉能究心親兵忠義元額千人近年申明補刺人數加倍與向來事體不同以兩軍之事盡付一將正須稍重其權要亦不可輕畀昨來許國稍能訓緝漸成紀律今若非其人必致廢壊前規卒難整頓前政雖已奏辟丁松以私計不便尋不願就今欲辟差袁任充上件親兵忠義兩軍統領補許國元來窠闕右謹録奏聞伏候勑㫖列薦徐筠朱著留筠乞賜甄擢狀臣等誤䝉聖恩付以一道耳目之寄凡所部官吏之庸濁苛刻者不敢避怨具以實聞悉䝉朝廷施行不勝逺民之幸至於良二千石治行表表衆所共睹者若知刺而不知舉何以勸功竊見朝請郎權知全州軍州事徐筠學古好修謹身率下不事表暴力行撫摩刑役清平田里安帖餘事著書有補後學又能崇教化以厚風俗築城壁以固籓籬其它善政不一而足朝請大夫權發遣道州軍州事朱著持身㓗㢘蓄學醇正居家孝友賦政中和到郡之期雖未爲久而豈弟之實信服于民財賦獄訟色色整辦加之志趣端靖不爲苟合人品既高政術亦茂朝散大夫權發遣邵州軍州事留筠存心簡靖臨事寛明雖出相門實通吏道到官以來能於整辦之中不失拊循之實已上三人臣等參之頗審若蒙朝廷特賜甄擢决不上孤使令列薦薛洽趙崇模羅瀛趙伯駿蔡師仲趙彦飭乞賜旌擢狀臣等竊惟承流宣化其責在守令揚清激濁其責在長吏監司臣等誤膺委寄既以一路郡守之有治行者冒昧奏聞若及守而不及令何以爲字民者之勸竊見奉議郎知潭州長沙縣薛洽持身清㓗涖事醇明謹儉自持不事形跡毎月催科僅足則止能藏富於田里不窮民以自豐考之近時可爲㢘吏通直郎知潭州安化縣趙崇模冑出相門學有家法明練而不好察公㢘而務近民安化民獠錯居崇模以豈弟行之無不馴服用之它日當爲逺器宣教郎知潭州醴陵縣羅瀛爲學醇正臨事寛明能於催科之中不廢撫字之政終日孜孜主於愛人考之行事允有賢業通直郎知潭州湘鄉縣趙伯駿恬靜有守㢘介無華剖决得宜不事苛察湘鄉邑大事叢伯駿從容治之若有餘地參之輿論委有能稱宣教郎知道州營道縣蔡師仲性資融明器度開爽達於政術每事練詳而又持身㢘勤御下有方若試之事任實爲通材從事郎知衡州來陽縣趙彦飭奮由屬籍自致儒科練達吏能不廢學業徃時帥臣朱熹亦嘗舉之令爲來陽居多惠政已上六人臣等互加參稽頗爲詳審欲望朝廷特賜旌擢以爲作邑之勸它日設不如所舉則繆罔之罪臣等所不敢逃奏舉趙崇度趙彦北徐簡乞賜擢用狀同諸司臣等誤䝉聖恩分職臺閫深圖報國莫急薦賢今於部内得一二人敢用條陳以備器使臣等伏見宣教郎知桂陽軍趙崇度家法嚴整吏事詳明推其惻怛忠誠之心施於撫摩愛利之政桂陽爲郡地險而僻民健以嚚崇度臨之以至㢘行之以不擾人自感服舉無異詞即其操履允是逺器文林郎知郴州宜章縣趙彦北沈浸詩書被服儒素其父公說在孝宗朝爲賢監司遺愛去思今滿蜀郡趙彦北克濟前美不墜家聲今宰山邑政有條理申嚴舊制結集土丁邑境有備故峒㓂之擾止在旁邑而獨不犯其境百姓以此感之從事郎邵州新化縣令徐簡出自儒家邃於講學文墨議論能世其傳故施於邑政藹有循良豈弟之風險俗頑民安其政教善怙惡懼百里維懐是三人者分處郡邑皆能爲陛下牧養小民培植國本况崇度乃故相忠定公汝愚之子陛下念其父之忠勲諸子多䝉録用豈待臣等以爲軒輊特以職守所在不敢蔽賢如彦北如簡則沈淪下僚無蚍蜉蟻子之援若不論薦何由自達伏望聖慈特賜擢用則三人者必能有所植立仰益明時後或不如所舉臣等甘坐謬舉之罰奏舉封彦明充將帥狀准行在尚書吏部符承嘉定五年十月二十八日都省劄子臣寮奏節文諸路帥憲許每歲奏舉可備將材及堪充鈐將以上任使者各兩人於奏内聲說或不如所舉甘同罪罰隨以姓名籍之宥府候將帥有闕參以衆薦次第除用如經録用有悞使令檢照元舉官重加責罰以革徇私覔舉之弊十月九日奉聖㫖依臣竊惟養之當有素而不可取具於臨時者將才也自頃用兵江淮諸將遇敵輒敗蓋望風奔潰者多有之豈非蓄養無素而取具臨時之過歟臣伏見降授成忠郎封彦明奮身行伍有志事功頃在兵間粗著勞效方和議未成時制置大使丘崈嘗薦於廟堂臣於是時實備位政府崈謂其人材武勇若奬勸作成之它日必爲朝廷之用頃因峒㓂猖狂自殿司統制移飛虎軍本以才選偶不諳地利失於輕動遂致敗衂因此罪斥然其御下整肅能與士卒同甘苦軍中至今思之謫居秭歸未䝉湔祓憂患頓挫當益増其所未能廢棄之久實爲可惜臣一向退間少與兵將官交接敢以所知上塞明詔伏望聖慈棄過匿瑕特賜甄録以備邊場之儲亦激勵將才之一術也臣今舉封彦明係嘉定六年第一員之數後不如所舉臣甘坐謬舉之罰奏舉布衣胡大壯乞賜褒録狀檢凖嘉定五年十一月十二日近降指揮臣寮上言節文方今收用人才非止一塗然山林畎畝之間懐德抱道不求聞達者豈無其人願俾監司守臣博加採訪具以名聞無爲文具朝廷審察其實以禮招致從而尊顯之庶幾上有得賢之實下無遺材之嘆三省同奉聖㫖依臣聞君以求賢致化臣以選賢報國古之道也恭惟陛下聖化日新上法乎祖宗崇儒重道博選賢俊之意比者明詔有司加惠遺逸責之搜訪俾以名聞且欲考察其實以禮招致而尊顯之雖堯舜之用心大禹之勤求不是過也臣濫分符閫逺在湖湘欽承德音夙夜惟謹廣求精選幸得其一詎敢忘報國之誼干蔽賢之典而不以上達哉臣伏見潭州衡山縣布衣胡大壯故寳文閣直學士諡文定安國之孫右承務郎宏之子也抗志高逺制行介潔自其少時已著孝友之稱既長受其祖安國之學於父宏研究經術博通墳典其持論以明義利爲本其立已以尚誠實爲要冠歲學成即不事科舉隱居衡嶽之下躬耕自給讀書自娯爵祿外慕不以嬰其心深藏固匿足跡未嘗至城市州縣官必禮於其廬然後得見於是行成於身理於家信於鄉黨達於逺邇邦人敬愛咸慕其道德尊之曰西園先生平日著述雖多而封建論數篇尤爲先達推重近時如前帥臣曹彦約提舉樂章咸嘉其行相繼剡上本州以嶽麓書院堂長虚席嘗遣官吏以禮延致至今力辭未就臣觀其學識節行足以師表後進蓋亦古之所謂逸民也臣竊聞孝宗朝嘗有詔舉遺逸於是福建諸司芮􅂱等以魏掞之之名來上則掞之自布衣召對賜第命爲學官又嘗與監察御史謝諤論郭雍之學皆本於易則雍自冲晦處士加封頥正先生此皆近事彰彰在人耳目者矧自陛下更化以來動遵孝宗成憲至於奬進恬退尤所急先今大壯年踰六十雖曰無求於世而體力康强亦非無用於世者若使朝廷試加表異俾如魏掞之郭雍輩得以齒下士被光寵於朝不至與草木同腐則興起人心轉移風俗視孝宗時亦何難焉是以臣愚輒體古人報國之誼不敢泛然論薦而以大壯應詔欲望聖慈特降睿㫖下之三省斟酌典故將大壯量才褒録或俾之一命而授以在外學官之職或錫之綸誥而假以處士之名庶幾山林巖穴之棄材悉爲時用可以仰副陛下求賢致化之意矣臣不勝惓惓奏舉黄學行劉用行李劉乞賜甄擢狀臣聞事君以仁者臣道之大端薦人於天子者諸侯之職分臣通班秘殿分閫遐藩圖報國恩所當薦士知賢不舉臣竊恥之臣竊見從事郎全州州學教授黄學行識度高華學業醇茂蚤優舎選復占儒科分教清湘留意樂育鄰境士類從之如歸餘日著書進而未已守臣曽松徐筠嘗薦其政績文學近者提刑樂章提舉林行知亦薦其文行俱高臣參酌公言允有實跡從政郎永州零陵縣令劉用行器資沉静趣向端方决科効官尤精吏事初任真州揚子縣尉克舉其職備著公勤制帥黄度守臣潘友聞皆嘗露章薦其材美今爲零陵令勞心撫字已著善聲稽之輿論允謂通材廸功郎潭州寧鄉縣主簿李劉學問深粹器識醇明更化之初於貢闈對䇿論事剴切知舉樓鑰等得其文以爲洋洋晁董公孫之對可為清朝得人之賀既而從臣曽㬇何異黄疇若又以其學問淵源文詞秀發可配古作薦之於朝今爲寧鄉簿領臣每試之以事見其剖决詳明議論平正表裏無瑕足爲逺器巳上三人資厯雖淺文學俱優在臣部内考察頗審况前後各有論薦欲望聖慈特賜甄擢以爲舘學臺閣之儲設它日不如所舉臣敢辭謬舉之罰應詔舉李燔陳元勲鄭凖充所知狀今月二十三日凖尚書吏部符承嘉定六年正月十八日勅中書門下省臣寮劄子奏節文乞明詔内外之臣各舉所知在内侍從臺諫兩省官在外帥守監司立以期限不拘資格不拘統屬各許於文臣常調之中舉實才之士二三人其有言行可稱事功可述並條列聞奏以其所薦籍之中書精加審覈次第選掄倘或欺誣必與連坐正月十八日三省同奉聖㫖依自指揮到日限十日聞奏臣伏見文林郎添差江南西路轉運司幹辦公事李燔經術精博趣操剛方早從師友多士推服分教襄陽爲帥臣鄭挺挾私奏劾自是杜門刻志學問不屑意禄仕堂審掌故列屬寺廷皆辭不就尚淹選調未厭師虞宜加崇奬以勵㢘退奉議郎前荆湖南路安撫司主管機宜文字陳元勲文采高華吏能强濟素安平進有志事功方峒㓂搶攘宣勞幕府剸裁區處曲盡事宜帥臣曹彦約嘗以功狀聞於朝廷今巳書滿以其才力使任劇煩優有餘裕承直郎差充江淮荆浙福建廣南路坑冶鑄錢司幹辦公事鄭凖性資邁爽學術淹該䇿名儒科通練世故陸沉州縣未究所藴若䝉選擇必有以自見於時臣誤䝉聖恩俾分閫寄自揆疎拙無以補報祗承明詔許之薦舉敢以所知者三人冒昧以聞如燔之學行實堪臺閣之選若元勲若凖俱可備中外職任將來不如所舉臣甘坐謬舉之罰奏舉張聲道張履信廖視乞賜甄擢狀臣䝉恩分閫備位逾年職在藩宣責兼刺舉欲率其屬當簡乃僚竊見朝請郎改權發遣永州軍州事張聲道早擢儒科嘗丞冊府文采學問士論所推自去班行洊更麾節今爲永州留心郡政剖决民訟發擿吏姦撙節非泛之資罷去非義之取如零陵舊有竹稅久已無竹而稅額尚存聲道到任採訪即爲蠲放客旅舊苦重征多不入城市井蕭條聲道寛其認額民旅遂通又能捐俸助學勤身率下豈弟之政田里安之識者謂其材堪䑓閣不當淹滯逺外朝請郎通判潭州軍州事張履信賦資清謹臨事强濟昨宰巖邑已著能聲帥守監司屢嘗論薦通判本州過滿三考凡事任責未始辭難起發經總制錢數目浩瀚稱提新㑹協贊爲多其他闗决舉無淹滯持身㢘潔始終如一試以内外繁劇之任必有可觀朝奉郎前通判衡州軍州事廖視器質端方克守家法嘗任理掾以直去官兩爲劇縣治狀稱最衡陽二郡備著賢勞承攝永道二州首尾年餘剔除姦弊愛惜財賦一毫不以妄用代者賴之近雖䝉朝廷差知房陵然其材識操行冝在激濁揚清之選已上三人者在本路守貳之内不易多得欲望聖慈特賜甄擢他日必能各以其所長見於世用奏舉李鼎陳覿黄龜鼎莫价乞賜擢用狀臣竊惟國家分道置帥許以察吏臣子以身報國未若薦賢臣承恩守藩罔功閲歲得於考察宜有薦揚竊見宣教郎知潭州益陽縣李鼎資性和平學業醇茂初任宜春簿領繼爲臨賀教官皆以修潔受知當路循次改秩試邑益陽適承彫弊之餘力行撫摩之政能修學校以勸士寛期㑹以安民獄訟不察而明催科不擾而辦平易近民於鼎幾之從政郎邵州州學教授陳覿賦資靖共持身端介平昔安分未始干進舊從朱熹講學尤以名義氣節爲重分教邵陽極力作成不專事於文辭能誨人以㢘恥恬退有守於覿似之從事郎郴州桂東縣令黄龜鼎材諝疏通器能肅給三仕於桂陽民懐其惠今爲桂東縣令乃昔峒㓂所巢龜鼎雖務懐柔亦不姑息革暴而良漸有端倪還定安集龜鼎有力焉從政郎道州江華縣令莫价志氣好修文采亦富見於議論每事正平江華之在舂陵號爲難治价力行撫字之政不忍鄙夷其民學道愛人价有志焉已上四人在臣部内具有實迹可采欲望聖慈特賜褒擢以厲其餘庻見九重不忘逺之意奏舉章瑑甄世光乞賜軫録狀臣竊惟用人之道猶之用器擇人之術比之擇材器不可不及鋒而用材不可不及時而擇及鋒則多利器及時則多良材臣前後薦士巳成屢瀆今於所部又得二人其材與器皆堪煩使涵養更久必大可觀然知其可使辦事又當及其英銳早加收拾竊見承務郎監潭州廣積倉兼衙倉章瑑材力强濟識度精明博通舊聞練達世務本州倉官前此並縁久例不免侵漁瑑能持身㢘潔遂絶此弊郡有亡金之獄累月不得主名臣委之考鞫數日卒得其實使之剖析疑滯當無留難廸功郎潭州醴陵縣尉甄世光奮自儒科曉暢民事出入阡陌未始辭勞而又不事詭隨能自植立醴陵之治理有效世光之助爲多已上二人欲望朝廷特賜軫錄它日或有繁難任使必能辦治惟幸朝廷及鋒及時而採取之再奏舉宋億狀臣二年分閫初乏寸長僅免曠瘝實賴僚佐臣伏見奉議郎前簽書武安軍節度判官㕔公事宋億學有師承行無玷闕靜重能守㢘潔不私奮由甲科雅安平進用舉主考第始獲更選以年制所拘遂授簽幙臣在鄉里已知其賢及來長沙適同王事朝夕相與識察益熟凡擬斷獄訟悉得其平區處職事皆協於理清不矯亢和不詭隨一郡賓僚少出其右臣嘗乞以倅貳奏辟後凖回降以不曽作縣難於施行臣實愛其人不容但已乞令再任仰荷俞允首尾四載操守如一臣之拙政䝉助甚多近日滿替咸惜其去而臣又誤叨改畀之命若不再以億之人材政績洊凟天聰則實有蔽賢之罪其何以勸來者欲望聖慈察臣斯舉出於公論特降睿㫖試以内外陞擢之職俾盡所長庶幾明時無失士之嗟在下無陸沉之嘆扶持世道豈曰小補伏候勅㫖奏舉蕭遵施梮姜注謝孫復謝興甫郄夢祥乞加録用狀臣䝉恩分閫自揆罔功惟念薦賢可以報上今有當官可紀居鄉有譽察議巳熟詎敢壅蔽弗以名聞臣伏見朝請大夫充荆湖南路安撫司參議官蕭遵材識優長政事勤恪克守家學蔚有文名前宰臣侍從皆舉充著述之選嘗以倅得郡而有恬退之心兩為湖南帥幕深知利便軍民相安人誦其德朝請郎通判潭州軍州事施梮器度恢閎材識明達留意宦業備著勞能嘗爲淮東倉屬荒政賴其經理爲邵陽倅善拊蠻猺再貳長沙闗决平允不事苛擾闔郡稱之朝奉郎通判潭州軍州事姜注禀資温粹持心正平濟美故家飾以儒雅其試邑贊幕俱有聲稱當路交章至於再四今倅是邦稱提錢㑹公私流通人䝉其惠承議郎充荆湖南路安撫司主管機冝文字謝孫復天資㢘謹識見疏通出自名門精於吏事昨任建寧庾屬能區畫茶利及宰浦城能字民發姦今贊機幕曉暢軍務措畫犒賞裨助爲多從事郎全州州學教授謝興甫文行華美氣質粹和謹重好修學術甚正爲殿試第五名十年不調今始分教清湘到官以來嚴於教養士子賴其作成從事郎新廣南西路提㸃刑獄司幹辦公事郄夢祥學識該通詞章炳蔚議論守正孝友可稱奮由甲科不自矜耀嘗分教郴陽兼攝倅職隄防盜賊動中事機今待逺次鄉黨稱其材業此六人者皆當官可紀居鄉有譽前後帥守監司屢有薦舉材之有用於此可見欲望聖慈隨其所長特加録用它日必能展效不負選掄奏舉趙綸趙彦搢祝夢良乞特與甄擢狀臣竊謂國之根本在乎民民之休戚係乎令令得其人政無不舉知而不舉何以勸功伏見通直郎知潭州益陽縣事趙綸相門濟美具有典刑天資粹和學識明邃近方更選試邑益陽綸到官之日寛以牧良善嚴以御彊梗民訟以時剖决曲直各得其當催科先出信由並無重疊追擾一邑之政整然可觀從事郎知潭州善化縣事趙彦搢屬籍老成儒科自奮持心寛厚律巳㢘平善化爲潭州附庸爰自前官縱弛之後繼以貪吏裒斂之餘彦搢區畫有方鉤索蠧弊不事鞭扑財計自裕一郡之人皆以爲能從政郎衡州耒陽縣令祝夢良上庠秀發材學優長吏事詳明有如素習耒陽爲衡外邑自比歲盜起鄰境實調發屯駐之衝民不奠居正資安集夢良到任未久一意拊摩平易近民推爲循吏此三人者皆作邑有善狀不負字民之選臣愚欲望聖慈特與甄擢俾就器使以勸循良不勝幸甚
