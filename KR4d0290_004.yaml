body:
  text: 後樂集巻四宋衛涇撰内制丘崈辭免端明殿學士侍讀依舊江淮宣撫使再除簽書樞密院事督視江淮軍馬不允詔勑具悉朕惟烈祖之朝舊德夙望今焉幾人而卿魁壘耆艾為國夀雋巋然獨存豈天將啓我家中興之業畱以遺朕意有在耶矧如才畧之雄足以當重任威名之著足以成大功近者有事中原將指非人輕信妄動是用輟卿筦鑰之寄盡䕶江淮之師而志念深長綜理詳密按屯飭備厥績用茂屬邉烽之多警在憂顧以未寛爰晉陟於機廷仍肇開於督府信任專則呼吸惟意風采振則觀聽益新高皇遺平城之憂朕非獲已武侯追先帝之遇茲廼其時注倚方隆勞謙宜畧所辭宜不允薛叔似為棗陽神馬坡兵敗乞行遣不允詔勑具悉卿以言論風㫖受知烈祖為時名儒圖囬經濟之業夙所抱負輟繇近列徃撫成師受任以來亦既累月凡所規畫當巳素定比頒命數增重事權北騎窺窬指授諸將摧鋒挫敵今其時矣上章引咎豈朕所聞矧事幾戒毫釐之差利害存呼吸之頃元戎一動衆心易揺選命餉臣就為卿副合謀幷智力控上流勉思報國之忠勿徇潔身之計無罪可待所請宜不允程松乞待罪不允詔勑具悉朕惟西蜀邈在萬里之外未嘗一念或忘於中矧時多虞謀帥尤重卿樞機夙望柱石全材比煩制閫之行就畀宣威之任惟文武兼資之有素故安危注意之靡殊屬北騎之犯邉致師徒之失律載披來奏良惻予懷雖長慮逺謀備述修攘之序然折衝厭難允資帷幄之籌兵將惰驕當裁之以法財力虚匱姑濟之以權卿固得以便宜朕弗從於中御亟展圖囬之畧迄成耆定之功庶不負於深知亦有辭於永世上章引咎非所欲聞無罪可待所請宜不允程松乞祠禄不允詔勑具悉朕顧瞻巴蜀在天一隅控制秦闗綿地千里方時無事謀帥孔艱矧今多虞擇才豈易以卿資兼文武識達經權昔嘗參筦於斗樞茲命宣威於井絡發蹤指示允嘉辟國之謀厭難銷盟顯著折衝之畧政徯勲名之究式觀忠孝之全廼繇念親遽欲諗疾夫王尊叱馭豈以家辭羊祜在軍何妨卧䕶中道而畫匪朕所期所請宜不允張巖辭免督視江淮軍馬不允詔勑具悉捷書屢奏敵衆潜奔情偽叵量事幾貴審雖權宜之可用念國體之當全卿望冠廷紳任顓樞筦料敵之智臨事之勇威足以行號令明足以公賞罰朕固知之熟矣爰因宥密之地徃提總督之權朕非務於佳兵卿具將於隆指揆萬全之長策成七德之雋功其在此行毋庸多遜所辭宜不允宇文紹節辭免兼同修國史兼實録院同修撰不允詔勑具悉朕惟信史之傳將垂永世之法雖廼圖囘於多事不忘敷述於先猷必得鴻儒徃資潤色卿學輳閫奥識洞幾微世參弼近之聨居稱文獻之美矧編摩之維舊俾論譔以是宜茲峻陟於中臺爰兼華於直筆式符妙選其畧謙辭所辭宜不允四川宣撫使知成都府楊輔辭免不允詔勑具悉朕惟妖孽就誅西陲甫定思得重臣以撫綏之念非聲實素著無以鎭壓羣動非識度寛明無以幷合衆謀以卿德懋材全望高諸老故就分閫之寄申以宣威之命朕又念賢者在朝何憂外郡之治直諫居内足寢淮南之謀是用蔽之僉言趣其來覲屬方側席以竚辰猶茲覽來章尚形謙避何也命召而不俟駕宜勉忠誠木彊而可折衝冀收儒效所辭宜不允安丙辭免轉中大夫端明殿學士知興州充利州西路安撫使兼四川宣撫副使不允詔勑具悉報非常之功者當隆於寵數撫新定之俗者難徇於彛章卿力奮精忠手鋤元惡易危為安而在譚笑固智畧之無前輟作傾耳以聽風聲諒人情之驩動乘衆心之共憤復故壤以如携露布朝聞褒綸夕下陞華書殿眎秩政塗豈惟彰體貎之優崇盖亟藉威名之靜鎮胡為剡牘尚爾控辭夫成功不矜已嘉任重之器先事而慮勿忘善後之圖副予眷倚之深昭爾勲庸之茂所辭宜不允安丙再辭免端明殿學士中大夫知沔州充利州西路安撫使兼四川宣撫使不允詔勑具悉朕惟定功行封以不踰時為貴任重致逺以能鎮物為先卿夙負竒才適遭多故率熊羆不二之士殄鯨鯢必戮之兇挺然忠誠皎若霜日談笑復秦闗之險從容奠坤壤之安爰稽盟府之藏亟舉司勲之典坐閱一時之久猶勤再命之恭夫視秩政塗朕既親以心膂宣威閫外朕方寄以股肱宜思體貎之隆勿存形迹之間亟祗茂渥益展壯猶所辭宜不允不得再有陳請楊輔乞還田里不允詔勑具悉朕惟國家平時儲養賢望正為一旦緩急之備卿高風立懦厚德鎭浮踐敭三朝華皓一節留以遺朕殆不偶然廼者孽臣敢圖不軌四隣震動西土繹騷惟卿截然中居倡率諸道詞氣慷慨意度安閒誕揚先聲與被密詔果兇渠之克殄迄井絡之載寧砥柱之屹中流昔固嘉於素守疾風之知勁草今愈諒於純誠俾宣外閫之威全䕶坤維之重封圻畧定尤藉撫綏豈徒寛西顧之憂抑俯徇蜀人之意抗章勇退非朕樂聞所請宜不允太皇太后遺誥夀成恵聖慈祐太皇太后誥内外文武臣寮等予猥以菲薄儷極阜陵獲執婦道以事高廟久承憲聖慈烈之明訓親見聖子神孫之相授饗東朝之奉垂二十年皇帝遹繩祖武仁孝彌昭屬者就安内庭昏定晨省率禮無闕頼天眷顧基祚方隆嘉與海内共底丕平永饗至養而春秋逾邁疾疢乘衰皇帝衣不解帶憂形於色禱祈醫療罔不疚懷定命有終莫施人力予年登七袠母儀三朝深明夜旦之常尚何死生之憾皇帝宜念宗廟之重勿過哀傷更頼二三大臣共為寛釋皇帝成服三日聽政䘮紀以日易月一依舊制行在文武臣寮十三日而除百官入臨隨地之宜諸道州府長吏以下三日釋服軍民不用縞素沿邉不得舉哀釋服之後勿禁作樂嫁娶應營奉等費並以夀慈宮錢物支給陵寢制度務從儉省毋事煩勞餘依憲聖慈烈皇后故事施行故茲遺誥想宜知悉擬不儔建節襲封嗣濮王制朕承詒燕之謀嗣延鴻之緒有懷英祖實基慶於濮園爰暨熙寧俶疏封於王社眷言族老卓冠宗盟稽世襲之閎規峻戎昭之異數誕敭制綍亶告廷紳具官某屬近而行尊身端而行飭出神明之冑小九宗五正之傳被儒雅之風躬兩獻二南之懿典刑前哲領袖洪支雖當武公耄耋之年居靡忘於箴儆常持老子止足之計動每戒於滿盈人知信厚之可師世謂康寧之未艾尚綴廉車之秩久從間館之游朕惟源之深者流必長施之豐者報亦厚歴考安懿百年之澤實開我家萬代之祥幣玉牲牷奉寢廟四時之祭山川土宇恢鄄城千里之疆爾惟聞孫舊有令望宜踵承祧之典聿循賜履之彛盭綬垂金賁苴茅之物采騂旌導節新授鉞之威儀申衍戶租陪輸井賦以固維城之勢以侈前寧之休於戱周尊同姓之盟以為之長漢列二等之爵其大者王惟忠孝可以踵令猷惟謙恭可以永終譽祗承茂命益介夀祺可宇文紹節辭免兵部尚書不允詔勑具悉古者六官之長皆取民譽盖欲敭歴事任經營四方使其名實孚於外而後選用重於朝朕以此意待士夫至不薄也卿學輳閫奥才裕經綸體國憂時蚤登禁列榦方盡瘁時號良翰久煩牧御之籌載錫召還之節惟武部廼司戎之職尚書為納言之官在平時不輕畀人矧多事尤當遴擇其勉副艱難之寄毋過形謙挹之辭所辭宜不允宇文紹節辭免華文閣直學士知江陵府兼權宣撫使不允詔勑具悉昔在先朝若琦仲淹經理西事或受任以出或毅然請行盖大臣以身許國罔間中外然踐敭既乆望實益孚華夏聳聞其風采卒皆為名宰輔朕觀祖宗用人於是有攷焉卿忠孝自其家傳材學周於世用比年以來入從出藩其帥合肥則備禦修飭其鎮京口則兵民奠安嘉乃茂庸召寘邇列荆襄擇牧復命建牙厥今邉祲雖銷而内治方急寛朕憂顧非卿誰可任者寵陞邃職承攝宣威卿其勿憚獨任朕屬任之意益厚矣亟祗成渙丕究逺圖所辭宜不允宇文紹節辭免侍讀依舊華文閣學士宣撫使兼知江陵府不允詔勑具悉近臣體國固不以寵利為心公朝用人亦貴乎名位之稱卿智畧輻輳忠節家傳屬當多事之秋屢懋榦方之績荆襄重鎭呉蜀要衝盖嘗畀卿以帥閫任宣威之寄矣朕念西冦甫殄北敵更盛外禦内修此時為急非擢正使領無以鎭撫邉徼非兼華帝幙無以昭示寵光成命既頒師虞允穆黽勉圖報乃卿職分謙引抗辭匪朕所望也亟祗渙渥毋憚暑行所辭宜不允趙淳辭免殿前司副都指揮使不允詔勑具悉朕至公御下勸賞眡功矧方邉壘之未平尤藉巖除而居重卿性資忠義智畧沈雄總禁旅於上游陟使端於制閫屬㓂戎之侵軼勵將士以扞防訖保堅城不假外援肆疇偉績擢貳中權實允叶於衆心奚尚煩於免牘夫出則任以方虎入則以為爪牙朕所倚毘又豈特密䕶凝嚴而巳折衝制勝將有頼焉報稱是圖撝謙宜畧所辭宜不允趙淳辭免特轉承宣使不允詔勑具悉朕惟將帥因事乃見其材朝廷眡功而為之報苟無以彰却敵安邉之績將何以勵忘身徇國之臣卿夙著威名獨當憂顧扞堅城於十日之乆摧强敵於百戰之餘皆而方畧之竒保我金湯之固肆頒茂渥用勸精忠峻陞畱務之班増竦轅門之望夫賞寜從厚朕固知臣下之勤勞然安不忘危爾宜念功名之終始毋庸多巽益展壯猶所辭宜不允丘崈乞守本官致仕不允詔勑具悉祖宗之時貴德尚齒凡股肱之舊年至而不得謝或承顧問或備諮訪皆足以表儀中外而諸老大臣雖身處佚休廼心罔不在王室初未嘗以脫遺軒冕為高君臣之間誼斯兩盡朕心慕焉卿出際三朝望隆百辟起從珍館作鎮留都擢貳幾廷肇開督府茂著籌邉之績尤深體國之誠比以閔勞少安閒燕卿固何心於出處朕亦靡替於眷思胡為剡牘之聞遽上挂冠之請惟今耆哲如卿幾人其悉至懷毋徇雅志所請宜不允張巖辭免資政殿大學士知福州不允詔勑具悉朕隆體貎之恩謹股肱之任故於大臣之去就毎務曲全其始終卿夙韜經濟之才再秉樞機之柄比開幙府出領元戎夫總督之任固不專於議和然狂狡之敵殆亦難於逆詐俾還位著尚頼帷籌洊覽奏封力祈引避爰冠班於規殿仍分閫於全閩朕於進退之際可謂有禮矣寛我南顧勉爾民庸又以疾辭非所喻也所辭宜不允張巖再辭免資政殿大學士知福州不允詔勑具悉厭二府之勞巳從所欲宣四方之力盍勉汝為卿蚤被簡知徧儀丞弼政頼折衝之畧遽騰引去之章祕殿隆名恩實均於邇列全閩便郡職固異於臨邉為爾相攸殆無過此尚思體國之誼勿事徇身之謀祗服寵榮毋庸多遜所辭宜不允不得再有陳請呉琯乞祠禄不允詔勑具悉昔漢馮野王以戚屬之賢擢左馮翊行能為二千石最然京師稱其威信亦必待嵗餘而後有攷焉盖用人無間於親疎成效皆責於乆任卿蚤更中外頗著事庸繇四姓之貴侯典九畿之奥郡官箴恪守民政可觀曾閱時之未多遽抗章而求佚朕方鑒守長數易之弊厭將迎費蠧之煩其益懋於治聲毋重陳於巽牘所請宜不允樓鑰辭免復原職不允詔勑具悉朕惟先朝夀俊初政侍臣眷懷不忘恩禮宜厚卿學為羣儒之表望出諸老之間燕頤累年華皓一節矧嘗冠文昌八座之班矣顧以微文未還寵職豈予尊德尚齒之誼哉茲從真館之游盡復西清之峻雖身居外服而心繫内朝匪徒加賁於丘園盖示不遺於故舊師言允穆巽牘奚為所辭宜不允費士寅辭免改差知潼川府不允詔勅具悉卿西州偉望二府舊臣乆煩制閫於邉陲為爾相攸於便郡距枌隂之宻邇視晝繡以何殊矧宣力四方式符雅志而折衝萬里正藉老謀茲忽攬于撝章祈退休於真館未為體國之誼夫豈圖安之時其略小嫌佇聞異最所辭宜不允楊次山乞休致不允詔勑具悉昔漢竇長君不以富貴驕人隂侍中力以盈溢辭位皆以后家同氣之至親而有恬養知足之髙致書之史册今為美談卿屬近坤儀班尊尉府當此精神之壯薦陳明哲之規眎漢二臣齊芳千載雖引年可尚而據禮未宜矧時方多虞情均休戚自圖便佚人謂斯何勉承眷倚之懷其畧好謙之牘所請宜不允趙善堅辭免除工部侍郎兼知臨安府不允詔勑具悉京師浩穰尤劇輦轂彈壓為先矧當多事之秋端以得人為重卿才猷強濟中外踐敭嘗奏最於神臯洊宣勞於民部比繇祠館起鎮制藩安田里之民枹鼓不警輯樓航之衆瀚海無波屬天府之掄才攷廷紳之僉論顧惟巳試之效莫如同姓之賢俾正橐班增峻事任朕匪輕於弄印卿奚徇於循墻亟服茂恩勉圖偉績所辭宜不允趙善堅辭免招收禁軍特轉一官不允詔勑具悉朕奬勵臣工靡恡爵秩所以示恩信章至公卿夙負材猷再總浩穰恢乎游刅藹然休聲恪奉詔條簡稽禁旅既疇庸之來上於論賞以宜先峻陞寓禄之階增重神臯之寄雖近臣體國罔寵利以為心然使人有功豈封爵之不予亟祗成渙毋事謙辭所辭宜不允趙師􅋷乞祠禄不允詔勑具悉京師浩穣古有難治之稱帥守屢更今以得人為重惟卿才周世用識洞物情比歷三輔之雄輒為九牧之最効見已試去思不忘故朕特輟邊閫之行復畀神臯之寄庶藉威望不煩教條而閱時未幾百廢具舉盖多多而益辦豈數數之為嫌矧如精彊安有疾疢遽有燕閑之請良非眷倚之懷昔翁歸以潔巳抱公表於近世廣漢以發奸摘伏名聞匈奴迹其有成悉繇乆任宜益圖於偉績顧奚徇於撝謙所請宜不允趙師􅋷辭免兼國用司參計官不允詔勑具悉朕惟器之小者雖加之圭勺而已盈力之宏者雖累以鈞石而不重卿智長於應變才裕乎撥煩再陟地官著阜通之效三為天府高治辦之聲矧餉節之薦更尤利源之熟究顧當今方急於財計而元宰亦提其大綱參禆碩謀正倚宿望人所難者卿則易然更觀游刅之新宜畧循墻之避所辭宜不允師垂再辭免除檢校少師不允詔宗族内朝之愛名器天下之公朕固篤於親親然敢私於授受恩義兩盡僉言允諧屬者祲結重闈禍延太母德莫酧於罔極禮孰重於送終朕方居廬不得躬夀原之役卿以近屬而徃宣使領之勤追竣事於因山訖寧神於清廟誕旉渙號庸奬成勞峻班列於孤卿隆表儀於同姓巳攽詔諭猶執謙辭深嘉體國之衷難廢懋功之典亟其祗拜勿復重陳所請宜不允師垂辭免除知大宗正事不允詔勑具悉古庶子官廼今宗正之任國家先選德望而位高屬近者特隆其名盖將以表儀内朝助我睦族不徒尊貴之而巳卿性資邁爽履行温純蚤屢試於事功晚遂安於閒燕朕念近支之賢宜在左右司宗虚次亟以命之矧而先王嘗典厥職視漢歆向父子亦何愧焉勉廸令猷毋庸多遜所辭宜不允陸峻乞祠禄不允詔勑具悉惟我祖宗尊賢貴老無愧三代之盛王耆哲居朝前後相望史册可攷卿器識閎逺德履粹夷簡在朕心十年於此晉列六官之長益儀百辟之瞻屬時疆埸之多虞正頼謀猷之入告共圖銷弭迄底安强胡為上章遽欲引去雖嘉止足之誼良咈眷倚之懷矧氣貎精神殆少壯所不及勿思自逸勉為朕留所請宜不允陸峻辭免除權禮部尚書不允詔勑具悉春官宗伯之職兼夷䕫之任所以辯上下之分洽神人之和非學通古今識明制作孰能居之卿業擅醇儒名高禁路憲府肅抨彈之奏刑曹助欽恤之仁迨兼直於瑣闈尤聳聞於批敇踐敭滋久獻納居多比虚位於秩宗將疇才於宿望乆焉弄印無以踰卿昔魯國秉禮而彊敵威懷叔孫制儀而悍將讋服得人而重自昔以然勉廸令猷毋庸多遜所辭宜不允賜叅知政事李壁生日詔迎長嶰籥甫踰浹日之期鍾秀岷山適紀誕辰之慶方躋榮於兩社實宣力於萬機宜舉賜章式綏夀嘏賜太尉保大軍節度使李孝純生日詔析木在辰俶正孟冬之序垂弧紀旦誕鍾戚屬之賢方開尉府之華益介琳宮之祉載朌臺飽式燕家庭生日賜生餼詔石泉槐火之新屬當令序蓬矢桑弧之設載誕鴻儒方頼經綸聿隆體貎頒餼牽於御府助燕喜於私庭益介夀祺永扶昌運今賜卿生日羊酒米麵等具如别録至可領也故茲詔示想宜知悉賜安南王李龍􅩾加恩制告書勅安南國王李龍􅩾九秋叶吉五室蕆儀荷上帝之博臨豈靈釐之専饗眷言南服為我世臣爰疏制綍之榮倂致恩頒之厚祗承寵數益懋忠圖商飛卿辭免戸部侍郎依舊淮西總領不允詔勑具悉轅門總餉委任匪輕若軍旅繁興則難易百倍卿清規亮節中外聳聞將指西淮朕所親擢方多虞之際調度四出用無乏興士得宿飽擢貳民部增重使權今既數月矣夙夜勤瘁綜理密微威信交孚卒乘輯睦肆嘉乃績就俾為真厥今敵騎雖巳引卻而邊瑣尚須調䕶夫規摹一定非可數更而事功垂成詎容中止此朕固以煩卿而非徒以寵卿也上章諗疾匪朕攸聞所辭宜不允呉獵乞罷黜不允詔勑具悉朕惟艱難多事之秋必得魁壘濟時之彦其材力足以禦卒變其器度足以包羣豪廼能合智并謀折衝厭難卿夙負兼全之畧乆分方面之權義旅雲從威聲逺憺朕念班爵崇則事任稱委寄隆則臨制廣是用陞之次對付以宣威迄屏扞於上流遂肅清於窮冦亟晉秋官之貳俾専使領之雄屬戡定於西陲宜將明於徳意徒得君重勉為朕行此誠忘私㣘國之時胡以引咎乞身為請亟其叱馭勿復重陳所請宜不允張澤辭免寶謨閣直學士宮觀不允詔勑具悉朕於侍從之臣進退以禮所以全恩遇勵節行也卿性質端靖議論正平擢居禁近之聨備罄猷為之益起之閒地畀以輔藩惟知平易以近民不飾厨傳以要譽屬時多事正藉老謀亟頒召音庸副虚佇乃力伸於祠請顧莫奪於冲懷爰陞西清學士之班以寵文昌八座之舊雖云彛典亶謂優賢尚毋忘畎畆之忠豈特示丘園之賁祗予成命奚事勞謙所辭宜不允陳杞辭免寳謨閣直學士致仕不允詔勑具悉知止足者人臣之髙致全體貎者朝廷之茂恩卿禁密之臣典刑之舊燕熙滋乆年德俱髙方有頼於詢猷遽力祈於謝事寵陞祕職勉徇冲懷然身在林泉之間而名列西清之籍豈特華其歸老盖曲示於優賢亟服徽章毋煩巽牘所辭宜不允蕭逵辭免招收福建路效用水軍數足特轉一官不允詔勑具悉操爵賞之柄示激勸之公雖予侍臣有勞必録卿器資端靖學職純明頃繇文昌分閫閩部有平易近民之政賦中和樂職之詩輸積募徒不擾而辦朕久知其為君子之才也肆疇茂績進陟崇階茲覽奏封力形謙避嘉爾體國之誼匪予懋功之心其即欽承式圖報稱所辭宜不允
