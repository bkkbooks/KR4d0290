body:
  text: 後樂集卷十七宋衛涇撰策問序跋行狀召試館職策問國家規畫長策思敉武功綜核庶政盡革平世具文之習將以恢王略而飭戎備敢問今之急務孰緩孰切夫建事以擇材為本經武以強兵為先調度以裕財為難儲庤以足食為重朝廷議論所及皆已次第舉行矣薦舉之詔首加於將帥之選又及於文武小大之臣不知可以博盡羣材否乎或謂介胄之所長搢紳之論豈能盡諗其優劣下僚之寒滯而上官之薦進未免有所遐遺則將何以開掄材之路歟中都簡試嚴良家之選諸路招募廣效用之額徒𨽻起戍收勇敢之士不知可以增警軍實否乎或謂選汰子弟拘於等則之不齊至反遺其技藝招刺新兵雖可充尺籍之數而倉卒豈容責其練習適戍征行動為民擾安能使之循紀律而用命則它何以為整兵之計歟軍須供億支費寖廣常賦不可輒加矣置國用參計之司以核天下之財廣鬻爵度牒之數以為權宜之策不知可以佐調度之乏否乎然州郡私其所入未必以出納之實上聞或迫之太急必至並緣為欺恩命優於舊比而應令者殊鮮異時勸誘不至寧免敷抑之病則裕民之道本末猶有當講者歟通融常平以濟轉輸之不給分委和糴以為蓄積之先具不知可以實塞下之備否乎然官吏苟且目前增補不能以足脫若小歉荒政何所倚賴近甸糴數太多商賈輻湊逐利一時雖可辦集民間能無續食之憂則足食之方先後猶有可慮者歟伊欲使時材奮興而有適用之實王師精鋭而有必勝之形版計周裕而源流無壅兵食充羡而公私無害子大夫當有深長之思以禆今日濟時之略其詳陳之將以復于上葉雲心注清淨經序關尹子曰非有道不可言不可言即道果不可言歟經以載道聖賢立言以明道訓故者復以之正訛辨惑發揮聖賢之言而道乃無蔽則言惡乎可廢當知口耳之所及者道之筌蹄而得於神融心會則言皆糟粕耳常清淨經道藏之上品學道之户牖也余嘗誦閲至老而未究其奧雲心居士一日過我袖出解義玩繹數章簡易而明白侣於經旨已無餘藴不覺擊節自謂弗如也詫以示諸同志或有難之者曰所釋無形無情無名然矣不區以别之則生天地運日月長萬物皆可以形情而互遷於此得無遺論乎豫答之曰擘肌分理而析其義則易流於穿鑿舉綱撮要而歸諸理則不失於渾融繼有難之者曰太上此書幽眇元邈未易窺測而欲以儒者之辭發其祕顯其微亦難矣夫豫又語之以王輔嗣用老子解易郭象解莊子似莊子議者非之今以簡易明白之説而闡幽眇元邈之旨則亦奚病然嘗聞之道不可聞不可見矧可言故關子可以言歸之有道者而且喻之以如吹影豈厚誣哉湛然澄水纎翳不留混茫太虛羣動俱息爰清爰靜是特入道之端倪而語其至極則窈乎寥乎超乎太易之先且無眹迹可求况得以筆舌擬議形容耶雲心於真常之藴固以深造而自得之矣而不免於言者蓋欲為後學筌蹄耳學者苟能繇其所言以推尋其所不容言者潛通默識籥乎太上之道則是經亦糟粕也然則太上著其所而為是經雲心演其義而為是辭與夫人之問難僕之辨釋皆贅也又從而為之序不尤贅乎曷若一付之忘言度人經後跋道藏三十六部傳流人世所睹聞者可數而靈寶度人一經尤無上之上又玄而玄者也元始一氣本於虛無惟虛惟無故能神而化之演大範於玄座而無類不生無物不成集萬真於黍珠而何大弗容何衆弗納誦之者能使遂白日之沖舉起長夜之沉淪豈諸道典可同日語其間元洞一章微顯闡幽妙韞攸寓修真之士儻知沉潛探索凝志忘形使氣化神神化虛歸於太無則雖未登玉京蕭臺固已合真元始而陟降左右矣道逺乎哉古有羽士日誦不輟飄然仙引他如度亡拔苦除妖弭患證驗非一窮髙極逺而測深厚其功力未易量也練使平君喬梓不吝重資大書深刻褫背成帙以散施四方持奉之衆豈謂是可徼福利哉蓋以此經之可慕可尊也福利固非為善者所覬然感應有機自有不期然而然者矣跋楊文公墨帖昔人云文章餘事士以德業為本文公國朝盛時道德文儒行誼氣節固與歐蘇馳驅千古若文體之變時有先後易地皆然要不必論江州使君公聞孫也自其先世裒集真墨迄今七十餘年將鋟木以廣其傳寶慶丙戌春書來遺録本恨見之晚觀諸賢題跋已盡稱揚之美頻年衰病筆墨流落然亦毋庸贅語玩閲數過亟以歸之因附名卷末庶託不朽云清明日吳郡衛某書跋四大夫手書創貽慶庵疏語某自幼聞先親偕伯父言先祖學究葬華亭鳯凰山之原幾二百年矣今族系繁衍皆所自出時節春秋必親祭拜守庵僧徒歲有常廩又助之買田為久長計某祗奉先訓惟謹比歲二月庚辰展掃墓下風木森然獨屋宇頺圮庵僧如珏袖出朝散四大夫創庵手筆一紙翰墨如新字間或刓缺且不著歲年卷末有亥六月三字以譜牒考之當是宣和初元時先祖甫登戊戍第侍郎召置三館尚書浸歷從班大夫有積善在躬克昌厥緒燕及雲來簪紱鼎盛等語躬率弟姪鳩工度材列名其次一為尚書父朝散七大夫一為十一府君逮今又百年大夫曾孫藻為二千石其他取世科登仕籍修儒學者不乏人某亦以非材嘗備數政府庸非逺澤所及耶方念為之更葺數楹視舊稍加爽塏使僧徒安居夤奉香火忽得大夫親迹捧誦再三仰見前人奉先追逺不忘本始之意篤厚如此即循故事捐錢十萬俾如珏董其役仍書梗概貽諸賢族冀勉承先志相與成之是將以大夫遺墨鑱石庵中傳不朽云嘉定五年仲春既望某拜手謹識御翰友順二字跋文嘉定乙亥冬十月臣涇昧死再拜言皇帝陛下臣之先世嘗以友順名所居之堂歲月逾逺扁榜未立無以稱為人子顯揚其親之意陛下不以臣愚戅幸嘗偹位丞弼願有以寵嘉之聖恩俞可於是親御翰墨大書二字以賜奎壁之光下飾蓬陋絢爛舄奕萬目聳瞻臣稽首頓首對揚休命退竊念列聖寶章宸畫寵錫臣下必皆一時勳舊文學之士日侍間燕僅乃得之如臣去違軒陛身落江湖誠不自意冒膺殊榮凌兢奉承懼弗克任惟先臣季敏與伯父臣時敏孝友天至人無間言斯堂之名義蓋取此臣兄弟臣涇臣濟臣洽臣湜從兄弟臣沂臣溉臣汋臣洙追繹先志聚居族食俾世世子孫罔敢失墜而臣猥繇末學謬忝世科誤陛下拔擢皆非蒙昧所能及實先訓有以成之也夫天典民彛風俗之感化關焉襲光睿藻萬世之表勸形焉然則陛下之所以詔臣者豈惟臣一家之私所以風厲天下者至矣兹庸摹刻被之琬琰併識下方傳之無極嘉定九年正月十一日資政殿大學士通議大夫知隆興軍府事兼管內勸農營田使江南西路安撫使馬步軍都總管吳郡開國公食邑二千四百户實封三百尸臣衛涇拜手謹書皇太子寶翰後樂二字跋文皇帝陛下既大書友順二字賜某命揭于先人之廬某又因暇日即所居葺成一堂竊取文正范公之語名曰後樂而皇太子殿下復灑寶翰俾勒為華榜以侈榮遇於是兩宫筆墨之妙重輝迭明照映江湖永為山林一隅之鎮惟范公起諸生少有大節每日誦曰士當先天下之憂而憂後天下之樂而樂夫憂樂以天下而先後在吾身則其所謂憂樂亦異乎人之憂樂矣其後參仁宗皇帝大政為宋名臣某生晚陋道德勳業不足倣佛萬一然竊知師慕今年衰志惰退藏邱壑仰窺皇帝陛下聖化日新皇太子殿下溫文日就顧雖老矣猶得與魚鳥之微遊泳德澤某之憂固可忘而樂則無窮也殿下以某嘗陪儲賔末綴故將賚及之敢併刻諸石以夸耀永世云嘉定十年六月初三日資政殿大學士通奉大夫提舉臨安府洞霄宫吳郡開國公食邑二千四百户食實封三百户衛某謹跋遊澱山識外舅餞送淮東詩後某紹熙壬子春赴淮東倉司往别外舅已病無他苦但以少食多倦以長篇飢其行且送到澱山僧廬到海陵甫踰月遽以訃告明年夏移浙東始得撫棺一慟後二十六歲嘉定戊寅冬敬閲故書見之愴然因識其後云先祖考太師魏國公行狀公諱某字致虛上世齊人唐末避亂徙錢塘又自錢塘徙華亭故今為華亭人曾祖某故不仕祖某故不仕父某贈朝請郎母陸氏俱贈宜人由公仕纍封也家世業儒朝請公厚德慷慨譽重閭里生二子公其仲也人授一經闢館延四方賢士為之師公自為童有志氣其進退應對已如成人親識莫不竒之未弱冠母陸氏捐館公追慕哀毁喟然歎曰吾不立身揚名不名人子於是蚤夜孜孜力學不倦一夕夢陸氏拊公之背而告之曰衛氏有後吾死且無憾矣公自是益刻苦年二十有五以舍法預貢升太學𨽻學五年經通業成擢進士第實政和八年也初調宣州南陵主簿明年己亥迎侍之官任滿升從政郎攝學正移攝太學博士繼三歷民社所至有聲初為溫州平陽縣令平陽溫之劇邑常難其人公下車未久善政化俗吏畏民愛尤以亷平自守忽一日縣郊遺火密邇縣治家人驚恐公曰果一邑之民皆災吾可獨幸歟命取公服向火而拜尋而反風滅火皆謂公神明之政可感天地遺愛在人平陽之民圖公之像于今祠焉再為臨安府新城縣令治聲茂著刺史部刺史一時名卿交以公名聞于上改通直郎未幾而二親繼亡公居喪盡禮常泣謂人曰吾不幸竟不逮生封憾何時而已耶及釋服差知餘杭縣視事之初公之兄以訃告公奉朝假歸赴既畢大事囑其猶子儔等曰吾憐汝之孤不忍分析所有先人家産罄以付汝復諭以剸裁家務之式戒其自勉又時推俸餘以助之甚為士論所重公之在餘杭施設不可備舉如興馬監如造溪橋皆有利於國有便於民其他所行後政率以為凖式既治行尤異時餘杭又屬籍天府廟堂遂浸熟公名矣考滿除通判鎮江府治歷二年府中胥慶及瓜之日太守曾公惇率僚屬餞公郊外千里之民攀轅戀德恨借留無計太守遂紀公之事命刻于石至十九年以歷任功賞磨勘凡六轉至朝奉大夫除通判紹興府居家待次二年俄得疾謂其子時敏曰有生必有終天地之常期自然之至數是以通人逹士以存亡為晦明死生為朝夕此理之常無足怪者我之疾革決不能起也汝輩孳孳為善無墜箕裘之業足矣少選泰然而逝實二十一年十月初一日也享年六十有二以二十二年十月十三日葬于湖州歸安縣廣德鄉石佛塢之原從吉卜也公娶沈氏平江人封宜人男三人時敏尚賢季敏時敏遇郊恩補將仕郎尚賢先公三十五日而卒季敏未官一女適右迪功郎新差監真州在城都商稅務孫伯彪公為人天資長厚寬仁愛物三仕為令尹民有訟入公庭諄諄撫諭如教子弟有可解解之必不得已象罪入刑焉及通判鎮江日令職官不得有私囚至則上之公隨事斷遣舉當於理由是獄無停囚庭無滯訟部使者每按臨無不嘉嘆在鄉周旋無貴賤親踈悉加以禮自始學至老未嘗釋卷有易説十卷論語解十卷其他所著文甚多未暇編次不汲汲於進取能以道自娛故官止于正郎職竟老州縣嗚呼哀哉以公之德而天何嗇之以壽耶公死之日逺近之人莫不吁嗟歎息如喪所親夫豈無自而然蓋經行狀公諱經字德常姓蓋氏其先大名府宗城縣人大名於漢為魏郡有蓋司𨽻墓在焉自漢及唐世有聞人髙祖以來蓄德不施武功始繇醫學得祿仕乃移籍開封靖康之亂中散挈家東南公生於建炎三年十月二十一日時道路榛梗行者不敢喘息公在襁褓家人輩屢趣乳者委置墟莽間曰毋以兒故纍百口乳者負而祝曰吾兒非凡必有相之者抱持疾趨日昳不哺乳飢無啼聲迄保護脫賊境人皆異之幼頴悟端重如成人少長有大志刻勵就學并日夜忘寢食操筆為文辭頃刻數千百言未冠逰太學挾其所有與四方之士校程式常出衆上聲振一時嘗有善相者問公姓氏曰君非蓋防禦家耶防禦有隂德里第旁近居人寒遺以衣飢飼以食疾豫以藥或深夜欵門戶委錢粟奕世流祉其後宜大天之報善在君矣以上舍奏名南宫擢紹興三十年進士甲科調紹興府司户參軍未幾罹外艱公以祿不逮親執喪哀毁過甚雖貧自力葬祭如禮乾道二年服除有旨擢太學正繼丁令人憂公以憂患艱閔十餘年學日益充朋逰多附華聞彌大宰相夙知公召復以才行薦于上除武學諭時壽皇在位十年矣方總核庶務規圖駿功公因對首斥佛老異端之説言其教以清淨虛無為宗人主崇尚稍入其説則蠧壞心術雖有剛勇正大之氣將為之銷蝕而不自覺且聾瞽愚俗至竭資産以奉施舍土木競興金碧流爛糜耗民力其弊不可勝計又言近時風俗奢靡相尚冒上踰等請申嚴法禁一切裁抑且請自貴近始壽皇嘉納即詔行之自是簡記上心九年除敕令所刪定官俄兼國史院編修官實録院檢討官浸歷清貫淳煕二年十月輪對賜見選德殿公奏言天下無不成之功須平居暇日所以治國所以制敵者從容有餘力而後可以應機會若歲月悠悠大計不立臨事後圖智者無所用其巧矣又言人言圖回不世之功當以人才為急今之用人不患無文采強幹小亷曲謹所急者忠誠奮發節槩特立易於感發之人夫忠誠節槩則其資稟渾厚亮直愛君愛國之念固已素定一有以激勵聳動之則捐軀竭節自不能已此等人才世固不乏但作之則興沮之則壞在人主抑揚進退之間耳又建請中興以來將相功臣不為不多方舉行慶典宜從凌煙麒麟雲臺之制繪像祕閣以侈太上皇帝一代之宏烈亦激勸人才之一術皆當上意公又論風俗頽惰殆類江左昔劉翔譏晉之公卿曰四海板蕩奄踰三紀斯乃廟堂焦慮忠臣畢命之秋而諸公晏安江左肆情縱欲謇諤之言不聞征伐之功不立何以尊主濟民今日之患莫大於上欲為而下不應陛下果欲伸大義於天下雪祖宗之讐恥非勵志節使人人有趨事赴功之心不足以振此弊往復數百言漏下數刻占奏詳明玉音嘉奬時上延見小大之臣咨詢治道尤注意人才及召對問公家世喜曰朕固知卿磊落閲所進疏見公階八品曰卿未改官耶即日特旨改宣教郎蓋異恩也翼日淮東總領錢公良臣對上宣諭曰蓋某有用之才曽無為朕言者朕因奏對自知之錢公因贊上知人之明且稱其才八靣受敵上曰卿言必不誣遂有意逺用矣尋除著作佐郎它日忽中使持詔至所寓舍問公經理財賦事公手疏奏臣起諸生財賦雖非素講然君命也寧有所擇乎聞者知公將有總餉之命三年正月除司農寺丞兼權戶部郎官總領淮西江東軍馬錢糧専一報發御前軍馬文字臨遣之次壽皇虛懷以聽公亦慷慨論事於封植人才以備緩急一説必諄復言之其略曰凡人才之可用者以其有精華果鋭之氣也如使銷鑠而不存枵然無用之人耳唐陸贄謂聖人之愛人才托其華英而使之當其暢茂而奬之是以鋭不挫而力不匱然此用才之説也若儲才需用則必更試以事功一習練世故可以老其才二發攄底藴可以堅其志三出入中外可以積其望蓄之如此其素自然取之不盡用之不竭何至臨事有乏使之歎哉又言理財之法纎悉畢備不可有加矣盍補罅葺漏使弊去法全則斂不及民而財自裕今外之轉運內之戶部皆財計所聚非若它官可責速效不能者既以無功而罷能者又以有勞而遷代易不常苟同傳舍彼偷免幸容耳何暇究心革弊乎壽皇首肯再三又請廣儲粟以實邊備嚴薦舉以戒市恩上皆然之撫勞丁寧公感上知遇到治所即布宣德意講求軍政之闕異時軍帥或務掊克以供苞苴遊燕無度使者業與狎昵莫敢孰何公拊循士卒申結諸將務極恩厚而身為繩矩自有以厭服其心視前所為悉斂戢由是人無猜阻軍政以舉自主將至於行伍莫不畏而愛之久而益服洎四年九月被旨奏計軍中利病人於公無隱情悉得其實一一條奏多所釐正其它節目如定按試時限填諸軍闕額軍中子弟以蔭得官者放令赴選公謂子弟生長行間便習弓馬於官業未必通解不若仍肄尺籍給衙吏俸較之新招刺人大不相侔又調發之際彼各衛其父兄可得死力詔為罷行之除户部郎復之任越明年三月又得旨奏計公將去於是再歲績用兹茂壽皇雅欲留公曰朕思代卿者難其人勉為朕往出尚藥器幣香茗以寵其行公在職益謹不懈國計軍政有所關繫講之益詳居五月召歸時邊圉北有輕脫生事者公入對因言善謀敵者不輕於用而后可以大用祖逖擊楫誓江志清中原及鎮雍邱與石勒相持境上乃通互市卻降人禁諸將侵暴古人圖勝藏於無形若校虛文貪小利使彼暌暌然以我為虞計亦淺迫矣至如避罪逃人宜勿收受盜馬來市勿與貿易間諜不密毋庸多遣廓然示以誠信以俟可乘之機乃國之福也壽皇憮然曰卿誠體國之言擢權戶部侍郎公謂財計固所當慮民貧抑非便即奏言丘夷淵實理所必至與其民貧思盜寧若捐微利以豫民使監司州縣通融有無冀漸紓民力此實固根本之道今所甚急者節浮費革濫賞汰冗吏言皆切理可謂知所先後矣七年五月詔兼侍講紬繹之暇於古今治亂君子小人消長之際必詳究熟復上為動寤是歲適旱公疏備豫六事曰定賑貸之賞曰通商販之利曰散常平曰嚴檢視曰已逋責曰緩賦租尋詔諸路備荒政實自公發之十一月借戶部尚書充賀金國生辰國信使過故都歷覽山川形勝感憤黍離中夜雪涕緣道觀者知公壯人爭覩為快舉手加額曰此中原人物蓋遺黎思漢之心未泯也接伴馬惠迪意傾鄉公公開懷與語具知彼中事情三月竣事入奏畫取守戰三策以獻咸得其要領非他人剽聞掠説藉手嘗試者壽皇改容稱嘆已而陳軍政四事一務蓄積二久任將三選幕官四旌武藝其久任將曰比嘗有以文易武為都統制者旋復文階文武之任視其才之當否可也豫奪不出於公言避就一聽其私意褻戎事亂名器莫此為甚選幕官曰近世士大夫狃於習俗不親武事一從軍幕目為冗濁遂使不肖者充員有才者恥就冝稍重其選精擇其人時賜對揚擢以清望他日贊謀經武將於此取之今軍幕許參用文臣略施行矣八年九月二日正除戶部侍郎二十日兼侍讀先是六月壬申詔開講日讀陸贄奏議比秋始御邇英適史魏公浩免奉朝請進讀虛席政府進除目上越次命公公力辭避詔不許公甫拜命趣入對天顔恱懌拊問甚厚且賜之坐曰朕素知卿乃以錢良臣姻家用卿晚矣公局蹐頓首謝後二日而言者及公公亟請去歸既踰年提舉江州太平興國宫十一年除知池州未赴仍奉祠十二年二月除知江州十三年八月起家知鎮江府辭不獲命勉至郡政以寬簡惠先鰥嫠甫三月人用寧便邑有姦贓吏公未致詰懼不免隂為詆訾旋以祠歸公置不問代公者卒劾罷之公遂杜門卻掃若將終焉初公家平江後徙華亭自戶部歸並所居闢地數畝佳花美木列植交蔭間以亭榭有堂扁曰怡顔翻閲故書徜徉其中親朋過從賦詩飲酒宴笑終日客去退處一室翛然或夜不寐則攬衣危坐篝火觀書逹旦脫遺紛埃沖淡如也如是且十載中間一出僅踰時公安於間適然燕居深念視國猶家每以國恩未報為恨嘗語人曰一旦君上使赴危難吾死所也若苟竊廩祿則已矣此公許國之素志也奉祠凡四年秩滿又閲歲絶不復問曰吾直未敢請致軍事爾紹熙三年四月二十七日以微疾卒于正寢享年六十有四初得疾起居如平時曰晝夜去來理之常也疾革對妻子無戚容語不及私盥濯正衣巾屬纊不亂其處死生之變足以見公平日矣公性夷易平直無崖異壁絶之行接人遇物氣貌溫如及當事或理所未安毅然有守不可奪以勢利內外純白非矯厲以為髙者以薦逹人才為任嘗言侍從初除舉自代美意也今具文應故事是除授之始言已不可取信何以責其後乎其忠實不欺類是家始甚貧然尚氣義賙人之急視出貨力如秕稗其遇故舊尤篤至解衣分食家之有無一不以綴意居官則務謹節曰有妄費者必橫取其在淮西有馬司一軍比他總領所為雄劇前居是職者賦入多漏失或侈用率稱貸朝廷别藏積四百餘萬緡公至精考核省餽遺不飾虛譽曽不乏供任戶部二年檢柅吏姦無招權乾沒之患調度有餘未嘗創一科斂條目凡所建明多及民隱殿司嘗干內降闢牧馬草地冒民田幾千頃公於上前辨折甚苦曰安可奪養人者以飼馬詞直理明卒從公議民田賴以獲免又請置籍植碑以弭後患其惠利博矣公於兄弟友敬素無生業既仕則均祿秩相繼蚤世公撫孤幼如已子延師使就學女厚資裝為擇佳配二姊嫠居無依倚公迎以歸奉養有禮明堂恩得蔭補舍其孫官季弟之子鈞今主嚴州建德縣簿歲時祭享滌濯必親嘗涕泣而言曰祭之豐誠不如養之薄也居鄉尚齒曩或以爵公身率之今遂成俗頃需次餘暇鄉黨後生多從講學公勸飭指誨亹亹忘倦後大半為知名士謙虛樂易惟恐不及仁厚好施始終弗渝公死之日逺近弔哭皆曰失此巨人長德矣公娶章氏封令人子男二人長曰鋭通直郎福建路提舉市舶司幹辦公事次曰鑄文林郎新監淮西總領所太平惠民局女四人長疾廢為尼次適朝請郎新通判鎮江軍府事錢仲彪次適承議郎充兩浙路轉運司幹辦公事王伯度次以歸涇孫男三人溥登仕郎孫女四人公家居無惰容亦不嚴厲自奉甚約藏書萬卷多手自標識尤耽班孟堅史且慕其為文有文集二十卷藏於家公自登第在選調十五年繇刪定官改秩七年位為侍從官至中大夫方未遇時人莫不嘆其淹滯公處之恬然晚為時用稍號通顯人咸謂宜公惟以超轕為懼公為人倜儻每務大體不為細冗之迫束於世無所怨惡始去國詔與祠時西掖當書詔者素與公厚善方來謁詡詡笑語退而繳奏竟寢祠命公不之怪也性不喜附麗苟進一意孤立其遇合端有本末有讒毁之者公卒無一語自解惟壽皇特知之深以故雖在外久而眷禮不衰公嘗曰吾安義命期無愧於心人知不知弗恤也嗚呼公出處之節與流俗落落若是則可以無愧也已鋭等將以明年七月辛酉葬公于餘杭縣吉安村山之原以行實囑涇顧晚陋不足以知公令人於涇為從母實姻舊義不得辭謹撰次其梗槩公祥符縣開國男食邑三百户褒贈不及沿近制也然嘗登從列於史法應得書將俟立言之君子有考焉謹狀故安康郡夫人章氏行狀夫人章氏其先建寧浦城人後徙居秀之華亭曾大父糈故贈承事郎曾祖妣徐氏周氏祖柷故任右通直郎祖妣孺人吳氏張氏考終故贈武義大夫妣宜人黃氏夫人生於紹興庚申幼端慧婉娩聽從動合女憲父母愛之誓不與凡子時中興右文崇建學校侍郎蓋公名一家少年首馳俊聲多士慕向尋繇舍選登鼎甲咸謂擇對莫冝于公遂以夫人歸焉既有家上承姑嫜旁接姻戚下御妾媵罔不順適閨門之內愈愈如也初侍郎處窮約而輕財尚氣誼家無餘資夫人竭力營陔養具滫髓問衣佐餕雖罄奩笥不憚侍郎得以悉意講學從之遊者日盛後多為聞人侍郎素友愛自夫人之歸愈無間言諸姑以孀獨來依夫人盡禮敬同甘苦始終猶一日死葬之先塋之側以便時祀有妹在室夫人資送特厚至損首飾豫之侍郎嘗欲舍其孫而官猶子夫人從臾不遺餘力昆弟之孤在左右者自幼及長拊育誨化男有分女有歸夫人之助多焉平居自奉簡素周人之急常恐不及親舊貧不能自存者皆有常餼歲飢里閭囏食則發廩損市直以倡巨室全活甚衆其仁而好施積而能散蓋出天資非勉強飾情以沽譽也自侍郎即世夫人理家政井井有條門祚益大簮組蟬聨蘭玉森列母孫四世極含飴戲綵之樂賜名亞于秦虢延慶侈于姬薑壽考康寧廣備五福世所稀見人以為隂功淑德之報嘉定已卯夫人年登八帙齒髮不衰精神益壯族黨合賀進流觴婦孫歸侍慶席數陪宴語杯酒流行多至夜分少壯或欠伸跛倚夫人整衣危坐無倦容涇固歎其稟異且期頥未艾也子鑄持荆襄使節將力丐歸為壽夫人持書止之曰邊氛未靖汝當宣力國事毋以私廢公雖嚴父教忠之訓不過此嗚呼賢哉性沖淡中年即屛脂澤釋綺麗日翻內典味禪悅脫遺世故死生旦暮之理洞然于中無一毫底滯屬纊之夕曽不怛化甲申八月二十六日以微疾卒于正寢享年八十有五纍封至安康郡夫人子男二人鋭故朝奉郎主管台州崇道觀鑄朝散大夫直祕閣知太平州女四人長從浮屠法次適中大夫中書門下省檢正諸房公事兼權兵部侍郎錢仲彪次適朝議大夫知通州王伯度幼以妻涇孫男五人溥從政郎京西路轉運司辦公事淳文林郎新監行在文思院門澄從事郎新湖州烏程縣丞涯漸將仕郎孫女七人朝請大夫知吉州軍州事趙希琴國學進士鄭公紹朝散大夫主管建康府崇禧觀劉垕忠翊郎添差監湖州都酒務趙汝旗承信郎新監戶部中浦犒賞酒庫張師稷浙漕進士陳極其壻也次許嫁涇幼子宣義郎新監建康府糧料院柳曽孫男六人似之仰之餘未名曽孫女三人鑄將以寶慶元年月日奉夫人之柩合祔于侍郎之墓以行實來請涇視夫人為從母且子壻也夫人與先妣實同生年涇不孝失所恃踰三十年不勝風木之痛每侍夫人如母存焉夫人遇涇亦均子姓壬午冬杪涇得竒疾屢瀕于死夫人不逺數舍來視問憂形于色至為之禱祠名山眷眷不忍舍去恩意篤矣涇方俟少間求從容外舍别甫踰歲遽隔千古傷今念往不知涕泗之橫集也追述遺美不敢以衰病辭扶羸執筆姑敘大略以備彤史之採訪云謹狀
